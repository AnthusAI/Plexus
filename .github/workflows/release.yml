name: Release

on:
  workflow_run:
    workflows:
      - CI/CD Pipeline
    types:
      - completed

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: false

jobs:
  semantic-release:
    name: Semantic Release
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main' && github.event.workflow_run.head_repository.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: refs/heads/main
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install semantic-release
        run: |
          python -m pip install --upgrade pip --no-cache-dir
          pip install python-semantic-release --no-cache-dir

      - name: Semantic Release Safety Check
        id: semrel_check
        run: |
          python - <<'PY'
          import os
          import re
          import subprocess
          import sys

          def read_version(*args: str) -> str:
              proc = subprocess.run(
                  ["semantic-release", "version", *args],
                  capture_output=True,
                  text=True,
                  check=True,
              )
              text = (proc.stdout + "\n" + proc.stderr).strip()
              matches = re.findall(r"\b\d+\.\d+\.\d+\b", text)
              if not matches:
                  print(f"Unable to parse version from output for args={args!r}\n{text}", file=sys.stderr)
                  sys.exit(1)
              return matches[-1]

          def semver_tuple(v: str) -> tuple[int, int, int]:
              major, minor, patch = v.split(".")
              return int(major), int(minor), int(patch)

          last_released = read_version("--print-last-released")
          next_version = read_version("--print")
          should_release = semver_tuple(next_version) > semver_tuple(last_released)

          if semver_tuple(next_version) < semver_tuple(last_released):
              print(
                  "Semantic-release safety check failed: computed next version is lower than latest released tag.",
                  file=sys.stderr,
              )
              print(f"latest released: {last_released}", file=sys.stderr)
              print(f"computed next:  {next_version}", file=sys.stderr)
              print(
                  "Aborting release to protect published GitHub release history.",
                  file=sys.stderr,
              )
              sys.exit(1)

          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as fh:
              fh.write(f"last_released={last_released}\n")
              fh.write(f"next_version={next_version}\n")
              fh.write(f"should_release={'true' if should_release else 'false'}\n")

          print(f"Semantic-release safety check passed: latest={last_released}, next={next_version}")
          if not should_release:
              print("No new release needed; skipping semantic-release push/publish.")
          PY

      - name: Prepare Git Auth
        if: steps.semrel_check.outputs.should_release == 'true'
        env:
          ANTHUSBOT_GH_TOKEN: ${{ secrets.ANTHUSBOT_GH_TOKEN }}
        run: |
          if [ -z "${ANTHUSBOT_GH_TOKEN}" ]; then
            echo "Missing secret: ANTHUSBOT_GH_TOKEN" >&2
            exit 1
          fi
          token_actor="$(curl -sSf -H "Authorization: Bearer ${ANTHUSBOT_GH_TOKEN}" https://api.github.com/user | python -c 'import json,sys; print(json.load(sys.stdin).get("login",""))')"
          if [ "${token_actor}" != "anthusbot" ]; then
            echo "ANTHUSBOT_GH_TOKEN is for '${token_actor}', expected 'anthusbot'." >&2
            exit 1
          fi
          git config user.name "anthusbot"
          git config user.email "anthusbot@users.noreply.github.com"
          git remote set-url origin "https://x-access-token:${ANTHUSBOT_GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"

      - name: Run Semantic Release
        if: steps.semrel_check.outputs.should_release == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.ANTHUSBOT_GH_TOKEN }}
          GH_TOKEN: ${{ secrets.ANTHUSBOT_GH_TOKEN }}
        run: |
          semantic-release version
          semantic-release publish
