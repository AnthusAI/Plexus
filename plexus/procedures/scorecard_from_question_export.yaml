name: Create Scorecard From Question Export
version: 1.0.1
class: Tactus
description: "Create a scorecard and one score per question from ai-ready JSON export."

params:
  questions_export_json:
    type: string
    input: textarea
    rows: 12
    required: false
    description: "Raw ai-ready export JSON text. Optional when questions_export_path is provided."
  questions_export_path:
    type: string
    required: false
    description: "Path to ai-ready export JSON file. Optional when questions_export_json is provided."
  target_scorecard_name:
    type: string
    required: true
    description: "Name for the new scorecard to create"
  target_scorecard_key:
    type: string
    required: false
    description: "Optional key for scorecard. Defaults to slugified target_scorecard_name."
  target_scorecard_external_id:
    type: string
    required: false
    description: "Optional external ID for scorecard. Defaults to key."
  target_scorecard_description:
    type: string
    required: false
    description: "Optional scorecard description"
  account_identifier:
    type: string
    input: hidden
    default: "default"
    description: "Account identifier (key/name/id)"
  model_name:
    type: string
    default: "gpt-5-mini-2025-08-07"
    description: "Model used in generated LangGraphScore YAML"
  model_provider:
    type: string
    default: "ChatOpenAI"
    description: "Model provider used in generated LangGraphScore YAML"
  reasoning_effort:
    type: string
    default: "low"
    description: "Reasoning effort used in generated LangGraphScore YAML"
  max_scores:
    type: number
    default: 0
    description: "Optional limit for number of questions to process (0 means all)"
  dry_run:
    type: boolean
    default: false
    description: "If true, return plan only and do not create/update in Plexus"
  require_approval:
    type: boolean
    default: true
    description: "If true, require Human.approve before write operations"

outputs:
  success:
    type: boolean
    required: true
  status:
    type: string
    required: true
  message:
    type: string
    required: true
  scorecard_id:
    type: string
    required: false
  score_ids:
    type: array
    required: false
  plan:
    type: object
    required: false

stages:
  - observe
  - plan
  - approval
  - act
  - complete

code: |
  local function safe_decode(value)
    if value == nil then
      return nil, "nil"
    end
    if type(value) ~= "string" then
      local ok_encode, encoded = pcall(function() return Json.encode(value) end)
      if ok_encode then
        local ok_decode, decoded = pcall(function() return Json.decode(encoded) end)
        if ok_decode then return decoded, nil end
      end
      return value, nil
    end
    local ok, decoded = pcall(function() return Json.decode(value) end)
    if ok then return decoded, nil end
    return nil, decoded
  end

  local function trim(value)
    if value == nil then return "" end
    local s = tostring(value)
    s = string.gsub(s, "^%s+", "")
    s = string.gsub(s, "%s+$", "")
    return s
  end

  local function has_text(value)
    return trim(value) ~= ""
  end

  local function normalize(value)
    return string.lower(trim(value))
  end

  local function to_bool(value, default)
    if value == nil then
      return default == true
    end
    if type(value) == "boolean" then
      return value
    end
    if type(value) == "number" then
      return value ~= 0
    end
    local s = normalize(value)
    if s == "true" or s == "1" or s == "yes" or s == "y" then
      return true
    end
    if s == "false" or s == "0" or s == "no" or s == "n" then
      return false
    end
    return default == true
  end

  local function slugify(value)
    local s = normalize(value)
    s = string.gsub(s, "[^a-z0-9]+", "-")
    s = string.gsub(s, "^-+", "")
    s = string.gsub(s, "-+$", "")
    if s == "" then return "score" end
    return s
  end

  local function escape_yaml(value)
    if value == nil then return "" end
    local s = tostring(value)
    s = string.gsub(s, "\\", "\\\\")
    s = string.gsub(s, '"', '\\"')
    s = string.gsub(s, "\r", " ")
    s = string.gsub(s, "\n", " ")
    return s
  end

  local function split_lines(value)
    local out = {}
    local text = tostring(value or "")
    for line in string.gmatch(text, "([^\n]*)\n?") do
      if line == "" and #out > 0 and out[#out] == "" then
      else
        out[#out + 1] = line
      end
    end
    if #out == 0 then out[1] = "" end
    return out
  end

  local function append_block(lines, indent, text)
    local block_lines = split_lines(text)
    for _, line in ipairs(block_lines) do
      table.insert(lines, indent .. line)
    end
  end

  local function build_faq_text(faqs)
    if type(faqs) ~= "table" or #faqs == 0 then return "" end
    local parts = {}
    for i, faq in ipairs(faqs) do
      local q = trim(faq.question_text or faq.question or "")
      local a = trim(faq.answer_text or faq.answer or "")
      local entry = ""
      if has_text(q) then entry = entry .. "Q: " .. q end
      if has_text(a) then
        if has_text(entry) then entry = entry .. "\n" end
        entry = entry .. "A: " .. a
      end
      if has_text(entry) then parts[#parts + 1] = entry end
    end
    return table.concat(parts, "\n\n")
  end

  local function build_guidelines(question, labels)
    local objective = trim(question.source_text or question.short_name or "")
    local guidance = trim(question.guidelines or "")
    local faq_text = build_faq_text(question.faqs)
    local lines = {}
    table.insert(lines, "# Guidelines for " .. (question.short_name or "Score"))
    table.insert(lines, "")
    table.insert(lines, "## Objective")
    table.insert(lines, objective)
    table.insert(lines, "")
    table.insert(lines, "## Classes")
    table.insert(lines, "Valid labels: [" .. table.concat(labels, ", ") .. "]")
    table.insert(lines, "Target class: " .. labels[1])
    table.insert(lines, "Default class: " .. labels[#labels])
    if has_text(guidance) then
      table.insert(lines, "")
      table.insert(lines, "## Source Guidance")
      table.insert(lines, guidance)
    end
    if has_text(faq_text) then
      table.insert(lines, "")
      table.insert(lines, "## FAQ Context")
      table.insert(lines, faq_text)
    end
    return table.concat(lines, "\n")
  end

  local function build_score_yaml(score, params)
    local lines = {}
    table.insert(lines, 'name: "' .. escape_yaml(score.name) .. '"')
    table.insert(lines, 'description: "' .. escape_yaml(score.description or score.name) .. '"')
    table.insert(lines, 'external_id: "' .. escape_yaml(score.external_id) .. '"')
    table.insert(lines, 'class: LangGraphScore')
    table.insert(lines, 'model_name: ' .. tostring(params.model_name or "gpt-5-mini-2025-08-07"))
    table.insert(lines, 'model_provider: ' .. tostring(params.model_provider or "ChatOpenAI"))
    table.insert(lines, 'reasoning_effort: ' .. tostring(params.reasoning_effort or "low"))
    table.insert(lines, 'max_tokens: 2000')
    table.insert(lines, 'graph:')
    table.insert(lines, '  - name: classifier')
    table.insert(lines, '    class: Classifier')
    table.insert(lines, '    batch: false')
    table.insert(lines, '    valid_classes:')
    for _, label in ipairs(score.labels) do
      table.insert(lines, "      - '" .. tostring(label) .. "'")
    end
    table.insert(lines, '    system_message: |-')
    append_block(lines, '      ', score.system_message)
    table.insert(lines, '    user_message: |-')
    append_block(lines, '      ', score.user_message)
    table.insert(lines, '    output:')
    table.insert(lines, '      value: classification')
    table.insert(lines, '      explanation: explanation')
    table.insert(lines, 'output:')
    table.insert(lines, '  value: classification')
    table.insert(lines, '  explanation: explanation')
    return table.concat(lines, "\n")
  end

  local function _decode_tool_result(raw)
    if type(raw) == "table" then
      return raw, nil
    end
    if type(raw) == "string" then
      return safe_decode(raw)
    end
    return nil, "unexpected tool response type: " .. tostring(type(raw))
  end

  local function _extract_error_message(result)
    if type(result) ~= "table" then
      return tostring(result)
    end
    if type(result.error) == "table" and has_text(result.error.message) then
      return result.error.message
    end
    if has_text(result.error) then
      return result.error
    end
    if has_text(result.message) then
      return result.message
    end
    return "unknown error"
  end

  local function call_plexus_api(namespace, method, args_table)
    local execute_tactus = Tool.get("execute_tactus")
    if execute_tactus == nil then
      error("execute_tactus tool is not available in this runtime")
    end

    local args_json = Json.encode(args_table or {})
    args_json = string.gsub(args_json, "%]%]", "] ]")
    local tactus = "return plexus." .. tostring(namespace) .. "." .. tostring(method) .. "(Json.decode([[" .. args_json .. "]]))"

    local raw = execute_tactus({tactus = tactus})
    local result, decode_err = _decode_tool_result(raw)
    if not result then
      error("execute_tactus decode failed: " .. tostring(decode_err))
    end
    if result.ok == false then
      error(_extract_error_message(result))
    end

    return result.value
  end

  local function set_stage_progress(current, total)
    local progress_tool = Tool.get("plexus_set_stage_progress")
    if progress_tool ~= nil then
      progress_tool({current = current, total = total})
    end
  end

  local function try_find_existing_scorecard(identifier)
    if not has_text(identifier) then
      return nil, nil
    end

    local ok, result = pcall(function()
      return call_plexus_api("scorecards", "info", {scorecard_identifier = tostring(identifier)})
    end)
    if not ok then
      local err_text = string.lower(tostring(result or ""))
      if string.find(err_text, "not found", 1, true) then
        return nil, nil
      end
      return nil, "Scorecard lookup failed: " .. tostring(result)
    end

    local data = result
    if type(data) == "string" then
      data = safe_decode(data)
    end
    if type(data) ~= "table" then
      return nil, nil
    end
    if data.success == false then
      return nil, nil
    end

    if has_text(data.id) or has_text(data.scorecard_id) then
      return {
        id = data.id or data.scorecard_id,
        name = data.name,
        key = data.key,
        externalId = data.externalId
      }, nil
    end

    return nil, nil
  end

  local function run(input)
    local params = input
    local dry_run = to_bool(params.dry_run, false)
    local require_approval = to_bool(params.require_approval, true)

    local export_json = trim(params.questions_export_json)
    if not has_text(export_json) and has_text(params.questions_export_path) then
      export_json = Step.checkpoint(function()
        return File.read(params.questions_export_path)
      end)
    end
    if not has_text(export_json) then
      return {success = false, status = "error", message = "Provide questions_export_json or questions_export_path"}
    end

    local export_data, export_err = safe_decode(export_json)
    if not export_data then
      return {success = false, status = "error", message = "Invalid export JSON: " .. tostring(export_err)}
    end

    local questions = export_data.questions or {}
    if #questions == 0 then
      return {success = false, status = "error", message = "Export JSON has no questions"}
    end

    local max_scores = tonumber(params.max_scores) or 0
    local target_name = trim(params.target_scorecard_name)
    if not has_text(target_name) then
      return {success = false, status = "error", message = "target_scorecard_name is required"}
    end

    local scorecard_key = trim(params.target_scorecard_key)
    if not has_text(scorecard_key) then scorecard_key = slugify(target_name) end
    local scorecard_external_id = trim(params.target_scorecard_external_id)
    if not has_text(scorecard_external_id) then scorecard_external_id = scorecard_key end
    local scorecard_description = trim(params.target_scorecard_description)
    if not has_text(scorecard_description) then scorecard_description = "Created from ai-ready question export" end

    Stage.set("observe")
    local existing, lookup_err = try_find_existing_scorecard(scorecard_key)
    if lookup_err then
      return {success = false, status = "error", message = lookup_err}
    end
    if existing == nil and normalize(scorecard_key) ~= normalize(target_name) then
      existing, lookup_err = try_find_existing_scorecard(target_name)
      if lookup_err then
        return {success = false, status = "error", message = lookup_err}
      end
    end
    if existing ~= nil then
      return {
        success = false,
        status = "exists",
        message = "Target scorecard already exists",
        scorecard_id = existing.id
      }
    end

    Stage.set("plan")
    local used_keys = {}
    local plan_scores = {}
    local processed = 0

    for _, q in ipairs(questions) do
      if max_scores > 0 and processed >= max_scores then break end
      local labels = q.active_answer_values or {}
      if #labels < 2 and q.answers then
        for _, ans in ipairs(q.answers) do
          local text = trim(ans.text)
          if has_text(text) then labels[#labels + 1] = text end
        end
      end
      if #labels < 2 then
        labels = {"Yes", "No"}
      end

      local name = trim(q.short_name)
      if not has_text(name) then
        name = trim(q.source_text or q.question_text)
      end
      if not has_text(name) then
        name = "Question " .. tostring(q.id or (#plan_scores + 1))
      end

      local key_base = slugify(name)
      local key = key_base
      local suffix = 2
      while used_keys[key] do
        key = key_base .. "-" .. tostring(suffix)
        suffix = suffix + 1
      end
      used_keys[key] = true

      local source_text = trim(q.source_text or q.question_text or q.short_name)
      local guidelines_md = build_guidelines(q, labels)
      local faq_text = build_faq_text(q.faqs)

      local system_message = "You are a call quality evaluator.\n\nQuestion: " .. source_text .. "\n\nUse the following policy guidance to classify the call.\n\n" .. trim(q.guidelines or "")
      if has_text(faq_text) then
        system_message = system_message .. "\n\nFAQ context:\n" .. faq_text
      end
      system_message = system_message .. "\n\nReturn exactly one valid class and concise reasoning."

      local user_message = "Evaluate the transcript for this question and choose one class.\n\n<transcript>\n{{text}}\n</transcript>\n\nValid classes: [" .. table.concat(labels, ", ") .. "]\n\nRespond with concise reasoning, then on a new line the final class."

      plan_scores[#plan_scores + 1] = {
        question_id = q.id,
        name = name,
        key = key,
        external_id = "question-" .. tostring(q.id or key),
        description = source_text,
        labels = labels,
        guidelines = guidelines_md,
        system_message = system_message,
        user_message = user_message
      }
      processed = processed + 1
    end

    if #plan_scores == 0 then
      return {success = false, status = "error", message = "No scores generated from export"}
    end

    local normalized_scorecard = {
      name = target_name,
      key = scorecard_key,
      external_id = scorecard_external_id,
      description = scorecard_description
    }

    if dry_run then
      Stage.set("complete")
      return {success = true, status = "planned", message = "Dry run - no changes applied", plan = {scorecard = normalized_scorecard, scores = plan_scores}}
    end

    if require_approval then
      Stage.set("approval")
      local approved = Human.approve({
        message = "Approve scorecard migration execution?",
        context = {
          scorecard = normalized_scorecard,
          score_count = #plan_scores,
          first_scores = {plan_scores[1], plan_scores[2], plan_scores[3]},
          dry_run = false
        },
        timeout = 7200,
        default = false
      })

      if not approved then
        return {success = false, status = "rejected", message = "Human rejected migration", plan = {scorecard = normalized_scorecard, scores = plan_scores}}
      end
    end

    Stage.set("act")
    local created_score_ids = {}
    local created_scorecard_id = nil

    local ok_create_scorecard, create_scorecard_result = pcall(function()
      return call_plexus_api("scorecards", "create", {
        name = normalized_scorecard.name,
        key = normalized_scorecard.key,
        external_id = normalized_scorecard.external_id,
        description = normalized_scorecard.description,
        account_identifier = params.account_identifier or "default"
      })
    end)

    if not ok_create_scorecard then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: " .. tostring(create_scorecard_result)
      }
    end

    if type(create_scorecard_result) == "table" and create_scorecard_result.success == false then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: " .. tostring(create_scorecard_result.error or "unknown error")
      }
    end

    if type(create_scorecard_result) ~= "table" then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: invalid response type"
      }
    end

    created_scorecard_id = create_scorecard_result.id or create_scorecard_result.scorecard_id
    if not has_text(created_scorecard_id) then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: missing scorecard id in response"
      }
    end

    for idx, score in ipairs(plan_scores) do
      set_stage_progress(idx - 1, #plan_scores)

      local ok_create_score, create_score_result = pcall(function()
        return call_plexus_api("score", "create", {
          scorecard_identifier = created_scorecard_id,
          name = score.name,
          key = score.key,
          external_id = score.external_id,
          description = score.description,
          score_type = "LangGraphScore",
          order = idx
        })
      end)

      if not ok_create_score then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': " .. tostring(create_score_result)
        }
      end

      if type(create_score_result) ~= "table" then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': invalid response type"
        }
      end

      if create_score_result.success == false then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': " .. tostring(create_score_result.error or "unknown error")
        }
      end

      local created_score_id = create_score_result.id or create_score_result.score_id
      if not has_text(created_score_id) then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': missing score id"
        }
      end

      local ok_update_score, update_score_result = pcall(function()
        return call_plexus_api("score", "update", {
          scorecard_identifier = created_scorecard_id,
          score_identifier = created_score_id,
          code = build_score_yaml(score, params),
          guidelines = score.guidelines,
          version_note = "Created from question export"
        })
      end)

      if not ok_update_score then
        return {
          success = false,
          status = "error",
          message = "Score update failed for '" .. tostring(score.name) .. "': " .. tostring(update_score_result)
        }
      end

      if type(update_score_result) == "table" and update_score_result.success == false then
        return {
          success = false,
          status = "error",
          message = "Score update failed for '" .. tostring(score.name) .. "': " .. tostring(update_score_result.error or "unknown error")
        }
      end

      created_score_ids[#created_score_ids + 1] = created_score_id
    end
    set_stage_progress(#plan_scores, #plan_scores)

    Stage.set("complete")
    return {
      success = true,
      status = "created",
      message = "Scorecard and scores created from question export",
      scorecard_id = created_scorecard_id,
      score_ids = created_score_ids,
      plan = {scorecard = normalized_scorecard, scores = plan_scores}
    }
  end

  Specification([[
  Feature: JSON-native scorecard migration procedure
    Scenario: Procedure initializes
      Given the procedure has started

    Scenario: Procedure initializes for dry-run path
      Given the procedure has started

    Scenario: Procedure initializes for execution path
      Given the procedure has started
  ]])

  Procedure {
    input = {
      questions_export_json = field.string{},
      questions_export_path = field.string{},
      target_scorecard_name = field.string{required = true},
      target_scorecard_key = field.string{},
      target_scorecard_external_id = field.string{},
      target_scorecard_description = field.string{},
      account_identifier = field.string{default = "default"},
      model_name = field.string{default = "gpt-5-mini-2025-08-07"},
      model_provider = field.string{default = "ChatOpenAI"},
      reasoning_effort = field.string{default = "low"},
      max_scores = field.number{default = 0},
      dry_run = field.boolean{default = false},
      require_approval = field.boolean{default = true}
    },

    output = {
      success = field.boolean{required = true},
      status = field.string{required = true},
      message = field.string{required = true},
      scorecard_id = field.string{},
      score_ids = field.array{},
      plan = field.object{}
    },

    function(input)
      return run(input)
    end
  }
