name: Create Scorecard From Question Export
version: 2.0.0
class: Tactus
description: "AI-generated scorecard migration from ai-ready question export (two-pass generation + review)."

params:
  questions_export_json:
    type: string
    input: textarea
    rows: 12
    required: false
    description: "Raw ai-ready export JSON text. Optional when questions_export_path is provided."
  questions_export_path:
    type: string
    required: false
    description: "Path to ai-ready export JSON file. Optional when questions_export_json is provided."
  reference_scorecard_identifier:
    type: string
    required: true
    description: "Reference scorecard id/key/name used for style/examples"
  target_scorecard_name:
    type: string
    required: true
    description: "Name for the new scorecard to create"
  target_scorecard_key:
    type: string
    required: false
    description: "Optional key for scorecard. Defaults to slugified target_scorecard_name."
  target_scorecard_external_id:
    type: string
    required: false
    description: "Optional external ID for scorecard. Defaults to key."
  target_scorecard_description:
    type: string
    required: false
    description: "Optional scorecard description"
  account_identifier:
    type: string
    input: hidden
    default: "default"
    description: "Account identifier (key/name/id)"
  model_name:
    type: string
    default: "gpt-5-mini"
    description: "Model used in generated LangGraphScore YAML"
  model_provider:
    type: string
    default: "ChatOpenAI"
    description: "Model provider used in generated LangGraphScore YAML"
  reasoning_effort:
    type: string
    default: "medium"
    description: "Reasoning effort used in generated LangGraphScore YAML"
  max_scores:
    type: number
    default: 0
    description: "Optional limit for number of questions to process (0 means all)"
  dry_run:
    type: boolean
    default: false
    description: "If true, return plan only and do not create/update in Plexus"
  require_approval:
    type: boolean
    default: true
    description: "If true, require Human.approve before write operations"

outputs:
  success:
    type: boolean
    required: true
  status:
    type: string
    required: true
  message:
    type: string
    required: true
  scorecard_id:
    type: string
    required: false
  score_ids:
    type: array
    required: false
  plan:
    type: object
    required: false

agents:
  runtime_guard:
    system_prompt: |
      Runtime compatibility agent. Do not act unless explicitly called.
    initial_message: |
      Stand by.
    tools:
      - plexus

  generator:
    provider: openai
    model: gpt-5.4
    verbosity: low
    system_prompt: |
      You are an expert Plexus score author. Generate a high-quality classifier score spec from policy text.

      Required JSON output schema (output JSON only, no markdown):
      {
        "name": "...",
        "key": "...",
        "external_id": "...",
        "description": "...",
        "labels": ["...", "..."],
        "target_class": "...",
        "default_class": "...",
        "guidance_summary": "...",
        "rationale": "...",
        "system_message": "...",
        "user_message": "..."
      }

      Rules:
      - labels length must be >= 2 and include target_class/default_class.
      - system_message must encode policy intent and decision boundaries from guidelines and FAQ.
      - user_message must instruct transcript evaluation and class selection clearly.
      - user_message must enforce output format:
        1) first line(s): concise reasoning in 2-3 sentences
        2) final line only: classification label
      - final classification line must be exactly one valid label with no extra text.
      - Keep all fields concise and directly actionable.
      - You MUST finish by calling done(reason=<JSON>, success=true).
      - The reason must be ONLY a JSON object string matching the required schema.
      - No prose, no prefixes, no markdown.
    initial_message: |
      Ready to generate score specs.
    tools:
      - done

  critic:
    provider: openai
    model: gpt-5.4
    verbosity: low
    system_prompt: |
      You are a strict reviewer for Plexus score authoring.
      Improve draft score specs for policy fidelity, decision clarity, and class consistency.

      Return JSON only, same schema:
      {
        "name": "...",
        "key": "...",
        "external_id": "...",
        "description": "...",
        "labels": ["...", "..."],
        "target_class": "...",
        "default_class": "...",
        "guidance_summary": "...",
        "rationale": "...",
        "system_message": "...",
        "user_message": "..."
      }

      Rules:
      - Preserve core intent while tightening ambiguities.
      - Ensure output is robust for noisy transcript evidence.
      - Keep explicit class constraints in user_message.
      - Enforce output contract in user_message:
        1) 2-3 sentence reasoning
        2) final line exactly one allowed classification label
      - You MUST finish by calling done(reason=<JSON>, success=true).
      - The reason must be ONLY a JSON object string matching the required schema.
      - No prose, no prefixes, no markdown.
    initial_message: |
      Ready to review and refine score specs.
    tools:
      - done

stages:
  - observe
  - plan
  - generate
  - review
  - approval
  - act
  - complete

code: |
  local PROMPT_VERSION = "scorecard_from_question_export.v2"

  local function safe_decode(value)
    if value == nil then
      return nil, "nil"
    end
    if type(value) ~= "string" then
      local ok_encode, encoded = pcall(function() return Json.encode(value) end)
      if ok_encode then
        local ok_decode, decoded = pcall(function() return Json.decode(encoded) end)
        if ok_decode then return decoded, nil end
      end
      return value, nil
    end
    local ok, decoded = pcall(function() return Json.decode(value) end)
    if ok then return decoded, nil end
    return nil, decoded
  end

  local function trim(value)
    if value == nil then return "" end
    local s = tostring(value)
    s = string.gsub(s, "^%s+", "")
    s = string.gsub(s, "%s+$", "")
    return s
  end

  local function has_text(value)
    return trim(value) ~= ""
  end

  local function normalize(value)
    return string.lower(trim(value))
  end

  local function to_bool(value, default)
    if value == nil then return default == true end
    if type(value) == "boolean" then return value end
    if type(value) == "number" then return value ~= 0 end
    local s = normalize(value)
    if s == "true" or s == "1" or s == "yes" or s == "y" then return true end
    if s == "false" or s == "0" or s == "no" or s == "n" then return false end
    return default == true
  end

  local function slugify(value)
    local s = normalize(value)
    s = string.gsub(s, "[^a-z0-9]+", "-")
    s = string.gsub(s, "^-+", "")
    s = string.gsub(s, "-+$", "")
    if s == "" then return "score" end
    return s
  end

  local function split_lines(value)
    local out = {}
    local text = tostring(value or "")
    for line in string.gmatch(text, "([^\n]*)\n?") do
      if line == "" and #out > 0 and out[#out] == "" then
      else
        out[#out + 1] = line
      end
    end
    if #out == 0 then out[1] = "" end
    return out
  end

  local function append_block(lines, indent, text)
    local block_lines = split_lines(text)
    for _, line in ipairs(block_lines) do
      table.insert(lines, indent .. line)
    end
  end

  local function escape_yaml(value)
    if value == nil then return "" end
    local s = tostring(value)
    s = string.gsub(s, "\\", "\\\\")
    s = string.gsub(s, '"', '\\"')
    s = string.gsub(s, "\r", " ")
    s = string.gsub(s, "\n", " ")
    return s
  end

  local function build_faq_text(faqs)
    if type(faqs) ~= "table" or #faqs == 0 then return "" end
    local parts = {}
    for _, faq in ipairs(faqs) do
      local q = trim(faq.question_text or faq.question or "")
      local a = trim(faq.answer_text or faq.answer or "")
      local entry = ""
      if has_text(q) then entry = entry .. "Q: " .. q end
      if has_text(a) then
        if has_text(entry) then entry = entry .. "\n" end
        entry = entry .. "A: " .. a
      end
      if has_text(entry) then parts[#parts + 1] = entry end
    end
    return table.concat(parts, "\n\n")
  end

  local function to_lua_literal(value)
    local value_type = type(value)
    if value == nil then return "nil" end
    if value_type == "boolean" then return value and "true" or "false" end
    if value_type == "number" then return tostring(value) end
    if value_type == "string" then return string.format("%q", value) end
    if value_type == "table" then
      local parts = {}
      local is_array = true
      local max_index = 0
      local count = 0
      for k, _ in pairs(value) do
        count = count + 1
        if type(k) ~= "number" or k < 1 or math.floor(k) ~= k then
          is_array = false
          break
        end
        if k > max_index then max_index = k end
      end
      if is_array and max_index ~= count then is_array = false end
      if is_array then
        for i = 1, max_index do
          parts[#parts + 1] = to_lua_literal(value[i])
        end
        return "{ " .. table.concat(parts, ", ") .. " }"
      end
      for k, v in pairs(value) do
        local key_literal
        if type(k) == "string" and string.match(k, "^[%a_][%w_]*$") then
          key_literal = k
        else
          key_literal = "[" .. to_lua_literal(k) .. "]"
        end
        parts[#parts + 1] = key_literal .. " = " .. to_lua_literal(v)
      end
      return "{ " .. table.concat(parts, ", ") .. " }"
    end
    return string.format("%q", tostring(value))
  end

  local function sanitize_ascii_text(value)
    local s = tostring(value or "")
    -- Remove problematic control bytes except common whitespace.
    s = string.gsub(s, "[%z\1-\8\11\12\14-\31]", " ")
    -- Keep payloads ASCII-safe to avoid Lua->Python UTF-8 decode errors in tool arg marshaling.
    s = string.gsub(s, "[\128-\255]", "")
    return s
  end

  local function sanitize_tool_args(value)
    local t = type(value)
    if t == "string" then
      return sanitize_ascii_text(value)
    end
    if t == "table" then
      local out = {}
      for k, v in pairs(value) do
        out[k] = sanitize_tool_args(v)
      end
      return out
    end
    return value
  end

  local function decode_tool_result(raw)
    if type(raw) == "table" then return raw, nil end
    if type(raw) == "string" then return safe_decode(raw) end
    return nil, "unexpected tool response type: " .. tostring(type(raw))
  end

  local function extract_error_message(result)
    if type(result) ~= "table" then return tostring(result) end
    if type(result.error) == "table" and has_text(result.error.message) then
      return result.error.message
    end
    if has_text(result.error) then return result.error end
    if has_text(result.message) then return result.message end
    return "unknown error"
  end

  local function call_plexus_api(namespace, method, args_table)
    local execute_tactus = Tool.get("execute_tactus")
    if execute_tactus == nil then
      error("execute_tactus tool is not available in this runtime")
    end

    local safe_args = sanitize_tool_args(args_table or {})
    local tactus = "return plexus."
      .. tostring(namespace)
      .. "."
      .. tostring(method)
      .. "("
      .. to_lua_literal(safe_args)
      .. ")"

    local raw = execute_tactus({tactus = tactus})
    local result, decode_err = decode_tool_result(raw)
    if not result then
      error("execute_tactus decode failed: " .. tostring(decode_err))
    end
    if result.ok == false then
      error(extract_error_message(result))
    end

    return result.value
  end

  local function preflight_write_capabilities()
    local execute_tactus = Tool.get("execute_tactus")
    if execute_tactus == nil then
      return nil, "execute_tactus tool is not available in this runtime"
    end

    local raw = execute_tactus({
      tactus = "return { "
        .. "scorecards_create = type(plexus.scorecards.create), "
        .. "score_create = type(plexus.score.create), "
        .. "score_update = type(plexus.score.update) "
        .. "}"
    })
    local result, decode_err = decode_tool_result(raw)
    if not result then
      return nil, "execute_tactus decode failed: " .. tostring(decode_err)
    end
    if result.ok == false then
      return nil, extract_error_message(result)
    end
    if type(result.value) ~= "table" then
      return nil, "execute_tactus preflight returned invalid response"
    end

    local value = result.value
    local function is_callable_type(t)
      return t == "function" or t == "userdata"
    end

    if not is_callable_type(value.scorecards_create)
      or not is_callable_type(value.score_create)
      or not is_callable_type(value.score_update) then
      return nil, "write APIs unavailable in execute_tactus runtime: scorecards.create=" .. tostring(value.scorecards_create)
        .. ", score.create=" .. tostring(value.score_create)
        .. ", score.update=" .. tostring(value.score_update)
    end
    return value, nil
  end

  local function set_stage_progress(current, total)
    local progress_tool = Tool.get("plexus_set_stage_progress")
    if progress_tool ~= nil then
      progress_tool({current = current, total = total})
    end
  end

  local function create_scorecard_with_compat(normalized_scorecard, account_identifier)
    local variants = {
      {
        name = normalized_scorecard.name
      },
      {
        name = normalized_scorecard.name,
        key = normalized_scorecard.key
      },
      {
        name = normalized_scorecard.name,
        external_id = normalized_scorecard.external_id
      },
      {
        name = normalized_scorecard.name,
        key = normalized_scorecard.key,
        external_id = normalized_scorecard.external_id
      },
      {
        name = normalized_scorecard.name,
        key = normalized_scorecard.key,
        account_identifier = account_identifier
      },
      {
        name = normalized_scorecard.name,
        external_id = normalized_scorecard.external_id,
        account_identifier = account_identifier
      },
      {
        name = normalized_scorecard.name,
        key = normalized_scorecard.key,
        external_id = normalized_scorecard.external_id,
        account_identifier = account_identifier
      },
    }

    local errors = {}
    for i, payload in ipairs(variants) do
      local ok, result = pcall(function()
        return call_plexus_api("scorecards", "create", payload)
      end)
      if ok and type(result) == "table" then
        local scorecard_id = result.id or result.scorecard_id
        if has_text(scorecard_id) then
          return result, nil
        end
        errors[#errors + 1] = "variant " .. tostring(i) .. ": missing id in response"
      else
        errors[#errors + 1] = "variant " .. tostring(i) .. ": " .. tostring(result)
      end
    end
    return nil, table.concat(errors, " | ")
  end

  local function create_score_with_compat(created_scorecard_id, score, order)
    local variants = {
      {
        scorecard_identifier = created_scorecard_id,
        name = score.name,
        key = score.key,
        external_id = score.external_id,
        description = score.description,
        score_type = "LangGraphScore",
        order = order
      },
      {
        scorecard_identifier = created_scorecard_id,
        name = score.name,
        key = score.key,
        external_id = score.external_id,
        description = score.description,
        type = "LangGraphScore",
        order = order
      },
      {
        scorecard_identifier = created_scorecard_id,
        name = score.name,
        external_id = score.external_id,
        description = score.description,
        type = "LangGraphScore",
        order = order
      },
      {
        scorecard_identifier = created_scorecard_id,
        name = score.name,
        description = score.description,
        type = "LangGraphScore",
        order = order
      },
    }

    local errors = {}
    for i, payload in ipairs(variants) do
      local ok, result = pcall(function()
        return call_plexus_api("score", "create", payload)
      end)
      if ok and type(result) == "table" then
        local created_score_id = result.id or result.score_id
        if has_text(created_score_id) then
          return result, nil
        end
        errors[#errors + 1] = "variant " .. tostring(i) .. ": missing score id"
      else
        errors[#errors + 1] = "variant " .. tostring(i) .. ": " .. tostring(result)
      end
    end
    return nil, table.concat(errors, " | ")
  end

  local function wait_for_done(agent, max_iters, inject)
    local start_count = Tool.get_call_count("done")
    if inject then
      agent({message = inject})
    else
      agent()
    end
    local iter = 0
    repeat
      if Tool.get_call_count("done") > start_count then
        return true
      end
      if iter >= max_iters then
        return false
      end
      agent()
      iter = iter + 1
    until false
  end

  local function parse_last_done_json()
    local done_call = Tool.last_call("done")
    if done_call == nil or done_call.args == nil then
      return nil, "missing done() call payload"
    end

    -- Preferred path: done(name="...", labels={...}, ...)
    if type(done_call.args) == "table" then
      local has_structured = false
      for k, _ in pairs(done_call.args) do
        if k ~= "reason" and k ~= "success" then
          has_structured = true
          break
        end
      end
      if has_structured then
        local structured = {}
        for k, v in pairs(done_call.args) do
          if k ~= "reason" and k ~= "success" then
            structured[k] = v
          end
        end
        return structured, nil
      end

      -- Secondary path: done(payload="{...}") or other single-string wrappers.
      for _, v in pairs(done_call.args) do
        if type(v) == "string" and has_text(v) then
          local data, err = safe_decode(v)
          if not data then
            local candidate = string.match(v, "%b{}")
            if candidate ~= nil then
              data, err = safe_decode(candidate)
            end
          end
          if data and type(data) == "table" then
            return data, nil
          end
        end
      end
    end

    local payload = tostring(done_call.args.reason or "")

    local data, err = safe_decode(payload)
    if not data and type(payload) == "string" and payload ~= "" then
      -- Fallback: salvage first JSON object from noisy text.
      local candidate = string.match(payload, "%b{}")
      if candidate ~= nil then
        data, err = safe_decode(candidate)
      end
    end
    if not data and type(payload) == "string" and payload ~= "" then
      local ordered_keys = {
        "name",
        "key",
        "external_id",
        "description",
        "labels",
        "target_class",
        "default_class",
        "guidance_summary",
        "rationale",
        "system_message",
        "user_message",
      }

      local parsed = {}
      local function extract_segment(text, start_key, next_key)
        local start_pat = start_key .. "%s*="
        local start_pos = string.find(text, start_pat)
        if not start_pos then return nil end
        local value_start = start_pos + #start_pat
        if next_key then
          local end_pat = ";%s*" .. next_key .. "%s*="
          local end_pos = string.find(text, end_pat, value_start)
          if end_pos then
            return trim(string.sub(text, value_start, end_pos - 1))
          end
        end
        return trim(string.sub(text, value_start))
      end

      for i, key_name in ipairs(ordered_keys) do
        local next_key = ordered_keys[i + 1]
        local raw_value = extract_segment(payload, key_name, next_key)
        if raw_value ~= nil then
          parsed[key_name] = raw_value
        end
      end

      if has_text(parsed.labels) then
        local labels = {}
        local inner = parsed.labels
        inner = string.gsub(inner, "^%[", "")
        inner = string.gsub(inner, "%]$", "")
        for label in string.gmatch(inner, "([^,]+)") do
          local cleaned = trim(label)
          if has_text(cleaned) then labels[#labels + 1] = cleaned end
        end
        parsed.labels = labels
      end

      if has_text(parsed.name) and has_text(parsed.key) and has_text(parsed.user_message) then
        data = parsed
      end
    end
    if not data then
      return nil, "invalid done() JSON: " .. tostring(err)
    end
    if type(data) ~= "table" then
      return nil, "done() payload must be a JSON object"
    end
    return data, nil
  end

  local function try_find_existing_scorecard(identifier)
    if not has_text(identifier) then return nil, nil end
    local ok, result = pcall(function()
      return call_plexus_api("scorecards", "info", {scorecard_identifier = tostring(identifier)})
    end)
    if not ok then
      local err_text = string.lower(tostring(result or ""))
      if string.find(err_text, "not found", 1, true) then
        return nil, nil
      end
      return nil, "Scorecard lookup failed: " .. tostring(result)
    end

    if type(result) ~= "table" then return nil, nil end
    local scorecard_id = result.id or result.scorecard_id or (result.additionalDetails or {}).id
    if not has_text(scorecard_id) then return nil, nil end

    return {
      id = scorecard_id,
      name = result.name,
      key = result.key,
      externalId = result.externalId
    }, nil
  end

  local function safe_slice(value, limit)
    local s = trim(value)
    if #s <= limit then return s end
    return string.sub(s, 1, limit) .. " ..."
  end

  local function extract_reference_examples(reference_scorecard_identifier, max_examples)
    local ref = call_plexus_api("scorecards", "info", {scorecard_identifier = reference_scorecard_identifier})
    if type(ref) ~= "table" then
      error("reference scorecard lookup returned invalid response")
    end

    local ref_id = ref.id or ref.scorecard_id or (ref.additionalDetails or {}).id
    if not has_text(ref_id) then
      error("reference scorecard lookup did not return id")
    end

    local score_rows = {}
    local sections = ((ref.sections or {}).items) or {}
    for _, section in ipairs(sections) do
      local scores = ((section.scores or {}).items) or {}
      for _, score in ipairs(scores) do
        score_rows[#score_rows + 1] = {
          id = score.id,
          name = score.name,
          key = score.key,
          externalId = score.externalId,
          description = score.description,
          order = tonumber(score.order) or 0
        }
      end
    end

    table.sort(score_rows, function(a, b)
      if a.order ~= b.order then return a.order < b.order end
      return tostring(a.id or "") < tostring(b.id or "")
    end)

    local examples = {}
    local take = math.min(#score_rows, max_examples)
    for i = 1, take do
      local row = score_rows[i]
      local info = call_plexus_api("score", "info", {
        scorecard_identifier = reference_scorecard_identifier,
        score_identifier = row.id or row.name or row.key
      })
      if type(info) == "table" then
        examples[#examples + 1] = {
          id = info.scoreId or row.id,
          name = info.scoreName or row.name,
          key = info.scoreKey or row.key,
          description = info.description or row.description,
          type = info.type or "LangGraphScore",
          guidelines = safe_slice(info.guidelines or "", 1800),
          code = safe_slice(info.code or "", 3500)
        }
      end
    end

    return {
      id = ref_id,
      name = ref.name,
      key = ref.key,
      externalId = ref.externalId,
      examples = examples
    }
  end

  local function normalize_question(raw, index)
    local labels = {}
    if type(raw.active_answer_values) == "table" then
      for _, v in ipairs(raw.active_answer_values) do
        local t = trim(v)
        if has_text(t) then labels[#labels + 1] = t end
      end
    end
    if #labels < 2 and type(raw.answers) == "table" then
      for _, ans in ipairs(raw.answers) do
        local t = trim(ans.text)
        if has_text(t) then labels[#labels + 1] = t end
      end
    end
    if #labels < 2 then labels = {"Yes", "No"} end

    local name = trim(raw.short_name)
    if not has_text(name) then name = trim(raw.source_text or raw.question_text) end
    if not has_text(name) then name = "Question " .. tostring(raw.id or index) end

    local source_text = trim(raw.source_text or raw.question_text or raw.short_name)
    if not has_text(source_text) then source_text = name end

    return {
      id = raw.id,
      order = tonumber(raw.order) or index,
      index = index,
      short_name = name,
      source_text = source_text,
      guidelines = trim(raw.guidelines or ""),
      faq_text = build_faq_text(raw.faqs),
      labels = labels
    }
  end

  local function build_generate_prompt(question, reference_context)
    local reference_examples = {}
    if type(reference_context.examples) == "table" then
      for i, ex in ipairs(reference_context.examples) do
        if i > 3 then break end
        reference_examples[#reference_examples + 1] = {
          id = ex.id,
          name = ex.name,
          key = ex.key,
          description = safe_slice(ex.description or "", 240),
          guidelines = safe_slice(ex.guidelines or "", 600)
        }
      end
    end
    local prompt_reference = {
      id = reference_context.id,
      name = reference_context.name,
      key = reference_context.key,
      examples = reference_examples
    }

    local prompt = {}
    table.insert(prompt, "Generate one Plexus classifier score spec from this question policy.")
    table.insert(prompt, "")
    table.insert(prompt, "Question Payload JSON:")
    table.insert(prompt, Json.encode(question))
    table.insert(prompt, "")
    table.insert(prompt, "Reference Score Patterns JSON:")
    table.insert(prompt, Json.encode(prompt_reference))
    table.insert(prompt, "")
    table.insert(prompt, "Output strict JSON only matching the required schema.")
    table.insert(prompt, "No markdown, no code fences.")
    return table.concat(prompt, "\n")
  end

  local function build_review_prompt(question, draft, reference_context)
    local reference_examples = {}
    if type(reference_context.examples) == "table" then
      for i, ex in ipairs(reference_context.examples) do
        if i > 2 then break end
        reference_examples[#reference_examples + 1] = {
          name = ex.name,
          key = ex.key,
          description = safe_slice(ex.description or "", 240),
          guidelines = safe_slice(ex.guidelines or "", 450)
        }
      end
    end
    local prompt_reference = {
      name = reference_context.name,
      key = reference_context.key,
      examples = reference_examples
    }

    local prompt = {}
    table.insert(prompt, "Review and refine this generated score spec for policy fidelity and clarity.")
    table.insert(prompt, "")
    table.insert(prompt, "Question Payload JSON:")
    table.insert(prompt, Json.encode(question))
    table.insert(prompt, "")
    table.insert(prompt, "Draft Spec JSON:")
    table.insert(prompt, Json.encode(draft))
    table.insert(prompt, "")
    table.insert(prompt, "Reference Score Patterns JSON:")
    table.insert(prompt, Json.encode(prompt_reference))
    table.insert(prompt, "")
    table.insert(prompt, "Return strict JSON only with same schema.")
    return table.concat(prompt, "\n")
  end

  local function probe_agent_done_contract(agent, role_name)
    local probe_payload = Json.encode({
      name = "Probe Score",
      key = "probe-score",
      external_id = "probe-score",
      description = "probe description",
      labels = {"Yes", "No"},
      target_class = "Yes",
      default_class = "No",
      guidance_summary = "probe guidance",
      rationale = "probe rationale",
      system_message = "probe system",
      user_message = "probe user"
    })
    local probe_prompt = table.concat({
      "Contract probe.",
      "Call done(reason=<JSON object string>, success=true).",
      "Put ONLY this JSON in reason (no extra text):",
      probe_payload
    }, "\n")

    local ok = wait_for_done(agent, 4, probe_prompt)
    if not ok then
      return nil, role_name .. " did not call done() in contract probe"
    end

    local parsed, err = parse_last_done_json()
    if not parsed then
      return nil, role_name .. " contract probe parse failed: " .. tostring(err)
    end
    return parsed, nil
  end

  local function contains_label(labels, value)
    local needle = normalize(value)
    for _, label in ipairs(labels) do
      if normalize(label) == needle then return true end
    end
    return false
  end

  local function validate_generated_spec(question, generated)
    if type(generated) ~= "table" then
      return nil, "generated spec must be object"
    end

    local labels = {}
    if type(generated.labels) == "table" then
      for _, label in ipairs(generated.labels) do
        local t = trim(label)
        if has_text(t) then labels[#labels + 1] = t end
      end
    end
    if #labels < 2 then
      labels = question.labels
    end

    local name = trim(generated.name)
    if not has_text(name) then name = question.short_name end

    local key = trim(generated.key)
    if not has_text(key) then key = slugify(name) end

    local external_id = trim(generated.external_id)
    if not has_text(external_id) then
      external_id = "question-" .. tostring(question.id or key)
    end

    local description = trim(generated.description)
    if not has_text(description) then description = question.source_text end

    local target_class = trim(generated.target_class)
    if not has_text(target_class) or not contains_label(labels, target_class) then
      target_class = labels[1]
    end

    local default_class = trim(generated.default_class)
    if not has_text(default_class) or not contains_label(labels, default_class) then
      default_class = labels[#labels]
    end

    local guidance_summary = trim(generated.guidance_summary)
    if not has_text(guidance_summary) then
      guidance_summary = safe_slice(question.guidelines, 1200)
    end

    local rationale = trim(generated.rationale)
    if not has_text(rationale) then
      rationale = "Generated from source guidelines and FAQ context"
    end

    local system_message = trim(generated.system_message)
    if not has_text(system_message) then
      return nil, "system_message is required"
    end

    local user_message = trim(generated.user_message)
    if not has_text(user_message) then
      return nil, "user_message is required"
    end

    local labels_csv = table.concat(labels, ", ")
    local format_block = table.concat({
      "Output format requirements (MANDATORY):",
      "1. Provide concise reasoning in 2-3 sentences.",
      "2. On the FINAL line, output exactly one label from [" .. labels_csv .. "].",
      "3. The final line must contain only the label and nothing else."
    }, "\n")
    if not string.find(user_message, "Output format requirements %(MANDATORY%)", 1, true) then
      user_message = user_message .. "\n\n" .. format_block
    end

    return {
      question_id = question.id,
      question_name = question.short_name,
      name = name,
      key = key,
      external_id = external_id,
      description = description,
      labels = labels,
      target_class = target_class,
      default_class = default_class,
      guidance_summary = guidance_summary,
      rationale = rationale,
      system_message = system_message,
      user_message = user_message,
      source_guidelines = question.guidelines,
      source_faq = question.faq_text
    }, nil
  end

  local function build_guidelines_from_generated(score)
    local lines = {}
    table.insert(lines, "# Guidelines for " .. tostring(score.name))
    table.insert(lines, "")
    table.insert(lines, "## Objective")
    table.insert(lines, tostring(score.description))
    table.insert(lines, "")
    table.insert(lines, "## Classes")
    table.insert(lines, "Valid labels: [" .. table.concat(score.labels, ", ") .. "]")
    table.insert(lines, "Target class: " .. tostring(score.target_class))
    table.insert(lines, "Default class: " .. tostring(score.default_class))
    table.insert(lines, "")
    table.insert(lines, "## Guidance Summary")
    table.insert(lines, tostring(score.guidance_summary))
    if has_text(score.source_guidelines) then
      table.insert(lines, "")
      table.insert(lines, "## Source Guidance")
      table.insert(lines, tostring(score.source_guidelines))
    end
    if has_text(score.source_faq) then
      table.insert(lines, "")
      table.insert(lines, "## FAQ Context")
      table.insert(lines, tostring(score.source_faq))
    end
    table.insert(lines, "")
    table.insert(lines, "## Authoring Rationale")
    table.insert(lines, tostring(score.rationale))
    return table.concat(lines, "\n")
  end

  local function build_score_yaml(score, params)
    local lines = {}
    table.insert(lines, 'name: "' .. escape_yaml(score.name) .. '"')
    table.insert(lines, 'description: "' .. escape_yaml(score.description or score.name) .. '"')
    table.insert(lines, 'external_id: "' .. escape_yaml(score.external_id) .. '"')
    table.insert(lines, 'class: LangGraphScore')
    table.insert(lines, 'model_name: ' .. tostring(params.model_name or "gpt-5-mini"))
    table.insert(lines, 'model_provider: ' .. tostring(params.model_provider or "ChatOpenAI"))
    table.insert(lines, 'reasoning_effort: ' .. tostring(params.reasoning_effort or "medium"))
    table.insert(lines, 'max_tokens: 3000')
    table.insert(lines, 'graph:')
    table.insert(lines, '  - name: classifier')
    table.insert(lines, '    class: Classifier')
    table.insert(lines, '    batch: false')
    table.insert(lines, '    valid_classes:')
    for _, label in ipairs(score.labels) do
      table.insert(lines, "      - '" .. tostring(label) .. "'")
    end
    table.insert(lines, '    system_message: |-')
    append_block(lines, '      ', score.system_message)
    table.insert(lines, '    user_message: |-')
    append_block(lines, '      ', score.user_message)
    table.insert(lines, '    output:')
    table.insert(lines, '      value: classification')
    table.insert(lines, '      explanation: explanation')
    table.insert(lines, 'output:')
    table.insert(lines, '  value: classification')
    table.insert(lines, '  explanation: explanation')
    return table.concat(lines, "\n")
  end

  local function run(input)
    local params = input
    local dry_run = to_bool(params.dry_run, false)
    local require_approval = to_bool(params.require_approval, true)
    local max_scores = tonumber(params.max_scores) or 0

    local reference_scorecard_identifier = trim(params.reference_scorecard_identifier)
    if not has_text(reference_scorecard_identifier) then
      return {success = false, status = "error", message = "reference_scorecard_identifier is required"}
    end

    local export_json = trim(params.questions_export_json)
    if not has_text(export_json) and has_text(params.questions_export_path) then
      export_json = Step.checkpoint(function()
        return File.read(params.questions_export_path)
      end)
    end
    if not has_text(export_json) then
      return {success = false, status = "error", message = "Provide questions_export_json or questions_export_path"}
    end

    local export_data, export_err = safe_decode(export_json)
    if not export_data then
      return {success = false, status = "error", message = "Invalid export JSON: " .. tostring(export_err)}
    end

    local questions = export_data.questions or {}
    if #questions == 0 then
      return {success = false, status = "error", message = "Export JSON has no questions"}
    end

    local target_name = trim(params.target_scorecard_name)
    if not has_text(target_name) then
      return {success = false, status = "error", message = "target_scorecard_name is required"}
    end

    local target_key = trim(params.target_scorecard_key)
    if not has_text(target_key) then target_key = slugify(target_name) end

    local target_external_id = trim(params.target_scorecard_external_id)
    if not has_text(target_external_id) then target_external_id = target_key end

    local target_description = trim(params.target_scorecard_description)
    if not has_text(target_description) then
      target_description = "Created from ai-ready question export"
    end

    local run_started_at = (os and os.date and os.date("!%Y-%m-%dT%H:%M:%SZ")) or ""

    Stage.set("observe")

    if not dry_run then
      local _, preflight_err = preflight_write_capabilities()
      if preflight_err then
        return {
          success = false,
          status = "error",
          message = "Write-path preflight failed before generation: " .. tostring(preflight_err)
        }
      end
    end

    local existing, lookup_err = try_find_existing_scorecard(target_key)
    if lookup_err then
      return {success = false, status = "error", message = lookup_err}
    end
    if existing == nil and normalize(target_key) ~= normalize(target_name) then
      existing, lookup_err = try_find_existing_scorecard(target_name)
      if lookup_err then
        return {success = false, status = "error", message = lookup_err}
      end
    end
    if existing ~= nil then
      return {
        success = false,
        status = "exists",
        message = "Target scorecard already exists",
        scorecard_id = existing.id
      }
    end

    local reference_context
    local ok_ref, ref_or_err = pcall(function()
      return extract_reference_examples(reference_scorecard_identifier, 5)
    end)
    if not ok_ref then
      return {
        success = false,
        status = "error",
        message = "Failed to load reference scorecard: " .. tostring(ref_or_err)
      }
    end
    reference_context = ref_or_err

    local _, generator_probe_err = probe_agent_done_contract(Generator, "Generator")
    if generator_probe_err then
      return {
        success = false,
        status = "error",
        message = generator_probe_err
      }
    end

    local _, critic_probe_err = probe_agent_done_contract(Critic, "Critic")
    if critic_probe_err then
      return {
        success = false,
        status = "error",
        message = critic_probe_err
      }
    end

    Stage.set("plan")
    local normalized_questions = {}
    for i, q in ipairs(questions) do
      normalized_questions[#normalized_questions + 1] = normalize_question(q, i)
    end

    table.sort(normalized_questions, function(a, b)
      if a.order ~= b.order then return a.order < b.order end
      local aid = tonumber(a.id) or 0
      local bid = tonumber(b.id) or 0
      if aid ~= bid then return aid < bid end
      return a.index < b.index
    end)

    if max_scores > 0 and #normalized_questions > max_scores then
      local limited = {}
      for i = 1, max_scores do limited[i] = normalized_questions[i] end
      normalized_questions = limited
    end

    local generated_scores = {}
    local used_keys = {}

    local total = #normalized_questions
    Stage.set("generate")
    for idx, question in ipairs(normalized_questions) do
      set_stage_progress(idx - 1, total)

      local generate_prompt = build_generate_prompt(question, reference_context)
      local generated_ok = wait_for_done(Generator, 6, generate_prompt)
      if not generated_ok then
        return {success = false, status = "error", message = "Generator did not return done() for question " .. tostring(question.id)}
      end

      local draft, draft_err = parse_last_done_json()
      if not draft then
        for retry = 1, 2 do
          local repair_prompt = table.concat({
            "Your previous done() payload was invalid.",
            "Error: " .. tostring(draft_err),
            "Return ONLY via done(reason=<JSON object string>, success=true).",
            "Do NOT use done named fields. reason must be pure JSON.",
            "Do not send commentary.",
          }, "\n")
          local repaired_ok = wait_for_done(Generator, 3, repair_prompt)
          if not repaired_ok then break end
          draft, draft_err = parse_last_done_json()
          if draft then break end
        end
      end
      if not draft then
        return {success = false, status = "error", message = "Generator JSON parse failed for question " .. tostring(question.id) .. ": " .. tostring(draft_err)}
      end

      Stage.set("review")
      local review_prompt = build_review_prompt(question, draft, reference_context)
      local reviewed_ok = wait_for_done(Critic, 6, review_prompt)
      if not reviewed_ok then
        return {success = false, status = "error", message = "Critic did not return done() for question " .. tostring(question.id)}
      end

      local reviewed, reviewed_err = parse_last_done_json()
      if not reviewed then
        for retry = 1, 4 do
          local repair_prompt = table.concat({
            "Your previous done() payload was invalid.",
            "Error: " .. tostring(reviewed_err),
            "Return ONLY via done(reason=<JSON object string>, success=true).",
            "Do NOT use done named fields. reason must be pure JSON.",
            "Do not send commentary.",
          }, "\n")
          local repaired_ok = wait_for_done(Critic, 3, repair_prompt)
          if not repaired_ok then break end
          reviewed, reviewed_err = parse_last_done_json()
          if reviewed then break end
        end
      end
      if not reviewed then
        return {
          success = false,
          status = "error",
          message = "Critic JSON parse failed for question " .. tostring(question.id) .. ": " .. tostring(reviewed_err)
        }
      end

      local final_spec, final_err = validate_generated_spec(question, reviewed)
      if not final_spec then
        return {success = false, status = "error", message = "Generated spec validation failed for question " .. tostring(question.id) .. ": " .. tostring(final_err)}
      end

      local key_base = slugify(final_spec.key or final_spec.name)
      local key = key_base
      local suffix = 2
      while used_keys[key] do
        key = key_base .. "-" .. tostring(suffix)
        suffix = suffix + 1
      end
      used_keys[key] = true

      final_spec.key = key
      if not has_text(final_spec.external_id) then
        final_spec.external_id = "question-" .. tostring(question.id or key)
      end

      local score_record = {
        question_id = question.id,
        question_name = question.short_name,
        name = final_spec.name,
        key = final_spec.key,
        external_id = final_spec.external_id,
        description = final_spec.description,
        labels = final_spec.labels,
        target_class = final_spec.target_class,
        default_class = final_spec.default_class,
        guidance_summary = final_spec.guidance_summary,
        rationale = final_spec.rationale,
        system_message = final_spec.system_message,
        user_message = final_spec.user_message,
        guidelines = build_guidelines_from_generated(final_spec),
        yaml_code = build_score_yaml(final_spec, params)
      }

      generated_scores[#generated_scores + 1] = score_record
      Stage.set("generate")
    end
    set_stage_progress(total, total)

    local normalized_scorecard = {
      name = target_name,
      key = target_key,
      external_id = target_external_id,
      description = target_description
    }

    local plan = {
      scorecard = normalized_scorecard,
      generated_scores = generated_scores,
      run_metadata = {
        prompt_version = PROMPT_VERSION,
        model_name = params.model_name,
        model_provider = params.model_provider,
        reasoning_effort = params.reasoning_effort,
        reference_scorecard_id = reference_context.id,
        reference_scorecard_identifier = reference_scorecard_identifier,
        reference_example_count = #reference_context.examples,
        started_at = run_started_at
      }
    }

    if dry_run then
      Stage.set("complete")
      return {
        success = true,
        status = "planned",
        message = "Dry run complete - generated score plans only",
        plan = plan
      }
    end

    if require_approval then
      Stage.set("approval")
      local approved = Human.approve({
        message = "Approve AI-generated scorecard migration execution?",
        context = {
          scorecard = normalized_scorecard,
          score_count = #generated_scores,
          sample_scores = {generated_scores[1], generated_scores[2]},
          reference_scorecard = {
            id = reference_context.id,
            name = reference_context.name,
            key = reference_context.key
          },
          run_metadata = plan.run_metadata
        },
        timeout = 7200,
        default = false
      })

      if not approved then
        return {
          success = false,
          status = "rejected",
          message = "Human rejected migration",
          plan = plan
        }
      end
    end

    Stage.set("act")
    local created_score_ids = {}

    local create_scorecard_result, scorecard_create_err = create_scorecard_with_compat(
      normalized_scorecard,
      params.account_identifier or "default"
    )
    if not create_scorecard_result then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: " .. tostring(scorecard_create_err),
        plan = plan
      }
    end

    if type(create_scorecard_result) ~= "table" then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: invalid response type",
        plan = plan
      }
    end

    local created_scorecard_id = create_scorecard_result.id or create_scorecard_result.scorecard_id
    if not has_text(created_scorecard_id) then
      return {
        success = false,
        status = "error",
        message = "Scorecard creation failed: missing scorecard id",
        plan = plan
      }
    end

    for idx, score in ipairs(generated_scores) do
      set_stage_progress(idx - 1, #generated_scores)

      local create_score_result, create_score_err = create_score_with_compat(
        created_scorecard_id,
        score,
        idx
      )
      if not create_score_result then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': " .. tostring(create_score_err),
          plan = plan
        }
      end

      if type(create_score_result) ~= "table" then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': invalid response type",
          plan = plan
        }
      end

      local created_score_id = create_score_result.id or create_score_result.score_id
      if not has_text(created_score_id) then
        return {
          success = false,
          status = "error",
          message = "Score creation failed for '" .. tostring(score.name) .. "': missing score id",
          plan = plan
        }
      end

      local ok_update_score, update_score_result = pcall(function()
        return call_plexus_api("score", "update", {
          scorecard_identifier = created_scorecard_id,
          score_identifier = created_score_id,
          code = score.yaml_code,
          guidelines = score.guidelines,
          version_note = "Created from question export (" .. tostring(score.question_id or "unknown") .. ")"
        })
      end)
      if not ok_update_score then
        return {
          success = false,
          status = "error",
          message = "Score update failed for '" .. tostring(score.name) .. "': " .. tostring(update_score_result),
          plan = plan
        }
      end

      if type(update_score_result) == "table" and update_score_result.success == false then
        return {
          success = false,
          status = "error",
          message = "Score update failed for '" .. tostring(score.name) .. "': " .. tostring(update_score_result.error or "unknown error"),
          plan = plan
        }
      end

      created_score_ids[#created_score_ids + 1] = created_score_id
    end
    set_stage_progress(#generated_scores, #generated_scores)

    Stage.set("complete")
    return {
      success = true,
      status = "created",
      message = "Scorecard and AI-generated scores created from question export",
      scorecard_id = created_scorecard_id,
      score_ids = created_score_ids,
      plan = plan
    }
  end

  Specification([[
  Feature: AI-generated JSON-native scorecard migration procedure
    Scenario: Procedure initializes
      Given the procedure has started

    Scenario: Procedure initializes for dry-run path
      Given the procedure has started

    Scenario: Procedure initializes for execution path
      Given the procedure has started
  ]])

  Procedure {
    input = {
      questions_export_json = field.string{},
      questions_export_path = field.string{},
      reference_scorecard_identifier = field.string{required = true},
      target_scorecard_name = field.string{required = true},
      target_scorecard_key = field.string{},
      target_scorecard_external_id = field.string{},
      target_scorecard_description = field.string{},
      account_identifier = field.string{default = "default"},
      model_name = field.string{default = "gpt-5-mini"},
      model_provider = field.string{default = "ChatOpenAI"},
      reasoning_effort = field.string{default = "medium"},
      max_scores = field.number{default = 0},
      dry_run = field.boolean{default = false},
      require_approval = field.boolean{default = true}
    },

    output = {
      success = field.boolean{required = true},
      status = field.string{required = true},
      message = field.string{required = true},
      scorecard_id = field.string{},
      score_ids = field.array{},
      plan = field.object{}
    },

    function(input)
      return run(input)
    end
  }
