  -- Load objective-specific guidance doc (injected into hypothesis generation context)
  -- Objective family maps: precision_safe → precision, recall_safe → recall
  local objective_family = objective:match("^(%a+)") or "alignment"
  local obj_doc_key = "optimizer-objective-" .. objective_family
  local OBJECTIVE_DOC = ""
  pcall(function()
    local ok, result = pcall(call_plexus_tool, "get_plexus_documentation",
      {filename = obj_doc_key}, {raw_string = true, max_retries = 1})
    if ok and has_text(result) then OBJECTIVE_DOC = result end
  end)
  Human.notify({message = string.format(
    "  Optimization objective: %s (doc: %s)", objective, obj_doc_key), level = "info"})

  -- Build the shared cookbook and constraints section (used by all hypothesis prompts)
  local function escalation_rank(mode)
    if mode == "ultra_creative" then return 3 end
    if mode == "escalate" then return 2 end
    return 1
  end

  local function plateau_escalation_mode(opts)
    local stagnant = opts.consecutive_stagnant_cycles or 0
    local override = opts.escalation_override
    local mode = "normal"
    if stagnant >= 6 then
      mode = "ultra_creative"
    elseif stagnant >= 3 then
      mode = "escalate"
    end
    if escalation_rank(override) > escalation_rank(mode) then
      mode = override
    end
    return mode
  end

  local function build_hypothesis_slots(opts)
    local mode = plateau_escalation_mode(opts)
    local slots = {"recent_incremental", "recent_bold", "regression_fix", "structural"}
    if mode == "escalate" then
      table.insert(slots, "reframe")
    elseif mode == "ultra_creative" then
      table.insert(slots, "reframe")
      table.insert(slots, "full_rewrite")
    end
    return slots, mode
  end

  local function cap_hypothesis_slots(slots, requested_count)
    local cap = tonumber(requested_count) or #slots
    if cap < 1 then
      cap = 1
    end
    -- Structural is a mandatory baseline lane (slot #4).
    -- Keep it even when callers provide a smaller candidate count.
    local has_structural = false
    for i = 1, #slots do
      if slots[i] == "structural" then
        has_structural = true
        break
      end
    end
    if has_structural and cap < 4 then
      cap = 4
    end
    if cap >= #slots then
      return slots
    end
    local capped = {}
    for i = 1, cap do
      capped[i] = slots[i]
    end
    return capped
  end

  local function build_cookbook_section(opts)
    local parts = {COOKBOOK_STATIC}
    local stagnant = opts.consecutive_stagnant_cycles or 0
    local escalation_mode = plateau_escalation_mode(opts)
    if escalation_mode == "ultra_creative" then
      table.insert(parts, "")
      table.insert(parts, string.format(
        "ULTRA-CREATIVE PLATEAU MODE (%d stagnant cycles):", stagnant))
      table.insert(parts, "The run is stuck. Search harder instead of shrinking the hypothesis set.")
      table.insert(parts, "Use the full 6-slot portfolio: incremental, bold, regression_fix, structural, reframe, full_rewrite.")
      table.insert(parts, "Keep the cautious lane for safety, but use the additional slots to explore materially different framings.")
      table.insert(parts, "Full rewrites are allowed here. Assume the current framing may be wrong.")
    elseif escalation_mode == "escalate" then
      table.insert(parts, "")
      table.insert(parts, string.format(
        "PLATEAU ESCALATION MODE (%d stagnant cycles):", stagnant))
      table.insert(parts, "Recent cycles are flat. Broaden search instead of reducing ambition.")
      table.insert(parts, "Use the 5-slot portfolio: incremental, bold, regression_fix, structural, reframe.")
      table.insert(parts, "Do not repeat the same failed idea with tiny wording changes unless the evidence clearly says the dose was the problem.")
    end

    -- Graduated confidence classification of prior approaches.
    -- Five tiers acknowledge measurement uncertainty and avoid premature conclusions.
    -- A hypothesis that regressed might have been the right direction at the wrong dose,
    -- or the wrong direction entirely — the LLM needs enough context to reason about this.
    if opts.iterations and #opts.iterations > 0 then
      local strongly_harmful = {}
      local moderately_negative = {}
      local mildly_negative = {}
      local near_neutral = {}
      local positive_signal = {}
      for _, iter in ipairs(opts.iterations) do
        if iter.exploration_results and type(iter.exploration_results) == "table" then
          for _, ap in ipairs(iter.exploration_results) do
            local fb_d = ap.fb_deltas and ap.fb_deltas.alignment or 0
            local acc_d = ap.acc_deltas and ap.acc_deltas.alignment or 0
            local desc = ap.done_reason or "(no description)"
            local line = string.format(
              "  - Cycle %s, cand%d: FB %+.3f  ACC %+.3f — %s",
              tostring(iter.iteration), ap.index, fb_d, acc_d, desc)
            if fb_d < -0.05 or acc_d < -0.05 then
              table.insert(strongly_harmful, line)
            elseif fb_d < -0.03 or acc_d < -0.03 then
              table.insert(moderately_negative, line)
            elseif fb_d < -0.005 or acc_d < -0.005 then
              table.insert(mildly_negative, line)
            elseif math.abs(fb_d) <= 0.02 and math.abs(acc_d) <= 0.02 then
              table.insert(near_neutral, line)
            elseif fb_d >= 0 then
              table.insert(positive_signal, line)
            end
          end
        end
      end
      if #strongly_harmful > 0 then
        table.insert(parts, "")
        table.insert(parts, "STRONGLY HARMFUL — do not retry this specific approach:")
        for _, line in ipairs(strongly_harmful) do table.insert(parts, line) end
        table.insert(parts, "Consider: was the direction fundamentally wrong, or was it applied too aggressively?")
        table.insert(parts, "A much more conservative version of the same idea might appear in 'mildly negative' below.")
      end
      if #moderately_negative > 0 then
        table.insert(parts, "")
        table.insert(parts, "MODERATELY NEGATIVE — do not retry unless the baseline has changed significantly:")
        for _, line in ipairs(moderately_negative) do table.insert(parts, line) end
        table.insert(parts, "These showed meaningful regression. They may have been too aggressive or poorly timed.")
        table.insert(parts, "Revisit ONLY after accepted structural changes that alter the baseline behavior.")
      end
      if #mildly_negative > 0 then
        table.insert(parts, "")
        table.insert(parts, "MILDLY NEGATIVE / INCONCLUSIVE — worth revisiting with lighter touch:")
        for _, line in ipairs(mildly_negative) do table.insert(parts, line) end
        table.insert(parts, "Results within or near measurement noise. The direction may be correct at a smaller dose")
        table.insert(parts, "or in combination with other changes. Consider a more conservative version of the same idea.")
      end
      if #near_neutral > 0 then
        table.insert(parts, "")
        table.insert(parts, "NEAR-NEUTRAL (small effect, may be refineable):")
        for _, line in ipairs(near_neutral) do table.insert(parts, line) end
        table.insert(parts, "These had minimal impact. You MAY refine one of these with a conservative adjustment.")
        table.insert(parts, "Do NOT repeat them exactly as-is.")
      end
      if #positive_signal > 0 then
        table.insert(parts, "")
        table.insert(parts, "POSITIVE SIGNAL (already tried — build on, don't repeat):")
        for _, line in ipairs(positive_signal) do table.insert(parts, line) end
        table.insert(parts, "These showed positive signal and may already be in the current code.")
        table.insert(parts, "Do not re-propose the same change, but you may build on the underlying idea.")
      end
    end

    -- Escalating warning based on prior accuracy regressions
    local acc_rejections = opts.consecutive_acc_rejections or 0
    if acc_rejections >= 2 then
      table.insert(parts, "")
      table.insert(parts, string.format("CRITICAL WARNING: %d consecutive iterations REJECTED for accuracy regression.", acc_rejections))
      table.insert(parts, "Keep a dedicated regression-protection lane active and do not repeat known harmful structural changes verbatim.")
      table.insert(parts, "Do NOT collapse the full search portfolio. Struggle should widen search, not narrow it.")
    elseif acc_rejections >= 1 then
      table.insert(parts, "")
      table.insert(parts, "WARNING: Prior iteration was REJECTED for accuracy regression.")
      table.insert(parts, "Make sure at least one hypothesis explicitly protects regression accuracy, but keep the bold and structural lanes alive.")
    end

    return table.concat(parts, "\n")
  end

  -- Build a focused prompt for a single hypothesis generation slot.
  -- Each slot has a specific objective; the agent proposes exactly ONE hypothesis.
  local function build_hypothesis_prompt(slot, already_proposed, opts)
    local parts = {}
    local escalation_mode = plateau_escalation_mode(opts)

    -- Show already-proposed hypotheses so the agent avoids duplicates
    if #already_proposed > 0 then
      table.insert(parts, "=== HYPOTHESES ALREADY PROPOSED THIS CYCLE ===")
      table.insert(parts, "The following hypotheses have already been proposed for this cycle.")
      table.insert(parts, "You MUST propose something DIFFERENT from all of these.\n")
      for _, hyp in ipairs(already_proposed) do
        table.insert(parts, string.format("  %d. %s: %s", hyp.index, hyp.name, hyp.description or ""))
      end
      table.insert(parts, "")
    end

    table.insert(parts, "=== YOUR TASK ===")
    table.insert(parts, "Propose exactly ONE hypothesis. Respond with a single numbered line:")
    table.insert(parts, string.format("%d. <Hypothesis name>: <Description of what to change and why>", #already_proposed + 1))
    table.insert(parts, "")

    -- Check for per-objective slot description overrides
    local slot_overrides = SLOT_OBJECTIVE_OVERRIDES[objective]
    if slot_overrides and slot_overrides[slot] then
      for _, line in ipairs(slot_overrides[slot]) do
        table.insert(parts, line)
      end
    elseif slot == "recent_incremental" then
      table.insert(parts, "OBJECTIVE: Incremental feedback fix (Category A)")
      table.insert(parts, "Pick ONE confusion matrix segment from the FEEDBACK RCA above (e.g.,")
      table.insert(parts, "'Predicted: Yes / Actual: No' OR 'Predicted: No / Actual: Yes' — NOT both).")
      table.insert(parts, "Target the LARGEST RCA category within that segment.")
      table.insert(parts, "POLICY-FIRST APPROACH: Ask yourself — does the rubric have a clear rule for")
      table.insert(parts, "the pattern this segment reveals? If not, ADD that rule. If a rule exists but")
      table.insert(parts, "the model applies it inconsistently, CLARIFY it. Policy changes generalize.")
      table.insert(parts, "Avoid adding few-shot examples unless the RCA shows consistent STT garbling.")
      table.insert(parts, "IMPORTANT: Each segment represents a different error direction. Fixing one may shift")
      table.insert(parts, "the other. Focusing on ONE direction is intentional — net improvement is the goal.")
      table.insert(parts, "Prefer the segment with MORE items (fixing the larger error type yields bigger gains).")
    elseif slot == "recent_bold" then
      table.insert(parts, "OBJECTIVE: Bold feedback fix (Category A or B)")
      table.insert(parts, "Target a DIFFERENT confusion matrix segment than hypothesis 1, OR address the")
      table.insert(parts, "same segment with a structurally different approach.")
      table.insert(parts, "POLICY-FIRST APPROACH: Look for MULTIPLE policy gaps or ambiguities the RCA")
      table.insert(parts, "reveals. Can you reorganize or rewrite a section of the rubric so that the model")
      table.insert(parts, "understands the decision criteria more clearly? A cleaner decision framework")
      table.insert(parts, "covering several edge cases is almost always better than adding individual examples.")
      table.insert(parts, "Also consider: are there contradictory patterns in the feedback that suggest the")
      table.insert(parts, "rubric itself needs a policy decision? If so, name the contradiction explicitly.")
      table.insert(parts, "Be willing to take more risk here — this is your swing-for-the-fences hypothesis.")
    elseif slot == "regression_fix" then
      table.insert(parts, "OBJECTIVE: Accuracy dataset fix (Category A or B)")
      table.insert(parts, "Target the top error pattern from the ACCURACY RCA above (the regression dataset),")
      table.insert(parts, "NOT the feedback RCA. The accuracy dataset is a deterministic regression safety net")
      table.insert(parts, "but ALSO an optimization target — improving accuracy often helps feedback too.")
      table.insert(parts, "Focus on what the accuracy RCA says the model is getting wrong.")
      table.insert(parts, "If the accuracy RCA shows distinct confusion matrix segments, focus on the larger one.")
    elseif slot == "structural" then
      table.insert(parts, "OBJECTIVE: Structural / non-prompt change (Category C — see cookbook)")
      table.insert(parts, "This slot is ALWAYS the 4th hypothesis. It must be a structural change,")
      table.insert(parts, "not a prompt rewrite. Pick the most promising option from the cookbook's")
      table.insert(parts, "Category C section.")
      table.insert(parts, "")
      table.insert(parts, "DYNAMIC PRIORITY: Do NOT blindly follow a fixed order. Instead:")
      table.insert(parts, "  1. Check accumulated_lessons (in your planning context) for any structural")
      table.insert(parts, "     approaches already tried in this run and their outcomes.")
      table.insert(parts, "  2. Do NOT re-propose any structural approach that has already FAILED in this run.")
      table.insert(parts, "  3. Pick from approaches not yet tried, in this approximate priority order:")
      table.insert(parts, "     - C3:  Model swap — follow the upgrade path from the cookbook.")
      table.insert(parts, "            FIRST: if not already on gpt-5.4-nano, swap to gpt-5.4-nano. Always.")
      table.insert(parts, "            ONLY after plateau (3+ cycles stuck): consider gpt-5.4-mini, then gpt-5-mini.")
      table.insert(parts, "            Mini models cost ~10× more than nano. Never propose mini for cost_efficiency runs.")
      table.insert(parts, "            Check accumulated_lessons — never retry a model that already failed.")
      table.insert(parts, "     - C1e: Input source — DeepgramInputSource (sentence format preferred).")
      table.insert(parts, "            ⚠ PREREQUISITE: Only propose if items have Deepgram JSON attachments.")
      table.insert(parts, "            If prior cycles show DeepgramInputSource smoke test failures, do NOT retry.")
      table.insert(parts, "     - C2:  Preprocessing — add, tune, relax, or REMOVE RelevantWindowsTranscriptFilter or other processors when they appear to hide needed evidence.")
      table.insert(parts, "            Removing a harmful filter is a valid structural hypothesis.")
      table.insert(parts, "            If adding/tuning RelevantWindowsTranscriptFilter, start with broad sentence windows such as prev_count=5 and next_count=8.")
      table.insert(parts, "            Do not start with prev_count=1/next_count=1 word windows on call transcripts; they often sever answers from the prompt they respond to.")
      table.insert(parts, "     - C1a: Architecture — decompose into multiple LLM calls, add N/A gate, add CoT node.")
      table.insert(parts, "            If you add an extraction stage, use class: Extractor and map output.extracted_text")
      table.insert(parts, "            into a named state field consumed by the final classifier.")
      table.insert(parts, "            Never use Classifier(valid_classes=['Extracted']) or similar pseudo-extractor labels.")
      table.insert(parts, "     - C4:  Full rewrite — if prior cycles have plateaued, start from scratch.")
      table.insert(parts, "     - C5:  Creative prompt transport experiments — ONLY after many cycles of failed/flat results and after trying C1-C4 options.")
      table.insert(parts, "            FIRST creative step: duplicate the full instruction prompt text twice (same content repeated 2x).")
      table.insert(parts, "            SECOND creative step (more extreme): translate prompt instructions into Polish while keeping answer classes/output in English for parser compatibility.")
      table.insert(parts, "            Never propose Polish translation before trying the prompt-duplication experiment.")
      table.insert(parts, "")
      table.insert(parts, "Check score_config.yaml to avoid proposing something already in place.")
      table.insert(parts, "Do NOT propose a prompt-only change for this slot — that is what slots 1-3 are for.")
    elseif slot == "reframe" then
      table.insert(parts, "OBJECTIVE: Reframe the problem (cross-cycle reinterpretation)")
      table.insert(parts, "Assume the optimizer has been framing the blocker too narrowly.")
      table.insert(parts, "Propose a materially different decision framework, decomposition, or rubric interpretation.")
      table.insert(parts, "Use this slot to challenge the dominant assumption from prior cycles.")
    elseif slot == "full_rewrite" then
      table.insert(parts, "OBJECTIVE: Full rewrite from a new framing")
      table.insert(parts, "Assume the current framing is wrong or exhausted.")
      table.insert(parts, "You may start from the baseline version and redesign major prompt sections, graph structure, preprocessing, or model allocation.")
      table.insert(parts, "Do not preserve existing structure just because it exists.")
    end

    -- Guide approach selection based on historical effectiveness
    table.insert(parts, "")
    table.insert(parts, "APPROACH SELECTION: The HYPOTHESIS EFFECTIVENESS SUMMARY in the planning context")
    table.insert(parts, "shows which categories of change have historically worked for this score. Weight")
    table.insert(parts, "your approach accordingly — but do not blindly follow past patterns if the RCA")
    table.insert(parts, "clearly points to a different type of fix.")

    if escalation_mode == "ultra_creative" then
      table.insert(parts, "")
      table.insert(parts, "** ULTRA-CREATIVE PLATEAU MODE ** — The run is stagnating. Search harder.")
      if slot == "recent_incremental" then
        table.insert(parts, "This is still the cautious lane. Make a focused, evidence-backed change.")
      else
        table.insert(parts, "Be willing to rethink the problem. Prefer materially different framings over tiny wording edits.")
      end
    elseif escalation_mode == "escalate" then
      table.insert(parts, "")
      table.insert(parts, "** PLATEAU ESCALATION MODE ** — The run is flat. Broaden search.")
      if slot == "recent_incremental" then
        table.insert(parts, "Keep this lane focused and evidence-backed.")
      else
        table.insert(parts, "Do not settle for tiny edits only. Aim for a meaningfully different approach.")
      end
    end

    table.insert(parts, "")
    table.insert(parts, "Remember: you will edit score_config.yaml to implement this. Only propose changes")
    table.insert(parts, "that can be made by editing that YAML file.")

    return table.concat(parts, "\n")
  end

  -- Build the review context message shown to the reviewer agent after evals
  local function build_review_context(opts)
    local parts = {}
    local function has_number(value)
      return type(value) == "number"
    end

    table.insert(parts, "=== EVALUATION RESULTS FOR YOUR CHANGE ===")
    table.insert(parts, "")
    table.insert(parts, string.format("Iteration %d change:", opts.iteration))
    table.insert(parts, string.format('  "%s"', opts.done_reason or "(no reason given)"))
    table.insert(parts, string.format("  New version: %s", tostring(opts.new_version_id)))
    table.insert(parts, string.format("  Prior version (reverts to): %s", tostring(opts.prior_version_id)))
    table.insert(parts, "")

    table.insert(parts, "Feedback alignment (vs baseline):")
    if opts.fb_metrics and has_number(opts.baseline_fb_ac1) and has_number(opts.fb_metrics.alignment) then
      table.insert(parts, string.format("  AC1: %.3f → %.3f (delta %+.3f)",
        opts.baseline_fb_ac1, opts.fb_metrics.alignment,
        opts.fb_metrics.alignment - opts.baseline_fb_ac1))
      if has_number(opts.fb_metrics.accuracy)
         and has_number(opts.fb_metrics.precision)
         and has_number(opts.fb_metrics.recall) then
        table.insert(parts, string.format("  Accuracy: %.3f, Precision: %.3f, Recall: %.3f",
          opts.fb_metrics.accuracy, opts.fb_metrics.precision, opts.fb_metrics.recall))
      else
        table.insert(parts, "  Accuracy/precision/recall: (not available)")
      end
    else
      table.insert(parts, "  (not available)")
    end
    table.insert(parts, "")

    table.insert(parts, "Accuracy on regression dataset (vs baseline):")
    if opts.acc_metrics and has_number(opts.baseline_acc_ac1) and has_number(opts.acc_metrics.alignment) then
      table.insert(parts, string.format("  AC1: %.3f → %.3f (delta %+.3f)",
        opts.baseline_acc_ac1, opts.acc_metrics.alignment,
        opts.acc_metrics.alignment - opts.baseline_acc_ac1))
    else
      table.insert(parts, "  (not available)")
    end
    table.insert(parts, "")

    -- Multi-candidate comparison table (if applicable)
    if opts.candidates and #opts.candidates > 1 then
      table.insert(parts, "=== CANDIDATE COMPARISON ===")
      table.insert(parts, string.format("%d candidates were tried. The best was pre-selected by metrics:", #opts.candidates))
      for _, cand in ipairs(opts.candidates) do
        local selected = cand.version_id == opts.new_version_id and " <- SELECTED" or ""
        local dq = ""
        if cand.score and cand.score <= -999 then dq = " (DISQUALIFIED)" end
        local synth_tag = cand.is_synthesis and " [SYNTH]" or ""
        table.insert(parts, string.format("  Candidate %d%s: Recent AC1 %+.3f, Regression AC1 %+.3f%s%s",
          cand.index or 0, synth_tag,
          cand.fb_deltas and cand.fb_deltas.alignment or 0,
          cand.acc_deltas and cand.acc_deltas.alignment or 0,
          dq, selected))
      end
      table.insert(parts, "")
    end

    table.insert(parts, "=== YOUR ASSESSMENT ===")
    table.insert(parts, "The system will automatically carry this version forward unless metrics regressed.")
    table.insert(parts, "A result that doesn't improve things is still useful — it gets carried forward as the new base")
    table.insert(parts, "so future cycles can build on it. Only a genuine regression (metrics went DOWN) causes a revert.")
    table.insert(parts, "")
    table.insert(parts, "Provide your assessment:")
    table.insert(parts, 'Call done(decision="keep", reason="...") — confirm you agree with carrying this forward.')
    table.insert(parts, 'Call done(decision="revert", reason="...") — flag a regression you observed (metrics went down).')
    table.insert(parts, "")
    table.insert(parts, 'REQUIRED: Call done(decision="keep", reason="...") or done(decision="revert", reason="...") NOW.')
    table.insert(parts, "Do NOT return a text response without calling this tool.")

    return table.concat(parts, "\n")
  end

  -- Diagnostic logger that bypasses broken Python logging by writing directly to file.
  -- Defined early so it is available in both fresh-run and continuation paths.
  local diag_path = "optimizer_diag.log"
  pcall(function() diag_path = os.getenv("PLEXUS_DIAG_LOG") or diag_path end)
  local function diag(msg)
    local ts = os.date("%Y-%m-%d %H:%M:%S")
    local line = string.format("[%s] %s\n", ts, msg)
    local existing = ""
    pcall(function() existing = File.read(diag_path) end)
    File.write(diag_path, existing .. line)
    Human.notify({message = msg, level = "info"})
  end

  -- Update the dashboard status message (visible during long-running cycles).
  -- Silently no-ops if the tool is unavailable.
  local function status_msg(msg)
    pcall(call_plexus_tool, "plexus_set_status_message", {message = msg}, {max_retries = 1})
  end

  -- Phase A: Setup & Baseline
  Stage.set("setup")
  Stage.progress(0, params.max_iterations)  -- show total cycle count from the start
  Human.notify({message = "Starting feedback alignment optimizer for scorecard=" .. params.scorecard .. ", score=" .. params.score, level = "info"})
  if params.max_iterations == 1 then
    Human.notify({
      message = "Single-cycle verification run: this will validate one optimization cycle only and will not perform champion promotion.",
      level = "info"
    })
  end

  -- Validate scorecard exists
  -- plexus_scorecard_info returns the scorecard dict directly (no wrapper):
  -- { name, key, externalId, additionalDetails: { id, ... }, sections: {...} }
  local scorecard_info = call_plexus_tool("plexus_scorecard_info", {scorecard_identifier = params.scorecard})
  if not scorecard_info or not scorecard_info.additionalDetails then
    return {
      success = false,
      status = "error",
      message = "Scorecard not found: " .. tostring(params.scorecard)
    }
  end

  local scorecard_id = scorecard_info.additionalDetails.id
  local scorecard_name = scorecard_info.name or scorecard_info.key

  -- Validate score exists
  -- plexus_score_info returns the score dict directly:
  -- { found, scoreId, scoreName, scoreKey, externalId, code, guidelines, location: {...}, ... }
  local score_info = call_plexus_tool("plexus_score_info", {
    score_identifier = params.score,
    scorecard_identifier = params.scorecard
  })

  if not score_info or not score_info.scoreId then
    return {
      success = false,
      status = "error",
      message = "Score not found: " .. tostring(params.score) .. " in scorecard: " .. tostring(scorecard_name)
    }
  end

  local score_id = score_info.scoreId
  local score_name = score_info.scoreName or score_info.scoreKey

  Human.notify({message = "Resolved: scorecard_id=" .. scorecard_id .. ", score_id=" .. score_id, level = "info"})

  local active_rubric_memory_score_version_id = has_text(params.start_version) and params.start_version or nil

  local recent_rubric_memory_briefing = ""
  local recent_rubric_memory_context = nil
  do
    local recent_ok, recent_result = pcall(call_plexus_tool, "plexus_rubric_memory_recent_entries", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score,
      score_id = score_id,
      score_version_id = active_rubric_memory_score_version_id,
      query = "recent SME stakeholder policy update rubric guideline change clarification before optimization",
      days = 30,
      limit = 16
    }, {max_retries = 1})
    if recent_ok and type(recent_result) == "table" and recent_result.success and has_text(recent_result.markdown_context) then
      recent_rubric_memory_context = recent_result
      recent_rubric_memory_briefing = recent_result.markdown_context
      State.set("recent_rubric_memory_context", recent_result)
      Human.notify({message = "Recent rubric-memory briefing loaded for optimizer preflight.", level = "info"})
    elseif recent_ok and type(recent_result) == "table" and recent_result.error then
      Human.notify({message = "Recent rubric-memory briefing unavailable: " .. tostring(recent_result.error), level = "warning"})
    else
      Human.notify({message = "Recent rubric-memory briefing unavailable for this optimizer run.", level = "debug"})
    end
  end

  local rubric_memory_briefing = ""
  local rubric_memory_context = nil
  do
    local rm_ok, rm_result = pcall(call_plexus_tool, "plexus_rubric_memory_evidence_pack", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score,
      score_id = score_id,
      score_version_id = active_rubric_memory_score_version_id,
      topic_hint = "Score-level optimizer rubric-memory briefing",
      synthesize = false
    }, {max_retries = 1})
    if rm_ok and type(rm_result) == "table" and rm_result.success and has_text(rm_result.markdown_context) then
      rubric_memory_context = rm_result
      rubric_memory_briefing = rm_result.markdown_context
      State.set("rubric_memory_context", rm_result)
      Human.notify({message = "Rubric-memory briefing loaded for optimizer planning.", level = "info"})
    elseif rm_ok and type(rm_result) == "table" and rm_result.error then
      Human.notify({message = "Rubric-memory briefing unavailable: " .. tostring(rm_result.error), level = "warning"})
    else
      Human.notify({message = "Rubric-memory briefing unavailable for this optimizer run.", level = "debug"})
    end
  end

  local function rubric_memory_context_score_version(context)
    if type(context) ~= "table" then
      return nil
    end
    if type(context.machine_context) == "table" and has_text(context.machine_context.score_version_id) then
      return context.machine_context.score_version_id
    end
    local citation_index = context.citation_index
    if type(citation_index) == "table" then
      for _, citation in pairs(citation_index) do
        if type(citation) == "table" and citation.kind == "official_rubric" and has_text(citation.score_version_id) then
          return citation.score_version_id
        end
      end
    end
    return nil
  end

  local function ensure_rubric_memory_context_for_version(score_version_id, purpose)
    if not has_text(score_version_id) then
      return nil
    end
    local current_context_version = rubric_memory_context_score_version(rubric_memory_context)
    if current_context_version == score_version_id then
      return rubric_memory_context
    end
    local rm_ok, rm_result = pcall(call_plexus_tool, "plexus_rubric_memory_evidence_pack", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score,
      score_id = score_id,
      score_version_id = score_version_id,
      topic_hint = purpose or "Optimizer rubric-memory active-version context",
      synthesize = false
    }, {max_retries = 1})
    if rm_ok and type(rm_result) == "table" and rm_result.success and has_text(rm_result.markdown_context) then
      rubric_memory_context = rm_result
      rubric_memory_briefing = rm_result.markdown_context
      State.set("rubric_memory_context", rm_result)
      State.set("rubric_memory_context_score_version_id", score_version_id)
      Human.notify({message = "Rubric-memory context refreshed for active version " .. tostring(score_version_id) .. ".", level = "info"})
      return rubric_memory_context
    end
    local err = "unknown error"
    if type(rm_result) == "table" and rm_result.error then
      err = tostring(rm_result.error)
    end
    Human.notify({message = "Rubric-memory context unavailable for active version " .. tostring(score_version_id) .. ": " .. err, level = "warning"})
    return nil
  end

  local function record_sme_question_gate(stage, raw_agenda, gate_result)
    local records = State.get("sme_question_gate_diagnostics") or {}
    table.insert(records, {
      stage = stage,
      raw_agenda = raw_agenda or "",
      result = gate_result
    })
    State.set("sme_question_gate_diagnostics", records)
  end

  local function gate_sme_agenda(raw_agenda, stage, optimizer_context)
    if not has_text(raw_agenda) then
      return raw_agenda, nil
    end
    local score_version_id = ""
    local active_version = State.get("last_accepted_version_id") or active_rubric_memory_score_version_id
    if has_text(active_version) then
      score_version_id = active_version
    end
    if type(rubric_memory_context) == "table" and type(rubric_memory_context.machine_context) == "table" then
      score_version_id = score_version_id ~= "" and score_version_id
        or rubric_memory_context.machine_context.score_version_id
        or ""
    end
    if not has_text(score_version_id) then
      Human.notify({message = "SME question gate skipped: rubric-memory context has no score_version_id.", level = "warning"})
      return raw_agenda, nil
    end
    local gate_rubric_memory_context = ensure_rubric_memory_context_for_version(score_version_id, "SME agenda rubric-memory context")
    if not gate_rubric_memory_context then
      Human.notify({message = "SME question gate skipped: active-version rubric-memory context unavailable.", level = "warning"})
      return raw_agenda, nil
    end
    local gate_ok, gate_result = pcall(call_plexus_tool, "plexus_rubric_memory_sme_question_gate", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score,
      score_version_id = score_version_id,
      candidate_agenda_markdown = raw_agenda,
      rubric_memory_context = gate_rubric_memory_context,
      optimizer_context = optimizer_context or ""
    }, {max_retries = 1})
    if gate_ok and type(gate_result) == "table" and gate_result.success then
      record_sme_question_gate(stage, raw_agenda, gate_result)
      Human.notify({message = string.format(
        "SME question gate applied (%s): suppressed=%s transformed=%s kept=%s",
        stage,
        tostring(gate_result.summary_counts and gate_result.summary_counts.suppressed or 0),
        tostring(gate_result.summary_counts and gate_result.summary_counts.transformed or 0),
        tostring(gate_result.summary_counts and gate_result.summary_counts.kept or 0)
      ), level = "info"})
      -- Validate the returned markdown is actual agenda text, not a serialized object
      local fam = gate_result.final_agenda_markdown
      local fam_looks_valid = type(fam) == "string"
        and fam:len() > 0
        and not fam:find("output=None", 1, true)
        and not fam:find("UsageStats(", 1, true)
      return fam_looks_valid and fam or raw_agenda, gate_result
    end
    local err = gate_ok and type(gate_result) == "table" and gate_result.error or tostring(gate_result)
    record_sme_question_gate(stage, raw_agenda, {success = false, error = err})
    Human.notify({message = "SME question gate unavailable: " .. tostring(err), level = "warning"})
    return raw_agenda, nil
  end

  -- ================================================================
  -- Pre-declare variables shared between fresh-run and continuation paths.
  -- (Lua 5.4 goto cannot jump into the scope of a local, so all locals that
  -- are used after ::start_cycling:: must be declared before the goto.)
  -- ================================================================
  local dataset_id              = nil
  local champion_version_id     = nil
  local regression_baseline       = nil
  local regression_baseline_id    = nil
  local regression_baseline_metrics = nil
  local regression_baseline_cost_per_item = nil
  local regression_baseline_rca   = {}
  local regression_available      = false
  local recent_baseline_id    = nil
  local recent_baseline_metrics = nil
  local recent_baseline_cost_per_item = nil
  local recent_baseline_rca   = {}
  -- current score config — set by init or continuation, used in cycle loop
  local current_code_path    = nil
  local current_code         = nil
  local current_guidelines   = nil

  local function parse_contradictions_report_result(report_result)
    if not report_result then
      return nil, "Contradictions report returned no result"
    end
    if type(report_result) ~= "table" then
      return nil, "Contradictions report returned unexpected result type: " .. tostring(report_result)
    end

    local status = string.lower(tostring(report_result.status or ""))
    if status == "failed" or status == "error" then
      return nil, tostring(report_result.error or report_result.message or "Contradictions report failed")
    end

    if not report_result.output then
      return nil, tostring(report_result.message or "Contradictions report returned no output")
    end

    local out = report_result.output
    local code_repr = nil
    if type(out) == "string" then
      local json_start = string.find(out, "%s*{")
      if json_start then
        local comment_header = string.sub(out, 1, json_start - 1)
        local json_str = string.sub(out, json_start)
        local parsed, parse_err = safe_decode(json_str)
        if parsed and type(parsed) == "table" then
          parsed.guidelines = nil
          local ok_enc, encoded = pcall(function() return Json.encode(parsed) end)
          if ok_enc and encoded then
            code_repr = comment_header .. encoded
          end
          out = parsed
        else
          return nil, "Contradictions report JSON parse failed: " .. tostring(parse_err)
        end
      else
        return nil, "Contradictions report output has no JSON object"
      end
    end

    if type(out) ~= "table" then
      return nil, "Contradictions report returned unsupported output type: " .. tostring(type(out))
    end
    if out.error then
      return nil, tostring(out.error)
    end

    return { output = out, code_repr = code_repr }, nil
  end

  -- Helper: run FeedbackContradictions report directly and cache result in State.
  -- Defined here (after scorecard_name/score_name) so it is available in both
  -- fresh-run and continuation paths.
  local function refresh_known_contradictions(current_cycle, opts)
    opts = opts or {}
    local ttl = opts.ttl_hours or 24
    local fresh = opts.fresh or false
    local contradictions_score_version_id =
      State.get("last_accepted_version_id") or active_rubric_memory_score_version_id or champion_version_id
    Human.notify({message = string.format(
      "Refreshing contradictions landscape (cycle %d, ttl=%dh, fresh=%s)...",
      current_cycle, ttl, tostring(fresh)), level = "info"})
    local ok, report_result = pcall(call_plexus_tool, "plexus_report_run", {
      block_class = "FeedbackContradictions",
      block_config = {
        scorecard = params.scorecard,
        score = params.score,
        mode = "contradictions",
        days = tostring(params.days or 90),
        max_feedback_items = 100,
        num_topics = 8,
        include_rubric_memory = true,
        score_version_id = contradictions_score_version_id
      },
      cache_key = "FeedbackContradictions: " .. scorecard_name .. " / " .. score_name .. " / " .. tostring(contradictions_score_version_id),
      ttl_hours = ttl,
      fresh = fresh
    })
    if not ok or not report_result then
      local err = "Contradictions report failed"
      if type(report_result) == "table" and report_result.error then
        err = tostring(report_result.error)
      elseif report_result then
        err = tostring(report_result)
      end
      State.set("known_contradictions_status", {cycle = current_cycle, available = false, error = err})
      Human.notify({message = "  Contradictions report failed: " .. err, level = "warning"})
      return
    end
    local parsed_result, parse_error = parse_contradictions_report_result(report_result)
    if not parsed_result then
      State.set("known_contradictions_status", {cycle = current_cycle, available = false, error = parse_error})
      Human.notify({message = "  Contradictions report unavailable: " .. tostring(parse_error), level = "warning"})
      return
    end

    local out = parsed_result.output
    local code_repr = parsed_result.code_repr
    local topics = out.topics or {}
    local total_items = out.total_items_analyzed or 0
    local contradictions_found = out.contradictions_found or 0
    local aligned_found = out.aligned_found or 0

    -- Separate topics into policy gaps vs. real guideline contradictions.
    -- Policy gaps have guideline_quote starting with "Policy gap:" — these CAN be fixed.
    -- Guideline contradictions have a real guideline quote — these CANNOT be fixed.
    local contradiction_topics = {}
    local policy_gap_topics = {}
    local policy_gap_count = 0
    local topics_structured = {}
    for _, topic in ipairs(topics) do
      local gq = topic.guideline_quote or ""
      local is_gap = string.find(gq, "^Policy gap") ~= nil
      -- Extract one representative exemplar
      local exemplar = nil
      local exemplars = topic.exemplars or {}
      if #exemplars > 0 then
        local ex = exemplars[1]
        exemplar = {
          initial_value = ex.initial_value or "?",
          final_value = ex.final_value or "?",
          edit_comment = trunc(ex.edit_comment or "", 200)
        }
        -- Track per-topic item contribution to policy gap count
        if is_gap then
          policy_gap_count = policy_gap_count + (topic.count or 0)
        end
      end
      local t = {
        label = topic.label or "Unknown",
        count = topic.count or 0,
        summary = trunc(topic.summary or "", 300),
        guideline_quote = trunc(gq, 200),
        is_policy_gap = is_gap,
        exemplar = exemplar
      }
      table.insert(topics_structured, t)
      if is_gap then
        table.insert(policy_gap_topics, t)
      else
        table.insert(contradiction_topics, t)
      end
    end

    -- Build pre-rendered text summary
    local summary_parts = {}
    if #topics > 0 then
      table.insert(summary_parts, string.format(
        "%d items analyzed | %d contradictions (%.0f%%) | %d policy gaps | %d aligned",
        total_items, contradictions_found,
        (total_items > 0) and (contradictions_found / total_items * 100) or 0,
        policy_gap_count, aligned_found))

      if #contradiction_topics > 0 then
        table.insert(summary_parts, "\nGuideline contradiction topics (NOT fixable via prompt editing):")
        for i, t in ipairs(contradiction_topics) do
          table.insert(summary_parts, string.format(
            "\n  %d. %s — %d items: %s\n     Guideline violated: \"%s\"",
            i, t.label, t.count, t.summary, t.guideline_quote))
          if t.exemplar then
            table.insert(summary_parts, string.format(
              "\n     Example: predicted=%s corrected=%s — \"%s\"",
              t.exemplar.initial_value, t.exemplar.final_value, t.exemplar.edit_comment))
          end
        end
      end

      if #policy_gap_topics > 0 then
        table.insert(summary_parts, "\nPolicy gap topics (CAN be fixed by adding a guideline rule):")
        for i, t in ipairs(policy_gap_topics) do
          table.insert(summary_parts, string.format(
            "\n  %d. %s — %d items: %s\n     Gap: \"%s\"",
            i, t.label, t.count, t.summary, t.guideline_quote))
          if t.exemplar then
            table.insert(summary_parts, string.format(
              "\n     Example: predicted=%s corrected=%s — \"%s\"",
              t.exemplar.initial_value, t.exemplar.final_value, t.exemplar.edit_comment))
          end
        end
      end
    else
      table.insert(summary_parts, "No contradiction or policy gap topics found in current feedback window.")
    end

    State.set("known_contradictions", {
      cycle = current_cycle,
      total_items_analyzed = total_items,
      contradictions_found = contradictions_found,
      policy_gap_count = policy_gap_count,
      aligned_found = aligned_found,
      topic_count = #topics,
      contradiction_topic_count = #contradiction_topics,
      policy_gap_topic_count = #policy_gap_topics,
      topics = topics_structured,
      summary = table.concat(summary_parts, "")
    })
    State.set("known_contradictions_status", {cycle = current_cycle, available = true, error = nil})
    if code_repr then
      State.set("known_contradictions_code_repr", code_repr)
      Human.notify({message = string.format(
        "  Stored FC code repr (%d chars, guidelines stripped)", #code_repr), level = "debug"})
    end
    Human.notify({message = string.format(
      "  Contradictions landscape: %d items | %d contradictions, %d policy gaps, %d topics",
      total_items, contradictions_found, policy_gap_count, #topics), level = "info"})
  end

  -- ================================================================
  -- Continuation detection: if this procedure has prior iterations,
  -- skip expensive dataset build + baseline evals and resume cycling.
  -- ================================================================
  local _prior_iters = State.get("iterations")
  local is_continuation = type(_prior_iters) == "table" and #_prior_iters > 0
  local continuation_rebaseline = false
  if is_continuation then
    local n = #_prior_iters
    Human.notify({message = string.format(
      "CONTINUATION MODE: Found %d prior cycles — resuming from cycle %d.", n, n), level = "info"})
    File.write(diag_path, "")  -- clear diag log for continuation run
    diag(string.format("=== CONTINUATION: %d prior cycles ===", n))

    -- Restore all init-phase variables from durable State
    dataset_id              = State.get("dataset_id")
    champion_version_id     = State.get("last_accepted_version_id") or State.get("baseline_version_id")
    active_rubric_memory_score_version_id = champion_version_id
    State.set("active_rubric_memory_score_version_id", active_rubric_memory_score_version_id)
    regression_baseline_id    = State.get("last_accepted_acc_eval_id") or State.get("regression_baseline_id")
    regression_baseline_metrics = State.get("last_accepted_acc_metrics") or State.get("regression_baseline_metrics")
    regression_baseline_cost_per_item = State.get("regression_baseline_cost_per_item")
    recent_baseline_id    = State.get("last_accepted_fb_eval_id") or State.get("recent_baseline_id")
    recent_baseline_metrics = State.get("last_accepted_fb_metrics") or State.get("recent_baseline_metrics")
    recent_baseline_cost_per_item = State.get("recent_baseline_cost_per_item")
    regression_baseline_rca   = State.get("last_regression_rca") or {}
    recent_baseline_rca   = State.get("last_recent_rca") or {}
    regression_available      = regression_baseline_metrics ~= nil

    -- Re-pull current config from last accepted version
    do
      local _cont_pull = call_plexus_tool("plexus_score_pull", {
        scorecard_identifier = params.scorecard,
        score_identifier = score_id,
        version_id = champion_version_id
      })
      if _cont_pull and _cont_pull.success then
        current_code_path = _cont_pull.codeFilePath
        current_code = File.read(current_code_path)
        if _cont_pull.guidelinesFilePath then
          local _g = File.read(_cont_pull.guidelinesFilePath)
          if has_text(_g) then current_guidelines = _g end
        end
      end
    end

    if has_text(params.hint) then
      Human.notify({message = "Continuation hint: " .. params.hint, level = "info"})
    end

    local stored_feedback_target_updated_at = State.get("feedback_target_updated_at")
    local watermark_ok, watermark = pcall(call_plexus_tool, "plexus_feedback_latest_update", {
      scorecard_name = params.scorecard,
      score_name = params.score,
      days = params.days
    })
    local current_feedback_target_updated_at =
      watermark_ok and watermark and not watermark.error and watermark.found and watermark.latest_feedback_updated_at or nil

    if has_text(current_feedback_target_updated_at)
      and has_text(stored_feedback_target_updated_at)
      and tostring(current_feedback_target_updated_at) ~= tostring(stored_feedback_target_updated_at) then
      continuation_rebaseline = true
      State.set("feedback_target_updated_at", current_feedback_target_updated_at)
      dataset_id = nil
      regression_baseline_id = nil
      regression_baseline_metrics = nil
      regression_baseline_cost_per_item = nil
      recent_baseline_id = nil
      recent_baseline_metrics = nil
      recent_baseline_cost_per_item = nil
      regression_baseline_rca = {}
      recent_baseline_rca = {}
      regression_available = false
      Human.notify({
        message = string.format(
          "Continuation detected newer feedback target (stored=%s current=%s). Refreshing baselines against the current target while preserving prior iterations.",
          tostring(stored_feedback_target_updated_at),
          tostring(current_feedback_target_updated_at)
        ),
        level = "warning"
      })
    end
  end  -- end is_continuation block — fall through to ::start_cycling::

  local function iso_after_or_equal(lhs, rhs)
    if not has_text(lhs) or not has_text(rhs) then return false end
    return tostring(lhs) >= tostring(rhs)
  end

  local dataset_cache_by_version = {}
  local function ensure_regression_dataset_for_version(version_id)
    local version_key = tostring(version_id or "__champion__")
    if dataset_cache_by_version[version_key] and has_text(dataset_cache_by_version[version_key].dataset_id) then
      return dataset_cache_by_version[version_key].dataset_id, dataset_cache_by_version[version_key].feedback_target_hash
    end

    local active_feedback_target_updated_at = State.get("feedback_target_updated_at")
    local min_dataset_rows = params.max_samples or 100
    local min_acceptable = math.max(math.floor(min_dataset_rows / 4), 15)
    local dataset_check = call_plexus_tool("plexus_dataset_check_associated", {
      scorecard = params.scorecard,
      score = params.score,
      score_version_id = version_id,
      days = params.days
    })

    local dataset_is_fresh = true
    if has_text(active_feedback_target_updated_at) then
      dataset_is_fresh = iso_after_or_equal(dataset_check and dataset_check.created_at, active_feedback_target_updated_at)
    end
    local dataset_adequate = dataset_check and dataset_check.has_dataset
      and dataset_check.is_materialized
      and dataset_check.row_count and dataset_check.row_count >= min_acceptable
      and dataset_is_fresh

    local selected_dataset_id = nil
    local selected_feedback_target_hash = dataset_check and dataset_check.feedback_target_hash or nil
    local selected_row_count = nil

    if dataset_adequate then
      selected_dataset_id = dataset_check.dataset_id
      selected_row_count = dataset_check.row_count
      Human.notify({message = string.format(
        "Found adequate associated dataset for version %s: %s (%s rows)",
        tostring(version_id or "champion"),
        tostring(selected_dataset_id),
        tostring(dataset_check.row_count or "?")
      ), level = "info"})
    else
      if dataset_check and dataset_check.has_dataset then
        if not dataset_is_fresh and has_text(active_feedback_target_updated_at) then
          Human.notify({message = string.format(
            "Existing dataset for version %s is stale (created_at=%s older than watermark=%s), creating new one...",
            tostring(version_id or "champion"),
            tostring(dataset_check.created_at or "unknown"),
            tostring(active_feedback_target_updated_at)
          ), level = "info"})
        else
          Human.notify({message = string.format(
            "Existing dataset for version %s has %d rows but need %d, creating new one...",
            tostring(version_id or "champion"),
            dataset_check.row_count or 0,
            min_dataset_rows
          ), level = "info"})
        end
      else
        Human.notify({message = "No associated dataset found for version " .. tostring(version_id or "champion") .. ", creating one...", level = "info"})
      end

      Human.notify({
        message = string.format("Building balanced regression dataset (%d items) for version %s...", min_dataset_rows, tostring(version_id or "champion")),
        level = "info"
      })
      local build_ok, build_result = pcall(call_plexus_tool, "plexus_dataset_build_from_feedback_window", {
        scorecard = params.scorecard,
        score = params.score,
        max_items = min_dataset_rows,
        days = params.days,
        balance = true,
        score_version_id = version_id
      })
      if not build_ok then
        Human.notify({message = "Balanced dataset build failed (" .. tostring(build_result) .. "), trying unbalanced...", level = "info"})
        build_result = nil
      end

      if build_result and build_result.rows_written and build_result.rows_written >= min_acceptable then
        selected_dataset_id = build_result.dataset_id
        selected_feedback_target_hash = build_result.feedback_target_hash
        selected_row_count = build_result.rows_written
        Human.notify({message = "Created balanced dataset: " .. selected_dataset_id .. " (" .. build_result.rows_written .. " rows)", level = "info"})
      else
        local rows_so_far = (build_result and build_result.rows_written) or 0
        Human.notify({message = "Balanced dataset only has " .. rows_so_far .. " rows, trying unbalanced...", level = "info"})

        local unbal_ok, unbal_result = pcall(call_plexus_tool, "plexus_dataset_build_from_feedback_window", {
          scorecard = params.scorecard,
          score = params.score,
          max_items = min_dataset_rows,
          days = params.days,
          balance = false,
          score_version_id = version_id
        })
        local final_build_result = unbal_ok and unbal_result or nil

        if final_build_result and final_build_result.rows_written and final_build_result.rows_written >= min_acceptable then
          selected_dataset_id = final_build_result.dataset_id
          selected_feedback_target_hash = final_build_result.feedback_target_hash
          selected_row_count = final_build_result.rows_written
          Human.notify({message = "Created unbalanced dataset: " .. selected_dataset_id .. " (" .. final_build_result.rows_written .. " rows)", level = "info"})
        else
          local final_rows = (final_build_result and final_build_result.rows_written) or 0
          Human.notify({message = string.format(
            "Insufficient feedback data for regression dataset (version %s): only %d items available (need %d, minimum %d). Regression tracking disabled for this run.",
            tostring(version_id or "champion"),
            final_rows,
            min_dataset_rows,
            min_acceptable
          ), level = "warning"})
          return nil
        end
      end
    end

    if selected_row_count and selected_row_count < min_dataset_rows then
      local diagnostic = {
        version_id = version_id,
        dataset_id = selected_dataset_id,
        requested_max_samples = min_dataset_rows,
        available_rows = selected_row_count,
        days = params.days,
        message = string.format(
          "Requested %d evaluation samples but only %d qualifying feedback items were available.",
          min_dataset_rows,
          selected_row_count
        )
      }
      local sample_size_diagnostics = State.get("sample_size_diagnostics") or {}
      table.insert(sample_size_diagnostics, diagnostic)
      State.set("sample_size_diagnostics", sample_size_diagnostics)
      Human.notify({message = diagnostic.message, level = "warning"})
      diag("Sample size diagnostic: " .. tostring(Json.encode(diagnostic)))
    end

    dataset_cache_by_version[version_key] = {
      dataset_id = selected_dataset_id,
      feedback_target_hash = selected_feedback_target_hash
    }
    return selected_dataset_id, selected_feedback_target_hash
  end

  -- ================================================================
  -- (Fresh run) Phase A — also used by continuation runs that need a clean
  -- rebaseline against a newer feedback target.
  -- ================================================================
  if not is_continuation or continuation_rebaseline then
  File.write(diag_path, "")  -- clear diag log for fresh run

  -- Dataset adequacy check: ensure a deterministic regression dataset exists.
  -- The accuracy evaluation uses this fixed dataset across all iterations.
  -- The feedback evaluation separately uses the newest items.
  Human.notify({message = "Checking for existing associated regression dataset...", level = "info"})

  local feedback_target_updated_at = nil
  local watermark_ok, watermark = pcall(call_plexus_tool, "plexus_feedback_latest_update", {
    scorecard_name = params.scorecard,
    score_name = params.score,
    days = params.days
  })
  if watermark_ok and watermark and not watermark.error and watermark.found and has_text(watermark.latest_feedback_updated_at) then
    feedback_target_updated_at = watermark.latest_feedback_updated_at
    Human.notify({
      message = "Feedback watermark: " .. tostring(feedback_target_updated_at),
      level = "info"
    })
  else
    Human.notify({message = "Feedback watermark unavailable; using row-count/materialization checks only.", level = "warning"})
  end
  dataset_id = ensure_regression_dataset_for_version(params.start_version)

  State.set("dataset_id", dataset_id)
  State.set("feedback_target_updated_at", feedback_target_updated_at)
  if dataset_id then
    Human.notify({message = "Using regression dataset: " .. dataset_id, level = "info"})
  else
    regression_available = false
    Human.notify({message = "No regression dataset available — running feedback-only (no accuracy regression guard).", level = "warning"})
  end

  -- Pull starting version (champion or specified start_version)
  local pull_args = {
    scorecard_identifier = params.scorecard,
    score_identifier = score_id
  }
  if has_text(params.start_version) then
    pull_args.version_id = params.start_version
    Human.notify({message = "Pulling specified start version: " .. params.start_version, level = "info"})
  else
    Human.notify({message = "Pulling champion score version...", level = "info"})
  end
  local initial_pull = call_plexus_tool("plexus_score_pull", pull_args)
  if not initial_pull or not initial_pull.success then
    return {
      success = false,
      status = "error",
      message = "Failed to pull initial score configuration"
    }
  end
  -- champion_version_id and baseline variables are pre-declared above the continuation check
  -- For continuation runs, champion_version_id was already restored from State; do not overwrite it.
  if not is_continuation then
    champion_version_id = initial_pull.versionId
  end
  if not has_text(active_rubric_memory_score_version_id) then
    active_rubric_memory_score_version_id = champion_version_id
  end
  State.set("active_rubric_memory_score_version_id", active_rubric_memory_score_version_id)
  dataset_cache_by_version[tostring(champion_version_id)] = {
    dataset_id = dataset_id
  }
  -- For continuation runs, current_code_path/current_code were already restored from the champion version.
  if not is_continuation then
    current_code_path = initial_pull.codeFilePath
    current_code = File.read(current_code_path)
  end

  -- Detect score class and load class-specific YAML format doc
  local score_class = (current_code:match("\nclass:%s*(%S+)")
                    or current_code:match("^class:%s*(%S+)")
                    or "LangGraphScore")
  local score_class_doc_key = (score_class == "TactusScore")
    and "score-yaml-tactusscore" or "score-yaml-langgraph"
  local SCORE_CLASS_DOC = ""
  pcall(function()
    local ok, result = pcall(call_plexus_tool, "get_plexus_documentation",
      {filename = score_class_doc_key}, {raw_string = true, max_retries = 1})
    if ok and has_text(result) then SCORE_CLASS_DOC = result end
  end)
  Human.notify({message = string.format(
    "  Score class: %s — loaded doc: %s", score_class, score_class_doc_key), level = "info"})

  if not is_continuation then
    current_guidelines = ""
    if initial_pull.guidelinesFilePath then
      local g = File.read(initial_pull.guidelinesFilePath)
      if has_text(g) then current_guidelines = g end
    end
  end
  Human.notify({message = "Champion version: " .. tostring(champion_version_id), level = "info"})

  -- Dual baseline evaluations — run new ones or reuse from a previous run
  Stage.set("baseline")
  -- (regression_baseline, regression_baseline_id/metrics/rca, regression_available,
  --  recent_baseline_id/metrics/rca are all pre-declared above the continuation check)

  local resume_regression = has_text(params.resume_regression_eval) and params.resume_regression_eval or nil
  local resume_recent  = has_text(params.resume_recent_eval) and params.resume_recent_eval or nil
  local feedback_target_updated_at = State.get("feedback_target_updated_at")
  if not has_text(feedback_target_updated_at) then
    local watermark_ok, watermark = pcall(call_plexus_tool, "plexus_feedback_latest_update", {
      scorecard_name = params.scorecard,
      score_name = params.score,
      days = params.days
    })
    if watermark_ok and watermark and not watermark.error and watermark.found and has_text(watermark.latest_feedback_updated_at) then
      feedback_target_updated_at = watermark.latest_feedback_updated_at
      State.set("feedback_target_updated_at", feedback_target_updated_at)
      Human.notify({message = "Initialized feedback watermark: " .. tostring(feedback_target_updated_at), level = "info"})
    end
  end

  if resume_regression or resume_recent then
    -- Resume mode: reuse existing baseline evaluations
    Human.notify({message = "Resuming from existing baseline evaluations...", level = "info"})

    -- Helper: warn (but don't fail) if resumed eval's version differs from starting version.
    -- The user explicitly chose to resume with these baselines, so trust them.
    local function validate_eval_version(eval_info, eval_type, eval_id)
      local eval_version = eval_info.score_version_id or eval_info.scoreVersionId
      if eval_version and eval_version ~= champion_version_id then
        Human.notify({message = string.format(
          "Note: %s baseline %s was run on version %s but starting version is %s. "
          .. "Using it as the reference baseline anyway.",
          eval_type, eval_id, eval_version, champion_version_id
        ), level = "warning"})
      end
      return true, nil
    end

    if resume_regression then
      Human.notify({message = "Fetching regression baseline: " .. resume_regression, level = "info"})
      local acc_info = call_plexus_tool("plexus_evaluation_info", {
        evaluation_id = resume_regression,
        output_format = "json"
      })
      if acc_info and not acc_info.error then
        record_evaluation_cost(acc_info, "resume_regression_baseline", "accuracy")
        local valid, err = validate_eval_version(acc_info, "Regression", resume_regression)
        if not valid then
          return {success = false, status = "error", message = err}
        end
        regression_baseline_id      = resume_regression
        regression_baseline_metrics = extract_metrics(acc_info)
        regression_baseline_cost_per_item = extract_cost_per_item(acc_info)
        regression_baseline_rca     = enrich_rca(acc_info.root_cause or {})
        regression_available        = true
        Human.notify({message = string.format(
          "Regression baseline (resumed): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
          regression_baseline_metrics.alignment,
          regression_baseline_metrics.accuracy,
          regression_baseline_metrics.precision,
          regression_baseline_metrics.recall
        ), level = "info"})
      else
        Human.notify({message = "Failed to resume regression baseline: " .. tostring(acc_info and acc_info.error or "not found"), level = "warning"})
      end
    end

    if resume_recent then
      Human.notify({message = "Fetching recent baseline: " .. resume_recent, level = "info"})
      local fb_info = call_plexus_tool("plexus_evaluation_info", {
        evaluation_id = resume_recent,
        output_format = "json"
      })
      if not fb_info or fb_info.error then
        return {
          success = false,
          status  = "error",
          message = "Failed to resume recent baseline " .. resume_recent .. ": " .. tostring(fb_info and fb_info.error or "not found")
        }
      end
      record_evaluation_cost(fb_info, "resume_recent_baseline", "feedback")
      -- Skip version validation for recent evals — they use the champion version
      -- at the time of evaluation, which may differ from the starting version.
      recent_baseline_id      = resume_recent
      recent_baseline_metrics = extract_metrics(fb_info)
      recent_baseline_cost_per_item = extract_cost_per_item(fb_info)
      recent_baseline_rca     = enrich_rca(fb_info.root_cause or {})
      Human.notify({message = string.format(
        "Recent baseline (resumed): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        recent_baseline_metrics.alignment,
        recent_baseline_metrics.accuracy,
        recent_baseline_metrics.precision,
        recent_baseline_metrics.recall
      ), level = "info"})
    end

    -- If recent baseline not resumed, must run it
    if not resume_recent then
      Human.notify({message = "No recent baseline to resume — running fresh...", level = "info"})
    end
  end

  -- (diag and refresh_known_contradictions are defined earlier, before continuation check)

  -- Try to reuse recent completed evaluations before running fresh baselines
  local n_samples = params.max_samples or 100
  if not regression_baseline_id and champion_version_id then
    local ok_acc, found_acc = pcall(call_plexus_tool, "plexus_evaluation_find_recent", {
      score_version_id = champion_version_id,
      evaluation_type  = "accuracy",
      max_age_hours    = 168,  -- 7 days: accuracy uses a fixed dataset, valid across restarts
      min_items        = math.floor(n_samples * 0.8),  -- allow ~20% smaller sample counts
      dataset_id       = dataset_id,
    })
    if ok_acc and found_acc and not found_acc.error and (found_acc.evaluation_id or found_acc.id) then
      record_evaluation_cost(found_acc, "find_recent_regression_baseline", "accuracy")
      regression_baseline_id      = found_acc.evaluation_id or found_acc.id
      regression_baseline_metrics = extract_metrics(found_acc)
      regression_baseline_cost_per_item = extract_cost_per_item(found_acc)
      regression_baseline_rca     = enrich_rca(found_acc.root_cause or {})
      regression_available        = true
      Human.notify({message = string.format(
        "Regression baseline (reusing recent): AC1=%.3f, Accuracy=%.3f",
        regression_baseline_metrics.alignment, regression_baseline_metrics.accuracy
      ), level = "info"})
    end
  end
  if not recent_baseline_id and champion_version_id then
    local ok_fb, found_fb = pcall(call_plexus_tool, "plexus_evaluation_find_recent", {
      score_version_id = champion_version_id,
      evaluation_type  = "feedback",
      max_age_hours    = 48,   -- 48h: daily runs take hours, need buffer beyond 24h
      min_items        = math.floor(n_samples * 0.8),  -- same 20% tolerance as accuracy
      days             = params.days,
      max_feedback_items = params.max_samples or 100,
      sampling_mode    = "newest",
      latest_feedback_updated_at = feedback_target_updated_at,
    })
    if ok_fb and found_fb and not found_fb.error and (found_fb.evaluation_id or found_fb.id) then
      record_evaluation_cost(found_fb, "find_recent_feedback_baseline", "feedback")
      recent_baseline_id      = found_fb.evaluation_id or found_fb.id
      recent_baseline_metrics = extract_metrics(found_fb)
      recent_baseline_cost_per_item = extract_cost_per_item(found_fb)
      recent_baseline_rca     = enrich_rca(found_fb.root_cause or {})
      Human.notify({message = string.format(
        "Recent baseline (reusing recent): AC1=%.3f, Accuracy=%.3f",
        recent_baseline_metrics.alignment, recent_baseline_metrics.accuracy
      ), level = "info"})
    end
  end

  -- Run fresh baselines for any that weren't found above
  if not recent_baseline_id or (dataset_id and not regression_baseline_id and not resume_regression) then
    local batch_items = {}
    if dataset_id and not regression_baseline_id then
      table.insert(batch_items, {
        scorecard_name  = params.scorecard,
        score_name      = params.score,
        evaluation_type = "accuracy",
        dataset_id      = dataset_id,
        n_samples       = params.max_samples or 100,
        version         = champion_version_id,
        notes           = "Baseline: deterministic regression dataset for " .. score_name,
      })
    end
    if not recent_baseline_id then
      table.insert(batch_items, {
        scorecard_name     = params.scorecard,
        score_name         = params.score,
        evaluation_type    = "feedback",
        version            = champion_version_id,
        days               = params.days,
        max_feedback_items = params.max_samples or 100,
        sampling_mode      = "newest",
        wait               = true,
        score_rubric_consistency_check = true,
        notes              = "Baseline: recent feedback alignment dataset for " .. score_name,
      })
    end

    Human.notify({
      message = string.format("Running %d fresh baseline evaluation(s) for %s...", #batch_items, score_name),
      level = "info"
    })

    local baseline_batch = call_plexus_tool("plexus_evaluation_run", {batch = batch_items})
    record_evaluation_batch_costs(baseline_batch, "fresh_baselines")

    -- Parse results — map back to regression/recent based on what we requested
    local batch_idx = 1
    if dataset_id and not regression_baseline_id then
      local acc_result = baseline_batch and baseline_batch[batch_idx]
      if acc_result and not acc_result.error and (acc_result.id or acc_result.evaluation_id) then
        regression_baseline         = acc_result
        regression_baseline_id      = acc_result.id or acc_result.evaluation_id
        regression_baseline_metrics = extract_metrics(acc_result)
        regression_baseline_cost_per_item = extract_cost_per_item(acc_result)
        regression_baseline_rca     = enrich_rca(acc_result.root_cause or {})
        regression_available        = true
        local acc_cache_label = acc_result._from_cache and " (cached)" or ""
        Human.notify({message = string.format(
          "Regression baseline%s: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
          acc_cache_label,
          regression_baseline_metrics.alignment,
          regression_baseline_metrics.accuracy,
          regression_baseline_metrics.precision,
          regression_baseline_metrics.recall
        ), level = "info"})
        diag(string.format("Regression baseline (%s): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
          tostring(regression_baseline_id),
          regression_baseline_metrics.alignment, regression_baseline_metrics.accuracy,
          regression_baseline_metrics.precision, regression_baseline_metrics.recall))
      else
        local err_msg = (acc_result and acc_result.error) or "no result"
        error("Failed to run baseline regression evaluation: " .. tostring(err_msg))
      end
      batch_idx = batch_idx + 1
    end

    if not recent_baseline_id then
      local fb_result = baseline_batch and baseline_batch[batch_idx]
      if not fb_result or fb_result.error or not (fb_result.id or fb_result.evaluation_id) then
        error("Failed to run baseline recent evaluation: " .. tostring(fb_result and fb_result.error or "no result"))
      end
      recent_baseline_id      = fb_result.id or fb_result.evaluation_id
      recent_baseline_metrics = extract_metrics(fb_result)
      recent_baseline_cost_per_item = extract_cost_per_item(fb_result)
      recent_baseline_rca     = enrich_rca(fb_result.root_cause or {})
      local fb_cache_label = fb_result._from_cache and " (cached)" or ""
      Human.notify({message = string.format(
        "Recent baseline%s: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        fb_cache_label,
        recent_baseline_metrics.alignment,
        recent_baseline_metrics.accuracy,
        recent_baseline_metrics.precision,
        recent_baseline_metrics.recall
      ), level = "info"})
      diag(string.format("Recent baseline (%s): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        tostring(recent_baseline_id),
        recent_baseline_metrics.alignment, recent_baseline_metrics.accuracy,
        recent_baseline_metrics.precision, recent_baseline_metrics.recall))
    end
  end

  -- Store both baselines in state
  State.set("regression_baseline_id",      regression_baseline_id)
  State.set("regression_baseline_metrics", regression_baseline_metrics)
  State.set("regression_baseline_cost_per_item", regression_baseline_cost_per_item)
  State.set("recent_baseline_id",      recent_baseline_id)
  State.set("recent_baseline_metrics", recent_baseline_metrics)
  State.set("recent_baseline_cost_per_item", recent_baseline_cost_per_item)
  -- Immutable copies for dashboard display — never overwritten on acceptance
  -- (the non-initial keys are updated each accepted cycle for agent context)
  if State.get("recent_initial_baseline_metrics") == nil then
    State.set("recent_initial_baseline_metrics", recent_baseline_metrics)
  end
  if State.get("regression_initial_baseline_metrics") == nil then
    State.set("regression_initial_baseline_metrics", regression_baseline_metrics)
  end
  if State.get("recent_initial_baseline_cost_per_item") == nil then
    State.set("recent_initial_baseline_cost_per_item", recent_baseline_cost_per_item)
  end
  if State.get("regression_initial_baseline_cost_per_item") == nil then
    State.set("regression_initial_baseline_cost_per_item", regression_baseline_cost_per_item)
  end
  State.set("baseline_version_id",       champion_version_id)
  State.set("scorecard_id",    scorecard_id)
  State.set("score_id",        score_id)
  State.set("scorecard_name",  scorecard_name)
  State.set("score_name",      score_name)
  if not is_continuation then
    State.set("iterations", {})
  end
  -- Store full RCA including _all_item_classifications (State now backed by S3, no size limit)
  State.set("last_regression_rca", regression_baseline_rca)
  State.set("last_recent_rca", recent_baseline_rca)

  -- Refresh feedback contradictions results now that the procedure needs them.
  pcall(refresh_known_contradictions, 0, {ttl_hours = 48})

  -- Early exit: if feedback alignment is already perfect or no RCA data
  local fb_rca_topics = (type(recent_baseline_rca) == "table" and recent_baseline_rca.topics) or {}
  local has_fb_rca = type(fb_rca_topics) == "table" and #fb_rca_topics > 0
  local acc_perfect = not regression_available or (regression_baseline_metrics and regression_baseline_metrics.alignment >= 0.99)
  if recent_baseline_metrics.alignment >= 0.99 and acc_perfect then
    local reason = "Both baselines already at 99%+ alignment — nothing to optimize."
    Human.notify({message = reason, level = "info"})
    return {
      success = true,
      status = "converged",
      message = reason,
      regression_baseline_id = regression_baseline_id,
      recent_baseline_id = recent_baseline_id,
      iterations = {},
      recent_improvement = 0,
      regression_improvement = 0,
      scorecard_id = scorecard_id,
      score_id = score_id
    }
  end
  end  -- end of `if not is_continuation then` fresh-run init block


  ::start_cycling::
  -- ================================================================
  -- Exploration / Synthesis Optimization Cycles
  -- Exploration: Probe independent fixes for different RCA categories
  -- Synthesis:   Combine successful Exploration fixes into one version
  -- Both fresh-run and continuation paths converge here.
  -- ================================================================
  Stage.set("exploration")

  local stop_reason = nil
  -- For fresh run: State.get returns {} (set just above).
  -- For continuation: State.get returns the prior accumulated iterations.
  local iterations = State.get("iterations") or {}
  -- Derive last-accepted state from accumulated iterations (works for both paths):
  local _last_accepted_v = champion_version_id
  local _last_accepted_fb_m = recent_baseline_metrics
  local _last_accepted_fb_eid = recent_baseline_id
  local _last_accepted_acc_m = regression_baseline_metrics
  local _last_accepted_acc_eid = regression_baseline_id
  -- Scan iterations in reverse to find the most recent accepted/carried cycle
  -- (accepted=true for ACCEPTED; carried cycles also have accepted=true with decision="CARRIED")
  for i = #iterations, 1, -1 do
    local it = iterations[i]
    if it.accepted and it.score_version_id then
      _last_accepted_v = it.score_version_id
      if it.recent_metrics      then _last_accepted_fb_m   = it.recent_metrics      end
      if it.recent_evaluation_id  then _last_accepted_fb_eid = it.recent_evaluation_id  end
      if it.regression_metrics      then _last_accepted_acc_m  = it.regression_metrics      end
      if it.regression_evaluation_id  then _last_accepted_acc_eid = it.regression_evaluation_id  end
      break
    end
  end
  local last_accepted_version_id = _last_accepted_v
  local last_accepted_fb_metrics = _last_accepted_fb_m
  local last_accepted_acc_metrics = _last_accepted_acc_m
  local last_accepted_fb_eval_id = _last_accepted_fb_eid
  local last_accepted_acc_eval_id = _last_accepted_acc_eid
  local consecutive_failed_cycles = 0  -- tracks rejected/failed cycles for diagnostics
  local consecutive_stagnant_cycles = 0  -- drives plateau escalation instead of early stopping

  -- ================================================================
  -- LLM error recovery and context management helpers
  -- ================================================================

  -- Classify an error string to determine recovery strategy
  local function classify_error(err_str)
    local s = string.lower(tostring(err_str))
    if string.find(s, "procedure run interrupted")
      or string.find(s, "keyboardinterrupt")
      or string.find(s, "sigint")
      or string.find(s, "sigterm") then
      return "interrupted"
    end
    if string.find(s, "contextwindowexceeded")
      or string.find(s, "context_length_exceeded")
      or string.find(s, "maximum context length")
      or string.find(s, "token limit") then
      return "context_window"
    end
    if string.find(s, "rate_limit") or string.find(s, "ratelimit")
      or string.find(s, "429") or string.find(s, "too many requests") then
      return "rate_limit"
    end
    if string.find(s, "timeout") or string.find(s, "timed out")
      or string.find(s, "connection")
      or string.find(s, "unterminated string")
      or string.find(s, "unexpected end of json") then
      return "transient"
    end
    if string.find(s, "authentication") or string.find(s, "api_key")
      or string.find(s, "unauthorized") then
      return "permanent"
    end
    return "unknown"
  end

  -- Proactive token budget guard — trim history before it overflows
  -- context_window param defaults to 180000 (Claude Sonnet/Opus 200K window minus 20K output reserve)
  local CONTEXT_BUDGET_TOKENS = params.context_window or 180000
  local CONTEXT_BUDGET_WARN   = math.floor(CONTEXT_BUDGET_TOKENS * 0.80)

  local function guard_context_budget(agent, budget)
    budget = budget or CONTEXT_BUDGET_TOKENS
    local ok_count, token_count = pcall(function() return agent.history:count_tokens() end)
    if not ok_count then return end  -- count_tokens not available, skip guard
    token_count = token_count or 0

    if token_count <= budget then
      if token_count > CONTEXT_BUDGET_WARN then
        diag(string.format("Context budget warning: %d tokens (budget=%d)", token_count, budget))
      end
      return
    end

    diag(string.format("Context budget exceeded: %d tokens > %d budget. Trimming.", token_count, budget))

    -- Get all messages, keep most recent that fit within budget
    local ok_get, all_msgs = pcall(function() return agent.history:get() end)
    if not ok_get or not all_msgs then
      agent.clear_history()
      return
    end

    -- Convert lupa table to Lua table if needed
    local msgs = {}
    if type(all_msgs) == "table" then
      msgs = all_msgs
    else
      -- lupa proxy — iterate to collect
      for i = 1, 9999 do
        local m = all_msgs[i]
        if m == nil then break end
        table.insert(msgs, m)
      end
    end

    local kept = {}
    local running_tokens = 0
    -- Walk backwards, keeping recent messages within budget.
    -- IMPORTANT: Preserve tool_calls/tool message pairs to avoid
    -- "messages with role 'tool' must be a response to a preceeding
    -- message with 'tool_calls'" errors from the API.
    for i = #msgs, 1, -1 do
      local msg = msgs[i]
      local content = ""
      pcall(function() content = msg.content or "" end)
      local role = ""
      pcall(function() role = msg.role or "" end)
      local msg_tokens = math.floor(#tostring(content) / 4) + 4

      -- If this is a "tool" message, we must also include the preceding
      -- assistant message with tool_calls. Check if we have room for both.
      if role == "tool" and i > 1 then
        local prev_msg = msgs[i - 1]
        local prev_content = ""
        pcall(function() prev_content = prev_msg.content or "" end)
        local prev_tokens = math.floor(#tostring(prev_content) / 4) + 4
        if running_tokens + msg_tokens + prev_tokens > budget then
          break  -- can't fit the pair, stop here
        end
      elseif running_tokens + msg_tokens > budget then
        break
      end

      table.insert(kept, 1, msg)
      running_tokens = running_tokens + msg_tokens
    end

    -- Remove any orphaned "tool" messages at the start of kept
    -- (the preceding tool_calls message may have been trimmed)
    while #kept > 0 do
      local first_role = ""
      pcall(function() first_role = kept[1].role end)
      if first_role == "tool" then
        table.remove(kept, 1)
      else
        break
      end
    end

    -- Always preserve first system message if it was dropped
    if #msgs > 0 and #kept > 0 then
      local first_role = ""
      pcall(function() first_role = msgs[1].role end)
      local kept_first_role = ""
      pcall(function() kept_first_role = kept[1].role end)
      if first_role == "system" and kept_first_role ~= "system" then
        table.insert(kept, 1, msgs[1])
      end
    end

    agent.clear_history()
    for _, msg in ipairs(kept) do
      pcall(function() agent.history:add(msg) end)
    end
    diag(string.format("History trimmed: %d tokens -> %d messages (%d tokens est)",
      token_count, #kept, running_tokens))
  end

  -- Retry wrapper for agent calls with error-type-specific recovery
  -- recovery_context: {file_content = string, task_description = string} or nil
  local MAX_EDITOR_RETRIES = 2

  safe_agent_call = function(agent, agent_name, msg, recovery_context)
    local function recovery_message(base_msg, context)
      if not context then return base_msg end
      local parts = {}
      if context.file_content then
        table.insert(parts, "=== CURRENT score_config.yaml ===\n"
          .. context.file_content
          .. "\n=== END OF score_config.yaml ===")
      end
      if context.task_description then
        table.insert(parts, context.task_description)
      elseif base_msg then
        table.insert(parts, base_msg)
      end
      if #parts == 0 then return base_msg end
      return table.concat(parts, "\n\n")
    end

    for attempt = 1, MAX_EDITOR_RETRIES + 1 do
      Tool.reset()
      local ok, err = pcall(function()
        agent({message = msg})
      end)
      if ok then return true, nil end

      local err_type = classify_error(err)
      diag(string.format("%s error (attempt %d/%d, type=%s): %s",
        agent_name, attempt, MAX_EDITOR_RETRIES + 1, err_type, trunc(tostring(err), 300)))

      if err_type == "interrupted" then
        error(tostring(err))
      end

      if err_type == "permanent" then
        return false, tostring(err)
      end

      if attempt > MAX_EDITOR_RETRIES then
        return false, tostring(err)
      end

      if err_type == "context_window" then
        -- Recovery: clear history and put essential context directly in the next turn.
        agent.clear_history()
        msg = recovery_message(msg, recovery_context)
        diag(string.format(
          "Recovered from %s context window error: cleared history, rebuilt inline context",
          agent_name))

      elseif err_type == "rate_limit" or err_type == "transient" then
        local wait_seconds = attempt * 5
        diag(string.format("Waiting %d seconds before retry...", wait_seconds))
        local t = os.clock() + wait_seconds
        while os.clock() < t do end

      else
        -- Unknown error: clear history and retry with inline context.
        agent.clear_history()
        msg = recovery_message(msg, recovery_context)
      end
    end
    return false, "max retries exceeded"
  end

  safe_editor_call = function(msg, recovery_context)
    return safe_agent_call(code_editor, "code_editor", msg, recovery_context)
  end

  local function report_phase_marker(phase_id)
    return "=== OPTIMIZER REPORT PHASE: " .. tostring(phase_id) .. " ==="
  end

  local function set_report_generation_status(status)
    status.updated_at = os.date("!%Y-%m-%dT%H:%M:%SZ")
    State.set("report_generation_status", status)
  end

  local function run_required_report_phase(agent, agent_name, phase_id, prompt, context_setup_fn)
    local phase = tostring(phase_id)
    local report_cycle = State.get("current_iteration")
    local context_chars = 0
    if context_setup_fn then
      local setup_ok, setup_result = pcall(context_setup_fn)
      if not setup_ok then
        stop_reason = "report_generation_failed"
        set_report_generation_status({
          phase_id = phase,
          status = "failed",
          cycle = report_cycle,
          started_at = os.date("!%Y-%m-%dT%H:%M:%SZ"),
          duration_seconds = 0,
          prompt_characters = #(prompt or ""),
          context_characters = 0,
          agent_name = agent_name,
          error_type = "context_setup",
          error_message = tostring(setup_result)
        })
        error("report_generation_failed:" .. phase .. ": " .. tostring(setup_result))
      end
      context_chars = tonumber(setup_result) or 0
    end

    local marker = report_phase_marker(phase)
    local marked_prompt = marker .. "\n\n" .. tostring(prompt or "")
    local started_at = os.date("!%Y-%m-%dT%H:%M:%SZ")
    local started_clock = os.clock()
    set_report_generation_status({
      phase_id = phase,
      status = "running",
      cycle = report_cycle,
      started_at = started_at,
      prompt_characters = #marked_prompt,
      context_characters = context_chars,
      agent_name = agent_name,
      turn_label = marker
    })
    diag(string.format("Report phase %s started (agent=%s, prompt=%d chars, context=%d chars)",
      phase, agent_name, #marked_prompt, context_chars))
    Human.notify({message = string.format("Report phase %s started", phase), level = "info"})

    Tool.reset()
    guard_context_budget(agent)
    local ok, err = safe_agent_call(agent, agent_name, marked_prompt, nil)
    local duration = os.clock() - started_clock
    local output = agent.output or ""
    if ok then
      set_report_generation_status({
        phase_id = phase,
        status = "succeeded",
        cycle = report_cycle,
        started_at = started_at,
        duration_seconds = duration,
        prompt_characters = #marked_prompt,
        context_characters = context_chars,
        output_characters = #output,
        agent_name = agent_name,
        turn_label = marker
      })
      diag(string.format("Report phase %s succeeded in %.2fs (%d output chars)",
        phase, duration, #output))
      Human.notify({message = string.format(
        "Report phase %s completed in %.2fs", phase, duration), level = "info"})
      return output
    end

    stop_reason = "report_generation_failed"
    set_report_generation_status({
      phase_id = phase,
      status = "failed",
      cycle = report_cycle,
      started_at = started_at,
      duration_seconds = duration,
      prompt_characters = #marked_prompt,
      context_characters = context_chars,
      output_characters = #output,
      agent_name = agent_name,
      turn_label = marker,
      error_type = classify_error(err),
      error_message = tostring(err)
    })
    diag(string.format("Report phase %s failed in %.2fs: %s",
      phase, duration, tostring(err)))
    Human.notify({message = string.format(
      "Report phase %s failed: %s", phase, trunc(tostring(err), 300)), level = "error"})
    error("report_generation_failed:" .. phase .. ": " .. tostring(err))
  end

  local function extract_markdown_section(text, heading)
    if not has_text(text) or not has_text(heading) then return "" end
    local _, hdr_end = text:find(heading .. "\n", 1, true)
    if not hdr_end then return "" end
    local next_hdr = text:find("\n## ", hdr_end + 1)
    local content = next_hdr and text:sub(hdr_end + 1, next_hdr - 1) or text:sub(hdr_end + 1)
    return (content:match("^(.-)%s*$") or content)
  end

  local function build_compact_contradiction_summary(kc, max_topics)
    if type(kc) ~= "table" then return "" end
    local total_items = kc.total_items_analyzed or 0
    local contradictions_found = kc.contradictions_found or 0
    local policy_gap_count = kc.policy_gap_count or 0
    local parts = {}
    if total_items > 0 then
      table.insert(parts, string.format(
        "Contradictions: %d/%d items (%.0f%%). Policy gaps: %d. True contradictions: %d.",
        contradictions_found,
        total_items,
        contradictions_found / total_items * 100,
        policy_gap_count,
        math.max(0, contradictions_found - policy_gap_count)))
    end
    local topics = kc.topics or {}
    if type(topics) == "table" and #topics > 0 then
      table.insert(parts, "Top topics:")
      for i = 1, math.min(max_topics or 3, #topics) do
        local topic = topics[i] or {}
        local label = topic.label or ("Topic " .. tostring(i))
        local count = topic.count or 0
        local kind = topic.is_policy_gap and "policy gap" or "contradiction"
        table.insert(parts, string.format(
          "- %s (%s, %d items): %s",
          label,
          kind,
          count,
          trunc(topic.summary or "", 180)))
      end
    end
    return table.concat(parts, "\n")
  end

  local max_cycles = params.max_iterations
  local cycle = #iterations  -- 0 for fresh run; N for continuation (resumes from where prior run left off)

  while cycle < max_cycles do
    cycle = cycle + 1
    local cycle_recorded = false
    local cycle_ok, cycle_err = pcall(function()
    diag(string.format("=== ENTERING CYCLE %d/%d === (last_accepted=%s)", cycle, max_cycles, tostring(last_accepted_version_id)))
    Human.notify({message = string.format(
      "═══ Cycle %d/%d ═══", cycle, max_cycles), level = "info"})
    State.set("current_iteration", cycle)
    Stage.progress(cycle, max_cycles)
    status_msg(string.format("Cycle %d/%d — starting", cycle, max_cycles))

    -- Stop when feedback changed since run start; restart is required to keep baselines coherent.
    do
      local start_watermark = State.get("feedback_target_updated_at")
      if has_text(start_watermark) then
        local wm_ok, wm = pcall(call_plexus_tool, "plexus_feedback_latest_update", {
          scorecard_name = params.scorecard,
          score_name = params.score,
          days = params.days
        })
        if wm_ok and wm and not wm.error and wm.found and has_text(wm.latest_feedback_updated_at) then
          local current_watermark = wm.latest_feedback_updated_at
          if tostring(current_watermark) > tostring(start_watermark) then
            stop_reason = "feedback_target_changed_restart_required"
            Human.notify({
              message = string.format(
                "Feedback target changed during run (start=%s current=%s). Stopping for clean restart.",
                tostring(start_watermark),
                tostring(current_watermark)
              ),
              level = "warning"
            })
            return "break_cycle"
          end
        end
      end
    end

    -- Pull the last accepted version as starting point for this cycle
    local score_pull = call_plexus_tool("plexus_score_pull", {
      scorecard_identifier = params.scorecard,
      score_identifier = score_id,
      version_id = last_accepted_version_id
    })
    if not score_pull or not score_pull.success then
      return {
        success = false,
        status = "error",
        message = "Failed to pull score configuration at cycle " .. cycle
      }
    end

    -- Read current code and guidelines
    local current_code = Step.checkpoint(function()
      return File.read(score_pull.codeFilePath)
    end)
    if not has_text(current_code) then
      return {
        success = false,
        status = "error",
        message = "Failed to read score code file at cycle " .. cycle
      }
    end
    local current_guidelines = ""
    if score_pull.guidelinesFilePath then
      local g_result = Step.checkpoint(function()
        return File.read(score_pull.guidelinesFilePath)
      end)
      if has_text(g_result) then
        current_guidelines = g_result
      end
    end

    -- Get current eval metrics (updated after accepted cycles)
    local current_fb_metrics = State.get("recent_baseline_metrics") or recent_baseline_metrics
    local current_acc_metrics = regression_available and (State.get("regression_baseline_metrics") or regression_baseline_metrics) or nil
    local current_fb_rca = State.get("last_recent_rca") or recent_baseline_rca
    local current_acc_rca = regression_available and (State.get("last_regression_rca") or regression_baseline_rca) or nil

    -- Count consecutive accuracy regressions for strategy selection
    local consecutive_acc_rejections = 0
    if iterations then
      for i = #iterations, 1, -1 do
        local it = iterations[i]
        local acc_d = it.regression_deltas and it.regression_deltas.alignment or 0
        if not it.accepted and acc_d < -0.02 then
          consecutive_acc_rejections = consecutive_acc_rejections + 1
        else
          break
        end
      end
    end

    -- ================================================================
    -- PHASE 1: Planning — sequential hypothesis generation
    -- Each hypothesis is generated in a separate LLM call with a focused
    -- objective. Each call sees previously proposed hypotheses to avoid
    -- duplication and ensure diversity.
    -- ================================================================
    Stage.set("exploration")
    status_msg(string.format("Cycle %d/%d — planning hypotheses", cycle, max_cycles))
    Human.notify({message = string.format(
      "Cycle %d — Planning: generating hypotheses sequentially...", cycle
    ), level = "info"})

    -- Build base planning context (RCA + metrics + guidelines + score config)
    local planning_inject = build_planning_context({
      scorecard_name = scorecard_name,
      score_name = score_name,
      baseline_version_id = champion_version_id,
      last_accepted_version_id = last_accepted_version_id,
      iterations = iterations,
      baseline_fb_metrics = recent_baseline_metrics,
      baseline_acc_metrics = regression_baseline_metrics,
      recent_metrics = current_fb_metrics,
      regression_metrics = current_acc_metrics,
      recent_rca = current_fb_rca,
      regression_rca = current_acc_rca,
      current_code = current_code,
      current_guidelines = current_guidelines,
      iteration = cycle,
      consecutive_failed_cycles = consecutive_failed_cycles,
      hint = params.hint,
      prior_run_prescription = params.prior_run_prescription,
      recent_rubric_memory_briefing = recent_rubric_memory_briefing,
      rubric_memory_briefing = rubric_memory_briefing
    })

    -- Build shared cookbook section
    local cookbook = build_cookbook_section({
      consecutive_failed_cycles = consecutive_failed_cycles,
      consecutive_stagnant_cycles = consecutive_stagnant_cycles,
      consecutive_acc_rejections = consecutive_acc_rejections,
      iterations = iterations
    })

    -- Log planning context for debugging
    local context_log_path = string.format("optimizer_cycle%d_planning_context.txt", cycle)
    pcall(function() File.write(context_log_path, planning_inject .. "\n\n" .. cookbook) end)

    -- Define the hypothesis generation slots for this cycle.
    -- Plateau expands the slot set instead of shrinking it.
    --   1. recent_incremental — small targeted tweak aimed at feedback alignment
    --   2. recent_bold        — larger change aimed at feedback alignment
    --   3. regression_fix    — change aimed at the regression accuracy dataset
    --   4. structural        — architecture, preprocessing, model swap, or other non-prompt structural change
    --   5. reframe           — added after 3+ stagnant cycles
    --   6. full_rewrite      — added after 6+ stagnant cycles
    local hyp_slots, cycle_escalation_mode = build_hypothesis_slots({
      consecutive_stagnant_cycles = consecutive_stagnant_cycles
    })
    hyp_slots = cap_hypothesis_slots(hyp_slots, params.num_candidates)
    local slot_names = table.concat(hyp_slots, ", ")
    if cycle_escalation_mode == "ultra_creative" then
      Human.notify({message = string.format(
        "  Ultra-creative plateau mode: %d stagnant cycles — generating %d/%d requested hypotheses (slots: %s)",
        consecutive_stagnant_cycles, #hyp_slots, params.num_candidates, slot_names), level = "warning"})
    elseif cycle_escalation_mode == "escalate" then
      Human.notify({message = string.format(
        "  Plateau escalation mode: %d stagnant cycles — generating %d/%d requested hypotheses (slots: %s)",
        consecutive_stagnant_cycles, #hyp_slots, params.num_candidates, slot_names), level = "warning"})
    else
      Human.notify({message = string.format(
        "  Generating %d/%d requested hypotheses (slots: %s)",
        #hyp_slots, params.num_candidates, slot_names), level = "info"})
    end

    -- Generate hypotheses sequentially — each sees the previous ones
    local hypotheses = {}

    for slot_idx, slot_name in ipairs(hyp_slots) do
      status_msg(string.format("Cycle %d/%d — generating hypothesis %d/%d (%s)", cycle, max_cycles, slot_idx, #hyp_slots, slot_name))
      Human.notify({message = string.format(
        "  Generating hypothesis %d/%d (%s)...", slot_idx, #hyp_slots, slot_name), level = "info"})

      local slot_ok, slot_err = pcall(function()
        -- Build the focused prompt for this slot
        local hyp_prompt = build_hypothesis_prompt(slot_name, hypotheses, {
          consecutive_failed_cycles = consecutive_failed_cycles,
          consecutive_stagnant_cycles = consecutive_stagnant_cycles
        })

        -- Full prompt = base context + cookbook + objective doc + score concepts doc + focused task
        local concepts_inject = has_text(SCORE_CONCEPTS_DOC)
          and ("\n\n=== SCORE FORMAT CONCEPTS ===\n" .. SCORE_CONCEPTS_DOC .. "\n=== END SCORE FORMAT CONCEPTS ===")
          or ""
        local obj_inject = has_text(OBJECTIVE_DOC)
          and ("\n\n=== OPTIMIZATION OBJECTIVE: " .. objective:upper() .. " ===\n" .. OBJECTIVE_DOC .. "\n=== END OPTIMIZATION OBJECTIVE ===")
          or ""
        local full_prompt = planning_inject .. "\n\n" .. cookbook .. obj_inject .. concepts_inject .. "\n\n" .. hyp_prompt

        -- Each hypothesis generation gets a fresh conversation to avoid confusion
        Tool.reset()
        hypothesis_planner.clear_history()
        -- Inject ALL prior cycles' synthesis reasoning + accumulated lessons
        do
          local prior_insights = State.get("cycle_insights") or {}
          local reasoning_parts = {}
          for _, ci in ipairs(prior_insights) do
            if ci.synthesis_reasoning and #ci.synthesis_reasoning > 0 then
              table.insert(reasoning_parts, string.format(
                "--- Cycle %d synthesis reasoning ---\n%s", ci.cycle, ci.synthesis_reasoning))
            end
          end
          if #reasoning_parts > 0 then
            hypothesis_planner.history:add({
              role = "system",
              content = "=== SYNTHESIS REASONING FROM ALL PRIOR CYCLES ===\n"
                .. table.concat(reasoning_parts, "\n\n")
                .. "\n=== END SYNTHESIS REASONING ==="
            })
            Human.notify({message = string.format(
              "    [hypothesis context] Injected %d cycles of synthesis reasoning",
              #reasoning_parts), level = "info"})
          end
          local acc_lessons = State.get("accumulated_lessons")
          if has_text(acc_lessons) then
            hypothesis_planner.history:add({
              role = "system",
              content = "=== ACCUMULATED LESSONS (LLM-synthesized summary) ===\n"
                .. trunc(acc_lessons, 3000)
                .. "\n=== END ACCUMULATED LESSONS ==="
            })
          end
        end
        guard_context_budget(hypothesis_planner)

        local plan_ok, plan_err = safe_agent_call(hypothesis_planner, "hypothesis_planner", full_prompt, {
          file_content = current_code,
          task_description = full_prompt
        })

        if not plan_ok then
          diag(string.format("Hyp slot %d (%s) FAILED: %s", slot_idx, slot_name, tostring(plan_err)))
          Human.notify({message = string.format(
            "    Slot %d (%s) failed: %s", slot_idx, slot_name, trunc(tostring(plan_err), 100)), level = "error"})
        else
          local response = hypothesis_planner.output or ""
          local parsed = parse_hypotheses(response)

          if #parsed > 0 then
            -- Take the first parsed hypothesis and re-index it
            local hyp = parsed[1]
            hyp.index = #hypotheses + 1
            hyp.slot = slot_name
            table.insert(hypotheses, hyp)
            diag(string.format("  Hyp %d (%s): %s — %s",
              hyp.index, slot_name, hyp.name, trunc(hyp.description, 200)))
            Human.notify({message = string.format(
              "    %d. [%s] %s: %s", hyp.index, slot_name, hyp.name, trunc(hyp.description, 100)), level = "info"})
          else
            -- Retry once with a nudge
            diag(string.format("Hyp slot %d (%s) produced no parseable hypothesis, retrying...", slot_idx, slot_name))
            guard_context_budget(hypothesis_planner)
            local retry_ok, _ = safe_agent_call(
              hypothesis_planner,
              "hypothesis_planner",
              "I need exactly ONE hypothesis on a single numbered line. Example:\n"
              .. string.format("%d. Fix something: Description of what to change and why", #hypotheses + 1),
              {file_content = current_code, task_description = full_prompt}
            )
            if retry_ok then
              local retry_parsed = parse_hypotheses(hypothesis_planner.output or "")
              if #retry_parsed > 0 then
                local hyp = retry_parsed[1]
                hyp.index = #hypotheses + 1
                hyp.slot = slot_name
                table.insert(hypotheses, hyp)
                diag(string.format("  Hyp %d (%s, retry): %s — %s",
                  hyp.index, slot_name, hyp.name, trunc(hyp.description, 200)))
                Human.notify({message = string.format(
                  "    %d. [%s] %s: %s", hyp.index, slot_name, hyp.name, trunc(hyp.description, 100)), level = "info"})
              else
                diag(string.format("Hyp slot %d (%s) failed after retry — no hypothesis", slot_idx, slot_name))
              end
            end
          end
        end
      end)

      if not slot_ok then
        if classify_error(slot_err) == "interrupted" then
          error(tostring(slot_err))
        end
        -- Encoding errors (e.g. UnicodeDecodeError from lupa), OOM, or other unexpected
        -- failures that bypassed safe_editor_call's pcall.  Log and continue — losing one
        -- slot should not skip the whole cycle.
        diag(string.format("Hyp slot %d (%s) unexpected error: %s", slot_idx, slot_name, trunc(tostring(slot_err), 300)))
        Human.notify({message = string.format(
          "    Slot %d (%s) unexpected error (skipped): %s",
          slot_idx, slot_name, trunc(tostring(slot_err), 200)), level = "warning"})
        code_editor.clear_history()
      end
    end

    -- Fallback if ALL slots failed
    if #hypotheses == 0 then
      local rca_action = current_fb_rca and current_fb_rca._primary_next_action
      local fallback_desc = "Address top error pattern from RCA"
      if type(rca_action) == "table" then
        fallback_desc = rca_action.action or rca_action.description or fallback_desc
      end
      hypotheses = {{index = 1, name = "RCA primary fix", description = fallback_desc, slot = "fallback"}}
    end

    diag(string.format("Planning complete: %d hypotheses generated", #hypotheses))
    Human.notify({message = string.format(
      "  Planning complete: %d hypotheses", #hypotheses), level = "info"})

    -- ================================================================
    -- PHASE 2: Implement each hypothesis (continuous conversation)
    -- ================================================================
    local submitted_versions = {}
    local submitted_version_keys = {}
    local submitted_version_ids = {}
    local function record_submitted_version(entry)
      local key = tostring(entry.index or "") .. ":" .. tostring(entry.version_id or "")
      local version_key = tostring(entry.version_id or "")
      if has_text(version_key) and submitted_version_ids[version_key] then
        diag(string.format(
          "Skipping duplicate submitted candidate version %s",
          tostring(entry.version_id)))
        return false
      end
      if submitted_version_keys[key] then
        diag(string.format(
          "Skipping duplicate submitted version record for hypothesis %s version %s",
          tostring(entry.index), tostring(entry.version_id)))
        return false
      end
      submitted_version_keys[key] = true
      if has_text(version_key) then submitted_version_ids[version_key] = true end
      table.insert(submitted_versions, entry)
      return true
    end
    local any_cannot_improve = false

    for h = 1, #hypotheses do
      local hyp = hypotheses[h]
      status_msg(string.format("Cycle %d/%d — implementing hypothesis %d/%d: %s", cycle, max_cycles, h, #hypotheses, trunc(hyp.name, 60)))
      Human.notify({message = string.format(
        "  Hypothesis %d/%d: %s", h, #hypotheses, hyp.name), level = "info"})

      -- Reset editor to baseline code for each hypothesis
      call_plexus_tool("score_editor_setup", {
        scorecard_identifier = params.scorecard,
        score_identifier     = score_id,
        yaml_content         = current_code,
        code_file_path       = score_pull.codeFilePath,
        parent_version_id    = last_accepted_version_id,
        iteration            = cycle,
        hypothesis           = hyp.name .. ": " .. (hyp.description or "")
      })

      -- Clear accumulated conversation and tool state to prevent corruption.
      -- Each hypothesis gets a completely fresh context.
      Tool.reset()
      code_editor.clear_history()

      -- Inner ReAct loop for this hypothesis.
      -- Failed str_replace attempts do NOT count as logical steps — the LLM gets
      -- unlimited retries for mechanical editing failures (up to max_edit_retries).
      -- Only meaningful actions (successful edit, submit, view, done) advance the
      -- step counter. This prevents hypotheses from failing due to editing mechanics
      -- rather than the hypothesis actually being a bad idea.
      local max_react_steps = 10
      local max_edit_retries = 10   -- total failed edits before giving up on this hypothesis
      local max_smoke_failures = 3  -- smoke test failures before abandoning hypothesis
      local version_id = nil
      local hyp_done_reason = ""
      local smoke_test_failure = nil
      local total_edit_failures = 0
      local total_smoke_failures = 0
      local hyp_reasoning_parts = {}  -- accumulates agent text across all ReAct steps

      local react_step = 0
      local hypothesis_done = false
      while react_step < max_react_steps and not hypothesis_done do
        react_step = react_step + 1
        local msg
        if react_step == 1 and total_edit_failures == 0 then
          -- First step for this hypothesis — include required context inline.
          local first_turn_context = {}
          if has_text(SCORE_CLASS_DOC) then
            table.insert(first_turn_context, string.format("=== SCORE YAML FORMAT REFERENCE (%s) ===\n", score_class)
              .. SCORE_CLASS_DOC
              .. "\n=== END SCORE YAML FORMAT REFERENCE ===")
          end
          local editor_content = call_plexus_tool("score_editor_get_content", {})
          if editor_content and editor_content.file_content then
            table.insert(first_turn_context, "=== CURRENT score_config.yaml (the file you are editing) ===\n"
              .. editor_content.file_content
              .. "\n=== END OF score_config.yaml ===")
          end

          msg = string.format(
            "Implement hypothesis %d of %d: %s\n\n%s\n\n"
            .. "Edit score_config.yaml to test this hypothesis. "
            .. "The current file content is included above in this message.\n"
            .. "For prompt-only hypotheses, prefer the SMALLEST UNIQUE replacement inside system_message or user_message.\n"
            .. "Do NOT replace the entire prompt block unless the hypothesis truly requires a full rewrite.\n"
            .. "IMPORTANT: Your str_replace old_str MUST be copied exactly from score_config.yaml.\n"
            .. "The RCA quotes are paraphrased — do NOT use RCA text as old_str.\n"
            .. "When done, call submit_score_version(version_note='<what you changed> to address <which error pattern>; expect <predicted effect>').\n"
            .. "The version_note is your future self's primary learning signal — be specific about WHAT, WHY, and EXPECTED EFFECT.\n"
            .. "Call done(reason='cannot_improve: ...') if you cannot find a viable edit.",
            h, #hypotheses, hyp.name, hyp.description)
          if #first_turn_context > 0 then
            msg = table.concat(first_turn_context, "\n\n") .. "\n\n" .. msg
          end
        else
          -- Subsequent turns: provide feedback on what just happened
          local last_edit = Tool.last_call("str_replace_editor")
          local last_submit = Tool.last_call("submit_score_version")
          local last_done = Tool.last_call("done")

          local recent_parts = {}

          -- Smoke test failure takes priority over all other feedback
          if smoke_test_failure then
            total_smoke_failures = total_smoke_failures + 1
            table.insert(recent_parts, "SMOKE TEST FAILED for the version you just submitted:\n\n" .. smoke_test_failure)
            table.insert(recent_parts, "\nThe score version was created but the prediction engine cannot execute it.")
            -- Give targeted recovery advice: processor errors should be reverted, not debugged
            local err_lower = string.lower(smoke_test_failure)
            if string.find(err_lower, "processor") or string.find(err_lower, "filter")
                or string.find(err_lower, "valueerror") or string.find(err_lower, "modulenotfounderror")
                or string.find(err_lower, "importerror") or string.find(err_lower, "attributeerror") then
              table.insert(recent_parts, "\nRECOVERY — this looks like a processor/class configuration error.")
              table.insert(recent_parts, "Do NOT attempt to debug or rewrite the failing processor.")
              table.insert(recent_parts, "Instead: remove any `processors:` section you added from score_config.yaml,"
                .. " then call submit_score_version to restore a clean baseline.")
              table.insert(recent_parts, "After reverting, implement the hypothesis using prompt changes only (system_message / user_message).")
            else
              table.insert(recent_parts, "Fix the issue in score_config.yaml and call submit_score_version again.")
            end
            if total_smoke_failures >= max_smoke_failures then
              table.insert(recent_parts, string.format(
                "\nYou have hit %d smoke test failures on this hypothesis. "
                .. "Call done(reason='cannot_improve: repeated smoke test failures') to skip it.",
                total_smoke_failures))
              hypothesis_done = true
            end
            smoke_test_failure = nil
          elseif last_edit then
            local edit_result = tostring(last_edit.result or "")
            local edit_command = tostring(tool_call_arg(last_edit, "command", ""))
            if edit_command == "view" then
              table.insert(recent_parts, "File viewed successfully. The file has NOT been modified yet.")
              table.insert(recent_parts, "You must call str_replace_editor with command='str_replace' to make changes, then call submit_score_version to submit.")
            elseif string.sub(edit_result, 1, 6) == "Error:" then
              table.insert(recent_parts, "Your str_replace_editor call returned an error:\n" .. edit_result)
              table.insert(recent_parts, "\nYou can retry the edit with corrected old_str, or call view to re-read the file and copy the exact text.")
            else
              table.insert(recent_parts, "Edit applied successfully.")
              table.insert(recent_parts, "You can make more edits, or call submit_score_version(version_note=\"...\") to submit.")
            end
          end
          if last_submit then
            local ok_sub, sub_result = pcall(function() return safe_decode(last_submit.result) end)
            if ok_sub and sub_result and sub_result.error then
              local err_text = tostring(sub_result.error)
              table.insert(recent_parts, "submit_score_version returned an error:\n  " .. err_text)
              if string.find(err_text, "most recent str_replace_editor") then
                table.insert(recent_parts, "\nTo recover: call str_replace_editor(command='view', path='score_config.yaml') to clear the error state, then call submit_score_version again.")
              elseif string.find(err_text, "unchanged from the original")
                  or string.find(err_text, "semantically unchanged") then
                table.insert(recent_parts, "\nThe file has not been modified. You must use str_replace_editor(command='str_replace', ...) to make actual changes before submitting.")
              else
                table.insert(recent_parts, "\nFix the issue and try submit_score_version again.")
              end
            end
          end
          if #recent_parts == 0 then
            table.insert(recent_parts, "No recognized tool call was made.")
            table.insert(recent_parts, "You must call str_replace_editor, submit_score_version, or done.")
          end
          table.insert(recent_parts, string.format("\n(Hypothesis %d, step %d/%d)", h, react_step, max_react_steps))

          -- Always include the current file content inline in the feedback message.
          local editor_content = call_plexus_tool("score_editor_get_content", {})
          if editor_content and editor_content.file_content then
            table.insert(recent_parts, "\n=== CURRENT score_config.yaml (copy your old_str EXACTLY from here) ===\n"
              .. editor_content.file_content
              .. "\n=== END OF score_config.yaml ===")
          end

          msg = table.concat(recent_parts, "\n")
        end

        -- Log the feedback message for debugging
        if react_step > 1 or total_edit_failures > 0 then
          Human.notify({message = string.format(
            "  [Hyp %d, step %d, edit_fails=%d] feedback (%d chars): %s",
            h, react_step, total_edit_failures, #msg, trunc(msg, 200)
          ), level = "info"})
        end
        -- Get current file for recovery context
        local hyp_file_content = nil
        pcall(function()
          local ec = call_plexus_tool("score_editor_get_content", {})
          if ec and ec.file_content then hyp_file_content = ec.file_content end
        end)

        guard_context_budget(code_editor)
        local editor_ok, editor_err = safe_editor_call(msg, {
          file_content = hyp_file_content or current_code,
          task_description = msg
        })
        if not editor_ok then
          diag(string.format("CODE_EDITOR FAILED in hypothesis %d step %d: %s", h, react_step, tostring(editor_err)))
          Human.notify({message = string.format(
            "  Hypothesis %d step %d — code_editor failed: %s", h, react_step, trunc(tostring(editor_err), 200)), level = "error"})
          hyp_done = true
        end

        -- Record agent's text response to session. If this turn ended with a
        -- terminal tool call, the tool args/result are the canonical outcome;
        -- provider final prose can be stale or misleading after tool execution.
        local terminal_tool_call = Tool.last_call("submit_score_version") or Tool.last_call("done")
        local agent_text = code_editor.output or ""
        if has_text(agent_text) and not terminal_tool_call then
          Human.notify({message = string.format(
            "  [Hyp %d, step %d] Agent: %s",
            h, react_step, trunc(agent_text, 500)), level = "info"})
          -- Accumulate actual text reasoning (skip if it looks like raw YAML content or non-string objects)
          if type(agent_text) == "string" and #agent_text > 20 and #agent_text < 4000
             and not string.find(agent_text, "^name:") and not string.find(agent_text, "^tactus_code:") then
            table.insert(hyp_reasoning_parts, agent_text)
          end
        elseif has_text(agent_text) and terminal_tool_call then
          diag(string.format(
            "  [Hyp %d] Ignoring agent prose after terminal tool call: %s",
            h, trunc(agent_text, 200)))
        end

        -- Capture reasoning from tool calls (agent often produces no text during tool use)
        -- Use pcall to guard against Python dict KeyError when args lack optional keys
        -- (e.g. undo_edit has no old_str/new_str; insert has no old_str)
        local last_edit = Tool.last_call("str_replace_editor")
        if last_edit then
          local cmd = tostring(tool_call_arg(last_edit, "command", ""))
          if cmd ~= "view" then
            local old_s = trunc(tostring(tool_call_arg(last_edit, "old_str", "")), 200)
            local new_s = trunc(tostring(tool_call_arg(last_edit, "new_str", "")), 400)
            if has_text(new_s) then
              local edit_reasoning = string.format("Edit: replaced [%s] with [%s]", old_s, new_s)
              table.insert(hyp_reasoning_parts, edit_reasoning)
              diag(string.format("  [Hyp %d] Captured edit reasoning: %s", h, trunc(edit_reasoning, 200)))
            end
          end
        end
        local last_submit = Tool.last_call("submit_score_version")
        if last_submit then
          local note = tostring(tool_call_arg(last_submit, "version_note", ""))
          if has_text(note) then
            table.insert(hyp_reasoning_parts, "Submit: " .. note)
            diag(string.format("  [Hyp %d] Captured submit reasoning: %s", h, trunc(note, 200)))
          end
        end
        local last_done_call = Tool.last_call("done")
        if last_done_call then
          local reason = tostring(tool_call_arg(last_done_call, "reason", ""))
          if has_text(reason) then
            table.insert(hyp_reasoning_parts, "Done: " .. reason)
            diag(string.format("  [Hyp %d] Captured done reasoning: %s", h, trunc(reason, 200)))
          end
        end

        -- Determine if this was a failed edit attempt (doesn't count as a logical step)
        local was_edit_failure = false
        local last_edit_check = Tool.last_call("str_replace_editor")
        if last_edit_check then
          local edit_result = tostring(last_edit_check.result or "")
          local edit_command = tostring(tool_call_arg(last_edit_check, "command", ""))
          if edit_command ~= "view" and string.sub(edit_result, 1, 6) == "Error:" then
            was_edit_failure = true
            total_edit_failures = total_edit_failures + 1
            Human.notify({message = string.format(
              "    Hypothesis %d: edit failure %d/%d (not counting as step)",
              h, total_edit_failures, max_edit_retries), level = "info"})
          end
        end

        -- Check termination conditions
        local submit_call = Tool.last_call("submit_score_version")
        if submit_call then
          local ok, submit_result = pcall(function() return safe_decode(submit_call.result) end)
          if ok and submit_result and submit_result.version_id then
            local candidate_id = submit_result.version_id
            Human.notify({message = string.format(
              "    Hypothesis %d: version %s created (step %d) — smoke testing...",
              h, candidate_id, react_step), level = "info"})

            local test_ok, test_result = pcall(call_plexus_tool, "plexus_score_test", {
              scorecard_identifier = params.scorecard,
              score_identifier     = score_id,
              version              = candidate_id,
              samples              = 3
            })
            local smoke_passed = false
            local smoke_detail = ""
            if not test_ok then
              smoke_detail = "Score test call error: " .. tostring(test_result)
            elseif type(test_result) ~= "table" then
              smoke_detail = "Score test returned non-table response: " .. tostring(test_result)
            else
              smoke_passed = test_result.passed == true
              if not smoke_passed then
                local base = tostring(test_result.message or "Score test failed")
                local fc = tostring(test_result.failure_code or "unknown")
                smoke_detail = string.format("%s (failure_code=%s)", base, fc)
                if test_result.failures and #test_result.failures > 0 then
                  smoke_detail = smoke_detail .. "\n\nFailure details:\n" .. tostring(safe_encode(test_result.failures) or "[]")
                elseif test_result.predictions and #test_result.predictions > 0 then
                  smoke_detail = smoke_detail .. "\n\nPrediction details:\n" .. tostring(safe_encode(test_result.predictions) or "[]")
                end
              end
            end

            if smoke_passed then
              version_id = candidate_id
              diag(string.format("Hyp %d score test passed, setting version_id=%s", h, tostring(candidate_id)))
              local vn = tostring(tool_call_arg(submit_call, "version_note", ""))
              if has_text(vn) then hyp_done_reason = vn end
              hypothesis_done = true
            else
              Human.notify({message = string.format(
                "    Hypothesis %d: score test FAILED — %s",
                h, trunc(smoke_detail, 120)), level = "warning"})
              diag(string.format("Hyp %d score test FAILED (version=%s): %s",
                h, tostring(candidate_id), trunc(smoke_detail, 200)))
              smoke_test_failure = string.format(
                "Version %s was created but FAILED the mechanical score test.\n\nError detail:\n%s\n\n"
                .. "The score_config.yaml has an execution error. Diagnose and fix it, "
                .. "then call submit_score_version again.",
                candidate_id, smoke_detail)
            end

          elseif ok and submit_result and submit_result.error then
            Human.notify({message = string.format(
              "    Hypothesis %d submit error (step %d): %s",
              h, react_step, tostring(submit_result.error)), level = "warning"})
          end
        end

        local done_call = Tool.last_call("done")
        if done_call then
          Human.notify({message = string.format("    Hypothesis %d: agent called done (step %d)", h, react_step), level = "info"})
          local ok_res, done_result = pcall(function() return safe_decode(done_call.result) end)
          if ok_res and done_result and has_text(done_result.reason) then
            hyp_done_reason = done_result.reason
          end
          if not has_text(hyp_done_reason) then
            local reason_val = tostring(tool_call_arg(done_call, "reason", ""))
            if has_text(reason_val) then
              hyp_done_reason = string.gsub(reason_val, "\\n", "\n")
            end
          end
          if string.find(string.lower(hyp_done_reason), "cannot_improve") then
            any_cannot_improve = true
          end
          hypothesis_done = true
        end

        -- If this was just a failed edit, don't count it as a logical step
        if was_edit_failure and not hypothesis_done then
          react_step = react_step - 1
          if total_edit_failures >= max_edit_retries then
            Human.notify({message = string.format(
              "    Hypothesis %d: %d edit failures — giving up on this hypothesis",
              h, total_edit_failures), level = "warning"})
            hypothesis_done = true
          end
        end
      end

      diag(string.format("Hyp %d react loop exited (steps=%d, version=%s, done=%s)",
        h, react_step, tostring(version_id or "nil"), tostring(hypothesis_done)))

      -- Post-hypothesis bookkeeping wrapped in pcall to prevent silent crashes
      -- (v13 crashed between smoke PASSED and submitted with no diag entry)
      local post_ok, post_err = pcall(function()
        -- Extract version_note as done_reason if we submitted
        if not has_text(hyp_done_reason) and version_id then
          local sc = Tool.last_call("submit_score_version")
          if sc then
            local note = tostring(tool_call_arg(sc, "version_note", ""))
            if has_text(note) then hyp_done_reason = note end
          end
        end

        -- Record submitted version
        if version_id then
          record_submitted_version({
            index = h,
            version_id = version_id,
            done_reason = hyp_done_reason,
            hypothesis = hyp,
            agent_reasoning = table.concat(hyp_reasoning_parts, "\n---\n")
          })
          diag(string.format("Hyp %d submitted (version=%s, steps=%d, edit_fails=%d): %s",
            h, version_id, react_step, total_edit_failures, trunc(hyp.name .. ": " .. (hyp.description or ""), 200)))
        else
          diag(string.format("Hyp %d NO VERSION (steps=%d, edit_fails=%d, reason=%s): %s",
            h, react_step, total_edit_failures,
            has_text(hyp_done_reason) and trunc(hyp_done_reason, 100) or "unknown",
            trunc(hyp.name .. ": " .. (hyp.description or ""), 200)))
        end
        end)

      if not post_ok then
        diag(string.format("ERROR in Hyp %d post-processing: %s", h, trunc(tostring(post_err), 500)))
        Human.notify({message = string.format(
          "  Hypothesis %d post-processing error (version may still be valid): %s",
          h, trunc(tostring(post_err), 200)), level = "error"})
        -- If we have a version_id, still record it despite the error
        if version_id then
          record_submitted_version({
            index = h,
            version_id = version_id,
            done_reason = hyp_done_reason or "(post-processing error)",
            hypothesis = hyp,
            agent_reasoning = table.concat(hyp_reasoning_parts, "\n---\n")
          })
          diag(string.format("Hyp %d submitted (recovered from error, version=%s): %s",
            h, version_id, trunc(hyp.name or "", 100)))
        end
      end
    end

    -- ================================================================
    -- PHASE 3: Batch evaluate all submitted versions
    -- ================================================================
    if #submitted_versions == 0 then
      -- No hypotheses produced a version
      local skip_reason = any_cannot_improve and "cannot_improve" or "all_hypotheses_failed"
      Human.notify({message = string.format(
        "Cycle %d — No hypotheses submitted (%s)", cycle, skip_reason), level = "info"})
      consecutive_failed_cycles = consecutive_failed_cycles + 1
      consecutive_stagnant_cycles = consecutive_stagnant_cycles + 1
      local cycle_log = {
        iteration = cycle,
        accepted = false,
        skip_reason = skip_reason,
        num_candidates = #hypotheses
      }
      table.insert(iterations, cycle_log)
      State.set("iterations", iterations)
      if Stop.requested() then stop_reason = "user_stopped"; return "break_cycle" end

    else
      -- Batch-eval all submitted hypothesis versions
      local batch = {}
      for _, sv in ipairs(submitted_versions) do
        if regression_available then
          local candidate_dataset_id = ensure_regression_dataset_for_version(sv.version_id)
          sv.dataset_id = candidate_dataset_id
          table.insert(batch, {
            scorecard_name = params.scorecard,
            score_name = params.score,
            evaluation_type = "accuracy",
            dataset_id = candidate_dataset_id,
            n_samples = params.max_samples or 100,
            version = sv.version_id,
            baseline = regression_baseline_id,
            current_baseline = last_accepted_acc_eval_id,
            notes = string.format("Cycle %d / %s — deterministic regression dataset", cycle, trunc(sv.hypothesis.name .. ": " .. (sv.hypothesis.description or ""), 500))
          })
        end
        table.insert(batch, {
          scorecard_name = params.scorecard,
          score_name = params.score,
          evaluation_type = "feedback",
          days = params.days,
          max_feedback_items = params.max_samples or 100,
          sampling_mode = "newest",
          version = sv.version_id,
          baseline = recent_baseline_id,
          current_baseline = last_accepted_fb_eval_id,
          wait = true,
          notes = string.format("Cycle %d / %s — recent feedback items", cycle, trunc(sv.hypothesis.name .. ": " .. (sv.hypothesis.description or ""), 500))
        })
      end

      status_msg(string.format("Cycle %d/%d — evaluating %d hypotheses (%d evals)", cycle, max_cycles, #submitted_versions, #batch))
      Human.notify({message = string.format(
        "  Evaluating %d hypotheses (%d evals in parallel)...",
        #submitted_versions, #batch
      ), level = "info"})

      diag(string.format("Dispatching hypothesis eval batch (%d evals)", #batch))
      local batch_results = call_plexus_tool("plexus_evaluation_run", {batch = batch})
      record_evaluation_batch_costs(batch_results, string.format("cycle_%d_hypothesis_batch", cycle))
      diag(string.format("Hypothesis eval batch returned (%d results)", batch_results and #batch_results or 0))

      -- Parse results
      local evals_per = regression_available and 2 or 1
      for i, sv in ipairs(submitted_versions) do
        local base_idx = (i - 1) * evals_per
        if regression_available then
          local acc_r = batch_results and batch_results[base_idx + 1]
          if acc_r and (acc_r.id or acc_r.evaluation_id) then
            sv.acc_metrics = extract_metrics(acc_r)
            sv.acc_cost_per_item = extract_cost_per_item(acc_r)
            sv.acc_deltas = calculate_deltas(sv.acc_metrics, regression_baseline_metrics)
            sv.acc_deltas_vs_current = calculate_deltas(sv.acc_metrics, last_accepted_acc_metrics)
            sv.acc_rca = enrich_rca(acc_r.root_cause or {})
            sv.acc_eval_id = acc_r.id or acc_r.evaluation_id
          end
        end
        local fb_r = batch_results and batch_results[base_idx + evals_per]
        if fb_r and (fb_r.id or fb_r.evaluation_id) then
          sv.fb_metrics = extract_metrics(fb_r)
          sv.fb_cost_per_item = extract_cost_per_item(fb_r)
          sv.fb_deltas = calculate_deltas(sv.fb_metrics, recent_baseline_metrics)
          sv.fb_deltas_vs_current = calculate_deltas(sv.fb_metrics, last_accepted_fb_metrics)
          sv.fb_rca = enrich_rca(fb_r.root_cause or {})
          sv.fb_eval_id = fb_r.id or fb_r.evaluation_id
        end
      end

      -- Classify hypotheses as succeeded/failed
      local succeeded = {}
      local failed = {}
      for _, sv in ipairs(submitted_versions) do
        sv.succeeded = classify_exploration_success(sv)
        if sv.succeeded then
          table.insert(succeeded, sv)
        else
          table.insert(failed, sv)
        end
      end

      -- Log results
      Human.notify({message = string.format(
        "  Results: %d succeeded, %d failed", #succeeded, #failed), level = "info"})
      for _, sv in ipairs(submitted_versions) do
        local status_label = sv.succeeded and "SUCCEEDED" or "FAILED"
        local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
        local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
        local fb_d_cur = sv.fb_deltas_vs_current and sv.fb_deltas_vs_current.alignment or 0
        local acc_d_cur = sv.acc_deltas_vs_current and sv.acc_deltas_vs_current.alignment or 0
        Human.notify({message = string.format(
          "    Hyp %d [%s]: Recent AC1 %+.3f (vs current %+.3f), Regression AC1 %+.3f (vs current %+.3f)  [%s]",
          sv.index, status_label, fb_d, fb_d_cur, acc_d, acc_d_cur,
          trunc(sv.done_reason or "", 60)
        ), level = "info"})
        diag(string.format("Hyp %d [%s] version=%s: Recent AC1 %+.3f (cur %+.3f), Regression AC1 %+.3f (cur %+.3f) — %s",
          sv.index, status_label, tostring(sv.version_id or "?"),
          fb_d, fb_d_cur, acc_d, acc_d_cur, trunc(sv.done_reason or sv.hypothesis and sv.hypothesis.name or "", 80)))
      end

      -- ================================================================
      -- PHASE 4: SYNTHESIS — dual-strategy approach
      -- Strategy A (cycle-focused): pick the single strongest change conservatively
      -- Strategy B (arc-focused, cycle 2+): apply highest-confidence cross-cycle pattern
      -- Both evaluated; programmatic selection picks the better one
      -- ================================================================
      diag("Entering synthesis phase")
      Stage.set("selection")
      status_msg(string.format("Cycle %d/%d — synthesis (combining best changes)", cycle, max_cycles))
      local final_version_id = nil
      local final_is_synthesis = true
      local final_done_reason = ""
      local synth_reasoning_parts = {}  -- accumulates agent text across synthesis steps (outer scope for cycle_log)
      local selected_strategy = nil     -- "A" or "B"
      local synthesis_eval_results = nil  -- winner's eval results from dual-strategy selection

      -- Helper: run a synthesis ReAct loop with a given prompt and starting code.
      -- Returns: version_id (or nil), done_reason, reasoning_parts table
      local function run_synthesis_react(prompt_text, start_code, start_label, parent_version_id, max_steps, strategy_label)
        local react_version_id = nil
        local react_done_reason = ""
        local react_reasoning = {}

        call_plexus_tool("score_editor_setup", {
          scorecard_identifier = params.scorecard,
          score_identifier     = score_id,
          yaml_content         = start_code,
          code_file_path       = score_pull.codeFilePath,
          parent_version_id    = parent_version_id,
          iteration            = cycle,
          hypothesis           = string.format("Cycle %d synthesis (%s)", cycle, strategy_label)
        })

        code_editor.clear_history()
        local synthesis_context_parts = {}
        if has_text(SCORE_CLASS_DOC) then
          table.insert(synthesis_context_parts, string.format("=== SCORE YAML FORMAT REFERENCE (%s) ===\n", score_class)
            .. SCORE_CLASS_DOC
            .. "\n=== END SCORE YAML FORMAT REFERENCE ===")
        end
        -- Include ALL prior cycles' synthesis reasoning + accumulated lessons inline.
        do
          local prior_insights = State.get("cycle_insights") or {}
          local reasoning_parts = {}
          for _, ci in ipairs(prior_insights) do
            if ci.synthesis_reasoning and #ci.synthesis_reasoning > 0 then
              table.insert(reasoning_parts, string.format(
                "--- Cycle %d synthesis reasoning ---\n%s", ci.cycle, ci.synthesis_reasoning))
            end
          end
          if #reasoning_parts > 0 then
            table.insert(synthesis_context_parts, "=== SYNTHESIS REASONING FROM ALL PRIOR CYCLES ===\n"
              .. table.concat(reasoning_parts, "\n\n")
              .. "\n=== END SYNTHESIS REASONING ===")
            Human.notify({message = string.format(
              "    [synthesis context] Injected %d cycles of synthesis reasoning",
              #reasoning_parts), level = "info"})
          end
          local acc_lessons = State.get("accumulated_lessons")
          if has_text(acc_lessons) then
            table.insert(synthesis_context_parts, "=== ACCUMULATED LESSONS (LLM-synthesized summary) ===\n"
              .. trunc(acc_lessons, 3000)
              .. "\n=== END ACCUMULATED LESSONS ===")
          end
          -- Deterministic cross-cycle item recurrence (PERSISTENT/OSCILLATING/FLIP_FLOP/LATE_EMERGING).
          -- Already computed by update_item_recurrence after each cycle's winning RCA.
          local _item_recurrence = State.get("item_recurrence") or {}
          local _recurrence_summary = build_recurrence_compact_summary(
            _item_recurrence, cycle)
          if _recurrence_summary then
            table.insert(synthesis_context_parts,
              "=== ITEM RECURRENCE PATTERNS (cross-cycle, deterministic) ===\n"
              .. _recurrence_summary
              .. "\n\nIMPLICATION: PERSISTENT, OSCILLATING, and FLIP_FLOP items are your HIGHEST-PRIORITY TARGETS. "
              .. "They have been wrong for multiple cycles and prior prompt changes did NOT fix them. Be MORE aggressive: "
              .. "add explicit literal rules, direct example snippets, or item-specific carve-outs that target exactly the "
              .. "language in those transcripts. Overfitting this eval set is acceptable and desired — the goal is 100% "
              .. "accuracy on the known items. Do not assume label noise; assume the rubric is still missing the rule that "
              .. "would force the correct answer for these specific cases. If you need to, quote a literal transcript snippet "
              .. "and pair it with the required classification.\n"
              .. "=== END ITEM RECURRENCE PATTERNS ===")
            Human.notify({message = string.format(
              "    [synthesis context] Injected deterministic item recurrence patterns"),
              level = "info"})
          end
        end
        table.insert(synthesis_context_parts,
          string.format("=== CURRENT score_config.yaml (starting from %s — apply your synthesis here) ===\n", start_label)
            .. start_code .. "\n=== END OF score_config.yaml ===")

        local max_edit_retries = 10
        local max_smoke_failures = 3
        local smoke_failure = nil
        local smoke_failure_count = 0
        local edit_failures = 0
        local step = 0
        local done = false
        local second_chance = false
        local second_chance_pending = false

        while step < max_steps and not done do
          step = step + 1
          local msg
          if step == 1 and edit_failures == 0 then
            msg = table.concat(synthesis_context_parts, "\n\n") .. "\n\n" .. prompt_text
          else
            local recent_parts = {}
            if smoke_failure then
              smoke_failure_count = smoke_failure_count + 1
              table.insert(recent_parts, "SMOKE TEST FAILED:\n\n" .. smoke_failure)
              local err_lower = string.lower(smoke_failure)
              if string.find(err_lower, "processor") or string.find(err_lower, "filter")
                  or string.find(err_lower, "valueerror") or string.find(err_lower, "modulenotfounderror")
                  or string.find(err_lower, "importerror") or string.find(err_lower, "attributeerror") then
                table.insert(recent_parts, "\nRECOVERY — processor/class error detected.")
                table.insert(recent_parts, "Remove any `processors:` section you added and call submit_score_version to restore a clean baseline.")
                table.insert(recent_parts, "Then implement the change using prompt modifications only.")
              else
                table.insert(recent_parts, "\nFix the issue and call submit_score_version again.")
              end
              if smoke_failure_count >= max_smoke_failures then
                done = true
              end
              smoke_failure = nil
            else
              local last_edit = Tool.last_call("str_replace_editor")
              local last_submit = Tool.last_call("submit_score_version")
              if last_edit then
                local edit_result = tostring(last_edit.result or "")
                local edit_cmd = tostring(tool_call_arg(last_edit, "command", ""))
                if edit_cmd == "view" then
                  table.insert(recent_parts, "File viewed. Call str_replace_editor with command='str_replace' to make changes.")
                elseif string.sub(edit_result, 1, 6) == "Error:" then
                  table.insert(recent_parts, "str_replace_editor error:\n" .. edit_result)
                  table.insert(recent_parts, "\nCall view to re-read, then retry with exact text.")
                else
                  table.insert(recent_parts, "Edit applied. Submit with submit_score_version or continue editing.")
                end
              end
              if last_submit then
                local ok_sub, sub_result = pcall(function() return safe_decode(last_submit.result) end)
              if ok_sub and sub_result and sub_result.error then
                table.insert(recent_parts, "submit_score_version error:\n  " .. tostring(sub_result.error))
                if string.find(tostring(sub_result.error), "semantically unchanged") then
                  table.insert(recent_parts, "\nFormatting/comment-only changes do not count. Make a meaningful rubric or score-logic edit before submitting.")
                end
              end
            end
            end
            if #recent_parts == 0 then
              table.insert(recent_parts, "You must call str_replace_editor or submit_score_version.")
            end
            table.insert(recent_parts, string.format("\n(%s step %d/%d, edit_fails=%d)",
              strategy_label, step, max_steps, edit_failures))
            local editor_content = call_plexus_tool("score_editor_get_content", {})
            if editor_content and editor_content.file_content then
              table.insert(recent_parts, "\n=== CURRENT score_config.yaml (copy your old_str EXACTLY from here) ===\n"
                .. editor_content.file_content
                .. "\n=== END OF score_config.yaml ===")
            end
            msg = table.concat(recent_parts, "\n")
          end

          if second_chance_pending then
            local second_parts = {
              "Your previous attempt concluded with cannot_improve. Try a MINIMAL change: "
                .. "a single clarifying example, one sharpened criterion, or a small prompt restructure. "
                .. "Even a neutral result is better than skipping. Submit with submit_score_version.",
              "Prefer the SMALLEST UNIQUE replacement inside system_message or user_message rather than replacing an entire prompt block."
            }
            local ec = call_plexus_tool("score_editor_get_content", {})
            if ec and ec.file_content then
              table.insert(second_parts, "\n=== CURRENT score_config.yaml (copy your old_str EXACTLY from here) ===\n"
                .. ec.file_content .. "\n=== END OF score_config.yaml ===")
            end
            msg = table.concat(second_parts, "\n")
            second_chance_pending = false
          end

          guard_context_budget(code_editor)
          local strategy_file_content = nil
          pcall(function()
            local ec = call_plexus_tool("score_editor_get_content", {})
            if ec and ec.file_content then strategy_file_content = ec.file_content end
          end)
          local editor_ok, editor_err = safe_editor_call(msg, {
            file_content = strategy_file_content or current_code,
            task_description = msg
          })
          if not editor_ok then
            diag(string.format("CODE_EDITOR FAILED in %s step %d: %s", strategy_label, step, tostring(editor_err)))
            Human.notify({message = string.format(
              "  %s step %d — code_editor failed: %s", strategy_label, step, trunc(tostring(editor_err), 200)), level = "error"})
            done = true
          end

          local terminal_tool_call = Tool.last_call("submit_score_version") or Tool.last_call("done")
          local agent_text = code_editor.output or ""
          if has_text(agent_text) and not terminal_tool_call then
            Human.notify({message = string.format(
              "  [%s, step %d] Agent: %s",
              strategy_label, step, trunc(agent_text, 500)), level = "info"})
            if type(agent_text) == "string" and #agent_text > 20 and #agent_text < 4000
               and not string.find(agent_text, "^name:") and not string.find(agent_text, "^tactus_code:") then
              table.insert(react_reasoning, agent_text)
            end
          elseif has_text(agent_text) and terminal_tool_call then
            diag(string.format(
              "  [%s] Ignoring agent prose after terminal tool call: %s",
              strategy_label, trunc(agent_text, 200)))
          end

          -- Capture reasoning from tool calls
          local last_edit_r = Tool.last_call("str_replace_editor")
          if last_edit_r then
            local cmd = tostring(tool_call_arg(last_edit_r, "command", ""))
            if cmd ~= "view" then
              local old_s = trunc(tostring(tool_call_arg(last_edit_r, "old_str", "")), 200)
              local new_s = trunc(tostring(tool_call_arg(last_edit_r, "new_str", "")), 400)
              if has_text(new_s) then
                table.insert(react_reasoning, string.format("Edit: replaced [%s] with [%s]", old_s, new_s))
              end
            end
          end
          local last_submit_r = Tool.last_call("submit_score_version")
          if last_submit_r then
            local note = tostring(tool_call_arg(last_submit_r, "version_note", ""))
            if has_text(note) then table.insert(react_reasoning, "Submit: " .. note) end
          end
          local last_done_r = Tool.last_call("done")
          if last_done_r then
            local reason = tostring(tool_call_arg(last_done_r, "reason", ""))
            if has_text(reason) then table.insert(react_reasoning, "Done: " .. reason) end
          end

          -- Detect failed edit attempts
          local was_edit_failure = false
          local edit_check = Tool.last_call("str_replace_editor")
          if edit_check then
            local edit_result = tostring(edit_check.result or "")
            local edit_command = tostring(tool_call_arg(edit_check, "command", ""))
            if edit_command ~= "view" and string.sub(edit_result, 1, 6) == "Error:" then
              was_edit_failure = true
              edit_failures = edit_failures + 1
            end
          end

          -- Check for submit
          local submit_call = Tool.last_call("submit_score_version")
          if submit_call then
            local ok, submit_result = pcall(function() return safe_decode(submit_call.result) end)
            if ok and submit_result and submit_result.version_id then
              local candidate_id = submit_result.version_id
              Human.notify({message = string.format(
                "  %s version %s created — smoke testing...", strategy_label, candidate_id), level = "info"})

              local test_ok, test_result = pcall(call_plexus_tool, "plexus_score_test", {
                scorecard_identifier = params.scorecard,
                score_identifier     = score_id,
                version              = candidate_id,
                samples              = 3
              })
              local smoke_passed = false
              local smoke_detail = ""
              if not test_ok then
                smoke_detail = "Score test call error: " .. tostring(test_result)
              elseif type(test_result) ~= "table" then
                smoke_detail = "Score test returned non-table response: " .. tostring(test_result)
              else
                smoke_passed = test_result.passed == true
                if not smoke_passed then
                  local base = tostring(test_result.message or "Score test failed")
                  local fc = tostring(test_result.failure_code or "unknown")
                  smoke_detail = string.format("%s (failure_code=%s)", base, fc)
                  if test_result.failures and #test_result.failures > 0 then
                    smoke_detail = smoke_detail .. "\n\nFailure details:\n" .. tostring(safe_encode(test_result.failures) or "[]")
                  elseif test_result.predictions and #test_result.predictions > 0 then
                    smoke_detail = smoke_detail .. "\n\nPrediction details:\n" .. tostring(safe_encode(test_result.predictions) or "[]")
                  end
                end
              end

              if smoke_passed then
                react_version_id = candidate_id
                local vn = tostring(tool_call_arg(submit_call, "version_note", ""))
                if has_text(vn) then react_done_reason = vn end
                diag(string.format("%s version created: %s", strategy_label, react_version_id))
                Human.notify({message = string.format(
                  "  %s version: %s", strategy_label, react_version_id), level = "info"})
                done = true
              else
                Human.notify({message = string.format(
                  "  %s score test FAILED: %s", strategy_label, trunc(smoke_detail, 120)), level = "warning"})
                smoke_failure = string.format(
                  "Version %s was created but FAILED the mechanical score test.\n\nError detail:\n%s\n\n"
                  .. "The score_config.yaml has an execution error. Diagnose and fix it, "
                  .. "then call submit_score_version again.",
                  candidate_id, smoke_detail)
              end

            elseif ok and submit_result and submit_result.error then
              Human.notify({message = string.format(
                "  %s submit error (step %d): %s",
                strategy_label, step, tostring(submit_result.error)), level = "warning"})
            end
          end

          -- Check if agent gave up
          if not done then
            local done_call = Tool.last_call("done")
            if done_call then
              local reason_text = tostring(tool_call_arg(done_call, "reason", "agent gave up"))
              if string.find(string.lower(reason_text), "cannot_improve") and not second_chance then
                second_chance = true
                second_chance_pending = true
                Human.notify({message = string.format("  %s: agent tried cannot_improve — giving one more chance", strategy_label), level = "info"})
              else
                react_done_reason = reason_text
                Human.notify({message = string.format(
                  "  %s: agent called done — %s", strategy_label, trunc(react_done_reason, 100)), level = "info"})
                done = true
              end
            end
          end

          if was_edit_failure and not done then
            step = step - 1
            if edit_failures >= max_edit_retries then
              Human.notify({message = string.format(
                "  %s: %d edit failures — giving up", strategy_label, edit_failures), level = "warning"})
              done = true
            end
          end
        end

        return react_version_id, react_done_reason, react_reasoning
      end -- run_synthesis_react

      Human.notify({message = string.format(
        "Cycle %d — Synthesis (dual-strategy): %d hypothesis results (%d succeeded, %d failed)...",
        cycle, #submitted_versions, #succeeded, #failed), level = "info"})

      -- Check for partial positive signals before deciding to skip synthesis
      local any_partial_positive = false
      local partial_signal_details = {}
      for _, sv in ipairs(submitted_versions) do
        local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
        local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
        if fb_d > 0.005 or acc_d > 0.005 then
          any_partial_positive = true
          table.insert(partial_signal_details, string.format(
            "Hyp %d: FB %+.3f, ACC %+.3f", sv.index, fb_d, acc_d))
        end
      end

      local all_badly_regressed = #submitted_versions > 0 and not any_partial_positive
      if all_badly_regressed then
        for _, sv in ipairs(submitted_versions) do
          local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
          local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
          if fb_d > -0.03 or acc_d > -0.03 then
            all_badly_regressed = false
            break
          end
        end
      end

      if all_badly_regressed and #succeeded == 0 then
        Human.notify({message = string.format(
          "Cycle %d — Skipping synthesis: all %d hypotheses regressed badly (no positive signal to build from)",
          cycle, #submitted_versions), level = "warning"})
        final_version_id = nil
        final_done_reason = "all_hypotheses_regressed"
        goto after_synthesis
      end

      if #succeeded == 0 and any_partial_positive then
        Human.notify({message = string.format(
          "Cycle %d — Running synthesis despite 0 successes: %d partial positive signals found",
          cycle, #partial_signal_details), level = "info"})
      end

      do -- do..end block so goto after_synthesis can jump past local declarations
      -- ----------------------------------------------------------------
      -- Build shared hypothesis results context (used by both strategies)
      -- ----------------------------------------------------------------
      local shared_hyp_parts = {}
      table.insert(shared_hyp_parts, "=== HYPOTHESIS EVALUATION RESULTS ===")
      for _, sv in ipairs(submitted_versions) do
        local status = sv.succeeded and "SUCCEEDED" or "FAILED"
        local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
        local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
        local fb_d_cur = sv.fb_deltas_vs_current and sv.fb_deltas_vs_current.alignment or 0
        local acc_d_cur = sv.acc_deltas_vs_current and sv.acc_deltas_vs_current.alignment or 0
        table.insert(shared_hyp_parts, string.format(
          "\nHypothesis %d ('%s'): %s",
          sv.index, sv.hypothesis.name, status))
        table.insert(shared_hyp_parts, string.format(
          "  vs current baseline: Recent AC1 %+.3f   Regression AC1 %+.3f",
          fb_d_cur, acc_d_cur))
        table.insert(shared_hyp_parts, string.format(
          "  vs original baseline: Recent AC1 %+.3f   Regression AC1 %+.3f",
          fb_d, acc_d))
        table.insert(shared_hyp_parts, string.format(
          "  Rationale: %s", trunc(sv.done_reason or sv.hypothesis.description, 2000)))
        if acc_d < -0.01 then
          table.insert(shared_hyp_parts, string.format(
            "  *** WARNING: This hypothesis REGRESSED accuracy by %.3f — do NOT incorporate without ensuring accuracy is preserved. ***",
            math.abs(acc_d)))
        end
      end

      -- Pull code for succeeded hypotheses
      for _, sv in ipairs(succeeded) do
        local hyp_pull = call_plexus_tool("plexus_score_pull", {
          scorecard_identifier = params.scorecard,
          score_identifier = score_id,
          version_id = sv.version_id
        })
        if hyp_pull and hyp_pull.success and hyp_pull.codeFilePath then
          local hyp_code = File.read(hyp_pull.codeFilePath)
          if has_text(hyp_code) then
            table.insert(shared_hyp_parts, string.format(
              "\n  === CODE FOR HYPOTHESIS %d (version %s) ===",
              sv.index, sv.version_id))
            table.insert(shared_hyp_parts, hyp_code)
            table.insert(shared_hyp_parts, string.format(
              "  === END CODE FOR HYPOTHESIS %d ===", sv.index))
          end
        end
      end
      table.insert(shared_hyp_parts, "")
      local shared_hyp_context = table.concat(shared_hyp_parts, "\n")

      -- ----------------------------------------------------------------
      -- Determine best starting point for Strategy A
      -- ----------------------------------------------------------------
      local synth_start_code = current_code
      local synth_start_label = "BASELINE"
      local synth_parent_version_id = last_accepted_version_id
      if #succeeded >= 1 then
        local best = succeeded[1]
        local best_score = -999
        for _, sv in ipairs(succeeded) do
          local combined = (sv.fb_deltas and sv.fb_deltas.alignment or 0)
                         + (sv.acc_deltas and sv.acc_deltas.alignment or 0)
          if combined > best_score then
            best_score = combined
            best = sv
          end
        end
        local best_pull = call_plexus_tool("plexus_score_pull", {
          scorecard_identifier = params.scorecard,
          score_identifier = score_id,
          version_id = best.version_id
        })
        if best_pull and best_pull.success and best_pull.codeFilePath then
          local best_code = File.read(best_pull.codeFilePath)
          if has_text(best_code) then
            synth_start_code = best_code
            synth_start_label = string.format("HYPOTHESIS %d (%s)", best.index, best.version_id)
            synth_parent_version_id = best.version_id
            diag(string.format("Strategy A starting from hypothesis %d (combined delta %+.3f)", best.index, best_score))
          end
        end
      end

      -- ================================================================
      -- STRATEGY A — "Cycle synthesis"
      -- Derive insights from every hypothesis result and combine them.
      -- Starts from best-performing hypothesis code. Max 8 ReAct steps.
      -- ================================================================
      local strategy_a_parts = {}
      table.insert(strategy_a_parts, string.format("=== CYCLE %d SYNTHESIS ===\n", cycle))
      table.insert(strategy_a_parts, "Your job is NOT to pick a winner. Your job is to be a researcher who reads")
      table.insert(strategy_a_parts, "every experiment result, extracts what each one teaches, and combines all")
      table.insert(strategy_a_parts, "the lessons into one improved score version.\n")
      table.insert(strategy_a_parts, "STEP 1 — Analyze each hypothesis result:")
      table.insert(strategy_a_parts, "  For EVERY hypothesis — succeeded or failed — ask:")
      table.insert(strategy_a_parts, "    • What specific change did it make?")
      table.insert(strategy_a_parts, "    • What did the metrics show? (feedback AC1 delta, accuracy AC1 delta)")
      table.insert(strategy_a_parts, "    • What does that result TEACH US about the score's current weaknesses?")
      table.insert(strategy_a_parts, "    • If it failed: was the direction wrong, or just too aggressive?")
      table.insert(strategy_a_parts, "      A failed hypothesis can still contain a correct insight at a smaller dose.\n")
      table.insert(strategy_a_parts, "STEP 2 — Derive the lessons:")
      table.insert(strategy_a_parts, "  Write a short list of what this cycle taught before you start editing:")
      table.insert(strategy_a_parts, "    Example: 'Two-gate policy helps feedback (+0.181) → include it.'")
      table.insert(strategy_a_parts, "    Example: 'Model gpt-5.4-nano improved both metrics → include the swap.'")
      table.insert(strategy_a_parts, "    Example: 'Program-match clarification helped moderately → include it.'")
      table.insert(strategy_a_parts, "    Example: 'DeepGram input source failed smoke test → defer, not ready yet.'\n")
      table.insert(strategy_a_parts, "STEP 3 — Build the combined version:")
      table.insert(strategy_a_parts, "  Start from the best-performing hypothesis (already loaded). Then:")
      table.insert(strategy_a_parts, "  a) ALWAYS include zero-interaction structural changes that succeeded.")
      table.insert(strategy_a_parts, "     A zero-interaction change cannot conflict with prompt text.")
      table.insert(strategy_a_parts, "     Model swap (model_name / model_provider) is the clearest example —")
      table.insert(strategy_a_parts, "     2 lines, no interaction with prompts. MUST be included if it succeeded.")
      table.insert(strategy_a_parts, "     Others: item: input source section, max_tokens changes.")
      table.insert(strategy_a_parts, "  b) Include complementary prompt improvements from other hypotheses IF")
      table.insert(strategy_a_parts, "     they address DIFFERENT aspects and the starting code does not already")
      table.insert(strategy_a_parts, "     cover them. Do not blindly copy prompt text — understand what each")
      table.insert(strategy_a_parts, "     change fixed and apply the minimum edit that achieves that fix.")
      table.insert(strategy_a_parts, "  c) For failed hypotheses with partial positive signal: consider a more")
      table.insert(strategy_a_parts, "     conservative version of the same idea if the direction seems right.")
      table.insert(strategy_a_parts, "  d) Do NOT merge conflicting rewrites of the SAME section from different")
      table.insert(strategy_a_parts, "     hypotheses. When two hypotheses edited the same section, use whichever")
      table.insert(strategy_a_parts, "     performed better on both metrics; do not blend their text.\n")
      table.insert(strategy_a_parts, shared_hyp_context)

      -- Full cross-cycle context: all prior cycles' analysis + accumulated lessons
      do
        -- Raw per-cycle insights (full analysis, all cycles — no truncation, no cap)
        local prior_insights = State.get("cycle_insights") or {}
        if #prior_insights > 0 then
          table.insert(strategy_a_parts, "=== LESSONS FROM ALL PRIOR CYCLES ===")
          for _, ci in ipairs(prior_insights) do
            table.insert(strategy_a_parts, string.format("--- Cycle %d ---", ci.cycle))
            if ci.prescription_summary and ci.prescription_summary ~= "" then
              table.insert(strategy_a_parts, "Prescription: " .. ci.prescription_summary)
            end
            if ci.diagnosis_summary and ci.diagnosis_summary ~= "" then
              table.insert(strategy_a_parts, "Diagnosis: " .. ci.diagnosis_summary)
            end
            if ci.hypotheses_tested and type(ci.hypotheses_tested) == "table" then
              for _, h in ipairs(ci.hypotheses_tested) do
                table.insert(strategy_a_parts, string.format("  %s: FB %+.3f  ACC %+.3f  %s",
                  h.name, h.fb_delta or 0, h.acc_delta or 0,
                  h.succeeded and "SUCCEEDED" or "FAILED"))
              end
            end
            table.insert(strategy_a_parts, "")
          end
          table.insert(strategy_a_parts, "=== END PRIOR CYCLE LESSONS ===")
          table.insert(strategy_a_parts, "")
        end
        -- Accumulated lessons: supplementary LLM-synthesized summary
        local acc_lessons = State.get("accumulated_lessons")
        if has_text(acc_lessons) then
          table.insert(strategy_a_parts, "=== ACCUMULATED LESSONS (LLM-synthesized summary) ===")
          table.insert(strategy_a_parts, trunc(acc_lessons, 3000))
          table.insert(strategy_a_parts, "=== END ACCUMULATED LESSONS ===")
          table.insert(strategy_a_parts, "")
        end
        -- Hypothesis effectiveness patterns
        if iterations and #iterations > 0 then
          local eff_summary = build_hypothesis_effectiveness_summary(iterations)
          if has_text(eff_summary) then
            table.insert(strategy_a_parts, eff_summary)
            table.insert(strategy_a_parts, "")
          end
        end
      end

      if #succeeded == 0 then
        table.insert(strategy_a_parts, "=== NOTE: NO HYPOTHESES MET THE SUCCESS THRESHOLD ===")
        table.insert(strategy_a_parts, "Use STEP 1 to find the approach with the most positive partial signal.")
        table.insert(strategy_a_parts, "Apply a conservative version of the most promising direction.")
        table.insert(strategy_a_parts, "A small safe change is better than an ambitious one that risks regression.")
        local partial_signals = {}
        for _, sv in ipairs(submitted_versions) do
          local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
          local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
          if fb_d > 0.005 or acc_d > 0.005 then
            table.insert(partial_signals, string.format(
              "  Hyp %d ('%s'): FB %+.3f, ACC %+.3f",
              sv.index, sv.hypothesis and sv.hypothesis.name or "?", fb_d, acc_d))
          end
        end
        if #partial_signals > 0 then
          table.insert(strategy_a_parts, "Partial positive signals:")
          for _, s in ipairs(partial_signals) do table.insert(strategy_a_parts, s) end
        end
        table.insert(strategy_a_parts, "")
      end

      table.insert(strategy_a_parts, string.format("Edit score_config.yaml starting from %s.", synth_start_label))
      table.insert(strategy_a_parts, "When done, call submit_score_version with a note that summarises the lessons")
      table.insert(strategy_a_parts, "you derived and what changes you made to address each one.")
      table.insert(strategy_a_parts, "  version_note='Cycle " .. tostring(cycle) .. " synthesis: <lesson 1> → <change made>; <lesson 2> → <change made>; expected effect: <prediction>'")
      if #succeeded == 0 then
        table.insert(strategy_a_parts, "You MUST submit a version. A neutral result provides signal for the next cycle.\n")
      else
        table.insert(strategy_a_parts, "If after analysis you truly cannot find any supportable improvement, call done(reason='cannot_improve: <explanation>').\n")
      end

      -- Run Strategy A
      diag("Running Strategy A (cycle-focused, conservative)")
      Human.notify({message = string.format(
        "  Strategy A (cycle synthesis): starting from %s, max 8 steps", synth_start_label), level = "info"})
      local strategy_a_version_id, strategy_a_done_reason, strategy_a_reasoning =
        run_synthesis_react(table.concat(strategy_a_parts, "\n"), synth_start_code, synth_start_label, synth_parent_version_id, 8, "Strategy-A")

      -- ================================================================
      -- STRATEGY B — "Arc-focused" (pattern-based) — cycle 2+ only
      -- Look across all cycles for highest-confidence cross-cycle signal.
      -- Starts from BASELINE code (current accepted base). Max 10 steps.
      -- ================================================================
      local strategy_b_version_id, strategy_b_done_reason, strategy_b_reasoning
      if cycle >= 2 then
        local strategy_b_parts = {}
        table.insert(strategy_b_parts, string.format("=== CYCLE %d SYNTHESIS (Strategy B: Arc-focused) ===\n", cycle))
        table.insert(strategy_b_parts, "Looking across ALL optimization cycles, identify the SINGLE change with")
        table.insert(strategy_b_parts, "the highest-confidence cross-cycle signal. You are starting from the BASELINE")
        table.insert(strategy_b_parts, "code, not from any hypothesis. Apply the most well-supported change.\n")

        -- Full optimization history table
        local version_history = build_version_history(
          iterations, baseline_version_id, recent_baseline_metrics,
          regression_baseline_metrics, last_accepted_version_id)
        table.insert(strategy_b_parts, version_history)
        table.insert(strategy_b_parts, "")

        -- Current cycle hypothesis results
        table.insert(strategy_b_parts, shared_hyp_context)

        -- Full cycle insights (no 2-entry cap)
        do
          local prior_insights = State.get("cycle_insights") or {}
          if #prior_insights > 0 then
            table.insert(strategy_b_parts, "=== FULL CYCLE-BY-CYCLE INSIGHTS ===")
            for _, ci in ipairs(prior_insights) do
              table.insert(strategy_b_parts, string.format("\n--- Cycle %d ---", ci.cycle))
              table.insert(strategy_b_parts, ci.analysis or "(no analysis)")
              if ci.hypotheses_tested and #ci.hypotheses_tested > 0 then
                table.insert(strategy_b_parts, "Hypotheses tested:")
                for _, h in ipairs(ci.hypotheses_tested) do
                  table.insert(strategy_b_parts, string.format(
                    "  %s: FB %+.3f, ACC %+.3f [%s]",
                    h.name, h.fb_delta or 0, h.acc_delta or 0,
                    h.succeeded and "PASS" or "FAIL"))
                end
              end
            end
            table.insert(strategy_b_parts, "")
          end
        end

        -- Deterministic cross-cycle item recurrence (PERSISTENT/OSCILLATING/FLIP_FLOP/LATE_EMERGING).
        -- Already computed by update_item_recurrence after each cycle's winning RCA.
        do
          local _item_recurrence = State.get("item_recurrence") or {}
          local _recurrence_summary = build_recurrence_compact_summary(
            _item_recurrence, cycle)
          if _recurrence_summary then
            table.insert(strategy_b_parts,
              "=== ITEM RECURRENCE PATTERNS (cross-cycle, deterministic) ===\n"
              .. _recurrence_summary
              .. "\n\nIMPLICATION: PERSISTENT, OSCILLATING, and FLIP_FLOP items are your HIGHEST-PRIORITY TARGETS. "
              .. "They have been wrong for multiple cycles and prior prompt changes did NOT fix them. Be MORE aggressive: "
              .. "add explicit literal rules, direct example snippets, or item-specific carve-outs that target exactly the "
              .. "language in those transcripts. Overfitting this eval set is acceptable and desired — the goal is 100% "
              .. "accuracy on the known items. Do not assume label noise; assume the rubric is still missing the rule that "
              .. "would force the correct answer for these specific cases. If you need to, quote a literal transcript snippet "
              .. "and pair it with the required classification.\n"
              .. "=== END ITEM RECURRENCE PATTERNS ===")
            table.insert(strategy_b_parts, "")
          end
        end

        -- Cross-cycle hypothesis comparison sorted by combined score
        do
          local all_hyps = {}
          local prior_insights = State.get("cycle_insights") or {}
          for _, ci in ipairs(prior_insights) do
            if ci.hypotheses_tested then
              for _, h in ipairs(ci.hypotheses_tested) do
                table.insert(all_hyps, {
                  cycle = ci.cycle,
                  name = h.name,
                  fb_delta = h.fb_delta or 0,
                  acc_delta = h.acc_delta or 0,
                  combined = (h.fb_delta or 0) + (h.acc_delta or 0),
                  succeeded = h.succeeded
                })
              end
            end
          end
          for _, sv in ipairs(submitted_versions) do
            local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
            local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
            table.insert(all_hyps, {
              cycle = cycle,
              name = sv.hypothesis and sv.hypothesis.name or ("Hypothesis " .. tostring(sv.index)),
              fb_delta = fb_d,
              acc_delta = acc_d,
              combined = fb_d + acc_d,
              succeeded = sv.succeeded or false
            })
          end
          table.sort(all_hyps, function(a, b) return a.combined > b.combined end)
          if #all_hyps > 0 then
            table.insert(strategy_b_parts, "=== CROSS-CYCLE HYPOTHESIS COMPARISON (sorted by combined delta) ===")
            for _, h in ipairs(all_hyps) do
              table.insert(strategy_b_parts, string.format(
                "  Cycle %d | %s | FB %+.3f | ACC %+.3f | Combined %+.3f | %s",
                h.cycle, h.name, h.fb_delta, h.acc_delta, h.combined,
                h.succeeded and "PASS" or "FAIL"))
            end
            table.insert(strategy_b_parts, "")
          end
        end

        table.insert(strategy_b_parts, "=== STRATEGY B TASK (Arc synthesis — cross-cycle) ===")
        table.insert(strategy_b_parts, "You are starting from the BASELINE code (not any hypothesis).")
        table.insert(strategy_b_parts, "Your job: read the full optimization history above as a RESEARCHER would.")
        table.insert(strategy_b_parts, "Across all cycles and all hypotheses — what has the evidence consistently")
        table.insert(strategy_b_parts, "taught us about this score's weaknesses? What directions have repeatedly")
        table.insert(strategy_b_parts, "helped? What has repeatedly failed? What hasn't been tried yet?\n")
        table.insert(strategy_b_parts, "Derive cross-cycle lessons, then build a version that incorporates the")
        table.insert(strategy_b_parts, "changes best supported by the accumulated evidence. This is not about")
        table.insert(strategy_b_parts, "copying the best-performing version — it is about understanding what")
        table.insert(strategy_b_parts, "the pattern of results is telling us and acting on that understanding.\n")
        table.insert(strategy_b_parts, "Edit score_config.yaml starting from BASELINE.")
        table.insert(strategy_b_parts, "When done, call submit_score_version with a note that states the cross-cycle")
        table.insert(strategy_b_parts, "lessons you identified and what changes you made to address each one.")
        table.insert(strategy_b_parts, "  version_note='Cycle " .. tostring(cycle) .. " synthesis (B): <cross-cycle lesson> → <change>; based on <cycles/hypotheses>; expected: <prediction>'")
        table.insert(strategy_b_parts, "If after analysis no well-supported change exists, call done(reason='cannot_improve: <explanation>').\n")

        diag("Running Strategy B (arc-focused, pattern-based)")
        Human.notify({message = "  Strategy B (arc-focused): starting from BASELINE, max 10 steps", level = "info"})
        strategy_b_version_id, strategy_b_done_reason, strategy_b_reasoning =
          run_synthesis_react(table.concat(strategy_b_parts, "\n"), current_code, "BASELINE", last_accepted_version_id, 10, "Strategy-B")
      end

      -- ================================================================
      -- Collect strategy results and evaluate in batch
      -- ================================================================
      local strategy_versions = {}
      if strategy_a_version_id then
        table.insert(strategy_versions, {
          label = "A",
          version_id = strategy_a_version_id,
          done_reason = strategy_a_done_reason,
          reasoning = strategy_a_reasoning
        })
      end
      if strategy_b_version_id then
        table.insert(strategy_versions, {
          label = "B",
          version_id = strategy_b_version_id,
          done_reason = strategy_b_done_reason,
          reasoning = strategy_b_reasoning
        })
      end

      diag(string.format("Strategy results: A=%s, B=%s",
        tostring(strategy_a_version_id or "nil"), tostring(strategy_b_version_id or "nil")))

      -- Default synth_reasoning_parts to Strategy A reasoning
      if strategy_a_reasoning then
        for _, r in ipairs(strategy_a_reasoning) do
          table.insert(synth_reasoning_parts, r)
        end
      end

      if #strategy_versions > 0 then
        -- Build batch evaluation for all strategy versions
        local eval_batch = {}
        for _, sv in ipairs(strategy_versions) do
          if regression_available then
            local strategy_dataset_id = ensure_regression_dataset_for_version(sv.version_id)
            sv.dataset_id = strategy_dataset_id
            table.insert(eval_batch, {
              scorecard_name = params.scorecard,
              score_name = params.score,
              evaluation_type = "accuracy",
              dataset_id = strategy_dataset_id,
              n_samples = params.max_samples or 100,
              version = sv.version_id,
              baseline = regression_baseline_id,
              current_baseline = last_accepted_acc_eval_id,
              notes = string.format("Cycle %d synthesis (Strategy %s) — regression: %s",
                cycle, sv.label, trunc(sv.done_reason or "", 300))
            })
          end
          table.insert(eval_batch, {
            scorecard_name = params.scorecard,
            score_name = params.score,
            evaluation_type = "feedback",
            days = params.days,
            max_feedback_items = params.max_samples or 100,
            sampling_mode = "newest",
            version = sv.version_id,
            baseline = recent_baseline_id,
            current_baseline = last_accepted_fb_eval_id,
            wait = true,
            notes = string.format("Cycle %d synthesis (Strategy %s) — recent: %s",
              cycle, sv.label, trunc(sv.done_reason or "", 300))
          })
        end

        Human.notify({message = string.format(
          "  Evaluating %d strategy version(s) (%d evals)...",
          #strategy_versions, #eval_batch), level = "info"})

        local eval_results = call_plexus_tool("plexus_evaluation_run", {batch = eval_batch})
        record_evaluation_batch_costs(eval_results, string.format("cycle_%d_strategy_batch", cycle))
        diag("Strategy eval batch returned")

        -- Extract metrics for each strategy version
        local evals_per = regression_available and 2 or 1
        for i, sv in ipairs(strategy_versions) do
          local offset = (i - 1) * evals_per
          if regression_available then
            local acc_r = eval_results and eval_results[offset + 1]
            if acc_r and (acc_r.id or acc_r.evaluation_id) then
              sv.acc_metrics = extract_metrics(acc_r)
              sv.acc_cost_per_item = extract_cost_per_item(acc_r)
              sv.acc_deltas = calculate_deltas(sv.acc_metrics, regression_baseline_metrics)
              sv.acc_deltas_vs_current = calculate_deltas(sv.acc_metrics, last_accepted_acc_metrics)
              sv.acc_rca = enrich_rca(acc_r.root_cause or {})
              sv.acc_eval_id = acc_r.id or acc_r.evaluation_id
            end
          end
          local fb_r = eval_results and eval_results[offset + evals_per]
          if fb_r and (fb_r.id or fb_r.evaluation_id) then
            sv.fb_metrics = extract_metrics(fb_r)
            sv.fb_cost_per_item = extract_cost_per_item(fb_r)
            sv.fb_deltas = calculate_deltas(sv.fb_metrics, recent_baseline_metrics)
            sv.fb_deltas_vs_current = calculate_deltas(sv.fb_metrics, last_accepted_fb_metrics)
            sv.fb_rca = enrich_rca(fb_r.root_cause or {})
            sv.fb_eval_id = fb_r.id or fb_r.evaluation_id
          end
          local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
          local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
          local fb_d_cur = sv.fb_deltas_vs_current and sv.fb_deltas_vs_current.alignment or 0
          local acc_d_cur = sv.acc_deltas_vs_current and sv.acc_deltas_vs_current.alignment or 0
          Human.notify({message = string.format(
            "  Strategy %s: Recent AC1 %+.3f (vs current %+.3f), Regression AC1 %+.3f (vs current %+.3f) (version %s)",
            sv.label, fb_d, fb_d_cur, acc_d, acc_d_cur, sv.version_id), level = "info"})
        end

        -- Programmatic selection: pick the better strategy version
        -- Uses objective_config to support parameterized optimization objectives
        local function score_strategy(sv)
          -- Hard veto checks (objective-specific thresholds)
          if objective_config.hard_veto_alignment and regression_available then
            local align_d = sv.acc_deltas and sv.acc_deltas.alignment or -999
            if align_d < objective_config.hard_veto_alignment then return -999 end
          end
          if objective_config.hard_veto_accuracy and regression_available then
            local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or -999
            if acc_d < objective_config.hard_veto_accuracy then return -999 end
          end
          -- Primary metric always comes from fb_deltas
          local primary_d = sv.fb_deltas and sv.fb_deltas[objective_config.primary_metric] or -999
          local score = primary_d * (objective_config.primary_weight or 1.0)
          -- Secondary metric: source is fb_deltas unless secondary_source == "acc"
          if objective_config.secondary_metric and objective_config.secondary_weight then
            local sec_source = (objective_config.secondary_source == "acc")
              and sv.acc_deltas or sv.fb_deltas
            local sec_d = sec_source and sec_source[objective_config.secondary_metric] or -999
            if sec_d > -999 then
              score = score + sec_d * objective_config.secondary_weight
            end
          end
          return score
        end

        local best_sv = strategy_versions[1]
        local best_sv_score = score_strategy(best_sv)
        for i = 2, #strategy_versions do
          local sv = strategy_versions[i]
          local sv_score = score_strategy(sv)
          -- Tie within 0.005: prefer Strategy A (lower risk)
          if sv_score > best_sv_score + 0.005 then
            best_sv = sv
            best_sv_score = sv_score
          end
        end

        local selection_reason
        local scores_str = {}
        for _, sv in ipairs(strategy_versions) do
          table.insert(scores_str, string.format("%s=%.3f", sv.label, score_strategy(sv)))
        end

        if best_sv_score <= -999 then
          selection_reason = string.format(
            "scores: %s -> no viable synthesis strategy",
            table.concat(scores_str, ", "))
          diag("Strategy selection skipped — " .. selection_reason)
          Human.notify({message = string.format(
            "  No viable synthesis strategy selected — %s",
            selection_reason), level = "warning"})
        else
          if #strategy_versions == 1 then
            selection_reason = string.format("only Strategy %s produced a version", best_sv.label)
          else
            selection_reason = string.format("scores: %s -> selected %s",
              table.concat(scores_str, ", "), best_sv.label)
          end

          diag(string.format("Strategy selection: %s (score=%.3f) — %s",
            best_sv.label, best_sv_score, selection_reason))
          Human.notify({message = string.format(
            "  Selected Strategy %s (score=%.3f) — %s",
            best_sv.label, best_sv_score, selection_reason), level = "info"})

          -- Set final version to winner
          final_version_id = best_sv.version_id
          final_done_reason = best_sv.done_reason or ""
          selected_strategy = best_sv.label
          synth_reasoning_parts = best_sv.reasoning or {}

          -- Store eval results for the winner (avoids re-evaluation later)
          synthesis_eval_results = {
            fb_metrics = best_sv.fb_metrics,
            acc_metrics = best_sv.acc_metrics,
            fb_cost_per_item = best_sv.fb_cost_per_item,
            acc_cost_per_item = best_sv.acc_cost_per_item,
            fb_deltas = best_sv.fb_deltas,
            acc_deltas = best_sv.acc_deltas,
            fb_deltas_vs_current = best_sv.fb_deltas_vs_current,
            acc_deltas_vs_current = best_sv.acc_deltas_vs_current,
            fb_rca = best_sv.fb_rca or {},
            acc_rca = best_sv.acc_rca or {},
            fb_eval_id = best_sv.fb_eval_id,
            acc_eval_id = best_sv.acc_eval_id,
            strategy_versions = strategy_versions,
            selection_reason = selection_reason
          }
        end
      end
      end -- do block for dual-strategy synthesis
      ::after_synthesis::
      -- Fallback if synthesis produced no version
      if not final_version_id then
        if #succeeded > 0 then
          Human.notify({message = "  Synthesis failed — falling back to best succeeded hypothesis", level = "warning"})
          table.sort(succeeded, function(a, b)
            return (a.fb_deltas and a.fb_deltas.alignment or 0) > (b.fb_deltas and b.fb_deltas.alignment or 0)
          end)
          final_version_id = succeeded[1].version_id
          final_done_reason = succeeded[1].done_reason or ""
          final_is_synthesis = false
        else
          -- No succeeded hypotheses AND synthesis failed — record as failed cycle
          Human.notify({message = string.format(
            "Cycle %d — No synthesis produced and no hypothesis succeeded", cycle), level = "info"})
          consecutive_failed_cycles = consecutive_failed_cycles + 1
          consecutive_stagnant_cycles = consecutive_stagnant_cycles + 1

          table.sort(submitted_versions, function(a, b)
            local a_fb = a.fb_deltas and a.fb_deltas.alignment or -999
            local b_fb = b.fb_deltas and b.fb_deltas.alignment or -999
            return a_fb > b_fb
          end)
          local best = submitted_versions[1]

          local cycle_log = {
            iteration = cycle,
            score_version_id = best and best.version_id or nil,
            done_reason = best and best.done_reason or "",
            regression_metrics = best and best.acc_metrics or nil,
            recent_metrics = best and best.fb_metrics or nil,
            regression_cost_per_item = best and best.acc_cost_per_item or nil,
            recent_cost_per_item = best and best.fb_cost_per_item or nil,
            regression_deltas = best and best.acc_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0},
            recent_deltas = best and best.fb_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0},
            accepted = false,
            num_candidates = #submitted_versions,
            exploration_results = submitted_versions
          }
          table.insert(iterations, cycle_log)
          cycle_recorded = true
          State.set("iterations", iterations)

          if best and best.fb_rca then State.set("last_recent_rca", best.fb_rca) end
          if best and best.acc_rca then State.set("last_regression_rca", best.acc_rca) end

          -- Compact history even on failed cycles
          if cycle < max_cycles then
            code_editor.clear_history()
            diag(string.format(
              "Cycle %d (failed) editor history cleared; state summary retained",
              cycle))
          end

          if Stop.requested() then stop_reason = "user_stopped"; return "break_cycle" end
        end
      end

      -- ================================================================
      -- Evaluate the final synthesized version (if we have one)
      -- ================================================================
      if final_version_id then
        local b_fb_metrics, b_acc_metrics, b_fb_deltas, b_acc_deltas
        local b_fb_cost_per_item, b_acc_cost_per_item
        local b_fb_deltas_vs_current, b_acc_deltas_vs_current
        local b_fb_rca, b_acc_rca
        local b_fb_eval_id, b_acc_eval_id

        -- Reuse pre-computed eval results from dual-strategy selection
        if synthesis_eval_results then
          b_fb_metrics = synthesis_eval_results.fb_metrics
          b_acc_metrics = synthesis_eval_results.acc_metrics
          b_fb_cost_per_item = synthesis_eval_results.fb_cost_per_item
          b_acc_cost_per_item = synthesis_eval_results.acc_cost_per_item
          b_fb_deltas = synthesis_eval_results.fb_deltas
          b_acc_deltas = synthesis_eval_results.acc_deltas
          b_fb_deltas_vs_current = synthesis_eval_results.fb_deltas_vs_current
          b_acc_deltas_vs_current = synthesis_eval_results.acc_deltas_vs_current
          b_fb_rca = synthesis_eval_results.fb_rca
          b_acc_rca = synthesis_eval_results.acc_rca
          b_fb_eval_id = synthesis_eval_results.fb_eval_id
          b_acc_eval_id = synthesis_eval_results.acc_eval_id
          diag("Using pre-computed eval results from dual-strategy selection")
        elseif not final_is_synthesis and #succeeded == 1 then
          b_fb_metrics = succeeded[1].fb_metrics
          b_acc_metrics = succeeded[1].acc_metrics
          b_fb_cost_per_item = succeeded[1].fb_cost_per_item
          b_acc_cost_per_item = succeeded[1].acc_cost_per_item
          b_fb_deltas = succeeded[1].fb_deltas
          b_acc_deltas = succeeded[1].acc_deltas
          b_fb_deltas_vs_current = succeeded[1].fb_deltas_vs_current
          b_acc_deltas_vs_current = succeeded[1].acc_deltas_vs_current
          b_fb_rca = succeeded[1].fb_rca or {}
          b_acc_rca = succeeded[1].acc_rca or {}
          b_fb_eval_id = succeeded[1].fb_eval_id
          b_acc_eval_id = succeeded[1].acc_eval_id
        else
          -- Need fresh evals for combined version
          diag(string.format("Dispatching synthesis eval for version %s", tostring(final_version_id)))
          status_msg(string.format("Cycle %d/%d — evaluating synthesis result", cycle, max_cycles))
          Human.notify({message = "  Evaluating final version...", level = "info"})
          local b_batch = {}
          local final_dataset_id = nil
          if regression_available then
            final_dataset_id = ensure_regression_dataset_for_version(final_version_id)
            table.insert(b_batch, {
              scorecard_name = params.scorecard,
              score_name = params.score,
              evaluation_type = "accuracy",
              dataset_id = final_dataset_id,
              n_samples = params.max_samples or 100,
              version = final_version_id,
              baseline = regression_baseline_id,
              current_baseline = last_accepted_acc_eval_id,
              notes = string.format("Cycle %d synthesis — deterministic regression dataset: %s", cycle, trunc(final_done_reason or "", 500))
            })
          end
          table.insert(b_batch, {
            scorecard_name = params.scorecard,
            score_name = params.score,
            evaluation_type = "feedback",
            days = params.days,
            max_feedback_items = params.max_samples or 100,
            sampling_mode = "newest",
            version = final_version_id,
            baseline = recent_baseline_id,
            current_baseline = last_accepted_fb_eval_id,
            wait = true,
            notes = string.format("Cycle %d synthesis — recent feedback items: %s", cycle, trunc(final_done_reason or "", 500))
          })

          local b_results = call_plexus_tool("plexus_evaluation_run", {batch = b_batch})
          record_evaluation_batch_costs(b_results, string.format("cycle_%d_final_synthesis_eval", cycle))
          diag("Synthesis eval batch returned")

          local b_evals_per = regression_available and 2 or 1
          if regression_available then
            local b_acc_r = b_results and b_results[1]
            if b_acc_r and (b_acc_r.id or b_acc_r.evaluation_id) then
              b_acc_metrics = extract_metrics(b_acc_r)
              b_acc_cost_per_item = extract_cost_per_item(b_acc_r)
              b_acc_deltas = calculate_deltas(b_acc_metrics, regression_baseline_metrics)
              b_acc_deltas_vs_current = calculate_deltas(b_acc_metrics, last_accepted_acc_metrics)
              b_acc_rca = enrich_rca(b_acc_r.root_cause or {})
              b_acc_eval_id = b_acc_r.id or b_acc_r.evaluation_id
            end
            diag(string.format("Regression metrics extracted: %s", tostring(b_acc_eval_id)))
          end
          local b_fb_r = b_results and b_results[b_evals_per]
          if b_fb_r and (b_fb_r.id or b_fb_r.evaluation_id) then
            b_fb_metrics = extract_metrics(b_fb_r)
            b_fb_cost_per_item = extract_cost_per_item(b_fb_r)
            b_fb_deltas = calculate_deltas(b_fb_metrics, recent_baseline_metrics)
            b_fb_deltas_vs_current = calculate_deltas(b_fb_metrics, last_accepted_fb_metrics)
            b_fb_rca = enrich_rca(b_fb_r.root_cause or {})
            b_fb_eval_id = b_fb_r.id or b_fb_r.evaluation_id
          end
          diag(string.format("Recent metrics extracted: %s", tostring(b_fb_eval_id)))
        end

        b_fb_deltas = b_fb_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0}
        b_acc_deltas = b_acc_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0}
        b_fb_deltas_vs_current = b_fb_deltas_vs_current or {alignment = 0, accuracy = 0, precision = 0, recall = 0}
        b_acc_deltas_vs_current = b_acc_deltas_vs_current or {alignment = 0, accuracy = 0, precision = 0, recall = 0}
        b_fb_rca = b_fb_rca or {}
        b_acc_rca = b_acc_rca or {}

        Human.notify({message = string.format(
          "  Final eval: Recent AC1 %+.3f (vs original), %+.3f (vs current); Regression AC1 %+.3f (vs original), %+.3f (vs current)%s",
          b_fb_deltas.alignment, b_fb_deltas_vs_current.alignment,
          b_acc_deltas.alignment, b_acc_deltas_vs_current.alignment,
          final_is_synthesis and " [SYNTHESIS]" or ""
        ), level = "info"})

        -- ================================================================
        -- REVIEW (wrapped in pcall for crash diagnosis)
        -- ================================================================
        diag("Starting review phase")
        local iter_accuracy_ok = b_acc_metrics ~= nil

        local disqualified = false
        local disqualification_reason = nil
        if not b_fb_metrics then
          disqualified = true
          disqualification_reason = "missing_recent_metrics"
        elseif regression_available and b_acc_deltas.alignment < -0.02 then
          disqualified = true
          disqualification_reason = string.format("regression_regression_vs_baseline_%.3f", b_acc_deltas.alignment)
        elseif b_fb_deltas.alignment < -0.02 then
          disqualified = true
          disqualification_reason = string.format("recent_regression_vs_baseline_%.3f", b_fb_deltas.alignment)
        end

        -- Dual-threshold: also check regression vs last accepted version
        -- Uses looser threshold (-0.05 vs -0.02) to account for evaluation noise
        if not disqualified and last_accepted_fb_metrics then
          local vs_accepted_fb = calculate_deltas(b_fb_metrics or recent_baseline_metrics, last_accepted_fb_metrics)
          local vs_accepted_acc = regression_available and last_accepted_acc_metrics and b_acc_metrics
            and calculate_deltas(b_acc_metrics, last_accepted_acc_metrics) or nil

          local accepted_regression_threshold = -0.05
          if vs_accepted_acc and vs_accepted_acc.alignment < accepted_regression_threshold then
            disqualified = true
            disqualification_reason = string.format("regression_regression_vs_accepted_%.3f", vs_accepted_acc.alignment)
          elseif vs_accepted_fb.alignment < accepted_regression_threshold then
            disqualified = true
            disqualification_reason = string.format("recent_regression_vs_accepted_%.3f", vs_accepted_fb.alignment)
          end
        end
        diag(string.format("disqualified=%s reason=%s", tostring(disqualified), tostring(disqualification_reason)))

        local accept = false

        if disqualified then
          Human.notify({message = string.format(
            "Cycle %d: version disqualified — skipping review", cycle), level = "warning"})
        else
          Tool.reset()
          reviewer.clear_history()
          -- Inject ALL prior cycles' synthesis reasoning + accumulated lessons
          do
            local prior_insights = State.get("cycle_insights") or {}
            local reasoning_parts = {}
            for _, ci in ipairs(prior_insights) do
              if ci.synthesis_reasoning and #ci.synthesis_reasoning > 0 then
                table.insert(reasoning_parts, string.format(
                  "--- Cycle %d synthesis reasoning ---\n%s", ci.cycle, ci.synthesis_reasoning))
              end
            end
            if #reasoning_parts > 0 then
              reviewer.history:add({
                role = "system",
                content = "=== SYNTHESIS REASONING FROM ALL PRIOR CYCLES ===\n"
                  .. table.concat(reasoning_parts, "\n\n")
                  .. "\n=== END SYNTHESIS REASONING ==="
              })
              Human.notify({message = string.format(
                "    [reviewer context] Injected %d cycles of synthesis reasoning",
                #reasoning_parts), level = "info"})
            end
            local acc_lessons = State.get("accumulated_lessons")
            if has_text(acc_lessons) then
              reviewer.history:add({
                role = "system",
                content = "=== ACCUMULATED LESSONS (LLM-synthesized summary) ===\n"
                  .. trunc(acc_lessons, 3000)
                  .. "\n=== END ACCUMULATED LESSONS ==="
              })
            end
          end
          diag("Building review context...")
          local review_msg = build_review_context({
            iteration = cycle,
            done_reason = final_done_reason,
            new_version_id = final_version_id,
            prior_version_id = last_accepted_version_id,
            fb_metrics = b_fb_metrics or recent_baseline_metrics,
            acc_metrics = iter_accuracy_ok and b_acc_metrics or nil,
            baseline_fb_ac1 = recent_baseline_metrics.alignment,
            baseline_acc_ac1 = regression_baseline_metrics and regression_baseline_metrics.alignment or 0,
            candidates = submitted_versions
          })
          diag(string.format("Review msg length: %d chars, invoking reviewer...", #review_msg))
          local review_ok, review_err = pcall(function()
            reviewer({message = review_msg})
          end)
          if not review_ok then
            diag(string.format("REVIEWER CRASHED: %s", tostring(review_err)))
          else
            diag("Reviewer returned")
          end

          -- Extract reviewer assessment (advisory only — metrics determine acceptance)
          local review_done = Tool.last_call("done")
          if review_done then
            local reason_field = tostring(tool_call_arg(review_done, "reason", ""))
            local decision_field = tostring(tool_call_arg(review_done, "decision", ""))
            Human.notify({message = string.format(
              "  Reviewer assessment: %s — %s",
              decision_field,
              has_text(reason_field) and reason_field or "(no reason)"
            ), level = "info"})
          end

          -- Acceptance is purely metric-based: carry forward unless metrics genuinely regressed.
          -- A neutral result (no improvement) is still carried forward — we accumulate
          -- many small changes across cycles, only rejecting when things actually got worse.
          local regression_threshold = -0.02
          local accepted_regression_threshold = -0.05
          local acc_regressed = regression_available and iter_accuracy_ok and (b_acc_deltas.alignment < regression_threshold)
          local fb_regressed = b_fb_deltas.alignment < regression_threshold

          -- Also check regression vs last accepted version (prevents sliding backward)
          local acc_regressed_vs_accepted = false
          local fb_regressed_vs_accepted = false
          if last_accepted_fb_metrics then
            local vs_accepted_fb = calculate_deltas(b_fb_metrics, last_accepted_fb_metrics)
            fb_regressed_vs_accepted = vs_accepted_fb.alignment < accepted_regression_threshold
            if regression_available and iter_accuracy_ok and last_accepted_acc_metrics then
              local vs_accepted_acc = calculate_deltas(b_acc_metrics, last_accepted_acc_metrics)
              acc_regressed_vs_accepted = vs_accepted_acc.alignment < accepted_regression_threshold
            end
          end

          local decision_str, decision_reason
          if acc_regressed then
            decision_str = "REJECTED"
            decision_reason = string.format("accuracy regressed vs baseline by %.4f", math.abs(b_acc_deltas.alignment))
            status_msg(string.format("Cycle %d/%d — REJECTED: %s", cycle, max_cycles, decision_reason))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          elseif fb_regressed then
            decision_str = "REJECTED"
            decision_reason = string.format("feedback regressed vs baseline by %.4f", math.abs(b_fb_deltas.alignment))
            status_msg(string.format("Cycle %d/%d — REJECTED: %s", cycle, max_cycles, decision_reason))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          elseif acc_regressed_vs_accepted then
            local vs_acc = calculate_deltas(b_acc_metrics, last_accepted_acc_metrics)
            decision_str = "REJECTED"
            decision_reason = string.format("accuracy regressed vs last accepted by %.4f", math.abs(vs_acc.alignment))
            status_msg(string.format("Cycle %d/%d — REJECTED: %s", cycle, max_cycles, decision_reason))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          elseif fb_regressed_vs_accepted then
            local vs_fb = calculate_deltas(b_fb_metrics, last_accepted_fb_metrics)
            decision_str = "REJECTED"
            decision_reason = string.format("feedback regressed vs last accepted by %.4f", math.abs(vs_fb.alignment))
            status_msg(string.format("Cycle %d/%d — REJECTED: %s", cycle, max_cycles, decision_reason))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          else
            accept = true
            local fb_improved = b_fb_deltas.alignment > 0.005
            if fb_improved then
              decision_str = "ACCEPTED"
              decision_reason = string.format("feedback improved by %.4f", b_fb_deltas.alignment)
              status_msg(string.format("Cycle %d/%d — ACCEPTED: %s", cycle, max_cycles, decision_reason))
              Human.notify({message = string.format("Cycle %d ACCEPTED: %s", cycle, decision_reason), level = "info"})
            else
              decision_str = "CARRIED"
              decision_reason = string.format("neutral result (Recent %+.4f)", b_fb_deltas.alignment)
              status_msg(string.format("Cycle %d/%d — CARRIED: %s", cycle, max_cycles, decision_reason))
              Human.notify({message = string.format("Cycle %d CARRIED: %s — carrying forward to accumulate improvements", cycle, decision_reason), level = "info"})
            end
            last_accepted_version_id = final_version_id
            last_accepted_fb_metrics = b_fb_metrics or last_accepted_fb_metrics
            last_accepted_fb_eval_id = b_fb_eval_id or last_accepted_fb_eval_id
            if regression_available and b_acc_metrics then
              last_accepted_acc_metrics = b_acc_metrics
            end
            if regression_available and b_acc_eval_id then
              last_accepted_acc_eval_id = b_acc_eval_id
            end
            -- Persist so a continuation run can restore the last-accepted state
            State.set("last_accepted_version_id",  last_accepted_version_id)
            active_rubric_memory_score_version_id = last_accepted_version_id
            State.set("active_rubric_memory_score_version_id", active_rubric_memory_score_version_id)
            State.set("last_accepted_fb_metrics",  last_accepted_fb_metrics)
            State.set("last_accepted_fb_eval_id",  last_accepted_fb_eval_id)
            State.set("last_accepted_acc_metrics", last_accepted_acc_metrics)
            State.set("last_accepted_acc_eval_id", last_accepted_acc_eval_id)
          end
          diag(string.format(
            "Cycle %d %s (version=%s): Recent AC1=%.3f (%+.3f vs original), Regression AC1=%.3f (%+.3f vs original) — %s",
            cycle, decision_str or "?", tostring(final_version_id),
            b_fb_metrics and b_fb_metrics.alignment or 0, b_fb_deltas.alignment,
            b_acc_metrics and b_acc_metrics.alignment or 0, b_acc_deltas.alignment,
            decision_reason or ""))
        end

        -- Build dual synthesis log for cycle record
        local dual_synthesis_log = nil
        if synthesis_eval_results and synthesis_eval_results.strategy_versions then
          dual_synthesis_log = {selection_reason = synthesis_eval_results.selection_reason}
          for _, sv in ipairs(synthesis_eval_results.strategy_versions) do
            dual_synthesis_log["strategy_" .. string.lower(sv.label)] = {
              version_id = sv.version_id,
              recent_delta = sv.fb_deltas and sv.fb_deltas.alignment or 0,
              regression_delta = sv.acc_deltas and sv.acc_deltas.alignment or 0,
              done_reason = trunc(sv.done_reason or "", 500)
            }
          end
        end

        -- Capture contradiction trend metrics for this cycle
        local contra_snap = State.get("known_contradictions") or {}
        local contra_pct = nil
        local gap_pct    = nil
        if contra_snap.total_items_analyzed and contra_snap.total_items_analyzed > 0 then
          if contra_snap.contradictions_found then
            contra_pct = math.floor(100 * contra_snap.contradictions_found / contra_snap.total_items_analyzed)
          end
          if contra_snap.policy_gap_count then
            gap_pct = math.floor(100 * contra_snap.policy_gap_count / contra_snap.total_items_analyzed)
          end
        end

        -- Store cycle log
        local cycle_log = {
          iteration = cycle,
          score_version_id = final_version_id,
          regression_evaluation_id = b_acc_eval_id,
          recent_evaluation_id = b_fb_eval_id,
          done_reason = final_done_reason,
          regression_metrics = b_acc_metrics,
          recent_metrics = b_fb_metrics,
          regression_cost_per_item = b_acc_cost_per_item,
          recent_cost_per_item = b_fb_cost_per_item,
          regression_deltas = b_acc_deltas,
          recent_deltas = b_fb_deltas,
          regression_deltas_vs_current = b_acc_deltas_vs_current,
          recent_deltas_vs_current = b_fb_deltas_vs_current,
          accepted = accept,
          disqualified = disqualified,
          disqualification_reason = disqualification_reason,
          is_synthesis = final_is_synthesis,
          num_candidates = #submitted_versions,
          exploration_results = submitted_versions,
          synthesis_reasoning = table.concat(synth_reasoning_parts, "\n---\n"),
          synthesis_strategy = selected_strategy,
          dual_synthesis = dual_synthesis_log,
          contradictions_pct = contra_pct,
          policy_gap_pct     = gap_pct,
        }
        table.insert(iterations, cycle_log)
        cycle_recorded = true

        -- Update cross-cycle item recurrence tracker from the winning synthesis RCA
        local fb_item_class = (b_fb_rca and type(b_fb_rca._all_item_classifications) == "table")
          and b_fb_rca._all_item_classifications or {}
        -- Build hypothesis label: synthesis strategy + done_reason, or best candidate name
        local recurrence_hyp_label
        if final_is_synthesis then
          recurrence_hyp_label = string.format("Synthesis-%s: %s",
            selected_strategy or "?", trunc(final_done_reason or "", 80))
        elseif succeeded and #succeeded > 0 and succeeded[1].hypothesis then
          recurrence_hyp_label = string.format("%s: %s",
            succeeded[1].hypothesis.name or "?",
            trunc(succeeded[1].hypothesis.description or final_done_reason or "", 60))
        else
          recurrence_hyp_label = trunc(final_done_reason or "", 80)
        end
        local item_recurrence = State.get("item_recurrence") or {}
        item_recurrence = update_item_recurrence(cycle, fb_item_class, item_recurrence, {
          hypothesis_name = recurrence_hyp_label,
          done_reason     = trunc(final_done_reason or "", 100),
          version_id      = final_version_id,
        })
        State.set("item_recurrence", item_recurrence)
        local o_count, p_count, f_count, e_count = 0, 0, 0, 0
        for _, e in pairs(item_recurrence) do
          if e.pattern == "OSCILLATING" then o_count = o_count + 1
          elseif e.pattern == "PERSISTENT"  then p_count = p_count + 1
          elseif e.pattern == "FLIP_FLOP"   then f_count = f_count + 1
          else e_count = e_count + 1 end
        end
        diag(string.format("Item recurrence tracker (cycle %d): %d total (%d oscillating, %d persistent, %d flip-flop, %d emerging), fb_item_class=%d",
          cycle, o_count + p_count + f_count + e_count, o_count, p_count, f_count, e_count, #fb_item_class))

        -- Run per-item LLM diagnosis for repeat offenders (PERSISTENT/OSCILLATING, wrong_count >= 3)
        if p_count + o_count > 0 then
          status_msg(string.format("Cycle %d/%d — diagnosing %d repeat offenders", cycle, max_cycles, p_count + o_count))
          local rod = {}
          pcall(function()
            rod = analyze_repeat_offenders(cycle, item_recurrence, iterations) or {}
          end)
          if #rod > 0 then
            Human.notify({message = string.format(
              "Cycle %d — repeat-offender diagnoses (%d items): %s",
              cycle, #rod,
              table.concat((function()
                local labels = {}
                for _, d in ipairs(rod) do
                  local id_label = has_text(d.external_id) and d.external_id or d.item_id
                  table.insert(labels, string.format("%s=%s[%s]", id_label, d.diagnosis, d.confidence))
                end
                return labels
              end)(), ", ")),
              level = "info"})
          end
        end

        diag("Saving iterations to state...")
        State.set("iterations", iterations)
        diag("Iterations saved")

        -- Concise cycle summary
        local accepted_count = 0
        local carried_count = 0
        local rejected_count = 0
        local skipped_count = 0
        for _, it in ipairs(iterations) do
          if it.skip_reason then skipped_count = skipped_count + 1
          elseif it.accepted then
            local fb_d = it.recent_deltas and it.recent_deltas.alignment or 0
            if fb_d > 0.005 then accepted_count = accepted_count + 1
            else carried_count = carried_count + 1 end
          else rejected_count = rejected_count + 1 end
        end
        local status_str
        if not accept then
          status_str = "REJECTED"
        elseif b_fb_deltas.alignment > 0.005 then
          status_str = "ACCEPTED"
        else
          status_str = "CARRIED"
        end
        local synthesis_note = final_is_synthesis and " [SYNTHESIS]" or ""
        local reason_short = has_text(final_done_reason) and (": " .. trunc(final_done_reason, 500)) or ""
        Human.notify({message = string.format(
          "┌─ Cycle %d/%d %s%s (%d succeeded, %d failed)%s\n│  Recent AC1: %.3f (%+.3f vs original, %+.3f vs current)  Regression AC1: %.3f (%+.3f vs original, %+.3f vs current)\n│  Running: %d accepted, %d carried (neutral), %d rejected, %d skipped\n└─ Current base: %s",
          cycle, max_cycles, status_str, synthesis_note, #succeeded, #failed, reason_short,
          b_fb_metrics and b_fb_metrics.alignment or 0, b_fb_deltas.alignment, b_fb_deltas_vs_current.alignment,
          b_acc_metrics and b_acc_metrics.alignment or 0, b_acc_deltas.alignment, b_acc_deltas_vs_current.alignment,
          accepted_count, carried_count, rejected_count, skipped_count,
          tostring(last_accepted_version_id)
        ), level = "info"})

        -- Update running state for next cycle
        if accept then
          consecutive_failed_cycles = 0  -- reset whenever we carry forward (even neutral)
          -- Only reset early-stopping counter on genuine improvement; CARRIED still counts as stagnant
          if b_fb_deltas.alignment >= 0.005 then
            consecutive_stagnant_cycles = 0
          else
            consecutive_stagnant_cycles = consecutive_stagnant_cycles + 1  -- CARRIED = stagnant
          end
          if iter_accuracy_ok then
            State.set("regression_baseline_metrics", b_acc_metrics)
            State.set("regression_baseline_cost_per_item", b_acc_cost_per_item)
          end
          State.set("recent_baseline_metrics", b_fb_metrics)
          State.set("recent_baseline_cost_per_item", b_fb_cost_per_item)
          State.set("current_regression_baseline_id", last_accepted_acc_eval_id)
          State.set("current_recent_baseline_id", last_accepted_fb_eval_id)
        else
          -- Only count genuine regressions toward the failure plateau counter
          consecutive_failed_cycles = consecutive_failed_cycles + 1
          consecutive_stagnant_cycles = consecutive_stagnant_cycles + 1  -- REJECTED = stagnant
        end
        diag("Saving RCA to state...")
        State.set("last_regression_rca", b_acc_rca)
        State.set("last_recent_rca", b_fb_rca)
        diag("State saved, checking exit conditions...")

        -- Check if target accuracy was reached (early exit)
        if accept and b_fb_metrics and b_fb_metrics.alignment >= params.target_accuracy then
          Human.notify({
            message = string.format(
              "Target alignment reached: recent AC1=%.3f >= %.3f — stopping early.",
              b_fb_metrics.alignment, params.target_accuracy),
            level = "info"
          })
          stop_reason = "target_reached"
          return "break_cycle"
        end

        -- Check for stop request
        if Stop.requested() then
          stop_reason = "user_stopped"
          return "break_cycle"
        end
        -- ================================================================
        -- End-of-cycle history compaction: replace full conversation with
        -- a compact summary to prevent context overflow in later cycles.
        -- build_planning_context() reconstructs the full optimization history
        -- from the iterations array, so the summary is supplementary context.
        -- ================================================================
        if cycle < max_cycles then
          local summary_parts = {}
          table.insert(summary_parts, string.format("=== CYCLE %d SUMMARY ===", cycle))
          table.insert(summary_parts, string.format("Status: %s", status_str))
          table.insert(summary_parts, string.format(
            "Feedback AC1: %.3f (%+.3f vs baseline)  Accuracy AC1: %.3f (%+.3f vs baseline)",
            b_fb_metrics and b_fb_metrics.alignment or 0, b_fb_deltas.alignment,
            b_acc_metrics and b_acc_metrics.alignment or 0, b_acc_deltas.alignment))

          if submitted_versions and #submitted_versions > 0 then
            table.insert(summary_parts, "Hypotheses tested:")
            for _, sv in ipairs(submitted_versions) do
              local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
              local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
              table.insert(summary_parts, string.format(
                "  %d. %s: FB %+.3f, ACC %+.3f — %s",
                sv.index or 0, sv.hypothesis and sv.hypothesis.name or "?",
                fb_d, acc_d,
                trunc(sv.done_reason or (sv.hypothesis and sv.hypothesis.description) or "", 2000)))
            end
          end

          if has_text(final_done_reason) then
            table.insert(summary_parts, "Synthesis: " .. trunc(final_done_reason, 2000))
          end
          table.insert(summary_parts, string.format("Current base version: %s",
            tostring(last_accepted_version_id)))

          code_editor.clear_history()
          diag(string.format("Cycle %d editor history cleared; state summary retained (%d chars)",
            cycle, #table.concat(summary_parts, "\n")))
          end

        diag(string.format("Cycle %d complete, entering next iteration", cycle))
      end  -- end of if final_version_id (synthesis produced a version to evaluate)


      -- ================================================================
      -- PER-CYCLE REPORT: diagnosis + prescription + planning analysis
      -- Runs after EVERY cycle where hypotheses were submitted and evaluated,
      -- including cycles where all hypotheses failed (no synthesis produced).
      -- Produces a structured report for the user, then planning notes
      -- for hypothesis generation in the next cycle.
      -- ================================================================
      if #iterations > 0 then
        status_msg(string.format("Cycle %d/%d — generating per-cycle report", cycle, max_cycles))
        Human.notify({message = string.format(
          "Cycle %d — generating per-cycle report...", cycle), level = "info"})

        local syn = {}
        local cur_iter = iterations[#iterations]
        local prior_insights = State.get("cycle_insights") or {}
        local known_contra = State.get("known_contradictions")

        table.insert(syn, string.format(
          "Analyze Cycle %d and produce exactly four sections in this order:\n"
          .. "## EXECUTIVE SUMMARY\n"
          .. "- Plain English only\n"
          .. "- Maximum 4 sentences total\n"
          .. "- Cover what improved or failed, the main blocker, and the next target\n\n"
          .. "## WHAT WORKED\n"
          .. "- Maximum 3 bullets\n"
          .. "- Each bullet must cite one concrete hypothesis result\n\n"
          .. "## WHAT FAILED\n"
          .. "- Maximum 3 bullets\n"
          .. "- Each bullet must name the blocker and why it matters\n\n"
          .. "## NEXT CYCLE TARGET\n"
          .. "- Maximum 3 bullets\n"
          .. "- Each bullet must name one specific next-cycle direction\n"
          .. "- No long paragraphs anywhere\n",
          cycle))

        table.insert(syn, string.format("\n=== CURRENT CYCLE %d RESULTS ===", cycle))
        if cur_iter and cur_iter.exploration_results and type(cur_iter.exploration_results) == "table" then
          for _, r in ipairs(cur_iter.exploration_results) do
            local r_fb_d = r.fb_deltas and r.fb_deltas.alignment or 0
            local r_acc_d = r.acc_deltas and r.acc_deltas.alignment or 0
            local hyp_label = r.hypothesis
              and (r.hypothesis.name .. ": " .. (r.hypothesis.description or ""))
              or ("Hypothesis " .. tostring(r.index))
            table.insert(syn, string.format(
              "- %s | Recent AC1 %+.3f | Regression AC1 %+.3f | %s | %s",
              hyp_label,
              r_fb_d,
              r_acc_d,
              r.succeeded and "PASS" or "FAIL",
              trunc(r.done_reason or "(no note)", 220)))
          end
        else
          table.insert(syn, "- No structured exploration results were recorded for this cycle.")
        end

        if #prior_insights > 0 then
          table.insert(syn, "\n=== PRIOR CYCLE SUMMARIES ===")
          for i = math.max(1, #prior_insights - 2), #prior_insights do
            local ci = prior_insights[i]
            if ci then
              table.insert(syn, string.format("Cycle %d executive summary: %s",
                ci.cycle, trunc(ci.executive_summary or ci.diagnosis_summary or "", 320)))
              if has_text(ci.prescription_summary) then
                table.insert(syn, string.format("Cycle %d next actions: %s",
                  ci.cycle, trunc(ci.prescription_summary, 220)))
              end
            end
          end
        end

        local compact_contra = build_compact_contradiction_summary(known_contra, 3)
        if has_text(compact_contra) then
          table.insert(syn, "\n=== CONTRADICTION SUMMARY ===")
          table.insert(syn, compact_contra)
        end

        if consecutive_failed_cycles >= 3 then
          table.insert(syn, string.format(
            "\n=== STAGNATION WARNING ===\n"
            .. "%d consecutive cycles failed to improve. Explicitly state whether the plateau looks like:\n"
            .. "- contradictory labels,\n"
            .. "- exhausted policy space,\n"
            .. "- structural/model limitations, or\n"
            .. "- an implementation miss worth refining.\n",
            consecutive_failed_cycles))
        end

        local syn_text = run_required_report_phase(
          cycle_analyst,
          "cycle_analyst",
          "cycle_executive_analysis",
          table.concat(syn, "\n"),
          function()
            cycle_analyst.clear_history()
            return 0
          end
        )

        local exec_summary = extract_markdown_section(syn_text, "## EXECUTIVE SUMMARY")

        -- ---- Call 2: Lab Report ----
        local lab_report = ""
        do
          local lr_parts = {}
          table.insert(lr_parts, string.format(
            "Write a concise lab report for Cycle %d of an optimization run.\n"
            .. "Audience: technical operators and the next optimizer run.\n"
            .. "HARD LIMIT: under 250 words total.\n"
            .. "Use only the sections below. No extra commentary.\n\n"
            .. "## LAB REPORT\n\n"
            .. "### What happened\n"
            .. "One line per hypothesis: name, change type (prompt/structural/model), "
            .. "FB AC1 delta, Regression AC1 delta, PASSED or FAILED.\n\n"
            .. "### Top error pattern still present\n"
            .. "1-2 sentences. The single most common remaining FP or FN pattern, with approximate count.\n\n"
            .. "### Next actions\n"
            .. "≤3 bullet points. Specific, operator-executable actions for the next cycle. "
            .. "Each: what exactly to try, why (evidence), expected impact.\n",
            cycle))
          table.insert(lr_parts, "\n=== CYCLE RESULTS ===\n")
          if cur_iter and cur_iter.exploration_results then
            for _, r in ipairs(cur_iter.exploration_results) do
              local fb_d = r.fb_deltas and r.fb_deltas.alignment or 0
              local acc_d = r.acc_deltas and r.acc_deltas.alignment or 0
              table.insert(lr_parts, string.format(
                "- %s: FB %+.3f  REG %+.3f  [%s]\n  %s",
                r.hypothesis and r.hypothesis.name or ("H"..tostring(r.index)),
                fb_d, acc_d, r.succeeded and "PASS" or "FAIL",
                trunc(r.done_reason or "", 300)))
            end
          end
          table.insert(lr_parts, "\n=== PLANNING ANALYSIS (context only) ===\n")
          table.insert(lr_parts, trunc(syn_text, 800))

          local lr_raw = run_required_report_phase(
            report_writer,
            "report_writer",
            "cycle_lab_report",
            table.concat(lr_parts, "\n"),
            function()
              report_writer.clear_history()
              return 0
            end
          )
          local _, hdr_end = lr_raw:find("## LAB REPORT\n", 1, true)
          if hdr_end then
            local stop = lr_raw:find("\n===", hdr_end + 1) or lr_raw:find("\n## ", hdr_end + 1)
            local raw = stop and lr_raw:sub(hdr_end + 1, stop - 1) or lr_raw:sub(hdr_end + 1)
            lab_report = (raw:match("^(.-)%s*$") or raw)
          else
            lab_report = lr_raw
          end
        end

        -- ---- Call 3: SME Agenda ----
        local sme_agenda = ""
        do
          local sme_parts = {}
          table.insert(sme_parts, string.format(
            "Write a short meeting agenda for domain experts (Subject Matter Experts).\n"
            .. "They are NOT technical. They do NOT know what AC1 means.\n\n"
            .. "Glossary (always apply):\n"
            .. "- \"Agent:\" in transcripts = the human call-center phone operator, NEVER an AI or software agent.\n"
            .. "- \"Customer:\" = the person calling in.\n"
            .. "- \"the evaluated score version\" = the specific score configuration being tested in this optimizer run.\n"
            .. "- Never write \"AI\" in your output. Say \"the evaluated score version\" or \"the score\".\n\n"
            .. "HARD LIMIT: max 3 agenda items. Under 200 words total.\n\n"
            .. "## SME AGENDA\n\n"
            .. "Format each item exactly as:\n\n"
            .. "### <short title of the decision>\n"
            .. "**Question:** <the specific decision SMEs need to make>\n"
            .. "**Examples:** (2-3 items, one per line, each citing a real item from the CANDIDATE ITEMS context)\n"
            .. "  - Item [<external_id>](<url>): score version said \"<prediction>\", reviewer labeled \"<correct>\". Transcript evidence: \"<quote from agent>\". Reviewer's edit comment: \"<comment>\".\n"
            .. "**Options:** (a) <option> (b) <option>\n"
            .. "**Impact:** ~<N> disputed reviews\n\n"
            .. "Hard rules:\n"
            .. "- Every Example MUST cite a real item by copying its markdown link verbatim from the CANDIDATE ITEMS context (the link block labeled \"link: [<id>](<url>)\"). Do NOT invent or omit item IDs.\n"
            .. "- Do NOT generalize across items. Each example describes ONE specific item concretely.\n"
            .. "- Never write \"AI\". Use \"the evaluated score version\" or \"the score\".\n"
            .. "- Only include items that REQUIRE a human policy decision.\n"
            .. "- No technical jargon, no model names, no metric names (no AC1, no accuracy percentages).\n"
            .. "- If there are no SME decisions needed, write exactly: (No SME decisions needed this cycle)\n",
            cycle))
          table.insert(sme_parts, "\n=== KEY FINDINGS FROM THIS CYCLE ===\n")
          table.insert(sme_parts, trunc(exec_summary, 300))
          table.insert(sme_parts, "\n\nTop patterns from planning analysis:\n")
          table.insert(sme_parts, trunc(
            table.concat({
              extract_markdown_section(syn_text, "## WHAT FAILED"),
              extract_markdown_section(syn_text, "## NEXT CYCLE TARGET")
            }, "\n"),
            600))

          local sme_raw = run_required_report_phase(
            report_writer,
            "report_writer",
            "cycle_sme_agenda",
            table.concat(sme_parts, "\n"),
            function()
              report_writer.clear_history()
              local agenda_items_ctx = _build_agenda_item_context(5)
              if has_text(agenda_items_ctx) then
                report_writer.history:add({role = "system", content = agenda_items_ctx})
                return #agenda_items_ctx
              end
              return 0
            end
          )
          local _, hdr_end = sme_raw:find("## SME AGENDA\n", 1, true)
          if hdr_end then
            local stop = sme_raw:find("\n===", hdr_end + 1) or sme_raw:find("\n## ", hdr_end + 1)
            local raw = stop and sme_raw:sub(hdr_end + 1, stop - 1) or sme_raw:sub(hdr_end + 1)
            sme_agenda = (raw:match("^(.-)%s*$") or raw)
          else
            sme_agenda = sme_raw
          end
        end
        local raw_cycle_sme_agenda = sme_agenda
        local cycle_gate_context = table.concat({
          "Cycle " .. tostring(cycle) .. " SME agenda",
          "Executive summary: " .. trunc(exec_summary, 500),
          "Planning analysis: " .. trunc(syn_text, 900)
        }, "\n")
        sme_agenda = gate_sme_agenda(
          raw_cycle_sme_agenda,
          "cycle_" .. tostring(cycle) .. "_sme_agenda",
          cycle_gate_context
        )

        -- Backward-compat field: exec_summary doubles as the "diagnosis" for older dashboard code
        local diag_summary  = exec_summary
        local presc_summary = ""
        -- Extract "Next actions" from lab report as prescription fallback
        do
          local _, na_end = lab_report:find("### Next actions\n", 1, true)
          if na_end then presc_summary = trunc(lab_report:sub(na_end + 1), 500) end
        end

        -- Display notifications — one per section
        if has_text(exec_summary) then
          Human.notify({message = string.format(
            "=== Cycle %d — Executive Summary ===\n\n%s", cycle, exec_summary), level = "info"})
        end
        if has_text(lab_report) then
          Human.notify({message = string.format(
            "=== Cycle %d — Lab Report ===\n\n%s", cycle, lab_report), level = "info"})
        end
        if has_text(sme_agenda) then
          Human.notify({message = string.format(
            "=== Cycle %d — SME Agenda ===\n\n%s", cycle, sme_agenda), level = "info"})
        end

        -- ---- Call 4: Per-cycle SME Worksheet ----
        do
          local cycle_suspected = {}
          local cycle_pairs = {}
          local cycle_rod = State.get("repeat_offender_diagnoses") or {}
          pcall(function()
            local ir = State.get("item_recurrence") or {}
            cycle_suspected = detect_suspected_mislabels(iterations, ir) or {}
            cycle_pairs     = build_contrasting_pairs(iterations, ir) or {}
          end)

          if #cycle_suspected > 0 or #cycle_pairs > 0 or #cycle_rod > 0 then
            Human.notify({message = string.format(
              "Cycle %d — SME Worksheet signals: %d suspected mislabels, %d contrasting pairs, %d repeat-offender diagnoses",
              cycle, #cycle_suspected, #cycle_pairs, #cycle_rod), level = "info"})

            local ws_parts = {}
            table.insert(ws_parts, string.format(
              "=== SME WORKSHEET (Cycle %d) ===\n", cycle))
            table.insert(ws_parts,
              "\nWrite the cycle SME Worksheet. Same format as the end-of-run worksheet.\n"
              .. "Name items by external_id. Quote transcript evidence verbatim.\n"
              .. "Use the REPEAT-OFFENDER DIAGNOSES section as the primary source for mislabel candidates.\n"
              .. "Items with diagnosis=mislabel and confidence=high are your top suspects — present them first.\n"
              .. "Items with diagnosis=contradictory_rule or recommended_action=accept_ceiling should go\n"
              .. "in 'Policy questions' with the SME_QUESTION text from the diagnosis.\n"
              .. "Sections: Suspected mislabels / Policy questions / Items still in play.\n"
              .. "Skip any section whose input is empty. Plain English; no metric names.\n")

            local ws_raw = run_required_report_phase(
              report_writer,
              "report_writer",
              string.format("cycle_%d_sme_worksheet", cycle),
              table.concat(ws_parts, "\n"),
              function()
                report_writer.clear_history()
                local p = {}

                -- Primary: repeat-offender diagnoses (LLM-produced per-item reasoning)
                if #cycle_rod > 0 then
                  local rod_json = "[]"
                  pcall(function() rod_json = Json.encode(cycle_rod) end)
                  table.insert(p, "=== REPEAT_OFFENDER_DIAGNOSES (primary — LLM per-item reasoning) ===")
                  table.insert(p, "These items have 3+ consecutive wrong cycles. Each has a specific diagnosis.")
                  for _, d in ipairs(cycle_rod) do
                    local id_label = has_text(d.external_id) and d.external_id or d.item_id
                    table.insert(p, string.format(
                      "Item %s: diagnosis=%s [%s] action=%s",
                      id_label, d.diagnosis or "?", d.confidence or "?", d.recommended_action or "?"))
                    table.insert(p, string.format("  %s", d.explanation or ""))
                    if has_text(d.sme_question) then
                      table.insert(p, string.format("  SME question: %s", d.sme_question))
                    end
                  end
                  table.insert(p, "=== END REPEAT_OFFENDER_DIAGNOSES ===\n")
                end

                -- Secondary: deterministic mislabel signals
                local sm_json = "[]"
                local cp_json = "[]"
                pcall(function() sm_json = Json.encode(cycle_suspected) end)
                pcall(function() cp_json = Json.encode(cycle_pairs) end)
                table.insert(p, "=== SUSPECTED_MISLABELS (JSON) ===")
                table.insert(p, sm_json)
                table.insert(p, "=== END SUSPECTED_MISLABELS ===\n")
                table.insert(p, "=== CONTRASTING_PAIRS (JSON) ===")
                table.insert(p, cp_json)
                table.insert(p, "=== END CONTRASTING_PAIRS ===\n")
                local ir = State.get("item_recurrence") or {}
                local rs = build_recurrence_compact_summary(ir, #iterations)
                if has_text(rs) then
                  table.insert(p, "=== ITEM RECURRENCE ===")
                  table.insert(p, trunc(rs, 1500))
                  table.insert(p, "=== END ITEM RECURRENCE ===")
                end
                local ctx = table.concat(p, "\n")
                report_writer.history:add({role = "system", content = ctx})
                return #ctx
              end
            )

            if has_text(ws_raw) then
              Human.notify({message = string.format(
                "=== Cycle %d — SME Worksheet ===\n\n%s", cycle, ws_raw), level = "info"})
            end

            local ci = State.get("cycle_insights") or {}
            if #ci > 0 then
              ci[#ci].sme_worksheet = ws_raw or ""
              ci[#ci].sme_worksheet_suspected_mislabels = cycle_suspected
              ci[#ci].sme_worksheet_contrasting_pairs = cycle_pairs
              ci[#ci].sme_worksheet_rod_diagnoses = cycle_rod
              State.set("cycle_insights", ci)
            end
          end
        end

        if not has_text(exec_summary) then
          Human.notify({message = syn_text, level = "info"})
        end
        -- Persist the cycle report so future cycles and the end-of-run summary can reference it.
        -- Stored in State (survives history compaction).
        local cur = iterations[#iterations]
        local insight_entry = {
          cycle = cycle,
          analysis = syn_text,
          executive_summary = exec_summary or "",
          lab_report = lab_report or "",
          sme_agenda_raw = raw_cycle_sme_agenda or "",
          sme_agenda = sme_agenda or "",
          diagnosis_summary = diag_summary or "",
          prescription_summary = presc_summary or "",
          synthesis_strategy_selected = cur and cur.synthesis_strategy or nil,
          dual_synthesis_comparison = cur and cur.dual_synthesis or nil,
          synthesis_reasoning = table.concat(synth_reasoning_parts, "\n---\n")
        }
        if cur and cur.exploration_results and type(cur.exploration_results) == "table" then
          insight_entry.hypotheses_tested = {}
          for _, r in ipairs(cur.exploration_results) do
            table.insert(insight_entry.hypotheses_tested, {
              name = r.hypothesis and r.hypothesis.name or ("Hypothesis " .. tostring(r.index)),
              description = r.done_reason or "",
              fb_delta = r.fb_deltas and r.fb_deltas.alignment or 0,
              acc_delta = r.acc_deltas and r.acc_deltas.alignment or 0,
              succeeded = r.succeeded or false
            })
          end
        end
        local cycle_insights = State.get("cycle_insights") or {}
        table.insert(cycle_insights, insight_entry)
        State.set("cycle_insights", cycle_insights)
        diag(string.format("Cycle %d report stored (%d chars, %d hypotheses)",
          cycle, #(syn_text or ""), insight_entry.hypotheses_tested and #insight_entry.hypotheses_tested or 0))

        -- =============================================================
        -- Accumulated Lessons: terse living document updated each cycle.
        -- Kept intentionally compact to avoid expensive report synthesis.
        -- =============================================================
        diag("Updating accumulated lessons document...")
        do
          local prev_lessons = State.get("accumulated_lessons") or ""
          local lp = {}
          table.insert(lp, "=== UPDATE ACCUMULATED LESSONS ===")
          table.insert(lp, "You maintain a living 'lessons learned' document across optimization cycles.")
          table.insert(lp, "Update it with findings from the cycle that just completed.\n")
          if has_text(prev_lessons) then
            table.insert(lp, "=== CURRENT LESSONS DOCUMENT ===")
            table.insert(lp, prev_lessons)
            table.insert(lp, "=== END CURRENT LESSONS ===\n")
          else
            table.insert(lp, "(No previous lessons — this is cycle 1. Create the initial document.)\n")
          end
          -- Determine cycle outcome label (status_str is only set when final_version_id exists)
          local cycle_outcome = "UNKNOWN"
          if status_str then
            cycle_outcome = status_str
          elseif not final_version_id then
            cycle_outcome = "FAILED (no synthesis produced)"
          end
          table.insert(lp, string.format("=== CYCLE %d RESULTS ===", cycle))
          for _, sv in ipairs(submitted_versions) do
            local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
            local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
            table.insert(lp, string.format(
              "Hypothesis %d ('%s'): FB %+.3f ACC %+.3f [%s] — %s",
              sv.index, sv.hypothesis and sv.hypothesis.name or "?",
              fb_d, acc_d, sv.succeeded and "PASS" or "FAIL",
              trunc(sv.done_reason or "", 500)))
          end
          table.insert(lp, string.format("Synthesis outcome: %s", cycle_outcome))
          table.insert(lp, string.format("Synthesis description: %s\n", trunc(final_done_reason or "", 500)))
          table.insert(lp, "Cycle analysis:\n" .. trunc(syn_text, 1200))
          table.insert(lp, "\n=== INSTRUCTIONS ===")
          table.insert(lp, "Output the COMPLETE updated lessons document. Structure:")
          table.insert(lp, "## What Works")
          table.insert(lp, "- [specific lesson]: [evidence from cycles N, M]")
          table.insert(lp, "## What Doesn't Work (and Why)")
          table.insert(lp, "- [lesson]: [evidence], confidence: high/medium/low, revisit if: [conditions]")
          table.insert(lp, "## Open Questions")
          table.insert(lp, "- [question]: [what we've tried], [what hasn't been tried]")
          table.insert(lp, "## Current Understanding")
          table.insert(lp, "- 2-3 bullets only summarizing where we are and what to try next\n")
          table.insert(lp, "Rules:")
          table.insert(lp, "- PRESERVE valid existing lessons, ADDING new evidence citations")
          table.insert(lp, "- ADD new lessons discovered this cycle")
          table.insert(lp, "- UPDATE confidence levels based on accumulated evidence")
          table.insert(lp, "- For 'doesn't work' items, note conditions under which they MIGHT work")
          table.insert(lp, "- MOVE lessons between sections if new evidence changes your assessment")
          table.insert(lp, "- Use bullets, not paragraphs")
          table.insert(lp, "- Total document MUST be under 1500 characters")
          table.insert(lp, "- Be specific: name exact config changes, not vague categories")
          -- Contradiction trend instructions (added when we have per-cycle trend data)
          local has_trend_data = false
          for _, it in ipairs(iterations) do
            if it.contradictions_pct ~= nil then has_trend_data = true; break end
          end
          if has_trend_data then
            table.insert(lp, "\n## Contradiction Trend (required if 2+ cycles have data)")
            table.insert(lp, "- Check the RCA evolution table Contra%/Gaps% columns across cycles")
            table.insert(lp, "- Stable Contra% = structural noise unfixable via prompt; note this explicitly")
            table.insert(lp, "- Falling Gaps% = policy space being exhausted; note how much remains")
            table.insert(lp, "- Rising Contra% = label quality degrading; flag for human review")
          end
          -- Item recurrence instructions
          local item_recurrence_lessons = State.get("item_recurrence") or {}
          local notable_count_lessons = 0
          for _, e in pairs(item_recurrence_lessons) do
            if e.pattern == "OSCILLATING" or e.pattern == "PERSISTENT" or e.pattern == "FLIP_FLOP" then
              notable_count_lessons = notable_count_lessons + 1
            end
          end
          if notable_count_lessons > 0 then
            table.insert(lp, string.format("\n## Item Recurrence (%d notable items tracked)", notable_count_lessons))
            table.insert(lp, "- GOAL: 100% accuracy. These items are your HIGHEST-PRIORITY targets.")
            table.insert(lp, "- OSCILLATING items alternate correct/wrong — prior hypotheses were too broad. Need a")
            table.insert(lp, "  more specific predicate that distinguishes the anti-correlated groups.")
            table.insert(lp, "- PERSISTENT items have been wrong every cycle — prior hypotheses did not target the")
            table.insert(lp, "  actual discriminating feature. Quote literal transcript evidence and add an explicit rule.")
            table.insert(lp, "- Record in 'What Doesn't Work' which specific hypotheses failed for these items so the")
            table.insert(lp, "  next cycle can try something DIFFERENT, not assume the item is unfixable.")
            table.insert(lp, "- Overfitting this eval set is acceptable and desired. Item-specific carve-outs are OK.")
          end

          local lessons_text = run_required_report_phase(
            report_writer,
            "report_writer",
            "accumulated_lessons",
            table.concat(lp, "\n"),
            function()
              report_writer.clear_history()
              return 0
            end
          )
          State.set("accumulated_lessons", lessons_text)
          diag(string.format("Accumulated lessons updated (%d chars)", #lessons_text))
        end

        -- =============================================================
        -- Feedback Landscape Diagnostic — runs every other cycle from
        -- cycle 3 onward (cycles 3, 5, 7, 9...). Builds cross-cycle
        -- item recurrence analysis and temporal patterns.
        -- =============================================================
        if cycle >= 3 and (cycle == 3 or cycle % 2 == 1) then
          diag("Generating feedback landscape diagnostic...")
          Human.notify({message = "  Generating feedback landscape diagnostic...", level = "info"})
          local item_recurrence_snap = State.get("item_recurrence") or {}
          local diag_result = pcall(function()
            local result = generate_feedback_landscape_diagnostic(
              cycle, item_recurrence_snap, iterations,
              current_guidelines)
            if result then
              State.set("recent_landscape_diagnostic", result)
              diag(string.format(
                "Feedback landscape diagnostic complete (%d notable items, %d chars full report)",
                result.notable_item_count or 0, #(result.full_report or "")))
              Human.notify({message = string.format(
                "  Feedback landscape diagnostic: %d notable items analyzed",
                result.notable_item_count or 0), level = "info"})
            else
              diag("Feedback landscape diagnostic: no notable items yet, skipped")
            end
          end)
          if not diag_result then
            diag("Feedback landscape diagnostic generation failed — continuing")
          end
        end

        -- Generate procedure-level running summary (progress + next steps).
        -- Shown in the dashboard between the metrics chart and the cycles table.
        diag("Generating procedure-level summary...")
        local summary_parts = {}
        table.insert(summary_parts, "You are summarizing the current state of an optimization run.\n")
        table.insert(summary_parts, string.format("Completed cycles: %d of %d\n", cycle, params.max_iterations or 3))
        -- Gather all cycle executive summaries (new format) with fallback to diagnosis_summary
        local all_insights = State.get("cycle_insights") or {}
        for _, ci in ipairs(all_insights) do
          table.insert(summary_parts, string.format("--- Cycle %d ---", ci.cycle))
          local cycle_status = ci.executive_summary
          if not cycle_status or cycle_status == "" then cycle_status = ci.diagnosis_summary end
          if cycle_status and cycle_status ~= "" then
            table.insert(summary_parts, "Summary: " .. cycle_status)
          end
          if ci.prescription_summary and ci.prescription_summary ~= "" then
            table.insert(summary_parts, "Next actions: " .. ci.prescription_summary)
          end
          table.insert(summary_parts, "")
        end
        table.insert(summary_parts, "Write exactly two sections:\n")
        table.insert(summary_parts, "## PROGRESS")
        table.insert(summary_parts, "Maximum 4 sentences summarizing what the optimization has learned across all cycles.")
        table.insert(summary_parts, "Use only the compact cycle summaries below. Plain English only.\n")
        table.insert(summary_parts, "## NEXT STEPS")
        table.insert(summary_parts, "Maximum 4 sentences summarizing the most important actions needed right now.")
        table.insert(summary_parts, "Prioritize only what matters now. No bullet points. No sub-headers.")

        local sum_text = run_required_report_phase(
          report_writer,
          "report_writer",
          "procedure_summary",
          table.concat(summary_parts, "\n"),
          function()
            report_writer.clear_history()
            return 0
          end
        )
        local sum_prog = sum_text:match("## PROGRESS\n(.-)\n## NEXT STEPS")
        local sum_next = sum_text:match("## NEXT STEPS\n(.*)")
        State.set("procedure_summary", {
          progress = sum_prog or "",
          next_steps = sum_next or "",
          -- Legacy field names kept for backward compat with older runs
          diagnosis = sum_prog or "",
          prescription = sum_next or "",
          updated_at = os.date("!%Y-%m-%dT%H:%M:%SZ"),
          cycle = cycle
        })
        diag(string.format("Procedure summary updated (progress=%d, next_steps=%d chars)",
          #(sum_prog or ""), #(sum_next or "")))
      end

      -- ================================================================
      -- Plateau escalation advisor: after 3+ stagnant cycles, ask how to widen
      -- the search. This never stops the run.
      -- ================================================================
      if consecutive_stagnant_cycles >= 3 then
        diag(string.format("Plateau escalation threshold reached (%d stagnant cycles) — invoking advisor", consecutive_stagnant_cycles))
        Human.notify({message = string.format(
          "  %d consecutive stagnant cycles — invoking plateau escalation advisor...",
          consecutive_stagnant_cycles), level = "warning"})

        -- Build context for the advisor
        local es_parts = {}
        local es_initial_ac1 = recent_baseline_metrics.alignment
        local es_current_ac1 = last_accepted_fb_metrics and last_accepted_fb_metrics.alignment or es_initial_ac1
        table.insert(es_parts, string.format(
          "OPTIMIZATION RUN SUMMARY\n"
          .. "Cycle: %d of %d\n"
          .. "Consecutive stagnant cycles (no significant improvement): %d\n"
          .. "Recent baseline AC1 (start of run): %.4f\n"
          .. "Current best feedback AC1: %.4f\n"
          .. "Total improvement so far: %+.4f\n",
          cycle, params.max_iterations or 3,
          consecutive_stagnant_cycles,
          es_initial_ac1,
          es_current_ac1,
          es_current_ac1 - es_initial_ac1))

        -- Include cycle history
        table.insert(es_parts, "\n=== CYCLE HISTORY ===")
        for _, prev in ipairs(iterations) do
          local status = prev.accepted and "ACCEPTED" or "REJECTED"
          local fb_d = prev.recent_deltas and prev.recent_deltas.alignment or 0
          table.insert(es_parts, string.format("Cycle %d: %s (Recent AC1 %+.3f)", prev.iteration, status, fb_d))
        end

        -- Include accumulated cycle reports (diagnosis + prescription)
        local all_es_insights = State.get("cycle_insights") or {}
        if #all_es_insights > 0 then
          table.insert(es_parts, "\n=== CYCLE REPORTS ===")
          for _, ci in ipairs(all_es_insights) do
            if ci.diagnosis_summary and ci.diagnosis_summary ~= "" then
              table.insert(es_parts, string.format("\nCycle %d DIAGNOSIS: %s", ci.cycle, ci.diagnosis_summary))
            end
            if ci.prescription_summary and ci.prescription_summary ~= "" then
              table.insert(es_parts, string.format("Cycle %d PRESCRIPTION: %s", ci.cycle, ci.prescription_summary))
            end
          end
        end

        -- Include contradiction data if available
        local known_contra_es = State.get("known_contradictions")
        if known_contra_es and (known_contra_es.contradictions_found or 0) > 0 then
          local total_errs = known_contra_es.total_errors or 1
          table.insert(es_parts, string.format(
            "\n=== CONTRADICTION LANDSCAPE ===\n"
            .. "%d contradiction items detected (%.0f%% of feedback errors).\n"
            .. "Policy gaps (addressable): %d\n"
            .. "True contradictions (unresolvable by prompt): %d",
            known_contra_es.contradictions_found,
            (known_contra_es.contradictions_found / math.max(1, total_errs)) * 100,
            known_contra_es.policy_gap_count or 0,
            (known_contra_es.contradictions_found - (known_contra_es.policy_gap_count or 0))))
        end

        -- Include contradiction trend across cycles (key signal for structural vs. fixable plateau)
        local trend_parts_es = {}
        for _, it in ipairs(iterations) do
          if it.contradictions_pct ~= nil then
            table.insert(trend_parts_es, string.format("  Cycle %d: %d%% contra / %d%% gaps  (Recent AC1 %+.3f)",
              it.iteration or 0, it.contradictions_pct, it.policy_gap_pct or 0,
              it.recent_deltas and it.recent_deltas.alignment or 0))
          end
        end
        if #trend_parts_es > 0 then
          table.insert(es_parts, "\n=== CONTRADICTION TREND ACROSS CYCLES ===")
          for _, t in ipairs(trend_parts_es) do table.insert(es_parts, t) end
          table.insert(es_parts, "If Contra% is flat: structural noise — prompt changes cannot resolve it.")
          table.insert(es_parts, "If Gaps% is near zero: policy space exhausted — no more prompt-level wins likely.")
        end

        -- Include item recurrence summary (persistent/oscillating items signal noise floor)
        local es_recurrence = State.get("item_recurrence") or {}
        local es_oscillating, es_persistent, es_flipflop, es_late = 0, 0, 0, 0
        for _, e in pairs(es_recurrence) do
          if e.pattern == "OSCILLATING"   then es_oscillating = es_oscillating + 1
          elseif e.pattern == "PERSISTENT"    then es_persistent = es_persistent + 1
          elseif e.pattern == "FLIP_FLOP" then es_flipflop   = es_flipflop   + 1
          elseif e.pattern == "LATE_EMERGING" then es_late   = es_late       + 1
          end
        end
        if es_oscillating + es_persistent + es_flipflop + es_late > 0 then
          table.insert(es_parts, string.format(
            "\n=== ITEM RECURRENCE PATTERNS ===\n"
            .. "%d oscillating items (wrong→correct→wrong — prior hypotheses were too broad)\n"
            .. "%d persistent items (wrong every cycle — prior hypotheses targeted the wrong feature)\n"
            .. "%d flip-flop items (wrong in different segments — need a more specific predicate)\n"
            .. "%d late-emerging items (appeared only in later cycles — may indicate side effects)\n"
            .. "GOAL: 100%% accuracy. These items are solvable with MORE AGGRESSIVE prompt changes:\n"
            .. "literal transcript quotes, item-specific carve-outs, or a tighter predicate that separates\n"
            .. "anti-correlated groups. Escalate to 'escalate' or 'ultra_creative' modes — do NOT accept\n"
            .. "these as unfixable. Overfitting this eval set is acceptable and desired.",
            es_oscillating, es_persistent, es_flipflop, es_late))
        end

        -- Include landscape diagnostic summary if available
        local es_landscape = State.get("recent_landscape_diagnostic")
        if es_landscape and has_text(es_landscape.compact_summary) then
          table.insert(es_parts, "\n=== FEEDBACK LANDSCAPE DIAGNOSTIC (summary) ===")
          table.insert(es_parts, trunc(es_landscape.compact_summary, 1500))
        end

        table.insert(es_parts,
          "\nBased on the above, how should the optimizer search harder next?\n"
          .. "Call done(escalation_mode=\"escalate\", reason=...) or done(escalation_mode=\"ultra_creative\", reason=...).")

        Tool.reset()
        early_stop_advisor.clear_history()
        local es_ok, es_err = pcall(function()
          early_stop_advisor({message = table.concat(es_parts, "\n")})
        end)

        if not es_ok then
          diag(string.format("Plateau escalation advisor crashed: %s — continuing run", tostring(es_err)))
        else
          local es_done = Tool.last_call("done")
          local es_decision = tostring(tool_call_arg(es_done, "escalation_mode", plateau_escalation_mode({
            consecutive_stagnant_cycles = consecutive_stagnant_cycles
          })))
          local es_reason = tostring(tool_call_arg(es_done, "reason", "(no reason given)"))
          diag(string.format("Plateau escalation advisor recommended %s: %s", es_decision, es_reason))
          Human.notify({message = string.format(
            "  Plateau escalation advisor: %s — %s", es_decision, es_reason), level = "info"})
        end
      end
    end  -- end of else (submitted_versions > 0)
    end)  -- end of pcall wrapper
    if not cycle_ok then
      if classify_error(cycle_err) == "interrupted" then
        stop_reason = "interrupted"
        error(tostring(cycle_err))
      end
      if string.find(tostring(cycle_err), "report_generation_failed", 1, true) then
        stop_reason = "report_generation_failed"
      end
      diag(string.format("ERROR in cycle %d: %s", cycle, tostring(cycle_err)))
      Human.notify({message = string.format(
        "ERROR in cycle %d: %s — stopping run", cycle, trunc(tostring(cycle_err), 500)), level = "error"})

      if not cycle_recorded then
        consecutive_failed_cycles = consecutive_failed_cycles + 1
        consecutive_stagnant_cycles = consecutive_stagnant_cycles + 1

        -- Record as failed cycle so history is preserved if we crashed before
        -- the cycle had already emitted its normal iteration record.
        table.insert(iterations, {
          iteration = cycle,
          accepted = false,
          skip_reason = "cycle_error: " .. trunc(tostring(cycle_err), 200),
          recent_deltas = {alignment = 0, accuracy = 0, precision = 0, recall = 0},
          regression_deltas = {alignment = 0, accuracy = 0, precision = 0, recall = 0},
        })
        State.set("iterations", iterations)
      end

      if stop_reason ~= "report_generation_failed" then
        stop_reason = "error"
      end
      error("Cycle " .. tostring(cycle) .. " failed: " .. tostring(cycle_err))
    end
    -- pcall body returns "break_cycle" when it wants to exit the while loop
    if cycle_err == "break_cycle" then break end
  end  -- end of while cycle
  diag("Exited main cycle loop")

  -- Determine final stop reason
  if not stop_reason then
    -- Check if ALL cycles were error-skipped (no real work done)
    local all_errors = true
    for _, iter in ipairs(iterations) do
      if not iter.skip_reason or not string.find(tostring(iter.skip_reason), "cycle_error") then
        all_errors = false
        break
      end
    end
    if #iterations > 0 and all_errors then
      local last_err = iterations[#iterations].skip_reason or "unknown error"
      stop_reason = "error"
      error("All " .. #iterations .. " cycles failed: " .. last_err)
    elseif #iterations >= max_cycles then
      stop_reason = "max_iterations"
    else
      stop_reason = "converged"
    end
  end

  -- Phase C: Finalization
  Stage.set("finalize")

  -- Calculate total improvement from accepted cycles
  local last_accepted = nil
  for i = #iterations, 1, -1 do
    if iterations[i].accepted then
      last_accepted = iterations[i]
      break
    end
  end

  local total_fb_improvement = last_accepted and
    (last_accepted.recent_metrics.alignment - recent_baseline_metrics.alignment) or 0
  local total_acc_improvement = 0
  if last_accepted and last_accepted.regression_metrics and regression_baseline_metrics then
    total_acc_improvement = last_accepted.regression_metrics.alignment - regression_baseline_metrics.alignment
  end

  local completion_mode = params.max_iterations == 1 and "Verification complete" or "Optimization complete"
  Human.notify({message = string.format(
    "%s: %d cycles, feedback AC1 improvement: %+.4f, accuracy AC1 improvement: %+.4f",
    completion_mode, #iterations, total_fb_improvement, total_acc_improvement
  ), level = "info"})

  -- ========================================================================
  -- END-OF-RUN DIAGNOSIS & PRESCRIPTION (always runs, three phases)
  -- ========================================================================
  Human.notify({message = "Generating end-of-run diagnosis and prescription...", level = "info"})

  local total_accepted = 0
  local total_rejected = 0
  local total_skipped = 0
  for _, iter in ipairs(iterations) do
    if iter.accepted then
      total_accepted = total_accepted + 1
    elseif has_text(iter.skip_reason) then
      total_skipped = total_skipped + 1
    else
      total_rejected = total_rejected + 1
    end
  end
  local success_rate = total_accepted / math.max(1, #iterations)

  -- Phase 0: Evidence Collection (Lua computation, no LLM)
  Human.notify({message = "  Phase 0: Collecting evidence...", level = "info"})

  -- 0a. Final contradictions refresh (expanded scope)
  local final_contra_ok = pcall(function()
    Human.notify({message = "  Running final contradictions analysis (expanded scope)...", level = "info"})
    local final_contradictions_score_version_id =
      State.get("last_accepted_version_id") or active_rubric_memory_score_version_id or champion_version_id
    local ok, report_result = pcall(call_plexus_tool, "plexus_report_run", {
      block_class = "FeedbackContradictions",
      block_config = {
        scorecard = params.scorecard,
        score = params.score,
        mode = "contradictions",
        days = tostring(params.days or 90),
        max_feedback_items = 400,
        num_topics = 12,
        include_rubric_memory = true,
        score_version_id = final_contradictions_score_version_id
      },
      cache_key = "FeedbackContradictions (expanded): " .. scorecard_name .. " / " .. score_name .. " / " .. tostring(final_contradictions_score_version_id),
      ttl_hours = 4,
      fresh = false
    })
    if ok and report_result then
      local parsed_result, parse_error = parse_contradictions_report_result(report_result)
      if not parsed_result then
        State.set("known_contradictions_status", {cycle = "final", available = false, error = parse_error})
        Human.notify({message = "  Final contradictions unavailable: " .. tostring(parse_error), level = "warning"})
        return
      end
      local out = parsed_result.output
      if type(out) == "table" and out.topics then
        -- Re-run the full topic parsing from refresh_known_contradictions
        local topics = out.topics or {}
        local total_items = out.total_items_analyzed or 0
        local contradictions_found = out.contradictions_found or 0
        local aligned_found = out.aligned_found or 0
        local contradiction_topics = {}
        local policy_gap_topics = {}
        local policy_gap_count = 0
        local topics_structured = {}
        for _, topic in ipairs(topics) do
          local gq = topic.guideline_quote or ""
          local is_gap = string.find(gq, "^Policy gap") ~= nil
          local exemplar = nil
          local exemplars = topic.exemplars or {}
          if #exemplars > 0 then
            local ex = exemplars[1]
            exemplar = {
              initial_value = ex.initial_value or "?",
              final_value = ex.final_value or "?",
              edit_comment = trunc(ex.edit_comment or "", 200)
            }
            if is_gap then policy_gap_count = policy_gap_count + (topic.count or 0) end
          end
          local t = {
            label = topic.label or "Unknown",
            count = topic.count or 0,
            summary = trunc(topic.summary or "", 300),
            guideline_quote = trunc(gq, 200),
            is_policy_gap = is_gap,
            exemplar = exemplar
          }
          table.insert(topics_structured, t)
          if is_gap then table.insert(policy_gap_topics, t) else table.insert(contradiction_topics, t) end
        end
        local summary_parts = {}
        if #topics > 0 then
          table.insert(summary_parts, string.format(
            "%d items analyzed | %d contradictions (%.0f%%) | %d policy gaps | %d aligned",
            total_items, contradictions_found,
            (total_items > 0) and (contradictions_found / total_items * 100) or 0,
            policy_gap_count, aligned_found))
          if #contradiction_topics > 0 then
            table.insert(summary_parts, "\nGuideline contradiction topics (NOT fixable via prompt editing):")
            for i, t in ipairs(contradiction_topics) do
              table.insert(summary_parts, string.format("\n  %d. %s — %d items: %s\n     Guideline violated: \"%s\"",
                i, t.label, t.count, t.summary, t.guideline_quote))
              if t.exemplar then
                table.insert(summary_parts, string.format("\n     Example: predicted=%s corrected=%s — \"%s\"",
                  t.exemplar.initial_value, t.exemplar.final_value, t.exemplar.edit_comment))
              end
            end
          end
          if #policy_gap_topics > 0 then
            table.insert(summary_parts, "\nPolicy gap topics (CAN be fixed by adding a guideline rule):")
            for i, t in ipairs(policy_gap_topics) do
              table.insert(summary_parts, string.format("\n  %d. %s — %d items: %s\n     Gap: \"%s\"",
                i, t.label, t.count, t.summary, t.guideline_quote))
              if t.exemplar then
                table.insert(summary_parts, string.format("\n     Example: predicted=%s corrected=%s — \"%s\"",
                  t.exemplar.initial_value, t.exemplar.final_value, t.exemplar.edit_comment))
              end
            end
          end
        end
        State.set("known_contradictions", {
          cycle = "final",
          total_items_analyzed = total_items,
          contradictions_found = contradictions_found,
          policy_gap_count = policy_gap_count,
          aligned_found = aligned_found,
          topic_count = #topics,
          contradiction_topic_count = #contradiction_topics,
          policy_gap_topic_count = #policy_gap_topics,
          topics = topics_structured,
          summary = table.concat(summary_parts, "")
        })
        State.set("known_contradictions_status", {cycle = "final", available = true, error = nil})
        Human.notify({message = string.format(
          "  Final contradictions: %d items | %d contradictions, %d policy gaps, %d topics",
          total_items, contradictions_found, policy_gap_count, #topics), level = "info"})
      end
    end
  end)
  if not final_contra_ok then
    State.set("known_contradictions_status", {cycle = "final", available = false, error = "Final contradictions refresh failed"})
    Human.notify({message = "  Final contradictions refresh failed", level = "warning"})
  end

  -- 0b. Build divergence analysis
  local divergence_text = ""
  pcall(function()
    divergence_text = build_divergence_analysis(iterations)
  end)

  -- 0c. Build RCA category evolution
  local rca_evolution_text = ""
  pcall(function()
    rca_evolution_text = build_rca_evolution(iterations)
  end)

  -- 0c2. Generate final feedback landscape diagnostic (always run at end — uses full run data)
  local final_landscape_diag = State.get("recent_landscape_diagnostic")
  pcall(function()
    local item_recurrence_final = State.get("item_recurrence") or {}
    local final_result = generate_feedback_landscape_diagnostic(
      #iterations, item_recurrence_final, iterations, current_guidelines)
    if final_result then
      State.set("recent_landscape_diagnostic", final_result)
      final_landscape_diag = final_result
      Human.notify({message = string.format(
        "  Final feedback landscape diagnostic: %d notable items analyzed",
        final_result.notable_item_count or 0), level = "info"})
    end
  end)

  -- 0d. Residual error sampling from RCA item classifications
  local residual_errors_text = ""
  pcall(function()
    local last_rca = State.get("last_recent_rca")
    if not last_rca or type(last_rca) ~= "table" then return end

    local items = last_rca._all_item_classifications
    if not items or type(items) ~= "table" or #items == 0 then
      -- Try nested path
      local ma = last_rca.misclassification_analysis
      if ma and type(ma) == "table" then
        items = ma.item_classifications_all
      end
    end
    if not items or type(items) ~= "table" or #items == 0 then return end

    -- Group by error direction
    local fp_items = {}  -- predicted positive, should be negative
    local fn_items = {}  -- predicted negative, should be positive
    local other_items = {}
    for _, ic in ipairs(items) do
      local pred = string.lower(tostring(ic.predicted_value or ""))
      local correct = string.lower(tostring(ic.correct_value or ""))
      if pred == "yes" and correct == "no" then
        table.insert(fp_items, ic)
      elseif pred == "no" and correct == "yes" then
        table.insert(fn_items, ic)
      else
        table.insert(other_items, ic)
      end
    end

    local parts = {}
    table.insert(parts, "=== RESIDUAL ERROR SAMPLES (items optimizer could not fix) ===")
    table.insert(parts, string.format("Total misclassified items in final evaluation: %d (FP: %d, FN: %d, Other: %d)",
      #items, #fp_items, #fn_items, #other_items))
    table.insert(parts, "")

    local function render_items(label, item_list, max_show)
      max_show = max_show or 5
      if #item_list == 0 then return end
      table.insert(parts, string.format("%s — showing %d of %d:", label, math.min(max_show, #item_list), #item_list))
      for i = 1, math.min(max_show, #item_list) do
        local ic = item_list[i]
        table.insert(parts, string.format(
          "  %d. Predicted=%s, Correct=%s | Category: %s | Fixability: %s",
          i, tostring(ic.predicted_value), tostring(ic.correct_value),
          tostring(ic.primary_category or "?"), tostring(ic.config_fixability or "?")))
        if has_text(ic.rationale_paragraph) then
          table.insert(parts, string.format("     Root cause: %s", trunc(ic.rationale_paragraph, 300)))
        end
        if has_text(ic.evidence_quote) then
          table.insert(parts, string.format("     Evidence: \"%s\"", trunc(ic.evidence_quote, 200)))
        end
        if has_text(ic.suggested_fix) then
          table.insert(parts, string.format("     Suggested fix: %s", trunc(ic.suggested_fix, 200)))
        end
        table.insert(parts, "")
      end
    end

    render_items("FALSE POSITIVES (predicted YES, should be NO)", fp_items, 2)
    render_items("FALSE NEGATIVES (predicted NO, should be YES)", fn_items, 2)
    if #other_items > 0 then
      render_items("OTHER MISCLASSIFICATIONS", other_items, 1)
    end

    table.insert(parts, "These are items remaining after optimization. The root causes and fixability ratings")
    table.insert(parts, "show whether prompt changes can address them or whether human intervention is needed.")
    table.insert(parts, "=== END RESIDUAL ERROR SAMPLES ===")
    residual_errors_text = table.concat(parts, "\n")
    Human.notify({message = string.format("  Residual errors sampled: %d FP, %d FN, %d other",
      #fp_items, #fn_items, #other_items), level = "info"})
  end)

  -- 0e. Hypothesis effectiveness summary
  local hypothesis_eff_text = ""
  pcall(function()
    hypothesis_eff_text = build_hypothesis_effectiveness_summary(iterations)
  end)

  -- Build the shared full-context block used by Phase 1 (Executive Summary) and Phase 2 (Lab Report).
  local full_ctx_parts = {}
  do
    table.insert(full_ctx_parts, "=== RUN SUMMARY ===")
    table.insert(full_ctx_parts, string.format("Cycles: %d | Accepted: %d | Rejected: %d | Skipped: %d | Success rate: %.0f%%",
      #iterations, total_accepted, total_rejected, total_skipped, success_rate * 100))
    table.insert(full_ctx_parts, string.format("Baseline Recent AC1: %.3f | Final Recent AC1: %.3f | Total FB improvement: %+.4f",
      recent_baseline_metrics.alignment or 0,
      last_accepted and last_accepted.recent_metrics and last_accepted.recent_metrics.alignment or recent_baseline_metrics.alignment or 0,
      total_fb_improvement))
    if regression_baseline_metrics then
      table.insert(full_ctx_parts, string.format("Baseline Regression AC1: %.3f | Final Regression AC1: %.3f | Total ACC improvement: %+.4f",
        regression_baseline_metrics.alignment or 0,
        last_accepted and last_accepted.regression_metrics and last_accepted.regression_metrics.alignment or regression_baseline_metrics.alignment or 0,
        total_acc_improvement))
    end
    table.insert(full_ctx_parts, "")

    local history_text = build_version_history(iterations, baseline_version_id, recent_baseline_metrics, regression_baseline_metrics, last_accepted_version_id)
    if has_text(history_text) then
      table.insert(full_ctx_parts, "=== CYCLE HISTORY ===")
      table.insert(full_ctx_parts, trunc(history_text, 2000))
      table.insert(full_ctx_parts, "")
    end

    if has_text(divergence_text) then
      table.insert(full_ctx_parts, divergence_text)
      table.insert(full_ctx_parts, "")
    end

    local kc = State.get("known_contradictions")
    local compact_contra = build_compact_contradiction_summary(kc, 3)
    if has_text(compact_contra) then
      table.insert(full_ctx_parts, "=== CONTRADICTION LANDSCAPE ===")
      table.insert(full_ctx_parts, compact_contra)
      table.insert(full_ctx_parts, "=== END CONTRADICTION LANDSCAPE ===")
      table.insert(full_ctx_parts, "")
    end

    if has_text(rca_evolution_text) then
      table.insert(full_ctx_parts, rca_evolution_text)
      table.insert(full_ctx_parts, "")
    end

    if has_text(residual_errors_text) then
      table.insert(full_ctx_parts, residual_errors_text)
      table.insert(full_ctx_parts, "")
    end

    if has_text(hypothesis_eff_text) then
      table.insert(full_ctx_parts, trunc(hypothesis_eff_text, 1500))
      table.insert(full_ctx_parts, "")
    end

    local insights = State.get("cycle_insights")
    if insights and type(insights) == "table" and #insights > 0 then
      table.insert(full_ctx_parts, "=== AGENT SYNTHESIS ACROSS CYCLES (most recent first) ===")
      for i = #insights, math.max(1, #insights - 2), -1 do
        local ins = insights[i]
        if ins and has_text(ins.analysis) then
          table.insert(full_ctx_parts, string.format("--- Cycle %d Analysis ---", ins.cycle or i))
          table.insert(full_ctx_parts, trunc(ins.analysis, 800))
        end
      end
      table.insert(full_ctx_parts, "=== END CYCLE INSIGHTS ===")
      table.insert(full_ctx_parts, "")
    end
  end
  local full_ctx = table.concat(full_ctx_parts, "\n")

  -- Phase 1: Executive Summary (plain-English, for any audience)
  Human.notify({message = "  Phase 1: Generating executive summary...", level = "info"})
  local executive_summary_text = "(executive summary not available)"
  local exec_prompt = table.concat({
    "=== END-OF-RUN EXECUTIVE SUMMARY ===\n",
    "\nYou are writing a brief executive summary of an optimization run for any audience",
    "\n— technical or non-technical. Write exactly 4 sentences.",
    "\nNo markdown headers. No bullet points. Flowing prose.",
    "\nThis should be copy-paste ready for a brief email to stakeholders.",
    "\n\nCover in this order:",
    "\n1. Starting point and ending point (use 'agreement' not 'AC1'; give the numbers).",
    "\n2. How many cycles ran and what the overall trajectory was.",
    "\n3. The single main reason we cannot improve further (specific, not generic).",
    "\n4. What decisions or clarifications are needed from subject-matter experts to unblock next steps.",
    "\n\nWrite nothing else. Just the 4 sentences."
  }, "")
  executive_summary_text = run_required_report_phase(
    report_writer,
    "report_writer",
    "end_executive_summary",
    exec_prompt,
    function()
      report_writer.clear_history()
      report_writer.history:add({role = "system", content = full_ctx})
      return #full_ctx
    end
  )

  -- Phase 2: Lab Report (technical, for operators and the next optimizer run)
  Human.notify({message = "  Phase 2: Generating lab report...", level = "info"})
  local lab_report_text = "(lab report not available)"
  local lab_prompt = table.concat({
    "=== END-OF-RUN LAB REPORT ===\n",
    "\nYou are writing a technical report for operators and AI agents who will work on",
    "\nthis score next. This document feeds the next optimization run as prior_run_prescription.",
    "\nInclude ONLY actions that lab operators or AI agents can take without SME input.",
    "\n\nKeep the entire report under 450 words.",
    "\nDo not pad. Do not repeat the same finding in multiple sections.",
    "\nUse exactly the sections below and nothing else.",
    "\n\nStructure your output with THREE top-level sections:",
    "\n\n## SUMMARY",
    "\nExactly 4 bullets, one sentence each. Cover: overall trajectory, stall reason,",
    "\ndataset divergence or alignment, and the realistic ceiling estimate.",
    "\n\n## ANALYSIS",
    "\nExactly 3 short subsections. Each must be exactly 2 sentences.",
    "\n\n### What happened",
    "\nNarrate the run in plain language: baseline metrics, what improved, what stalled,",
    "\nand the stop reason. Include the key AC1 numbers.",
    "\n\n### Why it stalled",
    "\nIdentify the single most important technical blocking factor. Be specific: name the",
    "\ncontradiction topic or policy gap, how many items it affects, and what the",
    "\nconflict is between what the model does and what reviewers expect.",
    "\nIf the datasets diverged, explain what that reveals about the ground truth.",
    "\n\n### Error patterns",
    "\nDescribe the top 3 residual patterns total. Keep this subsection to exactly 2 sentences.",
    "\nName whether each pattern is a contradiction, policy gap, or noisy label cluster.",
    "\n\n## NEXT ACTIONS (LAB ONLY)",
    "\nActions that lab operators or AI agents can take without SME input.",
    "\nInclude ONLY things under lab control: prompt engineering, model swaps,",
    "\narchitecture changes, data quality fixes.",
    "\nDo NOT include anything requiring a policy decision — those go in the SME Agenda.",
    "\nFormat each as: [PRIORITY] [WHAT]: [evidence/rationale]",
    "\nCap at 3 items. No padding.",
    "\n\n## SUSPECTED LOW-QUALITY FEEDBACK LABELS",
    "\nIf the Feedback Landscape Diagnostic identified specific suspected items:",
    "\nList them here. For each item:",
    "\n  Item ID | Human label | Model prediction | Pattern | Why suspected | Confidence",
    "\nGroup by theme if multiple items share the same root cause.",
    "\nPay special attention to OSCILLATING items — these reveal contradictory norms, not prompt issues.",
    "\nIf no items were identified, write: (No suspected low-quality labels identified in this run.)"
  }, "")

  lab_report_text = run_required_report_phase(
    report_writer,
    "report_writer",
    "end_lab_report",
    lab_prompt,
    function()
      report_writer.clear_history()
      report_writer.history:add({role = "system", content = full_ctx})
      local context_chars = #full_ctx
    -- Also include the feedback landscape diagnostic for label analysis
      local kc = State.get("known_contradictions")
      local compact_contra = build_compact_contradiction_summary(kc, 3)
      if has_text(compact_contra) then
        local contra_context = "=== CONTRADICTION DETAILS (for label analysis) ===\n" .. compact_contra
          .. "\n=== END CONTRADICTION DETAILS ==="
        report_writer.history:add({role = "system", content = contra_context})
        context_chars = context_chars + #contra_context
      end
      local final_diag = State.get("recent_landscape_diagnostic")
      if final_diag and has_text(final_diag.compact_summary) then
        local landscape_context = "=== FEEDBACK LANDSCAPE DIAGNOSTIC ===\n"
          .. string.format("(Generated from %d cycles; %d notable items)\n",
              final_diag.generated_at_cycle or 0, final_diag.notable_item_count or 0)
          .. trunc(final_diag.compact_summary, 800)
          .. "\n=== END FEEDBACK LANDSCAPE DIAGNOSTIC ==="
        report_writer.history:add({role = "system", content = landscape_context})
        context_chars = context_chars + #landscape_context
      end
      return context_chars
    end
  )

  -- Phase 3: SME Agenda (decision-formatted meeting agenda for stakeholders)
  Human.notify({message = "  Phase 3: Generating SME agenda...", level = "info"})
  local sme_agenda_text = "(SME agenda not available)"
  -- Extract score name for the agenda header if available
  local score_name_for_agenda = score_id or "Score"
  pcall(function()
    local sn = State.get("score_name")
    if has_text(sn) then score_name_for_agenda = sn end
  end)

  local sme_prompt = table.concat({
      "=== STAKEHOLDER MEETING AGENDA ===\n",
      "\nYou are writing a meeting agenda for subject-matter experts (SMEs) — the people",
      "\nwho write the rubric, handle the calls, and know the domain.",
      "\nThey are NOT engineers. They do not know what AC1 is. They do not care about YAML.",
      "\n\nGlossary (always apply):",
      "\n- \"Agent:\" in transcripts = the human call-center phone operator, NEVER an AI or software agent.",
      "\n- \"Customer:\" = the person calling in.",
      "\n- \"the evaluated score version\" = the specific score configuration being tested in this optimizer run.",
      "\n- Never write \"AI\" in your output. Say \"the evaluated score version\" or \"the score\".",
      "\n\nYour job: give SMEs a list of DECISIONS they need to make, formatted as agenda items.",
      "\n\nRules:",
      "\n- Each item is a question to answer, not a finding to read.",
      "\n- Include: what the question is, why it matters (in plain language), concrete examples.",
      "\n- Prioritize by how many items the decision would unblock.",
      "\n- Maximum 3 agenda items — pick the most important ones.",
      "\n- Keep the entire agenda under 200 words total.",
      "\n- Use plain English throughout.",
      "\n- Do NOT include anything the lab can fix without SME input.",
      "\n- Do NOT explain what agreement or AC1 means.",
      "\n- Do NOT summarize the optimization run — the agenda is action-only.",
      "\n- Never write \"AI\" — use \"the evaluated score version\" or \"the score\".",
      "\n- Every Example MUST cite a real item by copying its markdown link verbatim from the CANDIDATE ITEMS context. Do NOT invent or omit item IDs.",
      "\n- Each example describes ONE specific item concretely. Do NOT generalize across items.",
      "\n\nStructure your output exactly as follows:",
      string.format("\n\n## FOR YOUR NEXT MEETING: %s Quality Review", score_name_for_agenda),
      "\n\n### Title of the first decision",
      "\n**Why this matters:** 1-2 sentences on impact, in plain language",
      "\n**Examples:** 2-3 items, one per line, each citing a real item from the CANDIDATE ITEMS context:",
      "\n  - Item [<external_id>](<url>): score version said \"<prediction>\", reviewer labeled \"<correct>\". Transcript evidence: \"<quote from agent>\". Reviewer's edit comment: \"<comment>\".",
      "\n**Options:** (a) first option (b) second option (c) third option if applicable",
      "\n**Resolves:** ~N disputed reviews",
      "\n\n### Title of the second decision",
      "\n(repeat the same structure for each item, up to 3 total)",
      "\n\n## Background",
      "\n1-2 sentences only: overall performance trend in plain language"
  }, "")

  sme_agenda_text = run_required_report_phase(
    report_writer,
    "report_writer",
    "end_sme_agenda",
    sme_prompt,
    function()
      report_writer.clear_history()
      -- SME Agenda gets: candidate items (for link-grounded examples) + executive summary
      -- + lab report + contradiction details + feedback landscape
      local sme_ctx_parts = {}

      local agenda_items_ctx = _build_agenda_item_context(5)
      if has_text(agenda_items_ctx) then
        table.insert(sme_ctx_parts, agenda_items_ctx)
        table.insert(sme_ctx_parts, "")
      end

      table.insert(sme_ctx_parts, "=== EXECUTIVE SUMMARY ===")
      table.insert(sme_ctx_parts, executive_summary_text)
      table.insert(sme_ctx_parts, "=== END EXECUTIVE SUMMARY ===")
      table.insert(sme_ctx_parts, "")

      table.insert(sme_ctx_parts, "=== LAB REPORT ===")
      table.insert(sme_ctx_parts, trunc(lab_report_text, 600))
      table.insert(sme_ctx_parts, "=== END LAB REPORT ===")
      table.insert(sme_ctx_parts, "")

      local kc = State.get("known_contradictions")
      local compact_contra = build_compact_contradiction_summary(kc, 3)
      if has_text(compact_contra) then
        table.insert(sme_ctx_parts, "=== CONTRADICTION LANDSCAPE ===")
        table.insert(sme_ctx_parts, compact_contra)
        table.insert(sme_ctx_parts, "=== END CONTRADICTION LANDSCAPE ===")
        table.insert(sme_ctx_parts, "")
      end

      local final_diag = State.get("recent_landscape_diagnostic")
      if final_diag and has_text(final_diag.compact_summary) then
        table.insert(sme_ctx_parts, "=== FEEDBACK LANDSCAPE DIAGNOSTIC ===")
        table.insert(sme_ctx_parts, trunc(final_diag.compact_summary, 600))
        table.insert(sme_ctx_parts, "=== END FEEDBACK LANDSCAPE DIAGNOSTIC ===")
        table.insert(sme_ctx_parts, "")
      end

      if has_text(residual_errors_text) then
        table.insert(sme_ctx_parts, trunc(residual_errors_text, 900))
        table.insert(sme_ctx_parts, "")
      end

      local sme_context = table.concat(sme_ctx_parts, "\n")
      report_writer.history:add({role = "system", content = sme_context})
      return #sme_context
    end
  )
  local raw_end_sme_agenda = sme_agenda_text
  State.set("sme_agenda_raw", raw_end_sme_agenda)
  sme_agenda_text = gate_sme_agenda(
    raw_end_sme_agenda,
    "end_of_run_sme_agenda",
    table.concat({
      "End-of-run SME agenda",
      "Executive summary: " .. trunc(executive_summary_text, 600),
      "Lab report: " .. trunc(lab_report_text, 900),
      "Residual errors: " .. trunc(residual_errors_text, 900)
    }, "\n")
  )
  State.set("sme_agenda_gated", sme_agenda_text)

  -- ==================================================================
  -- Phase 3b: SME Worksheet (long-form companion to the SME Agenda)
  -- ==================================================================
  -- Pre-compute deterministic signals (suspected mislabels and contrasting
  -- pairs), then ask the report writer to produce a detailed Worksheet that
  -- names specific items, quotes the transcript, and separates "review this
  -- label" from "decide this policy". Unlike the Agenda, the Worksheet is
  -- NOT gated through rubric-memory because mislabel-review items are not
  -- policy questions.
  local suspected_mislabels = {}
  local contrasting_pairs = {}
  pcall(function()
    local item_recurrence_final = State.get("item_recurrence") or {}
    suspected_mislabels = detect_suspected_mislabels(iterations, item_recurrence_final) or {}
    contrasting_pairs = build_contrasting_pairs(iterations, item_recurrence_final) or {}
  end)

  Human.notify({message = string.format(
    "  SME Worksheet signals: %d suspected mislabels, %d contrasting pairs",
    #suspected_mislabels, #contrasting_pairs), level = "info"})

  local worksheet_text = "(SME worksheet not available)"
  Human.notify({message = "  Phase 3b: Generating SME worksheet...", level = "info"})

  local worksheet_prompt = table.concat({
    "=== SME WORKSHEET ===\n",
    "\nYou are writing the detailed companion to the SME Agenda. Subject-matter experts",
    "\nwill read this before their meeting to understand exactly what they are deciding.",
    "\n\nThis is the drill-down document: name specific items by external_id, quote the",
    "\ntranscript evidence verbatim, and separate label-review items from policy questions.",
    "\nUnlike the Agenda, you MUST include item IDs and direct transcript quotes.",
    "\n\nSections (emit them in this order; skip any section whose input list is empty):",
    "\n\n## Suspected mislabels (review before making policy changes)",
    "\nFor each item in SUSPECTED_MISLABELS input, write 3-5 lines:",
    "\n  **Item <external_id>** — label=<correct_value>, model=<predicted_value>, reason=<first reason code>",
    "\n  Transcript evidence: \"<evidence_quote>\"",
    "\n  Edit comment: \"<edit_comment>\"",
    "\n  Recommendation: ask the reviewer to confirm or correct the label; if mislabeled, shadow-invalidate.",
    "\nDo NOT treat these as policy questions until SMEs confirm the label.",
    "\n\n## Policy questions (real decisions SMEs must make)",
    "\nFor each of the top 3 policy questions (use CONTRASTING_PAIRS input and residual errors),",
    "\nwrite in this exact format:",
    "\n  **Question:** <plain-English question>",
    "\n  **Why it matters:** <one sentence on real-world impact>",
    "\n  **Contrasting examples:** (always include the pair when CONTRASTING_PAIRS has one covering this question)",
    "\n    Item <id_a>: \"<quote_a>\" → label=<A>",
    "\n    Item <id_b>: \"<quote_b>\" → label=<B>",
    "\n    Distinguishing feature: <one line naming the axis>",
    "\n  **Options:** a) ... b) ... c) ...",
    "\n  **If answered, resolves:** ~N items",
    "\n\n## Items still in play (for reference)",
    "\nCompact list of all PERSISTENT and OSCILLATING items with label, model prediction,",
    "\nand one-line rationale. One item per line. No editorializing, no options, no headers.",
    "\n\nRules:",
    "\n- Use plain English. SMEs are not engineers.",
    "\n- Quote transcript evidence verbatim; do NOT paraphrase.",
    "\n- Cite external_id (numeric) whenever you name an item.",
    "\n- If SUSPECTED_MISLABELS is empty, omit that whole section (do not write a placeholder).",
    "\n- If no contrasting pair exists for a policy question, omit the Contrasting examples sub-section for that question.",
    "\n- Keep each section focused. Do not pad. Do not repeat content across sections."
  }, "")

  worksheet_text = run_required_report_phase(
    report_writer,
    "report_writer",
    "end_sme_worksheet",
    worksheet_prompt,
    function()
      report_writer.clear_history()
      local parts = {}
      table.insert(parts, "=== EXECUTIVE SUMMARY ===")
      table.insert(parts, executive_summary_text)
      table.insert(parts, "=== END EXECUTIVE SUMMARY ===")
      table.insert(parts, "")

      -- Structured inputs the writer must use.
      local sm_json = "[]"
      local cp_json = "[]"
      pcall(function() sm_json = Json.encode(suspected_mislabels) end)
      pcall(function() cp_json = Json.encode(contrasting_pairs) end)
      table.insert(parts, "=== SUSPECTED_MISLABELS (JSON) ===")
      table.insert(parts, sm_json)
      table.insert(parts, "=== END SUSPECTED_MISLABELS ===")
      table.insert(parts, "")
      table.insert(parts, "=== CONTRASTING_PAIRS (JSON) ===")
      table.insert(parts, cp_json)
      table.insert(parts, "=== END CONTRASTING_PAIRS ===")
      table.insert(parts, "")

      -- Existing residual errors (already includes per-item RCA metadata).
      if has_text(residual_errors_text) then
        table.insert(parts, trunc(residual_errors_text, 2000))
        table.insert(parts, "")
      end

      -- Final item_recurrence compact summary for the "still in play" section.
      local item_recurrence_final = State.get("item_recurrence") or {}
      local recur_summary = build_recurrence_compact_summary(item_recurrence_final, #iterations)
      if has_text(recur_summary) then
        table.insert(parts, "=== ITEM RECURRENCE SUMMARY ===")
        table.insert(parts, trunc(recur_summary, 1500))
        table.insert(parts, "=== END ITEM RECURRENCE SUMMARY ===")
        table.insert(parts, "")
      end

      local ctx = table.concat(parts, "\n")
      report_writer.history:add({role = "system", content = ctx})
      return #ctx
    end
  )
  State.set("sme_worksheet", worksheet_text)

  -- Store results
  State.set("end_of_run_report", {
    generated_at = os.date("!%Y-%m-%dT%H:%M:%SZ"),
    run_summary = {
      cycles = #iterations,
      accepted = total_accepted,
      rejected = total_rejected,
      skipped = total_skipped,
      success_rate = success_rate,
      baseline_fb_ac1 = recent_baseline_metrics and recent_baseline_metrics.alignment or 0,
      final_fb_ac1 = last_accepted and last_accepted.recent_metrics and last_accepted.recent_metrics.alignment
        or (recent_baseline_metrics and recent_baseline_metrics.alignment or 0),
      total_fb_improvement = total_fb_improvement,
      total_acc_improvement = total_acc_improvement,
      stop_reason = stop_reason
    },
    executive_summary = {
      text = executive_summary_text
    },
    lab_report = {
      text = lab_report_text
    },
    sme_agenda = {
      text = sme_agenda_text
    },
    sme_worksheet = {
      text = worksheet_text,
      structured = {
        suspected_mislabels = suspected_mislabels,
        contrasting_pairs = contrasting_pairs,
      }
    },
    evidence = {
      divergence_summary = divergence_text,
      rca_evolution = rca_evolution_text,
      residual_errors = residual_errors_text
    }
  })

  -- Backward-compatible storage (lab_report serves as prior_run_prescription for next run)
  State.set("optimization_diagnostic", {
    text    = lab_report_text,
    summary = executive_summary_text,
    success_rate = success_rate,
    cycles = #iterations,
    accepted = total_accepted,
    rejected = total_rejected,
    skipped = total_skipped
  })

  -- Emit all three outputs to human
  Human.notify({message = "\n" .. string.rep("=", 60)
    .. "\n=== EXECUTIVE SUMMARY ===\n"
    .. string.rep("=", 60) .. "\n\n"
    .. executive_summary_text, level = "info"})

  Human.notify({message = "\n" .. string.rep("=", 60)
    .. "\n=== LAB REPORT ===\n"
    .. string.rep("=", 60) .. "\n\n"
    .. trunc(lab_report_text, 5000), level = "info"})

  Human.notify({message = "\n" .. string.rep("=", 60)
    .. "\n=== SME AGENDA ===\n"
    .. string.rep("=", 60) .. "\n\n"
    .. sme_agenda_text, level = "info"})

  Human.notify({message = "\n" .. string.rep("=", 60)
    .. "\n=== SME WORKSHEET ===\n"
    .. string.rep("=", 60) .. "\n\n"
    .. trunc(worksheet_text, 8000), level = "info"})

  if last_accepted_version_id and last_accepted_version_id ~= champion_version_id then
    Human.notify({message = string.format(
      "Winning version selected: %s (starting champion: %s). Manual promotion is required; the optimizer never promotes champion automatically.",
      last_accepted_version_id, tostring(champion_version_id)
    ), level = "info"})
  elseif last_accepted_version_id == champion_version_id then
    Human.notify({message = string.format(
      "Winning version remains the current champion (%s). No promotion was performed.",
      tostring(champion_version_id)
    ), level = "info"})
  else
    Human.notify({message = "No winning version was selected. No promotion was performed.", level = "info"})
  end

  return {
    success = true,
    status = stop_reason,
    message = string.format(
      "Completed %d cycles. Feedback AC1: %+.4f, Accuracy AC1: %+.4f (%s)",
      #iterations, total_fb_improvement, total_acc_improvement, stop_reason
    ),
    regression_baseline_id = regression_baseline_id,
    recent_baseline_id = recent_baseline_id,
    final_evaluation_id = last_accepted and last_accepted.recent_evaluation_id or nil,
    iterations = iterations,
    recent_improvement = total_fb_improvement,
    regression_improvement = total_acc_improvement,
    scorecard_id = scorecard_id,
    score_id = score_id,
    executive_summary = executive_summary_text,
    lab_report = lab_report_text,
    sme_agenda = sme_agenda_text,
    sme_worksheet = worksheet_text,
    winning_version_id = last_accepted_version_id
  }
