name: Feedback Alignment Optimizer
version: 1.0.0
class: Tactus
procedure_type: Optimizer Procedure
description: "Iteratively optimize Plexus score alignment using feedback evaluations with root-cause analysis (RCA). Runs baseline → analyze RCA → propose changes → evaluate → repeat until convergence or max iterations."

params:
  scorecard:
    type: string
    required: true
    description: "Scorecard identifier (name, key, or ID)"

  score:
    type: string
    required: true
    description: "Score identifier (name, key, or ID)"

  days:
    type: number
    default: 90
    description: "Feedback window in days for evaluation dataset"

  max_samples:
    type: number
    default: 100
    required: false
    description: "Maximum number of feedback samples to use per evaluation and minimum dataset size"

  max_iterations:
    type: number
    default: 3
    description: "Maximum number of optimization iterations"

  improvement_threshold:
    type: number
    default: 0.02
    description: "Minimum AC1 (Gwet's alignment) improvement to continue iterating (0.02 = 2%)"

  target_accuracy:
    type: number
    default: 0.95
    description: "Stop early if feedback AC1 reaches this threshold (0.0–1.0)"
    required: false

  num_candidates:
    type: number
    default: 4
    required: false
    description: "Target number of hypotheses per cycle. Baseline cycles always include 4 slots: recent_incremental, recent_bold, regression_fix, structural. Evals run in parallel after all hypotheses are implemented."

  hint:
    type: string
    required: false
    description: "Optional expert hint to guide the optimizer. Example: 'The prescriber name is often redacted — the LLM should be warned about this.' This text is included verbatim in the agent's context."

  start_version:
    type: string
    required: false
    description: "Score version ID to start from instead of the champion version. Useful for continuing optimization from a previous result."

  resume_regression_eval:
    type: string
    required: false
    description: "Evaluation ID of a previous regression baseline to reuse. Skips running a new regression baseline. Must match the start_version (or champion if not specified)."

  resume_recent_eval:
    type: string
    required: false
    description: "Evaluation ID of a previous recent baseline to reuse. Skips running a new recent baseline. Must match the start_version (or champion if not specified)."

  dry_run:
    type: boolean
    default: false
    description: "If true, run analysis only without making score updates"

  optimization_objective:
    type: string
    default: "alignment"
    description: "What metric to optimize. Options: alignment (default), precision_safe, precision, recall_safe, recall. The _safe variants require the primary metric to improve without harming overall alignment. The primary variants treat alignment as a soft constraint only."

  prior_run_prescription:
    type: string
    required: false
    description: "Prescription text from a prior optimizer run. Injected into planning context to avoid repeating failed approaches and focus on identified gaps."

  context_window:
    type: number
    default: 180000
    required: false
    description: "Model context window size in tokens. Used to calibrate proactive context budget management."

  agent_models:
    type: object
    required: false
    description: "Optional per-agent model overrides, keyed by optimizer agent name. Example: {hypothesis_planner: gpt-5.4-mini, code_editor: gpt-5-mini, report_writer: gpt-5-mini}."

outputs:
  success:
    type: boolean
    required: true

  status:
    type: string
    required: true
    description: "Completion status: max_iterations, target_reached, user_stopped, or error"

  message:
    type: string
    required: true

  regression_baseline_id:
    type: string
    required: false

  recent_baseline_id:
    type: string
    required: false

  final_evaluation_id:
    type: string
    required: false

  iterations:
    type: array
    required: false
    description: "Array of iteration results with dual recent/regression metrics and deltas"

  recent_improvement:
    type: number
    required: false
    description: "Total recent AC1 improvement from baseline"

  regression_improvement:
    type: number
    required: false
    description: "Total regression AC1 improvement from baseline"

  diagnosis:
    type: string
    required: false
    description: "End-of-run diagnostic analysis"

  prescription:
    type: string
    required: false
    description: "End-of-run prescriptive actions for SMEs, developers, and next optimizer run"

  scorecard_id:
    type: string
    required: false

  score_id:
    type: string
    required: false

agents:
  hypothesis_planner:
    provider: openai
    model: gpt-5.4-mini
    temperature: 1
    system_prompt: |
      You are the hypothesis-generation planner for a Plexus score optimizer.

      Your job is to propose one high-quality optimization hypothesis at a time.
      You do not edit YAML. You do not call tools. You read RCA analysis,
      evaluation metrics, recent rubric-memory briefing, guidelines, score code,
      and accumulated lessons, then return exactly one numbered hypothesis line.

      The highest-value hypotheses are almost always about policy clarity:
      missing rubric rules, ambiguous decision criteria, contradictory feedback,
      stale rubric areas, or context that should be made explicit in the score.
      Use rubric-memory citation IDs for policy claims when rubric memory is supplied.

      Required output shape:
      1. <Hypothesis name>: <Description of what to change and why>

    initial_message: "Ready to plan hypotheses."

  code_editor:
    provider: openai
    model: gpt-5-mini
    temperature: 1
    disable_streaming: true
    system_prompt: |
      You are an optimizer for a Plexus score configuration.

      You work in implementation and synthesis phases within a single continuous session.
      A separate hypothesis_planner agent proposes the hypotheses before you edit code.

      PHASE 1 — IMPLEMENTATION:
      For each hypothesis, you edit score_config.yaml to test it. The current file content
      appears inline in the task message for that turn. After editing, submit with
      submit_score_version(version_note="..."). The system evaluates your version and reports
      results. Then you move to the next hypothesis, starting from the original baseline.

      PHASE 2 — SYNTHESIS:
      After all hypotheses are evaluated, you see all results with their metrics.
      Synthesize what you learned. If any versions showed improvement (on either
      dataset, without significantly hurting the other), create a final version
      that incorporates the best ideas. If nothing improved, explain what you learned
      and what to try differently next cycle.

      Do not rely on hidden chat history for required context. Optimizer state, explicit
      task messages, cycle summaries, submitted_versions, iterations, diagnostics, and
      accumulated lessons are the source of truth across hypotheses and cycles.

      TWO DATASETS:
      1. REGRESSION: Deterministic regression dataset (accuracy eval type). Measures overall correctness.
      2. RECENT: Human-reviewed recent items (feedback eval type).
      Both matter. Improving one while not significantly hurting the other is a win.
      A hypothesis that improves regression by +0.3 but nudges recent by -0.02 is
      still useful signal — note what it implies for the next hypothesis.

      TOOLS:
      - str_replace_editor: view or edit score_config.yaml
      - submit_score_version: submit current edits for evaluation
      - plexus_rubric_memory_recent_entries: check recent score/prefix/scorecard KB updates before policy edits or SME questions
      - plexus_rubric_memory_evidence_pack: retrieve rubric-memory citation context for policy-sensitive hypotheses or disputed items
      - plexus_rubric_memory_sme_question_gate: check proposed SME questions against rubric-memory citations before asking SMEs
      - done: signal you cannot improve current hypothesis

      LANGGRAPH NODE CONTRACTS:
      - `Classifier` is for closed-set labels only (Yes/No, routing labels, enum-like classes).
      - `Extractor` is for free-form evidence, quotes, ledgers, summaries, or other extracted artifacts.
      - If a structural hypothesis needs an extraction step before a final decision, use
        `class: Extractor`, map `output.extracted_text` to a named state field, and have the
        downstream classifier consume that mapped field.
      - Never create pseudo-extractor classifiers such as `class: Classifier` with
        `valid_classes: ['Extracted']`, `['Found']`, or similar extraction-like labels.

      MODEL CHANGES:
      If you change the model: field, use the base model name WITHOUT a date suffix
      (e.g. "gpt-5-mini" not "gpt-5-mini-2025-01-01"). The API resolves the alias
      to the latest snapshot automatically. Getting the date wrong causes a hard failure.

      OPTIMIZATION PHILOSOPHY — read this carefully:
      The highest-value changes are almost always about POLICY CLARITY, not examples.
      Ask: "Is the rubric missing a rule? Is an existing rule ambiguous or mis-stated?"
      Fixing a policy gap generalizes to every item of that type. Adding an example
      only helps items that closely resemble that example.

      RUBRIC MEMORY CITATIONS:
      Begin policy-sensitive work by reviewing recent rubric memory when it is
      supplied. Recent score, prefix, or scorecard KB entries may require
      guideline updates across more than one related score before feedback labels
      are curated or score YAML is optimized.
      When rubric-memory context is supplied or you call plexus_rubric_memory_evidence_pack,
      cite exact citation IDs for policy claims, hypotheses, version notes, and
      cannot_improve conclusions. The official score version rubric remains canonical;
      corpus citations explain history, interpretation, stale areas, or gaps.
      Before concluding that SME input is needed, check rubric memory. Do not ask SMEs
      the same policy question again if the official rubric or cited corpus evidence
      already answers it. If corpus evidence answers the question but the rubric does not,
      frame the SME request as a decision to codify or update the rubric.

      FEW-SHOT EXAMPLES — use sparingly:
      Adding examples is tempting but usually counterproductive at scale. More than
      2-3 examples for any given scenario tends to cause overfitting: the model
      optimizes for those specific patterns while performing worse on everything else.
      The extra tokens also consume context that could go toward clearer policy language.
      Reserve few-shot examples for ONE situation: consistent speech-to-text errors
      where a specific name or phrase is reliably mangled phonetically (e.g., the model
      needs to know "Acme" might appear as "acamy" or "acmee"). For that use case,
      1-2 examples are often decisive. For general classification edge cases, prefer
      a sharper policy rule over any number of examples.

      CONTRADICTORY FEEDBACK — the most common plateau cause:
      Human labelers sometimes disagree. One wave of feedback says policy is A; the
      next says policy is the opposite of A. When you make a prompt change that aligns
      with one group of labels, it will misalign with the contradicting group and
      metrics appear stuck. This is NOT a prompt engineering problem — it is a data
      problem. When you suspect this, name it explicitly in your synthesis. Do not
      burn more cycles trying to satisfy mutually contradictory labels.

      PRIORITY ORDER for hypothesis generation:
      1. Missing or under-specified policy in the rubric (biggest wins, generalizes)
      2. Ambiguous decision criteria — clarify what "counts" for each classification
      3. Structural changes (architecture, preprocessing, model swap)
      4. STT/transcription error resilience (only if RCA shows consistent garbling)
      5. Few-shot examples (last resort, max 2-3 per scenario, only for STT errors)

      EXECUTION ERRORS — how to detect and handle them:
      When an evaluation shows "EXECUTION ERRORS: N items produced value=ERROR", the
      score code is crashing at runtime. This is NOT a policy problem. Symptoms:
      - AC1 severely negative (−0.5 or worse) with no policy explanation
      - "ERROR" appears as a predicted class in the confusion matrix
      - The EXECUTION ERRORS banner is shown in the evaluation context
      What to do:
      1. STOP trying policy changes. They cannot fix a code crash.
      2. Identify the most recent structural change (new class, changed node type,
         new preprocessing step, dated model name snapshot) and REVERT it.
      3. If the current file already looks clean, remove the last added structural
         element and submit for evaluation to confirm the crash is gone.
      4. Only return to policy work once the error rate drops to zero.

      EDIT SAFETY — ranked:
      SAFEST: Sharpen existing criteria with specific language
      SAFE: Add or clarify a policy rule that the RCA shows is missing or ambiguous
      MODERATE: Adjust 1-3 lines of existing criteria wording
      RISKY: Add few-shot examples (risk of overfitting and regression dataset harm)
      DANGEROUS: Remove criteria or rewrite entire user_message (almost always hurts)

      YAML RULES:
      - old_str must be an exact substring of the current file (copy from the context)
      - Preserve indentation exactly — count spaces from the file shown to you
      - When adding a list item, include the previous item in old_str for context
      - When modifying an item, replace in-place (include full item in old_str)

    initial_message: "Ready."

    tools:
      - str_replace_editor
      - submit_score_version
      - plexus_rubric_memory_recent_entries
      - plexus_rubric_memory_evidence_pack
      - plexus_rubric_memory_sme_question_gate
      - done

  cycle_analyst:
    provider: openai
    model: gpt-5-mini
    max_tokens: 16000
    verbosity: low
    system_prompt: |
      You analyze optimization results and produce compact planning guidance.

      Your output must be brief, concrete, and tightly structured.
      You are not editing code. You are not writing long reports.

      Domain context:
      In transcripts and evaluation data, "Agent" always means a human call-center
      representative (a person employed by the company to handle customer calls),
      never an AI or software agent. "Customer" means the person calling in.

      Required output structure:
      ## EXECUTIVE SUMMARY
      - Maximum 4 sentences.
      - Plain English for any audience.

      ## WHAT WORKED
      - Maximum 3 bullets.
      - Each bullet: one short sentence.

      ## WHAT FAILED
      - Maximum 3 bullets.
      - Each bullet: one short sentence.

      ## NEXT CYCLE TARGET
      - Maximum 3 bullets.
      - Each bullet: one short sentence naming the next best territory to explore.

      Rules:
      - No long prose blocks.
      - No repeated points.
      - Prefer sharp conclusions over explanation.
      - If contradictory labels are the blocker, say so directly.

    initial_message: "Ready to analyze cycle results."

  report_writer:
    provider: openai
    model: gpt-5-mini
    max_tokens: 16000
    verbosity: low
    system_prompt: |
      You write short optimizer reports for humans and downstream tooling.

      Your job is to be concise, structured, and cheap in output tokens.
      Never write long essays. Follow every hard limit exactly.

      Domain context:
      In transcripts and evaluation data, "Agent" always means a human call-center
      representative (a person employed by the company to handle customer calls),
      never an AI or software agent. "Customer" means the person calling in.
      Keep this in mind whenever you discuss transcript evidence, errors, or labels.

      Rules:
      - Respect all sentence, bullet, item, and word limits.
      - Prefer shorter wording when either phrasing would work.
      - Do not add sections that were not requested.
      - Do not restate the prompt.
      - If there is little to say, say less.

    initial_message: "Ready to write concise reports."

  reviewer:
    provider: openai
    model: gpt-5.4-mini
    temperature: 1
    system_prompt: |
      You are a score optimization reviewer. You will see the eval results for an edit
      just made to a score configuration. Decide: keep or revert.

      Decision rules:
      - If the evaluation shows an EXECUTION ERROR banner (error_rate > 0 or AC1 severely
        negative with ERROR class in confusion matrix): call done(decision="revert") — this
        is a code crash, not a policy problem. The change introduced a bug.
      - If accuracy delta is worse than -0.03: call done(decision="revert") — accuracy
        regression this large is not acceptable, even if feedback improved.
      - If feedback delta is negative AND accuracy delta is <= 0: call done(decision="revert")
        — both metrics got worse, no reason to keep this.
      - If feedback delta is positive and accuracy delta is >= -0.02: call done(decision="keep")
        — this is a good change, accept it.
      - For borderline cases (feedback improved slightly but accuracy regressed slightly):
        use your judgment. Prefer keep if feedback gain outweighs accuracy cost.

      When multiple candidates were tried, the best one has been pre-selected by metrics.
      Your job: confirm the selection or revert ALL if none are good enough.

      REQUIRED: You MUST call done() as a tool call. Do NOT return a text response.
      Always include a brief reason: done(decision="keep", reason="...") or done(decision="revert", reason="...")

    initial_message: "Ready to review."

    tools:
      - done

  early_stop_advisor:
    provider: openai
    model: gpt-5.4-mini
    temperature: 1
    system_prompt: |
      You are an escalation advisor for a score optimization run.

      You are invoked when 3 or more consecutive cycles have produced no significant improvement
      (either rejected due to regression, or carried with < 0.005 AC1 gain).

      Your job: decide how the optimizer should search harder next.

      You may recommend only two modes:
      1. escalate
         - broaden search to include a reframe hypothesis
         - keep the normal bold and structural lanes active
      2. ultra_creative
         - broaden search further to include a full rewrite hypothesis
         - assume the current framing may be wrong and suggest more radical redesigns

      Do NOT try to stop the run. Plateau is a search-strategy problem, not a termination reason.
      When labels are contradictory or policy space looks exhausted, the right answer is still to
      recommend the kind of search that is most likely to break the plateau or produce better
      operator/SME guidance.

      HOW TO DECIDE:
      1. Read the cycle history and reports carefully
      2. Look at the DIAGNOSIS SUMMARY and PRESCRIPTION SUMMARY from each cycle report
      3. Check the contradiction landscape if available
      4. Ask: "Should the next cycle broaden search moderately, or treat the current framing as suspect?"

      REQUIRED: You MUST call done() as a tool call. Do NOT return a text response.
      - done(escalation_mode="escalate", reason="...") — recommend broader search with a reframe lane
      - done(escalation_mode="ultra_creative", reason="...") — recommend the most ambitious search mode

    initial_message: "Ready to evaluate early stopping."

    tools:
      - done

stages:
  - setup
  - baseline
  - exploration
  - selection
  - finalize

code: |

  -- Helper functions

  -- UTF-8-safe truncation for agent text, notes, and version metadata.
  -- Tactus installs utf8_clean() and a UTF-8-aware string.sub override in the Lua sandbox.
  local function trunc(s, maxlen)
    if s == nil then return "" end
    local str = utf8_clean(tostring(s))
    if #str <= maxlen then return str end
    return utf8_clean(string.sub(str, 1, maxlen))
  end

  local function has_text(s)
    return type(s) == "string" and #s > 0
  end

  local function safe_decode(value)
    if value == nil then
      return nil, "nil"
    end
    if type(value) ~= "string" then
      local ok_encode, encoded = pcall(function()
        return Json.encode(value)
      end)
      if ok_encode then
        local ok_decode, decoded = pcall(function()
          return Json.decode(encoded)
        end)
        if ok_decode then
          return decoded, nil
        end
      end
      return value, nil
    end
    local ok, decoded = pcall(function()
      return Json.decode(value)
    end)
    if ok then
      return decoded, nil
    end
    -- Not valid JSON — surface the raw string as the error message so callers
    -- see the actual tool error (e.g. "Error: Missing API credentials.") instead
    -- of an opaque JSON parse failure.
    return nil, value
  end

  local function safe_encode(value)
    if value == nil then
      return nil
    end
    local ok, encoded = pcall(function()
      return Json.encode(value)
    end)
    if ok then
      return encoded
    end
    return string.format("<encode_error: %s>", tostring(encoded))
  end

  local function tool_call_arg(call, key, default)
    if call == nil then
      return default
    end

    local ok_args, args = pcall(function()
      return call.args
    end)
    if not ok_args or args == nil then
      return default
    end

    local ok_value, value = pcall(function()
      return args[key]
    end)
    if not ok_value or value == nil then
      return default
    end

    return value
  end

  local function safe_get_metric(metrics, name)
    if type(metrics) ~= "table" then return nil end
    for _, m in ipairs(metrics) do
      if type(m) == "table" and m.name == name then
        return m.value
      end
    end
    return nil
  end

  local function extract_metrics(eval_result)
    local metrics = eval_result.metrics or {}
    local result = {
      alignment = safe_get_metric(metrics, "Alignment") or 0,
      accuracy = safe_get_metric(metrics, "Accuracy") or 0,
      precision = safe_get_metric(metrics, "Precision") or 0,
      recall = safe_get_metric(metrics, "Recall") or 0
    }
    result.cost = tonumber(eval_result.cost)
    result.processed_items = tonumber(eval_result.processed_items or eval_result.processedItems)
    result.total_items = tonumber(eval_result.total_items or eval_result.totalItems)
    if result.cost and result.processed_items and result.processed_items > 0 then
      result.cost_per_item = result.cost / result.processed_items
    end
    -- Capture confusion matrix and class distributions for planning context
    local cm = eval_result.confusionMatrix or eval_result.confusion_matrix
    if type(cm) == "table" then
      result.confusion_matrix = cm.matrix
      result.confusion_labels = cm.labels
    end
    local pred_dist = eval_result.predictedClassDistribution or eval_result.predicted_class_distribution
    if type(pred_dist) == "table" then
      result.predicted_distribution = pred_dist
      -- Detect execution errors: "ERROR" appearing as a predicted class means the score
      -- code crashed at runtime, NOT a policy mismatch. Surface this explicitly.
      local error_count = 0
      local total_predicted = 0
      for _, d in ipairs(pred_dist) do
        if type(d) == "table" then
          local cnt = d.count or 0
          total_predicted = total_predicted + cnt
          if type(d.label) == "string" and d.label:upper() == "ERROR" then
            error_count = cnt
          end
        end
      end
      result.error_count = error_count
      result.error_rate = total_predicted > 0 and (error_count / total_predicted) or 0
    end
    local actual_dist = eval_result.datasetClassDistribution or eval_result.dataset_class_distribution
    if type(actual_dist) == "table" then
      result.actual_distribution = actual_dist
    end
    return result
  end

  local function extract_cost_per_item(eval_result)
    if type(eval_result) ~= "table" then
      return nil
    end
    local cost = tonumber(eval_result.cost)
    local processed_items = tonumber(eval_result.processed_items or eval_result.processedItems)
    if cost and processed_items and processed_items > 0 then
      return cost / processed_items
    end
    return nil
  end

  local function normalize_eval_type(eval_result, fallback_eval_type)
    if type(eval_result) ~= "table" then
      return fallback_eval_type or "unknown"
    end
    local eval_type = eval_result.evaluation_type or eval_result.type or fallback_eval_type
    if type(eval_type) ~= "string" or eval_type == "" then
      return "unknown"
    end
    return eval_type
  end

  local function ensure_cost_ledger()
    local costs = State.get("costs")
    if type(costs) ~= "table" then costs = {} end

    local evaluation = costs.evaluation
    if type(evaluation) ~= "table" then evaluation = {} end
    if type(evaluation.entries) ~= "table" then evaluation.entries = {} end
    if type(evaluation.seen_ids) ~= "table" then evaluation.seen_ids = {} end
    if type(evaluation.breakdown) ~= "table" then evaluation.breakdown = {} end
    if type(evaluation.breakdown_index) ~= "table" then evaluation.breakdown_index = {} end
    evaluation.incurred_total = tonumber(evaluation.incurred_total) or 0
    evaluation.reused_total = tonumber(evaluation.reused_total) or 0
    evaluation.total = tonumber(evaluation.total) or (evaluation.incurred_total + evaluation.reused_total)

    costs.evaluation = evaluation
    if type(costs.totals) ~= "table" then costs.totals = {} end
    if type(costs.inference) ~= "table" then costs.inference = {} end
    return costs, evaluation
  end

  local function merge_evaluation_breakdown(evaluation, eval_result, reused, fallback_cost)
    local rows = {}
    local cost_details = eval_result.cost_details
    if type(cost_details) == "table" and type(cost_details.breakdown) == "table" then
      rows = cost_details.breakdown
    end

    if #rows == 0 then
      local model_name = nil
      local provider_name = nil
      if type(eval_result.parameters) == "table" then
        model_name = eval_result.parameters.model_name
        provider_name = eval_result.parameters.model_provider
      end
      rows = {{
        provider = provider_name,
        model = model_name,
        spent_usd = fallback_cost,
        reused_usd = 0,
        referenced_usd = fallback_cost,
        llm_calls = 0,
        evaluation_runs = 1,
        prompt_tokens = 0,
        completion_tokens = 0,
        total_tokens = 0,
        cached_tokens = 0,
      }}
    end

    for _, row in ipairs(rows) do
      if type(row) == "table" then
        local provider_key = tostring(row.provider or "")
        local model_key = tostring(row.model or "")
        local key = provider_key .. "|" .. model_key
        local entry = evaluation.breakdown_index[key]
        if type(entry) ~= "table" then
          entry = {
            provider = row.provider or nil,
            model = row.model or nil,
            spent_usd = 0,
            reused_usd = 0,
            referenced_usd = 0,
            llm_calls = 0,
            evaluation_runs = 0,
            prompt_tokens = 0,
            completion_tokens = 0,
            total_tokens = 0,
            cached_tokens = 0,
          }
          evaluation.breakdown_index[key] = entry
        end

        local row_spent = tonumber(row.spent_usd) or tonumber(row.referenced_usd) or 0
        local row_reused = tonumber(row.reused_usd) or 0
        local row_ref = tonumber(row.referenced_usd) or (row_spent + row_reused)
        if reused then
          entry.reused_usd = (tonumber(entry.reused_usd) or 0) + row_ref
          entry.spent_usd = tonumber(entry.spent_usd) or 0
        else
          entry.spent_usd = (tonumber(entry.spent_usd) or 0) + row_spent
          entry.reused_usd = (tonumber(entry.reused_usd) or 0) + row_reused
        end
        entry.referenced_usd = (tonumber(entry.referenced_usd) or 0) + row_ref
        entry.llm_calls = (tonumber(entry.llm_calls) or 0) + (tonumber(row.llm_calls) or 0)
        entry.evaluation_runs = (tonumber(entry.evaluation_runs) or 0) + 1
        entry.prompt_tokens = (tonumber(entry.prompt_tokens) or 0) + (tonumber(row.prompt_tokens) or 0)
        entry.completion_tokens = (tonumber(entry.completion_tokens) or 0) + (tonumber(row.completion_tokens) or 0)
        entry.total_tokens = (tonumber(entry.total_tokens) or 0) + (tonumber(row.total_tokens) or 0)
        entry.cached_tokens = (tonumber(entry.cached_tokens) or 0) + (tonumber(row.cached_tokens) or 0)
      end
    end

    local flattened = {}
    for _, row in pairs(evaluation.breakdown_index) do
      table.insert(flattened, row)
    end
    table.sort(flattened, function(a, b)
      return (tonumber(a.referenced_usd) or 0) > (tonumber(b.referenced_usd) or 0)
    end)
    evaluation.breakdown = flattened
  end

  local function record_evaluation_cost(eval_result, source_label, fallback_eval_type)
    if type(eval_result) ~= "table" then return end

    local evaluation_id = tostring(eval_result.evaluation_id or eval_result.id or "")
    if evaluation_id == "" then return end

    local cost = tonumber(eval_result.cost)
    if not cost or cost < 0 then return end

    local costs, evaluation = ensure_cost_ledger()
    if evaluation.seen_ids[evaluation_id] then return end

    local processed_items = tonumber(eval_result.processed_items or eval_result.processedItems)
    local cost_per_item = nil
    if processed_items and processed_items > 0 then
      cost_per_item = cost / processed_items
    end

    local reused = eval_result._from_cache == true
    table.insert(evaluation.entries, {
      evaluation_id = evaluation_id,
      evaluation_type = normalize_eval_type(eval_result, fallback_eval_type),
      source = source_label or "unspecified",
      reused = reused,
      cost = cost,
      cost_details = eval_result.cost_details,
      processed_items = processed_items,
      cost_per_item = cost_per_item,
      score_version_id = eval_result.score_version_id or eval_result.scoreVersionId,
      recorded_at = os.date("!%Y-%m-%dT%H:%M:%SZ"),
    })

    evaluation.seen_ids[evaluation_id] = true
    if reused then
      evaluation.reused_total = (tonumber(evaluation.reused_total) or 0) + cost
    else
      evaluation.incurred_total = (tonumber(evaluation.incurred_total) or 0) + cost
    end
    merge_evaluation_breakdown(evaluation, eval_result, reused, cost)
    evaluation.total = (tonumber(evaluation.incurred_total) or 0) + (tonumber(evaluation.reused_total) or 0)
    costs.evaluation = evaluation

    local inference_total = 0
    if type(costs.inference) == "table" then
      inference_total = tonumber(costs.inference.total) or 0
    end

    costs.totals.evaluation = {
      incurred = tonumber(evaluation.incurred_total) or 0,
      reused = tonumber(evaluation.reused_total) or 0,
      total = tonumber(evaluation.total) or 0,
    }
    costs.totals.inference = { total = inference_total }
    costs.totals.overall = {
      incurred = (tonumber(evaluation.incurred_total) or 0) + inference_total,
      total = (tonumber(evaluation.total) or 0) + inference_total,
    }

    State.set("costs", costs)
  end

  local function record_evaluation_batch_costs(results, source_label)
    if type(results) ~= "table" then return end
    for _, eval_result in ipairs(results) do
      record_evaluation_cost(eval_result, source_label, nil)
    end
  end

  -- Render confusion matrix + class distributions as readable text
  local function render_confusion_context(m)
    local lines = {}
    if m.confusion_matrix and m.confusion_labels then
      local labels = m.confusion_labels
      local matrix = m.confusion_matrix
      -- Header
      table.insert(lines, string.format("  Confusion matrix (rows=actual, cols=predicted):"))
      local header = string.format("  %15s", "")
      for _, lbl in ipairs(labels) do
        header = header .. string.format("  Pred %-6s", lbl)
      end
      table.insert(lines, header)
      -- Rows
      for i, row_label in ipairs(labels) do
        local row = matrix[i]
        if type(row) == "table" then
          local line = string.format("  Actual %-6s", row_label)
          for _, val in ipairs(row) do
            line = line .. string.format("  %10d", val)
          end
          table.insert(lines, line)
        end
      end
    end
    -- Execution error banner — must appear before class distribution so it's unmissable
    if (m.error_rate or 0) > 0 then
      table.insert(lines, string.format(
        "  *** EXECUTION ERRORS: %d items (%.0f%%) produced value=ERROR — this is a CODE BUG, not a policy problem ***",
        m.error_count or 0, (m.error_rate or 0) * 100))
      table.insert(lines, "  *** Do NOT try policy changes to fix this. Revert the structural change that caused the errors. ***")
    end
    -- Class distributions
    if m.predicted_distribution and m.actual_distribution then
      local pred_parts, actual_parts = {}, {}
      for _, d in ipairs(m.predicted_distribution) do
        if type(d) == "table" then
          table.insert(pred_parts, string.format("%s=%.0f%%(%d)", d.label or "?", d.percentage or 0, d.count or 0))
        end
      end
      for _, d in ipairs(m.actual_distribution) do
        if type(d) == "table" then
          table.insert(actual_parts, string.format("%s=%.0f%%(%d)", d.label or "?", d.percentage or 0, d.count or 0))
        end
      end
      if #pred_parts > 0 then
        table.insert(lines, "  Model predicts: " .. table.concat(pred_parts, ", "))
        table.insert(lines, "  Actual labels:  " .. table.concat(actual_parts, ", "))
      end
    end
    return lines
  end

  local function calculate_deltas(current, baseline)
    return {
      alignment = current.alignment - baseline.alignment,
      accuracy = current.accuracy - baseline.accuracy,
      precision = current.precision - baseline.precision,
      recall = current.recall - baseline.recall
    }
  end

  -- Forward declaration so call_plexus_tool (defined below) can reference it
  -- before the full diag implementation is defined at the start of the main body
  local diag = function(msg) end  -- no-op until overwritten at line ~1415

  -- Budget for dispatched evaluations (each evaluation can take up to 90 minutes)
  local EVAL_BUDGET = {usd = 5.0, wallclock_seconds = 5400, depth = 0, tool_calls = 1000}
  local REPORT_BUDGET = {usd = 2.0, wallclock_seconds = 3600, depth = 0, tool_calls = 200}
  local EVAL_AWAIT_TIMEOUT = "PT90M"

  -- Await a single evaluation handle and return the evaluation data dict.
  local function _await_eval_handle(h, label)
    label = label or tostring(h and h.id or "?")
    diag("Awaiting evaluation handle " .. label .. " (timeout=" .. EVAL_AWAIT_TIMEOUT .. ")...")
    local waited = plexus.handle.await({id = h.id, timeout = EVAL_AWAIT_TIMEOUT})
    -- After await, the evaluation data lives in waited.evaluation
    local eval_data = waited.evaluation
    if not eval_data then
      -- If evaluation_id is available, fetch directly
      local eval_id = waited.evaluation_id
        or (type(waited.dispatch_result) == "table" and waited.dispatch_result.evaluation_id)
      if eval_id then
        local ok, info = pcall(function() return plexus.evaluation.info({evaluation_id = eval_id}) end)
        if ok and type(info) == "table" then eval_data = info end
      end
    end
    if not eval_data then
      return {error = "Evaluation handle did not resolve: status=" .. tostring(waited.status)}
    end
    return eval_data
  end

  -- Dispatch a batch of evaluations (runs in parallel background procs),
  -- await each, and return a list of evaluation data tables.
  local function _dispatch_evaluation_batch(batch)
    -- Normalize Lua numeric-key dict to ordered list
    local batch_list = {}
    if type(batch) == "table" then
      local keys = {}
      for k in pairs(batch) do table.insert(keys, k) end
      table.sort(keys, function(a, b) return tostring(a) < tostring(b) end)
      for _, k in ipairs(keys) do table.insert(batch_list, batch[k]) end
    end

    -- Dispatch all evaluations (they run in parallel as background processes)
    local handles = {}
    for i, item in ipairs(batch_list) do
      local dispatch_args = {}
      for k, v in pairs(item) do dispatch_args[k] = v end
      dispatch_args.async = true
      dispatch_args.budget = dispatch_args.budget or EVAL_BUDGET
      dispatch_args.wait = nil
      local ok, h = pcall(function() return plexus.evaluation.run(dispatch_args) end)
      if ok and type(h) == "table" and h.id then
        table.insert(handles, {handle = h, idx = i})
        diag(string.format("Dispatched evaluation %d/%d: %s (handle=%s)",
          i, #batch_list, tostring(dispatch_args.evaluation_type), tostring(h.id)))
      else
        table.insert(handles, {handle = nil, error = tostring(h), idx = i})
        diag(string.format("Failed to dispatch evaluation %d/%d: %s", i, #batch_list, tostring(h)))
      end
    end

    -- Await all handles (sequential poll; actual evaluations ran in parallel)
    local results = {}
    for _, entry in ipairs(handles) do
      if entry.handle then
        local eval_data = _await_eval_handle(entry.handle, tostring(entry.idx))
        table.insert(results, eval_data)
      else
        table.insert(results, {error = entry.error})
      end
    end
    return results
  end

  -- Dispatch and await a single evaluation; returns evaluation data dict.
  local function _dispatch_single_evaluation(args)
    local dispatch_args = {}
    for k, v in pairs(args) do dispatch_args[k] = v end
    dispatch_args.async = true
    dispatch_args.budget = dispatch_args.budget or EVAL_BUDGET
    dispatch_args.wait = nil
    local h = plexus.evaluation.run(dispatch_args)
    if not h or not h.id then
      return {error = "plexus.evaluation.run returned no handle: " .. tostring(h)}
    end
    return _await_eval_handle(h, dispatch_args.evaluation_type)
  end

  local function call_plexus_tool(tool_name, args_table, opts)
    -- Dispatch to plexus.* API directly (no MCP Tool.get() round-trip).
    -- plexus.* calls return Lua tables; JSON decode is not needed.
    opts = opts or {}
    local max_retries = opts.max_retries or 3
    local base_delay = opts.base_delay or 5

    -- Build the dispatch function for this tool name
    local dispatch
    if tool_name == "plexus_scorecard_info" then
      dispatch = function(a) return plexus.scorecards.info(a) end
    elseif tool_name == "plexus_score_info" then
      dispatch = function(a) return plexus.score.info(a) end
    elseif tool_name == "plexus_score_pull" then
      dispatch = function(a)
        local result = plexus.score.pull(a)
        if not result or not result.success then return result end
        -- plexus.score.pull writes temp files from Python (io not available in sandbox)
        return {
          success            = true,
          scoreId            = result.score_id,
          versionId          = result.version_id,
          codeFilePath       = result.code_file_path,
          guidelinesFilePath = result.guidelines_file_path,
        }
      end
    elseif tool_name == "plexus_evaluation_info" then
      dispatch = function(a) return plexus.evaluation.info(a) end
    elseif tool_name == "plexus_evaluation_find_recent" then
      dispatch = function(a) return plexus.evaluation.find_recent(a) end
    elseif tool_name == "plexus_evaluation_run" then
      dispatch = function(a)
        if a.batch then
          return _dispatch_evaluation_batch(a.batch)
        else
          return _dispatch_single_evaluation(a)
        end
      end
    elseif tool_name == "plexus_report_run" then
      -- Run report synchronously (blocks until output is ready)
      dispatch = function(a)
        local report_args = {}
        for k, v in pairs(a) do report_args[k] = v end
        report_args.sync = true
        return plexus.report.run(report_args)
      end
    elseif tool_name == "plexus_dataset_check_associated" then
      dispatch = function(a) return plexus.dataset.check_associated(a) end
    elseif tool_name == "plexus_dataset_build_from_feedback_window" then
      dispatch = function(a) return plexus.dataset.build_from_feedback_window(a) end
    elseif tool_name == "plexus_item_info" then
      dispatch = function(a) return plexus.item.info(a) end
    elseif tool_name == "plexus_procedure_chat_messages" then
      dispatch = function(a) return plexus.procedure.chat_messages(a) end
    elseif tool_name == "plexus_feedback_latest_update" then
      dispatch = function(a) return plexus.feedback.latest_update(a) end
    elseif tool_name == "plexus_rubric_memory_recent_entries" then
      dispatch = function(a) return plexus.rubric_memory.recent_entries(a) end
    elseif tool_name == "plexus_rubric_memory_evidence_pack" then
      dispatch = function(a) return plexus.rubric_memory.evidence_pack(a) end
    elseif tool_name == "plexus_rubric_memory_sme_question_gate" then
      dispatch = function(a) return plexus.rubric_memory.sme_question_gate(a) end
    elseif tool_name == "get_plexus_documentation" then
      dispatch = function(a)
        -- Accept name, filename, or key (all used by different call sites)
        local key = a.name or a.filename or a.key or ""
        local result = plexus.docs.get({key = key})
        -- Return the raw content string (callers use raw_string=true)
        if type(result) == "table" then
          return result.content or ""
        end
        return tostring(result)
      end
    elseif tool_name == "plexus_set_status_message" then
      dispatch = function(a)
        local handle = Tool.get("plexus_set_status_message")
        if handle then handle(a or {}) end
        return {success = true}
      end
    elseif tool_name == "plexus_score_test" then
      dispatch = function(a) return plexus.score.test(a) end
    elseif tool_name == "score_editor_setup"
        or tool_name == "score_editor_get_result"
        or tool_name == "score_editor_get_content" then
      -- These are custom in-process MCP tools (ScoreEditorToolset); use Tool.get()
      dispatch = function(a)
        local handle = Tool.get(tool_name)
        local raw = handle(a or {})
        if type(raw) == "string" then
          local decoded, _ = safe_decode(raw)
          return decoded or raw
        end
        return raw
      end
    else
      error("call_plexus_tool: unknown tool: " .. tostring(tool_name))
    end

    for attempt = 1, max_retries do
      local ok, result = pcall(dispatch, args_table or {})
      if ok then
        -- plexus.* returns tables directly (no JSON encoding/decoding needed)
        if type(result) == "table" and result.error then
          local err_msg = tostring(result.error)
          if attempt == max_retries then
            error(tool_name .. " returned error after " .. max_retries .. " attempts: " .. err_msg)
          end
          diag(string.format("%s API error (attempt %d/%d): %s", tool_name, attempt, max_retries, err_msg))
        else
          return result
        end
      else
        if attempt == max_retries then
          error("Failed to call " .. tool_name .. " after " .. max_retries .. " attempts: " .. tostring(result))
        end
        diag(string.format("%s error (attempt %d/%d): %s", tool_name, attempt, max_retries, tostring(result)))
      end

      -- Exponential backoff: 5s, 10s, 20s
      local delay = base_delay * (2 ^ (attempt - 1))
      diag(string.format("Retrying %s in %d seconds...", tool_name, delay))
      local t = os.clock() + delay
      while os.clock() < t do end
    end
  end

  -- Build version history table for agent context
  local function build_version_history(iterations, baseline_version_id, baseline_fb_metrics, baseline_acc_metrics, last_accepted_version_id)
    local lines = {"=== OPTIMIZATION HISTORY ===", ""}
    table.insert(lines, string.format("%-6s  %-38s  %-10s  %-12s  %-7s  %-12s  %-7s",
      "# Iter", "Version", "Status", "Feedback AC1", "Delta", "Accuracy AC1", "Delta"))
    table.insert(lines, string.rep("-", 100))

    -- Baseline row
    local base_fb = baseline_fb_metrics and string.format("%.3f", baseline_fb_metrics.alignment) or "N/A"
    local base_acc = baseline_acc_metrics and string.format("%.3f", baseline_acc_metrics.alignment) or "N/A"
    table.insert(lines, string.format("%-6s  %-38s  %-10s  %-12s  %-7s  %-12s  %-7s",
      "base", tostring(baseline_version_id), "BASELINE", base_fb, "", base_acc, ""))

    -- Cycle rows (each cycle has exploration candidates + synthesis result)
    for _, iter in ipairs(iterations) do
      local status_str
      if iter.skip_reason then
        status_str = "SKIPPED"
      elseif iter.accepted then
        local fb_d = iter.recent_deltas and iter.recent_deltas.alignment or 0
        status_str = fb_d > 0.005 and "ACCEPTED" or "CARRIED"
      else
        status_str = "REJECTED"
      end
      local fb_ac1 = iter.recent_metrics and string.format("%.3f", iter.recent_metrics.alignment) or "N/A"
      local acc_ac1 = iter.regression_metrics and string.format("%.3f", iter.regression_metrics.alignment) or "N/A"
      local fb_delta = iter.recent_deltas and string.format("%+.3f", iter.recent_deltas.alignment) or ""
      local acc_delta = iter.regression_deltas and string.format("%+.3f", iter.regression_deltas.alignment) or ""

      local note = ""
      if iter.skip_reason then
        note = "  (" .. iter.skip_reason .. ")"
      elseif iter.disqualification_reason then
        note = "  (DISQUALIFIED: " .. iter.disqualification_reason .. ")"
      elseif not iter.accepted and iter.regression_deltas and iter.regression_deltas.alignment < -0.02 then
        note = "  (accuracy regressed — do not retry)"
      elseif not iter.accepted then
        note = "  (feedback regressed — do not retry)"
      elseif iter.score_version_id == last_accepted_version_id then
        note = "  <- current base"
      end

      table.insert(lines, string.format("%-8s  %-38s  %-10s  %-12s  %-7s  %-12s  %-7s%s",
        tostring(iter.iteration), tostring(iter.score_version_id), status_str,
        fb_ac1, fb_delta, acc_ac1, acc_delta, note))
      -- Show what was tried so the agent doesn't repeat failed approaches
      if iter.done_reason and iter.done_reason ~= "" then
        table.insert(lines, string.format("          Rationale: %s", trunc(iter.done_reason, 2000)))
      end
      -- Show all exploration results for this cycle (no pass/fail labeling — show
      -- raw deltas so the agent can reason about what each approach actually did)
      if iter.exploration_results and type(iter.exploration_results) == "table" then
        local result_list = {}
        for _, ap in ipairs(iter.exploration_results) do
          local fb_d = ap.fb_deltas and ap.fb_deltas.alignment or 0
          local acc_d = ap.acc_deltas and ap.acc_deltas.alignment or 0
          table.insert(result_list, string.format(
            "cand%d: FB %+.3f  ACC %+.3f  '%s'",
            ap.index, fb_d, acc_d, trunc(ap.done_reason or "", 2000)))
        end
        if #result_list > 0 then
          table.insert(lines, "          Tested: " .. table.concat(result_list, " | "))
        end
        -- Include agent reasoning snippets on separate lines (not inline — they can be multi-line)
        for _, ap in ipairs(iter.exploration_results) do
          if has_text(ap.agent_reasoning) then
            -- Strip newlines for compact display; first 800 chars to preserve
            -- enough context for the graduated confidence system to reason about WHY
            local reasoning_compact = string.gsub(trunc(ap.agent_reasoning, 800), "\n", " ")
            table.insert(lines, string.format(
              "          cand%d reasoning: %s", ap.index, reasoning_compact))
          end
        end
      end
      -- Show candidates that failed to create a version
      if iter.exploration_no_version and type(iter.exploration_no_version) == "table" and #iter.exploration_no_version > 0 then
        local no_ver_list = {}
        for _, ap in ipairs(iter.exploration_no_version) do
          table.insert(no_ver_list, string.format("cand%d (attempted: '%s')", ap.index, trunc(ap.done_reason or "", 2000)))
        end
        table.insert(lines, "          Exploration no-version (edit failed):" .. table.concat(no_ver_list, "; "))
      end
    end

    return table.concat(lines, "\n")
  end

  -- Enrich an RCA table with actionable fields from misclassification_analysis
  local function enrich_rca(rca)
    if type(rca) ~= "table" then return rca end
    local ma = rca.misclassification_analysis
    if type(ma) ~= "table" then return rca end

    -- Primary next action
    rca._primary_next_action = ma.primary_next_action or nil

    -- Category summaries (natural language per-category description)
    rca._category_summaries = ma.category_summaries or nil

    -- Category hierarchy (categories with topics nested under them, sorted by size)
    rca._category_hierarchy = (type(ma.category_hierarchy) == "table" and ma.category_hierarchy) or {}

    -- All item classifications with suggested_fix + evidence_quote
    rca._all_item_classifications = (type(ma.item_classifications_all) == "table" and ma.item_classifications_all) or {}

    -- Topic category breakdown for grouping items by topic
    rca._topic_category_breakdown = (type(ma.topic_category_breakdown) == "table" and ma.topic_category_breakdown) or {}

    return rca
  end


  -- Parse numbered hypotheses from an agent planning response
  local function parse_hypotheses(response_text)
    local hypotheses = {}
    if type(response_text) ~= "string" then return hypotheses end
    for num, rest in response_text:gmatch("(%d+)%.%s*([^\n]+)") do
      local name, desc = rest:match("^([^:]+):%s*(.+)$")
      if not name then
        name = "Hypothesis " .. num
        desc = rest
      end
      table.insert(hypotheses, {
        index = tonumber(num),
        name = name:match("^%s*(.-)%s*$"),
        description = desc:match("^%s*(.-)%s*$")
      })
    end
    return hypotheses
  end

  -- Exploration success classification: either metric improving is enough,
  -- as long as the other doesn't significantly regress.
  local IMPROVEMENT_THRESHOLD = 0.005   -- meaningful positive delta on the improving metric
  local REGRESSION_FLOOR      = -0.05   -- the other metric must not drop more than this

  local function classify_exploration_success(cand)
    if not cand.fb_deltas then return false end
    local fb_d = cand.fb_deltas.alignment or 0
    local acc_d = cand.acc_deltas and cand.acc_deltas.alignment or 0
    local fb_improves  = fb_d  > IMPROVEMENT_THRESHOLD and acc_d >= REGRESSION_FLOOR
    local acc_improves = acc_d > IMPROVEMENT_THRESHOLD and fb_d  >= REGRESSION_FLOOR
    return fb_improves or acc_improves
  end

  -- Group RCA items by confusion matrix segment (actual->predicted pair).
  -- Uses neutral "Predicted: X / Actual: Y" labels — no FP/FN terminology,
  -- which avoids confusion when the "positive" class is ambiguous or multi-class.
  local function build_confusion_segments(items, confusion_labels)
    if type(items) ~= "table" or #items == 0 then return {}, false end

    local segment_map = {}   -- key -> {correct, predicted, items=[]}
    local segment_order = {} -- insertion order
    local class_set = {}

    for _, item in ipairs(items) do
      local pred    = tostring(item.predicted_value or "?")
      local correct = tostring(item.correct_value   or "?")
      local key     = correct .. "\0" .. pred
      if not segment_map[key] then
        segment_map[key] = {correct = correct, predicted = pred, items = {}}
        table.insert(segment_order, key)
      end
      table.insert(segment_map[key].items, item)
      class_set[pred]    = true
      class_set[correct] = true
    end

    -- Determine binary vs multi-class (for hint wording only)
    local class_list = {}
    for c in pairs(class_set) do table.insert(class_list, c) end
    table.sort(class_list)
    local is_binary = #class_list == 2

    -- Sort segments by item count descending
    table.sort(segment_order, function(a, b)
      return #segment_map[a].items > #segment_map[b].items
    end)

    local segments = {}
    for _, key in ipairs(segment_order) do
      local seg = segment_map[key]
      -- Neutral label: works for binary and multi-class equally
      local label = string.format('Predicted: "%s" / Actual: "%s"', seg.predicted, seg.correct)
      -- Hint: describe the direction of the error in plain terms
      local hint
      if is_binary then
        hint = string.format(
          'The model predicted "%s" when the correct answer was "%s".\n'
          .. 'To fix: adjust criteria so that cases like these are classified as "%s" instead.',
          seg.predicted, seg.correct, seg.correct)
      else
        hint = string.format(
          'The model predicted "%s" when the correct answer was "%s".\n'
          .. 'Add or sharpen criteria that distinguish "%s" from "%s".',
          seg.predicted, seg.correct, seg.correct, seg.predicted)
      end
      table.insert(segments, {
        correct   = seg.correct,
        predicted = seg.predicted,
        label     = label,
        hint      = hint,
        items     = seg.items,
      })
    end
    return segments, is_binary
  end

  -- Update the cross-cycle item recurrence tracker.
  -- Extracts misclassified items from item_classifications and updates the persistent
  -- tracker. Only tracks items with non-empty item_id. Caps at 50 items.
  -- Pattern classification is purely programmatic — no LLM.
  -- cycle_context (optional): {hypothesis_name, done_reason, version_id}
  local function update_item_recurrence(cycle, item_classifications, tracker, cycle_context)
    tracker = tracker or {}
    if type(item_classifications) ~= "table" or #item_classifications == 0 then
      return tracker
    end

    -- Index current cycle's MISCLASSIFIED items by item_id
    local seen_this_cycle = {}
    for _, item in ipairs(item_classifications) do
      local id = item.item_id
      if id and id ~= "" then
        seen_this_cycle[id] = {
          segment  = tostring(item.predicted_value or "?") .. "/" .. tostring(item.correct_value or "?"),
          predicted = tostring(item.predicted_value or "?"),
          correct   = tostring(item.correct_value   or "?"),
          rationale = trunc(tostring(item.rationale_short or item.evidence_quote or ""), 150),
          evidence  = trunc(tostring(item.evidence_quote or ""), 120),
        }
      end
    end

    -- Build compact hypothesis label for this cycle's entry
    local hyp_label = nil
    if cycle_context then
      if has_text(cycle_context.hypothesis_name) then
        hyp_label = trunc(cycle_context.hypothesis_name, 80)
      elseif has_text(cycle_context.done_reason) then
        hyp_label = trunc(cycle_context.done_reason, 80)
      end
    end

    -- Update or create tracker entries for items WRONG this cycle
    for id, cur in pairs(seen_this_cycle) do
      local entry = tracker[id]
      local pc_entry = {cycle=cycle, segment=cur.segment, rationale=cur.rationale, evidence=cur.evidence}
      if hyp_label then pc_entry.hypothesis = hyp_label end
      if not entry then
        tracker[id] = {
          first_cycle       = cycle,
          last_cycle        = cycle,
          wrong_count       = 1,
          correct_count     = 0,
          segment           = cur.segment,
          segment_stable    = true,
          recent_label    = cur.correct,
          model_prediction  = cur.predicted,
          per_cycle         = {pc_entry},
          pattern           = "EMERGING",
        }
      else
        entry.last_cycle       = cycle
        entry.wrong_count      = (entry.wrong_count or entry.total_appearances or 0) + 1
        entry.model_prediction = cur.predicted
        if entry.segment ~= cur.segment then entry.segment_stable = false end
        entry.segment = cur.segment
        table.insert(entry.per_cycle, pc_entry)
      end
    end

    -- Record CORRECT this cycle for tracked items NOT in this cycle's misclassifications.
    -- Since evaluation uses sampling_mode="newest" with fixed max_samples, the same
    -- feedback items are evaluated each cycle. Absence = correctly classified.
    -- Only record for items seen wrong in the immediately prior cycle (avoids noise
    -- from items that were wrong long ago and are now irrelevant).
    for id, entry in pairs(tracker) do
      if not seen_this_cycle[id] and entry.last_cycle == cycle - 1 then
        local pc_entry = {cycle=cycle, segment="CORRECT"}
        if hyp_label then pc_entry.hypothesis = hyp_label end
        table.insert(entry.per_cycle, pc_entry)
        entry.correct_count = (entry.correct_count or 0) + 1
      end
    end

    -- Pattern classification for all tracked items
    for _, entry in pairs(tracker) do
      local wrong = entry.wrong_count or entry.total_appearances or 0
      local correct = entry.correct_count or 0
      -- Count transitions between CORRECT and wrong segments in per_cycle
      local transitions = 0
      if entry.per_cycle and #entry.per_cycle >= 2 then
        for i = 2, #entry.per_cycle do
          local prev_seg = entry.per_cycle[i-1].segment
          local cur_seg  = entry.per_cycle[i].segment
          local prev_correct = (prev_seg == "CORRECT")
          local cur_correct  = (cur_seg == "CORRECT")
          if prev_correct ~= cur_correct then transitions = transitions + 1 end
        end
      end
      -- OSCILLATING: wrong→correct→wrong (or correct→wrong→correct) — the whack-a-mole signal
      if transitions >= 2 then
        entry.pattern = "OSCILLATING"
      -- PERSISTENT: wrong in same segment 3+ cycles, never correct in between
      elseif wrong >= 3 and entry.segment_stable and correct == 0 then
        entry.pattern = "PERSISTENT"
      -- FLIP_FLOP: wrong in 2+ cycles but segment changes (different type of error each time)
      elseif wrong >= 2 and not entry.segment_stable then
        entry.pattern = "FLIP_FLOP"
      -- LATE_EMERGING: first appeared in cycle 3+, at least 2 wrong appearances
      elseif entry.first_cycle >= 3 and wrong >= 2 then
        entry.pattern = "LATE_EMERGING"
      else
        entry.pattern = "EMERGING"
      end
    end

    -- Migrate legacy field name (total_appearances → wrong_count)
    for _, entry in pairs(tracker) do
      if entry.total_appearances and not entry.wrong_count then
        entry.wrong_count = entry.total_appearances
      end
      entry.total_appearances = nil  -- remove legacy field
    end

    -- Evict items not active in last 4 cycles (no wrong or correct entries)
    local to_remove = {}
    for id, entry in pairs(tracker) do
      -- last_cycle tracks last WRONG cycle; also check per_cycle for recent CORRECT
      local last_activity = entry.last_cycle or 0
      if entry.per_cycle then
        for _, pc in ipairs(entry.per_cycle) do
          if pc.cycle and pc.cycle > last_activity then last_activity = pc.cycle end
        end
      end
      if cycle - last_activity > 4 then table.insert(to_remove, id) end
    end
    for _, id in ipairs(to_remove) do tracker[id] = nil end

    -- Cap at 50 items by interest score (oscillating/persistent items rank highest)
    local pattern_weight = {OSCILLATING=10, PERSISTENT=8, FLIP_FLOP=6, LATE_EMERGING=3, EMERGING=1}
    local scored = {}
    for id, entry in pairs(tracker) do
      local w = pattern_weight[entry.pattern] or 1
      local wrong = entry.wrong_count or 0
      local correct = entry.correct_count or 0
      table.insert(scored, {id=id, score=w * (wrong + correct)})
    end
    if #scored > 50 then
      table.sort(scored, function(a, b) return a.score > b.score end)
      for i = 51, #scored do tracker[scored[i].id] = nil end
    end

    -- Trim per_cycle history to last 8 entries per item (need more for oscillation detection)
    for _, entry in pairs(tracker) do
      if entry.per_cycle and #entry.per_cycle > 8 then
        local trimmed = {}
        for i = #entry.per_cycle - 7, #entry.per_cycle do
          table.insert(trimmed, entry.per_cycle[i])
        end
        entry.per_cycle = trimmed
      end
    end

    return tracker
  end

  -- Build a compact summary of the recurrence tracker for planning context injection.
  -- Shows notable items: OSCILLATING, PERSISTENT, FLIP_FLOP, LATE_EMERGING (not EMERGING).
  local function build_recurrence_compact_summary(tracker, current_cycle)
    if type(tracker) ~= "table" then return nil end
    local oscillating = {}
    local persistent  = {}
    local flip_flop   = {}
    local late_emerg  = {}
    for id, entry in pairs(tracker) do
      if entry.pattern == "OSCILLATING" then
        table.insert(oscillating, {id=id, entry=entry})
      elseif entry.pattern == "PERSISTENT" then
        table.insert(persistent, {id=id, entry=entry})
      elseif entry.pattern == "FLIP_FLOP" then
        table.insert(flip_flop, {id=id, entry=entry})
      elseif entry.pattern == "LATE_EMERGING" then
        table.insert(late_emerg, {id=id, entry=entry})
      end
    end
    if #oscillating == 0 and #persistent == 0 and #flip_flop == 0 and #late_emerg == 0 then return nil end

    -- Sort by wrong_count desc
    local function by_wrong(a, b) return (a.entry.wrong_count or 0) > (b.entry.wrong_count or 0) end
    table.sort(oscillating, by_wrong)
    table.sort(persistent,  by_wrong)
    table.sort(flip_flop,   by_wrong)

    local parts = {}
    if #oscillating > 0 then
      table.insert(parts, string.format("OSCILLATING items (%d) — whack-a-mole: wrong→correct→wrong across cycles:", #oscillating))
      table.insert(parts, "  These items flip between correct and incorrect as config changes trade off between groups.")
      for _, p in ipairs(oscillating) do
        local e = p.entry
        -- Show the per-cycle trajectory
        local trajectory = {}
        if e.per_cycle then
          for _, pc in ipairs(e.per_cycle) do
            table.insert(trajectory, string.format("C%d:%s", pc.cycle, pc.segment))
          end
        end
        table.insert(parts, string.format(
          "  %s: label=%s, %dx wrong, %dx correct, trajectory=[%s]",
          p.id, e.recent_label or "?", e.wrong_count or 0, e.correct_count or 0,
          table.concat(trajectory, " → ")))
      end
    end
    if #persistent > 0 then
      table.insert(parts, string.format("PERSISTENT items (%d) — same confusion segment across 3+ cycles, never correct:", #persistent))
      for _, p in ipairs(persistent) do
        local e = p.entry
        local last_pc = e.per_cycle and e.per_cycle[#e.per_cycle]
        local last_hyp = last_pc and last_pc.hypothesis and (" [" .. last_pc.hypothesis .. "]") or ""
        table.insert(parts, string.format(
          "  %s: label=%s model=%s, cycles %d-%d (%dx)%s, last_rationale=%s",
          p.id, e.recent_label, e.model_prediction,
          e.first_cycle, e.last_cycle, e.wrong_count or 0, last_hyp,
          trunc(last_pc and last_pc.rationale or "", 70)))
      end
    end
    if #flip_flop > 0 then
      table.insert(parts, string.format("FLIP_FLOP items (%d) — error segment changes between cycles:", #flip_flop))
      for _, p in ipairs(flip_flop) do
        local e = p.entry
        table.insert(parts, string.format(
          "  %s: wrong in different segments (%dx wrong in %d cycles)",
          p.id, e.wrong_count or 0, current_cycle - e.first_cycle + 1))
      end
    end
    if #late_emerg > 0 then
      table.insert(parts, string.format("LATE_EMERGING items (%d) — first appeared cycle 3+, possible regressions:", #late_emerg))
      for _, p in ipairs(late_emerg) do
        local e = p.entry
        table.insert(parts, string.format("  %s: first cycle %d, label=%s model=%s",
          p.id, e.first_cycle, e.recent_label, e.model_prediction))
      end
    end
    return table.concat(parts, "\n")
  end

  -- ==================================================================
  -- SME Worksheet helpers (end-of-run, Phase 3b)
  -- ==================================================================
  -- These run deterministically against the final RCA and the recurrence
  -- tracker. Their output feeds the SME Worksheet writer prompt with
  -- specific items, transcript quotes, and contrasting pairs — the signals
  -- that the LLM has consistently failed to surface from aggregate context.

  -- Extract the original transcript-quote evidence from an RCA item.
  local function _extract_evidence_quote(ic)
    if type(ic) ~= "table" then return "" end
    if has_text(ic.evidence_quote) then return trunc(ic.evidence_quote, 220) end
    if type(ic.evidence_snippets) == "table" then
      for _, snip in ipairs(ic.evidence_snippets) do
        if type(snip) == "table"
           and snip.source ~= "edit_comment"
           and has_text(snip.quote_or_fact) then
          return trunc(snip.quote_or_fact, 220)
        end
      end
    end
    return ""
  end

  -- Extract the edit_comment string for an item from its evidence_snippets.
  local function _extract_edit_comment(ic)
    if type(ic) ~= "table" or type(ic.evidence_snippets) ~= "table" then return "" end
    for _, snip in ipairs(ic.evidence_snippets) do
      if type(snip) == "table" and snip.source == "edit_comment" and has_text(snip.quote_or_fact) then
        -- edit_comment snippets come wrapped in quotes; strip them for cleaner display
        local raw = tostring(snip.quote_or_fact)
        raw = raw:gsub('^"(.*)"$', "%1")
        return trunc(raw, 240)
      end
    end
    return ""
  end

  -- Derive the external_id (numeric content id) from an item_id of the
  -- form "<account_uuid>--<external_id>". Returns "" if the pattern does
  -- not match.
  local function _external_id_from_item(item_id)
    if type(item_id) ~= "string" or item_id == "" then return "" end
    local _, _, ext = item_id:find("%-%-([^%-].*)$")
    return ext or ""
  end

  -- Build a dashboard URL for an item. Matches MCP/shared/utils.py:get_plexus_url.
  local PLEXUS_APP_URL = "https://plexus.anth.us"

  local function _item_url(item_id)
    if type(item_id) ~= "string" or item_id == "" then return "" end
    return PLEXUS_APP_URL .. "/lab/items/" .. item_id
  end

  -- Build a clickable markdown link labelled by external_id. Falls back to
  -- item_id if the composite pattern does not match.
  local function _item_link(item_id)
    if type(item_id) ~= "string" or item_id == "" then return "" end
    local ext = _external_id_from_item(item_id)
    local label = ext ~= "" and ext or item_id
    return "[" .. label .. "](" .. _item_url(item_id) .. ")"
  end

  -- Build a compact agenda context block naming up to `max_items` misclassified
  -- items from the most recent RCA, each with its clickable markdown link, the
  -- score version's prediction, the reviewer's label, transcript evidence, and
  -- cross-cycle pattern. Used by both the per-cycle and end-of-run SME Agenda
  -- prompts so the LLM has concrete items to cite instead of inventing examples.
  local function _build_agenda_item_context(max_items)
    max_items = max_items or 5
    local last_rca = State.get("last_recent_rca")
    if type(last_rca) ~= "table" then return "" end
    local items = last_rca._all_item_classifications
    if type(items) ~= "table" or #items == 0 then return "" end
    local recurrence = State.get("item_recurrence") or {}

    -- Collect misclassified items (predicted != correct), preferring PERSISTENT /
    -- OSCILLATING per the cross-cycle tracker.
    local wrong = {}
    for _, ic in ipairs(items) do
      local pred = tostring(ic.predicted_value or "")
      local corr = tostring(ic.correct_value or "")
      if pred ~= "" and corr ~= "" and pred ~= corr then
        local iid = tostring(ic.item_id or "")
        local rec = (type(recurrence) == "table" and iid ~= "") and recurrence[iid] or nil
        local pattern = (rec and rec.pattern) or "EMERGING"
        local wrong_count = (rec and rec.wrong_count) or 1
        local priority = 0
        if pattern == "PERSISTENT" then priority = 3
        elseif pattern == "OSCILLATING" then priority = 2
        elseif pattern == "FLIP_FLOP" then priority = 1
        end
        table.insert(wrong, {
          ic = ic,
          item_id = iid,
          pattern = pattern,
          wrong_count = wrong_count,
          priority = priority,
        })
      end
    end
    if #wrong == 0 then return "" end

    table.sort(wrong, function(a, b)
      if a.priority ~= b.priority then return a.priority > b.priority end
      if a.wrong_count ~= b.wrong_count then return a.wrong_count > b.wrong_count end
      return tostring(a.item_id) < tostring(b.item_id)
    end)

    local parts = {}
    table.insert(parts, "=== CANDIDATE ITEMS FOR AGENDA EXAMPLES ===")
    table.insert(parts, "Use ONLY these items when writing Examples. Copy each markdown link verbatim.")
    table.insert(parts, "")
    local n = math.min(#wrong, max_items)
    for i = 1, n do
      local w = wrong[i]
      local ic = w.ic
      local link = _item_link(w.item_id)
      local edit_comment = _extract_edit_comment(ic)
      local evidence = _extract_evidence_quote(ic)
      local rationale = tostring(ic.rationale_short or ic.rationale_paragraph or "")
      local category = tostring(ic.primary_category or "")
      table.insert(parts, string.format("ITEM %s", _external_id_from_item(w.item_id)))
      table.insert(parts, "  link: " .. link)
      table.insert(parts, string.format("  score version predicted: %s", tostring(ic.predicted_value or "?")))
      table.insert(parts, string.format("  reviewer labeled: %s", tostring(ic.correct_value or "?")))
      table.insert(parts, string.format("  cross-cycle pattern: %s (wrong %d cycles)", w.pattern, w.wrong_count))
      if has_text(evidence) then
        table.insert(parts, string.format("  transcript evidence (\"Agent:\" = human phone operator): \"%s\"", trunc(evidence, 280)))
      end
      if has_text(edit_comment) then
        table.insert(parts, string.format("  reviewer edit comment: \"%s\"", trunc(edit_comment, 280)))
      end
      if has_text(category) then
        table.insert(parts, string.format("  error category: %s", category))
      end
      if has_text(rationale) then
        table.insert(parts, string.format("  score rationale: %s", trunc(rationale, 240)))
      end
      table.insert(parts, "")
    end
    table.insert(parts, "=== END CANDIDATE ITEMS ===")
    return table.concat(parts, "\n")
  end

  -- Deterministic detector: flag items whose feedback record carries
  -- machine-checkable contradictions suggesting the label itself may be wrong
  -- (as opposed to a real policy gap). See plan, section 1.
  local function detect_suspected_mislabels(iterations, item_recurrence)
    local results = {}
    local last_rca = State.get("last_recent_rca")
    if type(last_rca) ~= "table" then return results end
    local items = last_rca._all_item_classifications
    if type(items) ~= "table" or #items == 0 then
      local ma = last_rca.misclassification_analysis
      if type(ma) == "table" then items = ma.item_classifications_all end
    end
    if type(items) ~= "table" or #items == 0 then return results end

    -- Keywords that, when present in edit_comment, express reviewer
    -- *agreement* with the AI's original prediction or explicitly deny that
    -- the call was problematic. If final_value disagrees with the model's
    -- original "no-problem" direction while the comment reads "no problem",
    -- the label likely contradicts the comment.
    local agreement_keywords = {
      "no inappropriate",
      "not inappropriate",
      "agree with aime",
      "agree with ai",
      "agree w/ ai",
      "no issue",
      "not an issue",
      "nothing inappropriate",
      "not a violation",
      "no violation",
    }

    local function comment_agrees_with_no_problem(comment_lc)
      for _, kw in ipairs(agreement_keywords) do
        if comment_lc:find(kw, 1, true) then return true end
      end
      return false
    end

    -- Build a wrong_count lookup from the recurrence tracker for the
    -- "persistent across 3+ cycles" condition.
    local wrong_counts = {}
    local patterns = {}
    if type(item_recurrence) == "table" then
      for id, entry in pairs(item_recurrence) do
        wrong_counts[id] = entry.wrong_count or 0
        patterns[id] = entry.pattern or "EMERGING"
      end
    end

    for _, ic in ipairs(items) do
      local item_id = tostring(ic.item_id or "")
      if item_id ~= "" then
        local external_id = _external_id_from_item(item_id)
        local predicted = tostring(ic.predicted_value or "")
        local correct = tostring(ic.correct_value or "")
        local edit_comment = _extract_edit_comment(ic)
        local evidence_quote = _extract_evidence_quote(ic)
        local fixability = tostring(ic.config_fixability or "")
        local reasons = {}

        -- Reason A: edit_comment text asserts "no problem" but the label
        -- is the "problem" class (i.e., correct_value disagrees with the
        -- comment's stated position).
        if has_text(edit_comment) and comment_agrees_with_no_problem(edit_comment:lower()) then
          -- The "problem" label depends on the score, so we infer from the
          -- predicted_value: if the model originally predicted the "no-problem"
          -- class (whatever value that is) and the comment agrees with no problem,
          -- then the label should match the prediction — if it doesn't, the
          -- label contradicts the comment.
          -- Heuristic: if the model's prediction matches the comment's stance
          -- (no-problem) but the correct_value does not, flag as suspect.
          -- We use a simple rule: if predicted != correct AND comment says
          -- "no problem", the label likely contradicts the comment.
          if predicted ~= correct then
            table.insert(reasons, "edit_comment_contradicts_label")
          end
        end

        -- Reason B: the model's explanation correctly identified that the
        -- disputed content was spoken by a non-agent speaker, yet the label
        -- still disagrees with the model. Detect by looking for the phrase
        -- "spoken by the customer" / "customer said" / "by the customer"
        -- in the evidence quote or rationale.
        local rationale_lc = (tostring(ic.rationale_paragraph or "") .. " "
                              .. tostring(ic.rationale_short or "") .. " "
                              .. tostring(evidence_quote or "")):lower()
        if rationale_lc:find("spoken by the customer", 1, true)
           or rationale_lc:find("customer said", 1, true)
           or rationale_lc:find("by the customer", 1, true)
           or rationale_lc:find("not attributable to the agent", 1, true) then
          if predicted ~= correct then
            table.insert(reasons, "model_reasoned_customer_speech_but_label_disagrees")
          end
        end

        -- Reason C: persistent failure across cycles + needs_sme_clarification.
        -- A persistent gray-area item that the optimizer cannot resolve via
        -- rule changes is a candidate for label review.
        local wc = wrong_counts[item_id] or 0
        local pat = patterns[item_id] or "EMERGING"
        if (pat == "PERSISTENT" or pat == "OSCILLATING")
           and wc >= 3
           and (fixability == "needs_sme_clarification"
                or fixability == "blocked_by_mechanical") then
          table.insert(reasons, "persistent_unfixable_gray_area")
        end

        if #reasons > 0 then
          table.insert(results, {
            item_id = item_id,
            external_id = external_id,
            predicted_value = predicted,
            correct_value = correct,
            edit_comment = edit_comment,
            evidence_quote = evidence_quote,
            primary_category = tostring(ic.primary_category or ""),
            config_fixability = fixability,
            wrong_count = wc,
            pattern = pat,
            reasons = reasons,
          })
        end
      end
    end
    return results
  end

  -- Deterministic detector: find up to 3 pairs of persistent/oscillating
  -- items with OPPOSITE labels and shared primary_category or overlapping
  -- evidence vocabulary. These reveal the actual policy axis reviewers
  -- disagree on. See plan, section 2.
  local function build_contrasting_pairs(iterations, item_recurrence)
    local results = {}
    local last_rca = State.get("last_recent_rca")
    if type(last_rca) ~= "table" then return results end
    local items = last_rca._all_item_classifications
    if type(items) ~= "table" or #items == 0 then
      local ma = last_rca.misclassification_analysis
      if type(ma) == "table" then items = ma.item_classifications_all end
    end
    if type(items) ~= "table" or #items == 0 then return results end

    local patterns = {}
    if type(item_recurrence) == "table" then
      for id, entry in pairs(item_recurrence) do
        patterns[id] = entry.pattern or "EMERGING"
      end
    end

    -- Candidate pool: misclassified in final cycle AND persistent/oscillating.
    local candidates = {}
    for _, ic in ipairs(items) do
      local item_id = tostring(ic.item_id or "")
      local pat = patterns[item_id] or "EMERGING"
      if item_id ~= "" and (pat == "PERSISTENT" or pat == "OSCILLATING" or pat == "FLIP_FLOP") then
        table.insert(candidates, {
          item_id = item_id,
          external_id = _external_id_from_item(item_id),
          predicted_value = tostring(ic.predicted_value or ""),
          correct_value = tostring(ic.correct_value or ""),
          edit_comment = _extract_edit_comment(ic),
          evidence_quote = _extract_evidence_quote(ic),
          primary_category = tostring(ic.primary_category or ""),
          rationale_short = trunc(tostring(ic.rationale_short or ic.rationale_paragraph or ""), 220),
          pattern = pat,
        })
      end
    end
    if #candidates < 2 then return results end

    -- Tokenize helper for cheap overlap.
    local stopwords = {
      ["the"]=1,["a"]=1,["an"]=1,["and"]=1,["or"]=1,["of"]=1,["to"]=1,["in"]=1,
      ["on"]=1,["is"]=1,["are"]=1,["was"]=1,["were"]=1,["be"]=1,["it"]=1,["that"]=1,
      ["this"]=1,["for"]=1,["with"]=1,["as"]=1,["by"]=1,["at"]=1,["from"]=1,["not"]=1,
      ["no"]=1,["yes"]=1,["i"]=1,["you"]=1,["we"]=1,["he"]=1,["she"]=1,["they"]=1,
      ["agent"]=1,["customer"]=1,["transcript"]=1,["evidence"]=1,
    }
    local function tokenize(s)
      local tokens = {}
      if type(s) ~= "string" then return tokens end
      for w in s:lower():gmatch("[%a']+") do
        if #w >= 3 and not stopwords[w] then
          tokens[w] = (tokens[w] or 0) + 1
        end
      end
      return tokens
    end
    local function overlap_score(a_tokens, b_tokens)
      local score = 0
      for w, _ in pairs(a_tokens) do
        if b_tokens[w] then score = score + 1 end
      end
      return score
    end

    -- Score every opposite-label pair.
    local scored_pairs = {}
    for i = 1, #candidates - 1 do
      for j = i + 1, #candidates do
        local a, b = candidates[i], candidates[j]
        if a.correct_value ~= "" and b.correct_value ~= "" and a.correct_value ~= b.correct_value then
          local a_text = (a.evidence_quote or "") .. " " .. (a.rationale_short or "")
          local b_text = (b.evidence_quote or "") .. " " .. (b.rationale_short or "")
          local a_tokens = tokenize(a_text)
          local b_tokens = tokenize(b_text)
          local vocab_score = overlap_score(a_tokens, b_tokens)
          local category_bonus = (a.primary_category ~= "" and a.primary_category == b.primary_category) and 3 or 0
          local total_score = vocab_score + category_bonus
          if total_score > 0 then
            -- Identify shared tokens for "distinguishing feature" hint.
            local shared_tokens = {}
            for w, _ in pairs(a_tokens) do
              if b_tokens[w] then table.insert(shared_tokens, w) end
            end
            table.insert(scored_pairs, {
              a = a, b = b, score = total_score, shared_tokens = shared_tokens,
            })
          end
        end
      end
    end
    table.sort(scored_pairs, function(x, y) return x.score > y.score end)

    -- Take up to 3 highest-scoring pairs with no item repeated across pairs.
    local used = {}
    for _, p in ipairs(scored_pairs) do
      if #results >= 3 then break end
      if not used[p.a.item_id] and not used[p.b.item_id] then
        used[p.a.item_id] = true
        used[p.b.item_id] = true
        -- Build a compact shared-tokens string for the Worksheet hint.
        local shared_str = ""
        if #p.shared_tokens > 0 then
          local top = {}
          for i = 1, math.min(5, #p.shared_tokens) do table.insert(top, p.shared_tokens[i]) end
          shared_str = table.concat(top, ", ")
        end
        table.insert(results, {
          item_a = p.a,
          item_b = p.b,
          similarity_score = p.score,
          shared_vocabulary = shared_str,
        })
      end
    end
    return results
  end

  -- Per-item LLM diagnostic for repeat offenders.
  -- Runs once per cycle for every PERSISTENT/OSCILLATING item with wrong_count >= 3.
  -- Returns a list of diagnosis records stored in State("repeat_offender_diagnoses").
  -- Each record: {item_id, external_id, diagnosis, confidence, explanation, recommended_action}
  -- diagnosis values: mislabel | rubric_gap | new_policy_case | classifier_failure | contradictory_rule
  -- recommended_action values: challenge_label | clarify_rubric | add_policy | accept_ceiling | investigate_code
  --
  -- Called from the per-cycle block after update_item_recurrence; results injected into
  -- build_planning_context() and the per-cycle SME Worksheet.
  local function analyze_repeat_offenders(cycle, item_recurrence, iterations)
    if type(item_recurrence) ~= "table" then return {} end

    -- Collect candidates: PERSISTENT or OSCILLATING with wrong_count >= 3
    local candidates = {}
    local last_rca = State.get("last_recent_rca")
    local rca_items_by_id = {}
    if type(last_rca) == "table" then
      local items = last_rca._all_item_classifications
      if type(items) ~= "table" or #items == 0 then
        local ma = last_rca.misclassification_analysis
        if type(ma) == "table" then items = ma.item_classifications_all end
      end
      if type(items) == "table" then
        for _, ic in ipairs(items) do
          local id = tostring(ic.item_id or "")
          if id ~= "" then rca_items_by_id[id] = ic end
        end
      end
    end

    for item_id, entry in pairs(item_recurrence) do
      local pat = entry.pattern or "EMERGING"
      local wc = entry.wrong_count or 0
      if (pat == "PERSISTENT" or pat == "OSCILLATING") and wc >= 3 then
        table.insert(candidates, {id = item_id, entry = entry, rca_ic = rca_items_by_id[item_id]})
      end
    end

    if #candidates == 0 then return {} end

    -- Sort: OSCILLATING first (contradictory rule signal), then by wrong_count desc
    table.sort(candidates, function(a, b)
      local ap = a.entry.pattern == "OSCILLATING" and 0 or 1
      local bp = b.entry.pattern == "OSCILLATING" and 0 or 1
      if ap ~= bp then return ap < bp end
      return (a.entry.wrong_count or 0) > (b.entry.wrong_count or 0)
    end)

    -- Cap at 6 items to keep LLM cost bounded
    if #candidates > 6 then
      local trimmed = {}
      for i = 1, 6 do trimmed[i] = candidates[i] end
      candidates = trimmed
    end

    -- Check if we already analyzed these items this cycle (skip re-analysis on re-entry)
    local existing = State.get("repeat_offender_diagnoses") or {}
    local existing_cycle = State.get("repeat_offender_diagnoses_cycle") or -1
    if existing_cycle == cycle and #existing > 0 then
      return existing
    end

    diag(string.format("analyze_repeat_offenders: cycle %d, %d candidates", cycle, #candidates))

    local results = {}

    for _, cand in ipairs(candidates) do
      local item_id = cand.id
      local entry = cand.entry
      local ic = cand.rca_ic
      local external_id = _external_id_from_item(item_id)

      -- Build per-item diagnostic prompt
      local p = {}
      table.insert(p, string.format(
        "You are diagnosing a single repeat-offender item from a score optimization run.\n"
        .. "Terminology: \"Agent:\" in transcripts = the human call-center phone operator.\n"
        .. "The thing being evaluated is the score version, never call it \"AI\".\n"
        .. "Item external_id: %s | Pattern: %s | Wrong %d cycles | Correct %d cycles\n"
        .. "Human reviewer label: %s | Most recent score prediction: %s\n",
        external_id ~= "" and external_id or item_id,
        entry.pattern or "?",
        entry.wrong_count or 0,
        entry.correct_count or 0,
        tostring(entry.recent_label or "?"),
        tostring(entry.model_prediction or "?")))

      -- Per-cycle history
      if entry.per_cycle and #entry.per_cycle > 0 then
        table.insert(p, "Per-cycle history (most recent first):")
        for i = #entry.per_cycle, math.max(1, #entry.per_cycle - 6), -1 do
          local pc = entry.per_cycle[i]
          local outcome = pc.segment == "CORRECT" and "✓ CORRECT" or string.format("✗ WRONG (%s)", pc.segment or "?")
          local hyp_note = has_text(pc.hypothesis) and (" | hypothesis: " .. trunc(pc.hypothesis, 80)) or ""
          table.insert(p, string.format("  Cycle %d: %s%s", pc.cycle or i, outcome, hyp_note))
          if pc.segment ~= "CORRECT" then
            if has_text(pc.rationale) then
              table.insert(p, string.format("    RCA: %s", trunc(pc.rationale, 180)))
            end
            if has_text(pc.evidence) then
              table.insert(p, string.format("    Evidence: \"%s\"", trunc(pc.evidence, 180)))
            end
          end
        end
        table.insert(p, "")
      end

      -- RCA item details (from last evaluation)
      if type(ic) == "table" then
        local edit_comment = _extract_edit_comment(ic)
        local evidence_quote = _extract_evidence_quote(ic)
        local fixability = tostring(ic.config_fixability or "")
        local rationale = tostring(ic.rationale_short or ic.rationale_paragraph or "")
        if has_text(edit_comment) then
          table.insert(p, string.format("Reviewer edit comment: \"%s\"", edit_comment))
        end
        if has_text(evidence_quote) then
          table.insert(p, string.format("Transcript evidence: \"%s\"", evidence_quote))
        end
        if has_text(fixability) then
          table.insert(p, string.format("Config fixability: %s", fixability))
        end
        if has_text(rationale) then
          table.insert(p, string.format("Score rationale: %s", trunc(rationale, 300)))
        end
        table.insert(p, "")
      end

      table.insert(p, "Based on all the above, diagnose this item. Respond in exactly this format:\n")
      table.insert(p, "DIAGNOSIS: <one of: mislabel | rubric_gap | new_policy_case | classifier_failure | contradictory_rule>")
      table.insert(p, "CONFIDENCE: <one of: high | medium | low>")
      table.insert(p, "EXPLANATION: <1-2 sentences explaining what is actually happening>")
      table.insert(p, "RECOMMENDED_ACTION: <one of: challenge_label | clarify_rubric | add_policy | accept_ceiling | investigate_code>")
      table.insert(p, "SME_QUESTION: <one sentence — the specific question to put to a domain expert, or NONE if no SME input needed>")
      table.insert(p, "\nDiagnosis values:\n"
        .. "  mislabel — the human reviewer's label is likely wrong (the score is correct)\n"
        .. "  rubric_gap — the rubric is missing or ambiguous; a rule addition could fix this\n"
        .. "  new_policy_case — this is a novel scenario not covered by the current rubric\n"
        .. "  classifier_failure — the score's reasoning is wrong; better prompt logic is needed\n"
        .. "  contradictory_rule — fixing this item requires a rule that breaks other items\n"
        .. "Recommended action values:\n"
        .. "  challenge_label — bring to SME to review the human label\n"
        .. "  clarify_rubric — the existing rubric rule needs to be sharpened\n"
        .. "  add_policy — a new policy rule needs to be added to the rubric\n"
        .. "  accept_ceiling — accept that this item cannot be fixed without contradicting others\n"
        .. "  investigate_code — check for a code/structural issue (not a policy problem)")

      local prompt_text = table.concat(p, "\n")

      local ok, err = pcall(function()
        report_writer.clear_history()
        safe_agent_call(report_writer, "report_writer", prompt_text, nil)
      end)

      local raw_output = report_writer.output or ""

      if ok and has_text(raw_output) then
        -- Parse structured response
        local diagnosis = raw_output:match("DIAGNOSIS:%s*([%w_]+)") or "classifier_failure"
        local confidence = raw_output:match("CONFIDENCE:%s*([%w]+)") or "low"
        local explanation = raw_output:match("EXPLANATION:%s*([^\n]+)") or ""
        local recommended_action = raw_output:match("RECOMMENDED_ACTION:%s*([%w_]+)") or "investigate_code"
        local sme_question = raw_output:match("SME_QUESTION:%s*([^\n]+)") or ""
        if sme_question:upper() == "NONE" then sme_question = "" end

        table.insert(results, {
          item_id = item_id,
          external_id = external_id,
          pattern = entry.pattern,
          wrong_count = entry.wrong_count or 0,
          correct_count = entry.correct_count or 0,
          recent_label = tostring(entry.recent_label or ""),
          model_prediction = tostring(entry.model_prediction or ""),
          diagnosis = diagnosis,
          confidence = confidence,
          explanation = explanation,
          recommended_action = recommended_action,
          sme_question = sme_question,
        })

        diag(string.format(
          "analyze_repeat_offenders: item %s → diagnosis=%s [%s] action=%s",
          external_id ~= "" and external_id or item_id, diagnosis, confidence, recommended_action))
      else
        diag(string.format(
          "analyze_repeat_offenders: item %s failed: %s",
          external_id ~= "" and external_id or item_id, trunc(tostring(err or ""), 120)))
      end
    end

    State.set("repeat_offender_diagnoses", results)
    State.set("repeat_offender_diagnoses_cycle", cycle)
    return results
  end

  -- Forward declaration: defined later but called from build_planning_context
  local build_hypothesis_effectiveness_summary

  -- Generate the Feedback Landscape Diagnostic — an LLM-synthesized multi-level analysis
  -- of cross-cycle item recurrence patterns. Runs after cycle 3+ every 2 cycles.
  -- Returns {compact_summary, full_report, generated_at_cycle} or nil on failure.
  local safe_agent_call
  local safe_editor_call
  local function generate_feedback_landscape_diagnostic(cycle, item_recurrence, iterations, current_guidelines)
    if type(item_recurrence) ~= "table" then return nil end

    -- Only run if we have enough notable data to analyze
    local notable_count = 0
    for _, entry in pairs(item_recurrence) do
      if entry.pattern == "OSCILLATING" or entry.pattern == "PERSISTENT"
         or entry.pattern == "FLIP_FLOP" or entry.pattern == "LATE_EMERGING" then
        notable_count = notable_count + 1
      end
    end
    if notable_count == 0 then return nil end

    -- Build the diagnostic prompt
    local dp = {}
    table.insert(dp, "=== FEEDBACK LANDSCAPE DIAGNOSTIC REQUEST ===")
    table.insert(dp, "You are analyzing cross-cycle item recurrence patterns to diagnose WHY the optimizer")
    table.insert(dp, "is struggling with certain feedback items. This is meta-analysis across all cycles run so far.\n")

    -- Recurrence data
    table.insert(dp, string.format("=== ITEM RECURRENCE DATA (cycle %d) ===", cycle))
    table.insert(dp, "Items below have appeared in multiple optimization cycles. Pay special attention to:")
    table.insert(dp, "- OSCILLATING items: wrong→correct→wrong — the 'whack-a-mole' pattern where fixing one group breaks another")
    table.insert(dp, "- PERSISTENT items: always wrong in the same segment across 3+ cycles despite config changes")
    table.insert(dp, "- FLIP_FLOP items: wrong in different segments across cycles (FP→FN or vice versa)")
    table.insert(dp, "OSCILLATING items are especially diagnostic: they reveal contradictory norms in the feedback.\n")

    local all_notable = {}
    for id, entry in pairs(item_recurrence) do
      if entry.pattern ~= "EMERGING" then
        table.insert(all_notable, {id=id, entry=entry})
      end
    end
    -- Sort: OSCILLATING first, then PERSISTENT, then others; within pattern by wrong_count desc
    local pattern_order = {OSCILLATING=1, PERSISTENT=2, FLIP_FLOP=3, LATE_EMERGING=4}
    table.sort(all_notable, function(a, b)
      local pa = pattern_order[a.entry.pattern] or 5
      local pb = pattern_order[b.entry.pattern] or 5
      if pa ~= pb then return pa < pb end
      return (a.entry.wrong_count or 0) > (b.entry.wrong_count or 0)
    end)

    for _, p in ipairs(all_notable) do
      local e = p.entry
      table.insert(dp, string.format("Item %s — Pattern: %s", p.id, e.pattern))
      table.insert(dp, string.format("  Human label: %s | Model prediction: %s | First seen: cycle %d | Wrong: %d | Correct: %d",
        e.recent_label, e.model_prediction, e.first_cycle, e.wrong_count or 0, e.correct_count or 0))
      if e.per_cycle and #e.per_cycle > 0 then
        table.insert(dp, "  Per-cycle history (hypothesis tested → outcome → RCA rationale):")
        for _, pc in ipairs(e.per_cycle) do
          local line = string.format("    C%d", pc.cycle)
          if pc.hypothesis and pc.hypothesis ~= "" then
            line = line .. string.format(" [tested: %s]", pc.hypothesis)
          end
          if pc.segment == "CORRECT" then
            line = line .. " ✓ CORRECT (item was classified correctly this cycle)"
          elseif pc.segment and pc.segment ~= "" then
            line = line .. string.format(" ✗ WRONG segment=%s", pc.segment)
          end
          table.insert(dp, line)
          if pc.segment ~= "CORRECT" then
            if pc.rationale and pc.rationale ~= "" then
              table.insert(dp, string.format("      RCA: %s", pc.rationale))
            end
            if pc.evidence and pc.evidence ~= "" then
              table.insert(dp, string.format("      Evidence: \"%s\"", pc.evidence))
            end
          end
        end
      end
      table.insert(dp, "")
    end

    -- Contradiction trend
    local has_trend = false
    for _, it in ipairs(iterations or {}) do
      if it.contradictions_pct ~= nil then has_trend = true; break end
    end
    if has_trend then
      table.insert(dp, "=== CONTRADICTION TREND ACROSS CYCLES ===")
      for _, it in ipairs(iterations) do
        if it.contradictions_pct ~= nil then
          table.insert(dp, string.format("  Cycle %d: %d%% contradictions / %d%% policy gaps",
            it.iteration or 0, it.contradictions_pct, it.policy_gap_pct or 0))
        end
      end
      table.insert(dp, "")
    end

    -- Guidelines excerpt for context
    if has_text(current_guidelines) then
      table.insert(dp, "=== CURRENT GUIDELINES (for context) ===")
      table.insert(dp, trunc(current_guidelines, 3000))
      table.insert(dp, "=== END GUIDELINES ===\n")
    end

    table.insert(dp, "=== YOUR ANALYSIS TASK ===")
    table.insert(dp, "GOAL: 100% accuracy on this evaluation set. Overfitting is acceptable and desired.")
    table.insert(dp, "These items are misclassified after multiple cycles — your job is to figure out the exact")
    table.insert(dp, "rule, literal example, or carve-out that will force the correct answer next cycle.\n")
    table.insert(dp, "## Per-Item Targeted Fixes")
    table.insert(dp, "For EACH notable item above, produce a concrete fix recommendation:")
    table.insert(dp, "  - Item ID")
    table.insert(dp, "  - Evidence snippet (the exact transcript phrase driving the wrong answer)")
    table.insert(dp, "  - Why prior hypotheses failed for this item (cite specific hypotheses from the history)")
    table.insert(dp, "  - Exact rule/example/carve-out to add to the prompt to force the correct classification")
    table.insert(dp, "  - Whether the fix risks breaking any other items (name them) and how to scope it narrowly\n")
    table.insert(dp, "## Cross-Item Pattern Analysis")
    table.insert(dp, "Do these items cluster around specific themes? Name each theme and the items in it.")
    table.insert(dp, "For OSCILLATING items: identify ANTI-CORRELATED GROUPS where fixing one breaks another.")
    table.insert(dp, "When you find anti-correlated groups, propose a SINGLE unified rule that threads the needle —")
    table.insert(dp, "e.g. a more specific predicate that distinguishes the two groups instead of a blanket rule.\n")
    table.insert(dp, "## Aggressive Fix Strategy")
    table.insert(dp, "For each theme, propose the most aggressive prompt change that will fix ALL items in the theme")
    table.insert(dp, "without breaking correctly-classified items. Literal transcript quotes paired with the required")
    table.insert(dp, "classification are encouraged. Item-specific carve-outs are encouraged if nothing else works.")
    table.insert(dp, "Do NOT suggest invalidating labels, giving up on items, or declaring a ceiling — assume every item")
    table.insert(dp, "CAN be fixed with the right prompt. If prior hypotheses failed, that is evidence those hypotheses")
    table.insert(dp, "were too weak, too broad, or targeted the wrong feature — not evidence the label is noise.\n")
    table.insert(dp, "Be specific and concrete. Name exact items, exact phrases, and exact rule text.")
    table.insert(dp, "=== END ANALYSIS TASK ===")

    Tool.reset()
    report_writer.clear_history()
    local ok, err = safe_agent_call(report_writer, "report_writer", table.concat(dp, "\n"), nil)
    if not ok then
      diag(string.format("Feedback landscape diagnostic failed: %s", tostring(err)))
      return nil
    end

    local full_report = report_writer.output or ""
    if not has_text(full_report) then return nil end

    -- Build compact summary for planning context injection
    -- Extract the "Cross-Item Pattern Analysis" and "Optimization Ceiling Assessment" sections
    local function extract_section(text, heading)
      local _, hdr_end = text:find(heading .. "\n", 1, true)
      if not hdr_end then return "" end
      local next_hdr = text:find("\n## ", hdr_end + 1)
      local content = next_hdr and text:sub(hdr_end + 1, next_hdr - 1) or text:sub(hdr_end + 1)
      return (content:match("^(.-)%s*$") or content)
    end

    local per_item_section = extract_section(full_report, "## Per-Item Targeted Fixes")
    local pattern_section  = extract_section(full_report, "## Cross-Item Pattern Analysis")
    local strategy_section = extract_section(full_report, "## Aggressive Fix Strategy")

    local compact_parts = {}
    if has_text(per_item_section) then
      table.insert(compact_parts, "Per-item targeted fixes:\n" .. trunc(per_item_section, 1200))
    end
    if has_text(pattern_section) then
      table.insert(compact_parts, "Cross-item patterns:\n" .. trunc(pattern_section, 600))
    end
    if has_text(strategy_section) then
      table.insert(compact_parts, "Aggressive fix strategy:\n" .. trunc(strategy_section, 600))
    end

    return {
      full_report          = full_report,
      compact_summary      = table.concat(compact_parts, "\n\n"),
      generated_at_cycle   = cycle,
      notable_item_count   = notable_count,
    }
  end

  -- Build the full context message for the planning phase
  local function build_planning_context(opts)
    local parts = {}

    table.insert(parts, string.format('Score: "%s" | Scorecard: "%s"', opts.score_name, opts.scorecard_name))
    table.insert(parts, string.format("Baseline version: %s", tostring(opts.baseline_version_id)))
    table.insert(parts, "")

    -- Version history
    table.insert(parts, build_version_history(
      opts.iterations, opts.baseline_version_id,
      opts.baseline_fb_metrics, opts.baseline_acc_metrics,
      opts.last_accepted_version_id
    ))

    -- Current base
    table.insert(parts, "")
    table.insert(parts, string.format("Current base (score_config.yaml): %s", tostring(opts.last_accepted_version_id)))
    table.insert(parts, "")

    -- Accumulated lessons: LLM-synthesized supplementary summary alongside
    -- full per-cycle data.  Does NOT replace raw data — adds a pre-digested
    -- synthesis layer that helps the model orient quickly.
    local accumulated_lessons = State.get("accumulated_lessons")
    if has_text(accumulated_lessons) then
      table.insert(parts, "=== ACCUMULATED LESSONS (LLM-synthesized summary, updated each cycle) ===")
      table.insert(parts, trunc(accumulated_lessons, 3000))
      table.insert(parts, "=== END ACCUMULATED LESSONS ===")
      table.insert(parts, "")
    end

    -- Full per-cycle insights: raw prescriptions, diagnoses, and hypothesis results
    -- from ALL prior cycles.  The model gets both the raw data and the synthesis above.
    local cycle_insights = State.get("cycle_insights") or {}
    if #cycle_insights > 0 then
      table.insert(parts, "=== PER-CYCLE INSIGHTS (all cycles, most recent first) ===")
      for i = #cycle_insights, 1, -1 do
        local ci = cycle_insights[i]
        table.insert(parts, string.format("--- Cycle %d ---", ci.cycle))
        if ci.prescription_summary and ci.prescription_summary ~= "" then
          table.insert(parts, "Prescription: " .. ci.prescription_summary)
        end
        if ci.diagnosis_summary and ci.diagnosis_summary ~= "" then
          table.insert(parts, "Diagnosis: " .. ci.diagnosis_summary)
        end
        if ci.hypotheses_tested and type(ci.hypotheses_tested) == "table" then
          for _, h in ipairs(ci.hypotheses_tested) do
            table.insert(parts, string.format("  %s: FB %+.3f  ACC %+.3f  %s",
              h.name, h.fb_delta or 0, h.acc_delta or 0,
              h.succeeded and "SUCCEEDED" or "FAILED"))
          end
        end
        table.insert(parts, "")
      end
      table.insert(parts, "=== END PER-CYCLE INSIGHTS ===")
      table.insert(parts, "")
    end

    -- Hypothesis effectiveness summary: which approach categories have worked
    if opts.iterations and #opts.iterations > 0 then
      local eff_summary = build_hypothesis_effectiveness_summary(opts.iterations)
      if has_text(eff_summary) then
        table.insert(parts, eff_summary)
        table.insert(parts, "Prefer categories with positive average deltas.")
        table.insert(parts, "But follow the RCA over historical patterns if they conflict.")
        table.insert(parts, "")
      end
    end

    if has_text(opts.recent_rubric_memory_briefing) then
      table.insert(parts, "=== RECENT RUBRIC MEMORY ===")
      table.insert(parts, trunc(opts.recent_rubric_memory_briefing, 9000))
      table.insert(parts, "=== END RECENT RUBRIC MEMORY ===")
      table.insert(parts, "")
      table.insert(parts, "Before optimizing YAML or asking SMEs, compare recent KB entries against current guidelines and current scorecard/related-score policy.")
      table.insert(parts, "")
    end

    if has_text(opts.rubric_memory_briefing) then
      table.insert(parts, "=== RUBRIC MEMORY BRIEFING (official rubric + cited corpus evidence) ===")
      table.insert(parts, trunc(opts.rubric_memory_briefing, 12000))
      table.insert(parts, "=== END RUBRIC MEMORY BRIEFING ===")
      table.insert(parts, "")
      table.insert(parts, "Use citation IDs from this briefing for policy-memory claims and hypotheses.")
      table.insert(parts, "")
    end

    -- Evaluation results
    table.insert(parts, "=== CURRENT EVALUATION RESULTS ===")
    local fb_m = opts.recent_metrics
    if fb_m then
      table.insert(parts, string.format("Feedback: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        fb_m.alignment, fb_m.accuracy, fb_m.precision, fb_m.recall))
      local cm_lines = render_confusion_context(fb_m)
      for _, line in ipairs(cm_lines) do table.insert(parts, line) end
      -- Compact error-direction breakdown derived from RCA items
      if opts.recent_rca and type(opts.recent_rca) == "table"
         and type(opts.recent_rca._all_item_classifications) == "table" then
        local segs, _ = build_confusion_segments(
          opts.recent_rca._all_item_classifications, fb_m.confusion_labels)
        if #segs > 0 then
          table.insert(parts, "  Error direction breakdown:")
          for _, seg in ipairs(segs) do
            table.insert(parts, string.format("    %s: %d items", seg.label, #seg.items))
          end
        end
      end
    end
    if opts.recent_rca then
      table.insert(parts, "Feedback RCA:")
      local rca = opts.recent_rca
      if type(rca) == "table" then
        if rca.overall_explanation then
          table.insert(parts, "Summary: " .. tostring(rca.overall_explanation))
        end
        if rca.overall_improvement_suggestion then
          table.insert(parts, "Suggestion: " .. tostring(rca.overall_improvement_suggestion))
        end
        -- Primary next action (with mechanical-diagnosis sanity check)
        if rca._primary_next_action then
          local pna = rca._primary_next_action
          if type(pna) == "table" then
            local pna_text = pna.action or pna.description or pna.recommendation or ""
            if pna_text ~= "" then
              local confidence = pna.confidence and (" [" .. tostring(pna.confidence) .. " confidence]") or ""
              table.insert(parts, "Primary next action: " .. pna_text .. confidence)
              -- If RCA suspects a bug/mechanical failure, verify it's plausible:
              -- a true mechanical failure (e.g. parse error always returning one class)
              -- would produce errors in only ONE confusion matrix segment.
              -- If errors appear in MULTIPLE segments, the mechanical diagnosis is
              -- almost certainly wrong — it's a prompt/logic problem, not infrastructure.
              if pna_text == "bug_investigation" and type(rca._all_item_classifications) == "table" then
                local seg_counts = {}
                for _, item in ipairs(rca._all_item_classifications) do
                  local key = tostring(item.predicted_value or "?") .. "\0" .. tostring(item.correct_value or "?")
                  seg_counts[key] = (seg_counts[key] or 0) + 1
                end
                local num_segments = 0
                for _ in pairs(seg_counts) do num_segments = num_segments + 1 end
                if num_segments > 1 then
                  table.insert(parts, "  NOTE: 'bug_investigation' diagnosis is likely INCORRECT here.")
                  table.insert(parts, "  Errors appear in " .. num_segments .. " distinct confusion matrix segments,")
                  table.insert(parts, "  which rules out a simple mechanical failure (those produce errors in only one direction).")
                  table.insert(parts, "  Treat this as a prompt/logic problem — focus on the RCA segments below.")
                end
              end
            end
          end
        end
        -- Misclassification analyses: segmented by confusion matrix direction first,
        -- then by RCA category within each segment.
        if type(rca._all_item_classifications) == "table" and #rca._all_item_classifications > 0 then
          local total_items = #rca._all_item_classifications
          local segments, _ = build_confusion_segments(
            rca._all_item_classifications,
            opts.recent_metrics and opts.recent_metrics.confusion_labels)

          -- Build per-segment category metadata from category_hierarchy (for summary/patterns/topics)
          local cat_meta = {}  -- category_key -> cat table from hierarchy
          if type(rca._category_hierarchy) == "table" then
            for _, cat in ipairs(rca._category_hierarchy) do
              cat_meta[cat.category_key or "unknown"] = cat
            end
          end

          -- Segment-level example budget: largest segment gets most
          local seg_example_budgets = {5, 3, 2, 1}

          table.insert(parts, string.format("=== MISCLASSIFICATION ANALYSIS BY ERROR DIRECTION (%d total) ===", total_items))
          table.insert(parts, "IMPORTANT: Each segment represents a distinct error direction.")
          table.insert(parts, "Fixes for one segment often pull against fixes for another.")
          table.insert(parts, "Target ONE segment per hypothesis — do not try to fix multiple directions simultaneously.")

          if #segments == 0 then
            table.insert(parts, "(No misclassifications to analyze)")
          else
            for seg_rank, seg in ipairs(segments) do
              table.insert(parts, "")
              table.insert(parts, string.format("--- %s (%d items) ---", seg.label, #seg.items))
              table.insert(parts, seg.hint)

              -- Group this segment's items by RCA category
              local seg_by_cat = {}
              local seg_cat_order = {}
              for _, item in ipairs(seg.items) do
                local cat_key = item.primary_category or "unknown"
                if not seg_by_cat[cat_key] then
                  seg_by_cat[cat_key] = {}
                  table.insert(seg_cat_order, cat_key)
                end
                table.insert(seg_by_cat[cat_key], item)
              end
              -- Sort categories within segment by count descending
              table.sort(seg_cat_order, function(a, b)
                return #seg_by_cat[a] > #seg_by_cat[b]
              end)

              -- Per-category example budget within this segment
              local cat_example_limits = {
                seg_rank == 1 and 5 or (seg_rank == 2 and 3 or 2),
                seg_rank == 1 and 3 or 2,
                1, 1, 1
              }

              for cat_rank, cat_key in ipairs(seg_cat_order) do
                local cat_items = seg_by_cat[cat_key]
                local cat_count = #cat_items
                local share_pct = (cat_count / #seg.items) * 100
                local meta = cat_meta[cat_key] or {}
                local cat_label = meta.category_label or cat_key

                table.insert(parts, "")
                table.insert(parts, string.format("  [%s] %d items (%.0f%% of this segment)",
                  cat_label, cat_count, share_pct))

                if meta.summary_text and meta.summary_text ~= "" then
                  table.insert(parts, "  Summary: " .. tostring(meta.summary_text))
                end
                if type(meta.top_patterns) == "table" and #meta.top_patterns > 0 then
                  local ps = {}
                  for _, p in ipairs(meta.top_patterns) do
                    table.insert(ps, string.format("%s (%d)", tostring(p.pattern or "?"), p.count or 0))
                  end
                  table.insert(parts, "  Patterns: " .. table.concat(ps, ", "))
                end
                if type(meta.topics) == "table" and #meta.topics > 0 then
                  local ts = {}
                  for _, t in ipairs(meta.topics) do
                    table.insert(ts, string.format("%s (%d)", tostring(t.label or "?"), t.member_count or 0))
                  end
                  table.insert(parts, "  Topics: " .. table.concat(ts, ", "))
                end
                -- Representative evidence
                if type(rca._category_summaries) == "table" and rca._category_summaries[cat_key] then
                  local cs = rca._category_summaries[cat_key]
                  if type(cs) == "table" and type(cs.representative_evidence) == "table"
                     and #cs.representative_evidence > 0 then
                    table.insert(parts, "  Evidence:")
                    for _, ev in ipairs(cs.representative_evidence) do
                      if type(ev) == "table" then
                        table.insert(parts, string.format("    * [%s] %s",
                          ev.source or "?", ev.quote_or_fact or ""))
                      end
                    end
                  end
                end
                -- Detailed examples
                local max_ex = cat_example_limits[math.min(cat_rank, #cat_example_limits)]
                local num_shown = math.min(max_ex, cat_count)
                if num_shown > 0 then
                  table.insert(parts, string.format("  Examples (%d of %d):", num_shown, cat_count))
                  for ex_i = 1, num_shown do
                    local item = cat_items[ex_i]
                    table.insert(parts, string.format("    [%d] predicted=%s correct=%s",
                      ex_i, tostring(item.predicted_value or "?"), tostring(item.correct_value or "?")))
                    if item.rationale_short and item.rationale_short ~= "" then
                      table.insert(parts, "        Summary: " .. tostring(item.rationale_short))
                    end
                    if item.suggested_fix and item.suggested_fix ~= "" then
                      table.insert(parts, "        Suggested fix: " .. tostring(item.suggested_fix))
                    end
                    if item.rationale_paragraph and item.rationale_paragraph ~= "" then
                      table.insert(parts, "        Rationale: " .. tostring(item.rationale_paragraph))
                    end
                    if item.evidence_quote and item.evidence_quote ~= "" then
                      table.insert(parts, "        Evidence: " .. tostring(item.evidence_quote))
                    end
                    if item.detailed_cause and item.detailed_cause ~= "" then
                      table.insert(parts, "        Detailed cause: " .. tostring(item.detailed_cause))
                    end
                  end
                end
              end
            end
          end
        end
      else
        table.insert(parts, tostring(rca))
      end
    end

    -- Representative transcripts: fetch actual item text for top misclassification items.
    -- Picks one item per error direction (confusion matrix segment), up to 3 total.
    -- Seeing real transcripts helps hypothesis generation the same way it helps humans
    -- doing manual optimization: the model can reason about WHY a classification failed
    -- by reading what the score actually saw, not just RCA summaries and evidence quotes.
    if opts.recent_rca and type(opts.recent_rca._all_item_classifications) == "table"
       and #opts.recent_rca._all_item_classifications > 0 then
      local segs_for_tx, _ = build_confusion_segments(
        opts.recent_rca._all_item_classifications,
        opts.recent_metrics and opts.recent_metrics.confusion_labels)

      -- One item per segment (the first one with an item_id), up to 3 total
      local transcript_candidates = {}
      for _, seg in ipairs(segs_for_tx) do
        for _, item in ipairs(seg.items) do
          if item.item_id and item.item_id ~= "" then
            table.insert(transcript_candidates, {
              item_id   = item.item_id,
              predicted = item.predicted_value,
              correct   = item.correct_value,
              category  = item.primary_category,
              evidence  = item.evidence_quote,
              seg_label = seg.label,
            })
            break  -- one representative per segment only
          end
        end
        if #transcript_candidates >= 3 then break end
      end

      if #transcript_candidates > 0 then
        table.insert(parts, "")
        table.insert(parts, "=== REPRESENTATIVE TRANSCRIPTS (actual content for selected misclassification items) ===")
        table.insert(parts, "Each item shows the full transcript that the score classified incorrectly.")
        table.insert(parts, "Use these to reason concretely about WHY the score is failing and what to change.")
        table.insert(parts, "")
        for t_i, cand in ipairs(transcript_candidates) do
          local ok_item, item_data = pcall(call_plexus_tool, "plexus_item_info",
            {item_id = cand.item_id, minimal = true}, {max_retries = 2})
          if ok_item and type(item_data) == "table" and item_data.text then
            local tx = trunc(tostring(item_data.text), 2000)
            table.insert(parts, string.format(
              "--- Transcript %d: predicted=%s  correct=%s  category=%s  (%s) ---",
              t_i,
              tostring(cand.predicted or "?"),
              tostring(cand.correct or "?"),
              tostring(cand.category or "?"),
              tostring(cand.seg_label or "?")))
            if cand.evidence and cand.evidence ~= "" then
              table.insert(parts, "RCA evidence: " .. tostring(cand.evidence))
            end
            table.insert(parts, "Transcript:")
            table.insert(parts, tx)
            table.insert(parts, "")
          else
            diag(string.format("Transcript fetch skipped for item %s: %s",
              tostring(cand.item_id), tostring(item_data)))
          end
        end
        table.insert(parts, "=== END REPRESENTATIVE TRANSCRIPTS ===")
        table.insert(parts, "")
      end
    end

    table.insert(parts, "")

    local acc_m = opts.regression_metrics
    if acc_m then
      table.insert(parts, string.format("Accuracy: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        acc_m.alignment, acc_m.accuracy, acc_m.precision, acc_m.recall))
      local cm_lines = render_confusion_context(acc_m)
      for _, line in ipairs(cm_lines) do table.insert(parts, line) end
    end
    if opts.regression_rca then
      table.insert(parts, "Accuracy RCA (deterministic dataset — improve this too, not just avoid regression):")
      local rca = opts.regression_rca
      if type(rca) == "table" then
        if rca.overall_explanation then
          table.insert(parts, "Summary: " .. tostring(rca.overall_explanation))
        end
        if rca.overall_improvement_suggestion then
          table.insert(parts, "Suggestion: " .. tostring(rca.overall_improvement_suggestion))
        end
        -- Primary next action
        if rca._primary_next_action then
          local pna = rca._primary_next_action
          if type(pna) == "table" then
            local pna_text = pna.action or pna.description or pna.recommendation or ""
            if pna_text ~= "" then
              local confidence = pna.confidence and (" [" .. tostring(pna.confidence) .. " confidence]") or ""
              table.insert(parts, "Primary next action: " .. pna_text .. confidence)
            end
          end
        end
        -- Category summaries (accuracy dataset — brief, for regression awareness)
        if type(rca._category_hierarchy) == "table" and #rca._category_hierarchy > 0 then
          table.insert(parts, "Error categories (accuracy dataset — target these for Hypothesis 3):")
          for _, cat in ipairs(rca._category_hierarchy) do
            local cat_count = cat.item_count or 0
            if cat_count > 0 then
              local cat_label = cat.category_label or cat.category_key or "unknown"
              local share_pct = (cat.share or 0) * 100
              table.insert(parts, string.format("  %s (%d items, %.0f%%): %s",
                cat_label, cat_count, share_pct, tostring(cat.summary_text or "")))
            end
          end
        elseif type(rca._category_summaries) == "table" then
          table.insert(parts, "Error categories:")
          for cat, summary in pairs(rca._category_summaries) do
            local summary_text
            if type(summary) == "table" then
              summary_text = summary.category_summary_text or summary.text or summary.description or summary.summary or summary[1] or "?"
            else
              summary_text = tostring(summary)
            end
            local item_count = ""
            if type(summary) == "table" and summary.item_count then
              item_count = string.format(" (%d items)", summary.item_count)
            end
            table.insert(parts, string.format("  %s%s: %s", tostring(cat), item_count, tostring(summary_text)))
          end
        end
      else
        table.insert(parts, tostring(rca))
      end
    end
    table.insert(parts, "")

    -- Contradiction landscape — injected before guidelines so agent sees the ceiling
    -- before reading the score config. Updated every cycle.
    local known_contra = State.get("known_contradictions")
    local known_contra_code_repr = State.get("known_contradictions_code_repr")
    if known_contra and (has_text(known_contra.summary) or known_contra_code_repr) then
      local kc = known_contra
      local total_items = kc.total_items_analyzed or 0
      local contra_found = kc.contradictions_found or 0
      local gap_count = kc.policy_gap_count or 0
      local aligned = kc.aligned_found or 0

      table.insert(parts, "=== CONTRADICTION LANDSCAPE (live — refreshed this cycle) ===")
      table.insert(parts, string.format(
        "Analyzed: %d feedback items | Contradictions: %d (%.0f%%) | Policy gaps: %d | Aligned: %d",
        total_items, contra_found,
        (total_items > 0) and (contra_found / total_items * 100) or 0,
        gap_count, aligned))

      -- Show optimization ceiling when contradictions are non-trivial
      if total_items > 0 and contra_found > 0 then
        local ceiling = math.max(0, (total_items - contra_found) / total_items - 0.05)
        table.insert(parts, string.format(
          "OPTIMIZATION CEILING: With %d contradictions in %d items (%.0f%%), prompt optimization"
          .. "\n  alone cannot drive AC1 above ~%.2f. Cycles spent on contradiction items are wasted.",
          contra_found, total_items,
          (contra_found / total_items * 100), ceiling))
      end

      table.insert(parts, "")
      if known_contra_code_repr then
        -- Inject the actual code representation (comment header + JSON) that the FC block produces.
        -- This gives the agent full voting metadata, topic details, and exemplars.
        table.insert(parts, known_contra_code_repr)
        Human.notify({message = "  [FC context] Injecting code repr: " .. string.sub(known_contra_code_repr, 1, 400) .. "...", level = "debug"})
      else
        table.insert(parts, kc.summary)
      end
      table.insert(parts, "")
      table.insert(parts, "IMPLICATION: Hypotheses targeting contradiction items are unlikely to succeed.")
      table.insert(parts, "Target policy gaps and ambiguous guidelines instead for reliable gains.")
      table.insert(parts, "=== END CONTRADICTION LANDSCAPE ===")
      table.insert(parts, "")
    end

    -- Feedback landscape diagnostic (compact summary — full report in final prescription)
    local landscape_diag = State.get("recent_landscape_diagnostic")
    if landscape_diag and has_text(landscape_diag.compact_summary) then
      table.insert(parts, string.format(
        "=== FEEDBACK LANDSCAPE DIAGNOSTIC (from cycle %d) ===",
        landscape_diag.generated_at_cycle or "?"))
      table.insert(parts, landscape_diag.compact_summary)
      table.insert(parts, "")
      table.insert(parts, "IMPLICATION: PERSISTENT, OSCILLATING, and FLIP_FLOP items are your HIGHEST-PRIORITY TARGETS.")
      table.insert(parts, "These items have been wrong for multiple cycles and prior prompt changes did NOT fix them.")
      table.insert(parts, "Be MORE aggressive: add explicit literal rules, direct example snippets, or item-specific carve-outs")
      table.insert(parts, "that target exactly the language in those transcripts. Overfitting this eval set is acceptable and desired —")
      table.insert(parts, "the goal is 100% accuracy on the known items. Do not back off assuming label noise; assume the rubric")
      table.insert(parts, "is still missing the rule that would force the correct answer for these specific cases.")
      table.insert(parts, "=== END FEEDBACK LANDSCAPE DIAGNOSTIC ===")
      table.insert(parts, "")
    elseif opts.iterations and #opts.iterations >= 2 then
      -- Recurrence compact summary (pre-diagnostic — available every cycle from cycle 2 onward)
      local item_recurrence = State.get("item_recurrence") or {}
      local recurrence_summary = build_recurrence_compact_summary(item_recurrence, opts.iteration or #opts.iterations)
      if recurrence_summary then
        table.insert(parts, "=== ITEM RECURRENCE PATTERNS (cross-cycle) ===")
        table.insert(parts, recurrence_summary)
        table.insert(parts, ""  )
        table.insert(parts, "IMPLICATION: PERSISTENT, OSCILLATING, and FLIP_FLOP items are your HIGHEST-PRIORITY TARGETS.")
        table.insert(parts, "They have been wrong for multiple cycles and prior prompt changes did NOT fix them. Be more aggressive:")
        table.insert(parts, "add explicit literal rules, direct example snippets, or item-specific carve-outs that target exactly")
        table.insert(parts, "the language in those transcripts. Overfitting this eval set is acceptable and desired — the goal is")
        table.insert(parts, "100% accuracy on the known items. Do not assume label noise; assume the rubric is still missing")
        table.insert(parts, "the rule that would force the correct answer for these specific cases.")
        table.insert(parts, "=== END ITEM RECURRENCE PATTERNS ===")
        table.insert(parts, "")
      end
    end

    -- Repeat-offender LLM diagnoses: per-item diagnosis for PERSISTENT/OSCILLATING items
    -- with wrong_count >= 3. Produced by analyze_repeat_offenders() each cycle.
    local rod = State.get("repeat_offender_diagnoses") or {}
    if #rod > 0 then
      table.insert(parts, "=== REPEAT-OFFENDER DIAGNOSES (LLM per-item analysis) ===")
      table.insert(parts, "These items have been wrong for 3+ consecutive cycles despite multiple prompt changes.")
      table.insert(parts, "Each diagnosis explains WHY the optimizer cannot fix the item and what action is needed.\n")
      for _, d in ipairs(rod) do
        local id_label = has_text(d.external_id) and d.external_id or d.item_id
        table.insert(parts, string.format(
          "Item %s — Pattern: %s | Wrong: %d | Label: %s | AI: %s",
          id_label, d.pattern or "?", d.wrong_count or 0,
          d.recent_label or "?", d.model_prediction or "?"))
        table.insert(parts, string.format(
          "  Diagnosis: %s [%s confidence] — %s",
          d.diagnosis or "?", d.confidence or "?", d.explanation or ""))
        table.insert(parts, string.format(
          "  Recommended action: %s",
          d.recommended_action or "?"))
        if has_text(d.sme_question) then
          table.insert(parts, string.format(
            "  SME question: %s", d.sme_question))
        end
        table.insert(parts, "")
      end
      -- Escalation guidance based on diagnosis types
      local has_ceiling = false
      local has_mislabel = false
      local has_contradictory = false
      for _, d in ipairs(rod) do
        if d.recommended_action == "accept_ceiling" then has_ceiling = true end
        if d.diagnosis == "mislabel" and d.confidence == "high" then has_mislabel = true end
        if d.diagnosis == "contradictory_rule" then has_contradictory = true end
      end
      if has_ceiling or has_contradictory then
        table.insert(parts, "ESCALATION: One or more items have diagnosis=contradictory_rule or action=accept_ceiling.")
        table.insert(parts, "Do NOT generate more hypothesis variants targeting these items — the optimizer cannot fix them.")
        table.insert(parts, "Instead, generate a SME question for each and move on to other items.")
      end
      if has_mislabel then
        table.insert(parts, "MISLABEL ALERT: One or more items have high-confidence mislabel diagnosis.")
        table.insert(parts, "These items should be flagged for label review before further optimization cycles.")
      end
      table.insert(parts, "=== END REPEAT-OFFENDER DIAGNOSES ===")
      table.insert(parts, "")
    end

    -- Guidelines (read-only reference), then editable score config last
    if has_text(opts.current_guidelines) then
      table.insert(parts, "=== CLASSIFICATION GUIDELINES (READ-ONLY reference — DO NOT edit this) ===")
      table.insert(parts, opts.current_guidelines)
      table.insert(parts, "=== END OF GUIDELINES (read-only) ===")
      table.insert(parts, "")
    end

    -- Current score configuration (editable) — placed last so it's most prominent
    table.insert(parts, "=== CURRENT SCORE CONFIGURATION (score_config.yaml) — THIS IS THE FILE YOU EDIT ===")
    table.insert(parts, opts.current_code or "(not available)")
    table.insert(parts, "=== END OF score_config.yaml ===")

    -- Count consecutive accuracy regressions in prior iterations
    local consecutive_acc_rejections = 0
    if opts.iterations then
      for i = #opts.iterations, 1, -1 do
        local it = opts.iterations[i]
        local acc_d = it.regression_deltas and it.regression_deltas.alignment or 0
        if not it.accepted and acc_d < -0.02 then
          consecutive_acc_rejections = consecutive_acc_rejections + 1
        else
          break
        end
      end
    end

    -- Expert hint (optional, from user)
    if has_text(opts.hint) then
      table.insert(parts, "")
      table.insert(parts, "=== EXPERT HINT (from domain expert — prioritize this guidance) ===")
      table.insert(parts, opts.hint)
    end

    -- Prior run prescription (cross-run learning)
    if has_text(opts.prior_run_prescription) then
      table.insert(parts, "")
      table.insert(parts, "=== PRIOR RUN PRESCRIPTION (from previous optimizer run) ===")
      table.insert(parts, "The previous optimizer run completed with the following prescription.")
      table.insert(parts, "Use this to AVOID approaches that already failed and FOCUS on identified gaps:")
      table.insert(parts, opts.prior_run_prescription)
      table.insert(parts, "=== END PRIOR RUN PRESCRIPTION ===")
    end

    return table.concat(parts, "\n")
  end

  -- === EVIDENCE-COLLECTION HELPERS (for end-of-run diagnosis) ===

  -- Build a table showing feedback-vs-accuracy divergence across all cycles.
  -- Returns a formatted string showing per-cycle divergence direction.
  local function build_divergence_analysis(iterations)
    local parts = {}
    local divergent_cycles = 0
    local total_cycles_with_both = 0
    local fb_sum = 0
    local acc_sum = 0

    table.insert(parts, "=== FEEDBACK-REGRESSION DIVERGENCE ANALYSIS ===")
    table.insert(parts, string.format("%-6s %-30s %10s %10s %10s   %s",
      "Cycle", "Hypothesis", "FB Δ", "ACC Δ", "Diverge", "Direction"))
    table.insert(parts, string.rep("-", 100))

    for _, iter in ipairs(iterations) do
      if iter.skip_reason then goto continue_iter end

      -- Use the accepted/final version's deltas
      local fb_d = iter.recent_deltas and iter.recent_deltas.alignment or 0
      local acc_d = iter.regression_deltas and iter.regression_deltas.alignment or 0
      local divergence = fb_d - acc_d
      local direction = ""

      if acc_d ~= 0 or fb_d ~= 0 then
        total_cycles_with_both = total_cycles_with_both + 1
        fb_sum = fb_sum + fb_d
        acc_sum = acc_sum + acc_d
      end

      if fb_d > 0.005 and acc_d > 0.005 then
        direction = "Both improve"
      elseif fb_d < -0.005 and acc_d < -0.005 then
        direction = "Both regress"
      elseif fb_d > 0.005 and acc_d < -0.005 then
        direction = "!! DIVERGE: FB up ACC down"
        divergent_cycles = divergent_cycles + 1
      elseif fb_d < -0.005 and acc_d > 0.005 then
        direction = "!! DIVERGE: FB down ACC up"
        divergent_cycles = divergent_cycles + 1
      else
        direction = "Neutral"
      end

      -- Find hypothesis name from exploration_results
      local hyp_name = "(synthesis)"
      if iter.exploration_results and #iter.exploration_results > 0 then
        local best = iter.exploration_results[1]
        for _, sv in ipairs(iter.exploration_results) do
          if sv.succeeded then best = sv; break end
        end
        if best.hypothesis and best.hypothesis.name then
          hyp_name = trunc(best.hypothesis.name, 28)
        end
      end

      table.insert(parts, string.format("%-6d %-30s %+10.3f %+10.3f %+10.3f   %s",
        iter.iteration or 0, hyp_name, fb_d, acc_d, divergence, direction))

      -- Also show individual hypotheses if there are interesting divergences
      if iter.exploration_results then
        for _, sv in ipairs(iter.exploration_results) do
          local sv_fb = sv.fb_deltas and sv.fb_deltas.alignment or 0
          local sv_acc = sv.acc_deltas and sv.acc_deltas.alignment or 0
          if (sv_fb > 0.005 and sv_acc < -0.005) or (sv_fb < -0.005 and sv_acc > 0.005) then
            local sv_name = sv.hypothesis and sv.hypothesis.name or "?"
            table.insert(parts, string.format("  cand %-28s %+10.3f %+10.3f %+10.3f   !! divergent",
              trunc(sv_name, 28), sv_fb, sv_acc, sv_fb - sv_acc))
          end
        end
      end

      ::continue_iter::
    end

    table.insert(parts, string.rep("-", 100))

    -- Summary statistics
    if total_cycles_with_both > 0 then
      table.insert(parts, string.format(
        "\nSummary: %d of %d cycles show divergence (FB and ACC move in opposite directions).",
        divergent_cycles, total_cycles_with_both))
      table.insert(parts, string.format(
        "Cumulative: FB %+.3f, ACC %+.3f", fb_sum, acc_sum))

      if divergent_cycles > total_cycles_with_both * 0.5 then
        table.insert(parts, "\n!! HIGH DIVERGENCE: More than half of cycles show feedback and accuracy")
        table.insert(parts, "   moving in opposite directions. This strongly suggests:")
        table.insert(parts, "   (a) Rubric drift: feedback reviewers apply a different standard than the regression ground truth")
        table.insert(parts, "   (b) Regression dataset staleness: the curated dataset reflects an older rubric interpretation")
        table.insert(parts, "   (c) Reviewer inconsistency: different reviewers disagree about edge cases")
      elseif divergent_cycles > 0 then
        table.insert(parts, "\nSome divergence detected. Changes that improve feedback but hurt accuracy may be")
        table.insert(parts, "overfitting to recent reviewer patterns rather than finding genuine policy improvements.")
      else
        table.insert(parts, "\nDatasets are well-aligned — changes affect both similarly.")
      end
    else
      table.insert(parts, "\nNo cycles with both feedback and accuracy data available.")
    end

    table.insert(parts, "=== END DIVERGENCE ANALYSIS ===")
    return table.concat(parts, "\n")
  end

  -- Build RCA category evolution table across cycles.
  -- Shows how error categories change over the optimization run.
  local function build_rca_evolution(iterations)
    local parts = {}
    table.insert(parts, "=== RCA CATEGORY EVOLUTION ===")
    table.insert(parts, "How error root causes changed across cycles (feedback evaluation RCA):")
    table.insert(parts, "")
    table.insert(parts, string.format("%-6s %18s %18s %18s %18s %10s %9s %9s",
      "Cycle", "Config Problem", "Guideline Gap", "Info Gap", "Mechanical", "Fixable%", "Contra%", "Gaps%"))
    table.insert(parts, string.rep("-", 116))

    local has_data = false
    for _, iter in ipairs(iterations) do
      if iter.skip_reason then goto continue_rca end

      -- Find the RCA from the accepted/best exploration result
      local rca = nil
      if iter.exploration_results then
        for _, sv in ipairs(iter.exploration_results) do
          if sv.fb_rca and type(sv.fb_rca) == "table" then
            local ch = sv.fb_rca._category_hierarchy or
              (sv.fb_rca.misclassification_analysis and sv.fb_rca.misclassification_analysis.category_hierarchy)
            if ch and #ch > 0 then
              rca = sv.fb_rca
              break
            end
          end
        end
      end

      if not rca then goto continue_rca end

      local hierarchy = rca._category_hierarchy or
        (rca.misclassification_analysis and rca.misclassification_analysis.category_hierarchy) or {}
      if #hierarchy == 0 then goto continue_rca end

      has_data = true
      local config_n, guideline_n, info_n, mech_n, total_n = 0, 0, 0, 0, 0
      local fixable_n = 0

      for _, cat in ipairs(hierarchy) do
        local key = cat.category_key or ""
        local count = cat.item_count or 0
        total_n = total_n + count
        if string.find(key, "score_configuration") then
          config_n = config_n + count
        elseif string.find(key, "guideline_gap") then
          guideline_n = guideline_n + count
        elseif string.find(key, "information_gap") then
          info_n = info_n + count
        elseif string.find(key, "mechanical") then
          mech_n = mech_n + count
        end
      end

      -- Compute fixable% from item classifications if available
      local item_class = rca._all_item_classifications or
        (rca.misclassification_analysis and rca.misclassification_analysis.item_classifications_all) or {}
      if type(item_class) == "table" and #item_class > 0 then
        for _, ic in ipairs(item_class) do
          if ic.config_fixability == "likely_fixable" then
            fixable_n = fixable_n + 1
          end
        end
      end

      local fixable_pct = (total_n > 0) and (fixable_n / total_n * 100) or 0

      local function fmt_cat(n, tot)
        if tot == 0 then return string.format("%3d", n) end
        return string.format("%3d (%2.0f%%)", n, n / tot * 100)
      end

      local contra_pct_str = iter.contradictions_pct ~= nil and string.format("%d%%", iter.contradictions_pct) or "?"
      local gap_pct_str    = iter.policy_gap_pct     ~= nil and string.format("%d%%", iter.policy_gap_pct)     or "?"
      table.insert(parts, string.format("%-6d %18s %18s %18s %18s %9.0f%% %9s %9s",
        iter.iteration or 0,
        fmt_cat(config_n, total_n),
        fmt_cat(guideline_n, total_n),
        fmt_cat(info_n, total_n),
        fmt_cat(mech_n, total_n),
        fixable_pct,
        contra_pct_str,
        gap_pct_str))

      ::continue_rca::
    end

    if not has_data then
      table.insert(parts, "(No RCA category data available across cycles)")
    else
      table.insert(parts, "")
      table.insert(parts, "Key: Config Problem = fixable via prompt changes. Guideline Gap = needs SME input.")
      table.insert(parts, "Contra% = true contradictions (unfixable via prompt). Gaps% = policy gaps (fixable).")
      table.insert(parts, "If Contra% is flat across cycles: structural noise — prompt changes cannot help.")
      table.insert(parts, "If Gaps% is falling: policy space being exhausted. If Gaps% is stable: more gaps remain.")
    end

    table.insert(parts, "=== END RCA EVOLUTION ===")
    return table.concat(parts, "\n")
  end

  -- Build hypothesis effectiveness summary across all cycles.
  -- Categorizes hypotheses by type and computes per-category success rates.
  build_hypothesis_effectiveness_summary = function(iterations)
    local categories = {
      {key = "policy_clarification", label = "Policy clarification", patterns = {"clarif", "tighten", "sharpen", "refine", "reword", "disambigu"}},
      {key = "policy_addition", label = "Policy addition", patterns = {"add", "new rule", "missing", "gap", "cover", "address"}},
      {key = "structural", label = "Structural/model", patterns = {"model", "architect", "restructur", "node", "preprocess"}},
      {key = "fewshot", label = "Few-shot examples", patterns = {"example", "few.shot", "sample", "demonstrat"}},
      {key = "evidence_logic", label = "Evidence/logic", patterns = {"evidence", "anchor", "lock", "override", "precedence", "priority"}},
    }

    -- Count per category
    local cat_stats = {}
    for _, c in ipairs(categories) do
      cat_stats[c.key] = {label = c.label, tried = 0, succeeded = 0, fb_sum = 0, acc_sum = 0}
    end
    cat_stats["other"] = {label = "Other", tried = 0, succeeded = 0, fb_sum = 0, acc_sum = 0}

    for _, iter in ipairs(iterations) do
      if not iter.exploration_results then goto continue_hyp end
      for _, sv in ipairs(iter.exploration_results) do
        local name = ""
        if sv.hypothesis then
          name = string.lower((sv.hypothesis.name or "") .. " " .. (sv.hypothesis.description or ""))
        end

        local matched = false
        for _, c in ipairs(categories) do
          for _, pat in ipairs(c.patterns) do
            if string.find(name, pat) then
              local s = cat_stats[c.key]
              s.tried = s.tried + 1
              if sv.succeeded then s.succeeded = s.succeeded + 1 end
              s.fb_sum = s.fb_sum + (sv.fb_deltas and sv.fb_deltas.alignment or 0)
              s.acc_sum = s.acc_sum + (sv.acc_deltas and sv.acc_deltas.alignment or 0)
              matched = true
              break
            end
          end
          if matched then break end
        end

        if not matched then
          local s = cat_stats["other"]
          s.tried = s.tried + 1
          if sv.succeeded then s.succeeded = s.succeeded + 1 end
          s.fb_sum = s.fb_sum + (sv.fb_deltas and sv.fb_deltas.alignment or 0)
          s.acc_sum = s.acc_sum + (sv.acc_deltas and sv.acc_deltas.alignment or 0)
        end
      end
      ::continue_hyp::
    end

    local parts = {}
    table.insert(parts, "=== HYPOTHESIS EFFECTIVENESS SUMMARY ===")
    table.insert(parts, string.format("%-25s %7s %10s %10s %10s",
      "Category", "Tried", "Succeeded", "Avg FB Δ", "Avg ACC Δ"))
    table.insert(parts, string.rep("-", 65))

    local order = {"policy_clarification", "policy_addition", "evidence_logic", "structural", "fewshot", "other"}
    local total_tried = 0
    for _, key in ipairs(order) do
      local s = cat_stats[key]
      if s.tried > 0 then
        total_tried = total_tried + s.tried
        table.insert(parts, string.format("%-25s %7d %10d %+10.3f %+10.3f",
          s.label, s.tried, s.succeeded,
          s.fb_sum / s.tried, s.acc_sum / s.tried))
      end
    end

    if total_tried == 0 then
      table.insert(parts, "(No hypothesis data available)")
    end

    table.insert(parts, "=== END HYPOTHESIS EFFECTIVENESS ===")
    return table.concat(parts, "\n")
  end

  -- Load the optimization cookbook from the documentation system.
  -- This allows the cookbook to be updated without editing this YAML file.
