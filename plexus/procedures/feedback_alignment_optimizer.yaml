name: Feedback Alignment Optimizer
version: 1.0.0
class: Tactus
description: "Iteratively optimize Plexus score alignment using feedback evaluations with root-cause analysis (RCA). Runs baseline → analyze RCA → propose changes → evaluate → repeat until convergence or max iterations."

params:
  scorecard:
    type: string
    required: true
    description: "Scorecard identifier (name, key, or ID)"

  score:
    type: string
    required: true
    description: "Score identifier (name, key, or ID)"

  days:
    type: number
    default: 90
    description: "Feedback window in days for evaluation dataset"

  max_samples:
    type: number
    default: 100
    required: false
    description: "Maximum number of feedback samples to use per evaluation and minimum dataset size"

  max_iterations:
    type: number
    default: 3
    description: "Maximum number of optimization iterations"

  improvement_threshold:
    type: number
    default: 0.02
    description: "Minimum AC1 (Gwet's alignment) improvement to continue iterating (0.02 = 2%)"

  target_accuracy:
    type: number
    default: 0.95
    description: "Stop early if feedback AC1 reaches this threshold (0.0–1.0)"
    required: false

  num_candidates:
    type: number
    default: 3
    required: false
    description: "Maximum number of hypotheses per cycle (agent may propose fewer). Evals run in parallel after all hypotheses are implemented."

  hint:
    type: string
    required: false
    description: "Optional expert hint to guide the optimizer. Example: 'The prescriber name is often redacted — the LLM should be warned about this.' This text is included verbatim in the agent's context."

  start_version:
    type: string
    required: false
    description: "Score version ID to start from instead of the champion version. Useful for continuing optimization from a previous result."

  resume_accuracy_eval:
    type: string
    required: false
    description: "Evaluation ID of a previous accuracy baseline to reuse. Skips running a new accuracy baseline. Must match the start_version (or champion if not specified)."

  resume_feedback_eval:
    type: string
    required: false
    description: "Evaluation ID of a previous feedback baseline to reuse. Skips running a new feedback baseline. Must match the start_version (or champion if not specified)."

  dry_run:
    type: boolean
    default: false
    description: "If true, run analysis only without making score updates"

outputs:
  success:
    type: boolean
    required: true

  status:
    type: string
    required: true
    description: "Completion status: converged, max_iterations, target_reached, user_stopped, improvement_plateau, or error"

  message:
    type: string
    required: true

  accuracy_baseline_id:
    type: string
    required: false

  feedback_baseline_id:
    type: string
    required: false

  final_evaluation_id:
    type: string
    required: false

  iterations:
    type: array
    required: false
    description: "Array of iteration results with dual accuracy/feedback metrics and deltas"

  feedback_improvement:
    type: number
    required: false
    description: "Total feedback AC1 improvement from baseline"

  accuracy_improvement:
    type: number
    required: false
    description: "Total accuracy AC1 improvement from baseline"

  scorecard_id:
    type: string
    required: false

  score_id:
    type: string
    required: false

agents:
  code_editor:
    provider: openai
    model: gpt-5.4
    temperature: 1
    system_prompt: |
      You are an optimizer for a Plexus score configuration.

      You work in phases within a single continuous session:

      PHASE 1 — PLANNING:
      You receive RCA analysis, evaluation metrics, guidelines, and the current score
      configuration. You will be asked to propose ONE hypothesis at a time, with a specific
      objective (e.g., incremental feedback fix, bold feedback fix, accuracy fix).
      Respond with a single numbered hypothesis on one line.

      PHASE 2 — IMPLEMENTATION:
      For each hypothesis, you edit score_config.yaml to test it. The current file content
      appears in a system message before each task message. After editing, submit with
      submit_score_version(version_note="..."). The system evaluates your version and reports
      results. Then you move to the next hypothesis, starting from the original baseline.

      PHASE 3 — SYNTHESIS:
      After all hypotheses are evaluated, you see all results with their metrics.
      Synthesize what you learned. If any versions showed improvement (on either
      dataset, without significantly hurting the other), create a final version
      that incorporates the best ideas. If nothing improved, explain what you learned
      and what to try differently next cycle.

      You maintain full context across all phases and cycles — every result, whether
      it improved things or not, is valuable signal. Use the accumulated history to
      avoid repeating approaches that didn't work and to build on approaches that did.

      TWO DATASETS:
      1. ACCURACY: Regression dataset. Measures overall correctness.
      2. FEEDBACK: Human-reviewed items from the last 90 days.
      Both matter. Improving one while not significantly hurting the other is a win.
      A hypothesis that improves accuracy by +0.3 but nudges feedback by -0.02 is
      still useful signal — note what it implies for the next hypothesis.

      TOOLS:
      - str_replace_editor: view or edit score_config.yaml
      - submit_score_version: submit current edits for evaluation
      - done: signal you cannot improve current hypothesis

      MODEL CHANGES:
      If you change the model: field, use the base model name WITHOUT a date suffix
      (e.g. "gpt-5-mini" not "gpt-5-mini-2025-01-01"). The API resolves the alias
      to the latest snapshot automatically. Getting the date wrong causes a hard failure.

      EDIT SAFETY — ranked:
      SAFEST: Add concrete examples to clarify edge cases
      SAFE: Sharpen existing criteria with specific language
      MODERATE: Adjust 1-3 lines of existing criteria wording
      RISKY: Expand or broaden criteria (may hurt accuracy)
      DANGEROUS: Remove criteria or rewrite entire user_message (almost always hurts)

      YAML RULES:
      - old_str must be an exact substring of the current file (copy from the context)
      - Preserve indentation exactly — count spaces from the file shown to you
      - When adding a list item, include the previous item in old_str for context
      - When modifying an item, replace in-place (include full item in old_str)

    initial_message: "Ready."

    tools:
      - str_replace_editor
      - submit_score_version
      - done

  reviewer:
    provider: openai
    model: gpt-5.4
    temperature: 1
    system_prompt: |
      You are a score optimization reviewer. You will see the eval results for an edit
      just made to a score configuration. Decide: keep or revert.

      Decision rules:
      - If accuracy delta is worse than -0.03: call done(decision="revert") — accuracy
        regression this large is not acceptable, even if feedback improved.
      - If feedback delta is negative AND accuracy delta is <= 0: call done(decision="revert")
        — both metrics got worse, no reason to keep this.
      - If feedback delta is positive and accuracy delta is >= -0.02: call done(decision="keep")
        — this is a good change, accept it.
      - For borderline cases (feedback improved slightly but accuracy regressed slightly):
        use your judgment. Prefer keep if feedback gain outweighs accuracy cost.

      When multiple candidates were tried, the best one has been pre-selected by metrics.
      Your job: confirm the selection or revert ALL if none are good enough.

      REQUIRED: You MUST call done() as a tool call. Do NOT return a text response.
      Always include a brief reason: done(decision="keep", reason="...") or done(decision="revert", reason="...")

    initial_message: "Ready to review."

    tools:
      - done

stages:
  - setup
  - baseline
  - exploration
  - selection
  - finalize

code: |

  -- Helper functions

  -- Reliable string truncation — string.sub may not work in Tactus/lupa sandbox
  local function trunc(s, maxlen)
    if s == nil then return "" end
    local str = tostring(s)
    if #str <= maxlen then return str end
    local attempt = string.sub(str, 1, maxlen)
    if #attempt <= maxlen + 10 then
      return attempt
    end
    -- string.sub failed; build char-by-char via table
    local chars = {}
    for i = 1, maxlen do
      chars[i] = string.char(string.byte(str, i))
    end
    return table.concat(chars)
  end

  local function has_text(s)
    return type(s) == "string" and #s > 0
  end

  local function safe_decode(value)
    if value == nil then
      return nil, "nil"
    end
    if type(value) ~= "string" then
      local ok_encode, encoded = pcall(function()
        return Json.encode(value)
      end)
      if ok_encode then
        local ok_decode, decoded = pcall(function()
          return Json.decode(encoded)
        end)
        if ok_decode then
          return decoded, nil
        end
      end
      return value, nil
    end
    local ok, decoded = pcall(function()
      return Json.decode(value)
    end)
    if ok then
      return decoded, nil
    end
    -- Not valid JSON — surface the raw string as the error message so callers
    -- see the actual tool error (e.g. "Error: Missing API credentials.") instead
    -- of an opaque JSON parse failure.
    return nil, value
  end

  local function safe_get_metric(metrics, name)
    if type(metrics) ~= "table" then return nil end
    for _, m in ipairs(metrics) do
      if type(m) == "table" and m.name == name then
        return m.value
      end
    end
    return nil
  end

  local function extract_metrics(eval_result)
    local metrics = eval_result.metrics or {}
    local result = {
      alignment = safe_get_metric(metrics, "Alignment") or 0,
      accuracy = safe_get_metric(metrics, "Accuracy") or 0,
      precision = safe_get_metric(metrics, "Precision") or 0,
      recall = safe_get_metric(metrics, "Recall") or 0
    }
    -- Capture confusion matrix and class distributions for planning context
    local cm = eval_result.confusionMatrix or eval_result.confusion_matrix
    if type(cm) == "table" then
      result.confusion_matrix = cm.matrix
      result.confusion_labels = cm.labels
    end
    local pred_dist = eval_result.predictedClassDistribution or eval_result.predicted_class_distribution
    if type(pred_dist) == "table" then
      result.predicted_distribution = pred_dist
    end
    local actual_dist = eval_result.datasetClassDistribution or eval_result.dataset_class_distribution
    if type(actual_dist) == "table" then
      result.actual_distribution = actual_dist
    end
    return result
  end

  -- Render confusion matrix + class distributions as readable text
  local function render_confusion_context(m)
    local lines = {}
    if m.confusion_matrix and m.confusion_labels then
      local labels = m.confusion_labels
      local matrix = m.confusion_matrix
      -- Header
      table.insert(lines, string.format("  Confusion matrix (rows=actual, cols=predicted):"))
      local header = string.format("  %15s", "")
      for _, lbl in ipairs(labels) do
        header = header .. string.format("  Pred %-6s", lbl)
      end
      table.insert(lines, header)
      -- Rows
      for i, row_label in ipairs(labels) do
        local row = matrix[i]
        if type(row) == "table" then
          local line = string.format("  Actual %-6s", row_label)
          for _, val in ipairs(row) do
            line = line .. string.format("  %10d", val)
          end
          table.insert(lines, line)
        end
      end
    end
    -- Class distributions
    if m.predicted_distribution and m.actual_distribution then
      local pred_parts, actual_parts = {}, {}
      for _, d in ipairs(m.predicted_distribution) do
        if type(d) == "table" then
          table.insert(pred_parts, string.format("%s=%.0f%%(%d)", d.label or "?", d.percentage or 0, d.count or 0))
        end
      end
      for _, d in ipairs(m.actual_distribution) do
        if type(d) == "table" then
          table.insert(actual_parts, string.format("%s=%.0f%%(%d)", d.label or "?", d.percentage or 0, d.count or 0))
        end
      end
      if #pred_parts > 0 then
        table.insert(lines, "  Model predicts: " .. table.concat(pred_parts, ", "))
        table.insert(lines, "  Actual labels:  " .. table.concat(actual_parts, ", "))
      end
    end
    return lines
  end

  local function calculate_deltas(current, baseline)
    return {
      alignment = current.alignment - baseline.alignment,
      accuracy = current.accuracy - baseline.accuracy,
      precision = current.precision - baseline.precision,
      recall = current.recall - baseline.recall
    }
  end

  local function call_plexus_tool(tool_name, args_table, opts)
    -- Direct programmatic tool invocation via Tactus Tool.get() API
    -- No LLM agent involved — calls MCP tools directly from Lua
    -- Includes retry with exponential backoff for transient failures
    opts = opts or {}
    local max_retries = opts.max_retries or 3
    local base_delay = opts.base_delay or 5  -- seconds

    for attempt = 1, max_retries do
      local ok, raw_result = pcall(function()
        local tool_handle = Tool.get(tool_name)
        return tool_handle(args_table or {})
      end)

      if ok then
        local decoded_result, decode_err = safe_decode(raw_result)
        if decoded_result then
          -- Check for API-level errors (e.g. {error: "Scorecard not found"})
          if type(decoded_result) == "table" and decoded_result.error then
            local err_msg = tostring(decoded_result.error)
            if attempt == max_retries then
              error(tool_name .. " returned error after " .. max_retries .. " attempts: " .. err_msg)
            end
            diag(string.format("%s API error (attempt %d/%d): %s", tool_name, attempt, max_retries, err_msg))
          else
            return decoded_result
          end
        else
          if attempt == max_retries then
            error("Failed to decode " .. tool_name .. " result: " .. tostring(decode_err))
          end
          diag(string.format("%s decode error (attempt %d/%d): %s", tool_name, attempt, max_retries, tostring(decode_err)))
        end
      else
        if attempt == max_retries then
          error("Failed to call " .. tool_name .. " after " .. max_retries .. " attempts: " .. tostring(raw_result))
        end
        diag(string.format("%s error (attempt %d/%d): %s", tool_name, attempt, max_retries, tostring(raw_result)))
      end

      -- Exponential backoff: 5s, 10s, 20s
      local delay = base_delay * (2 ^ (attempt - 1))
      diag(string.format("Retrying %s in %d seconds...", tool_name, delay))
      local t = os.clock() + delay
      while os.clock() < t do end
    end
  end

  -- Build version history table for agent context
  local function build_version_history(iterations, baseline_version_id, baseline_fb_metrics, baseline_acc_metrics, last_accepted_version_id)
    local lines = {"=== OPTIMIZATION HISTORY ===", ""}
    table.insert(lines, string.format("%-6s  %-38s  %-10s  %-12s  %-7s  %-12s  %-7s",
      "# Iter", "Version", "Status", "Feedback AC1", "Delta", "Accuracy AC1", "Delta"))
    table.insert(lines, string.rep("-", 100))

    -- Baseline row
    local base_fb = baseline_fb_metrics and string.format("%.3f", baseline_fb_metrics.alignment) or "N/A"
    local base_acc = baseline_acc_metrics and string.format("%.3f", baseline_acc_metrics.alignment) or "N/A"
    table.insert(lines, string.format("%-6s  %-38s  %-10s  %-12s  %-7s  %-12s  %-7s",
      "base", tostring(baseline_version_id), "BASELINE", base_fb, "", base_acc, ""))

    -- Cycle rows (each cycle has exploration candidates + synthesis result)
    for _, iter in ipairs(iterations) do
      local status_str
      if iter.skip_reason then
        status_str = "SKIPPED"
      elseif iter.accepted then
        local fb_d = iter.feedback_deltas and iter.feedback_deltas.alignment or 0
        status_str = fb_d > 0.005 and "ACCEPTED" or "CARRIED"
      else
        status_str = "REJECTED"
      end
      local fb_ac1 = iter.feedback_metrics and string.format("%.3f", iter.feedback_metrics.alignment) or "N/A"
      local acc_ac1 = iter.accuracy_metrics and string.format("%.3f", iter.accuracy_metrics.alignment) or "N/A"
      local fb_delta = iter.feedback_deltas and string.format("%+.3f", iter.feedback_deltas.alignment) or ""
      local acc_delta = iter.accuracy_deltas and string.format("%+.3f", iter.accuracy_deltas.alignment) or ""

      local note = ""
      if iter.skip_reason then
        note = "  (" .. iter.skip_reason .. ")"
      elseif iter.disqualification_reason then
        note = "  (DISQUALIFIED: " .. iter.disqualification_reason .. ")"
      elseif not iter.accepted and iter.accuracy_deltas and iter.accuracy_deltas.alignment < -0.02 then
        note = "  (accuracy regressed — do not retry)"
      elseif not iter.accepted then
        note = "  (feedback regressed — do not retry)"
      elseif iter.score_version_id == last_accepted_version_id then
        note = "  <- current base"
      end

      table.insert(lines, string.format("%-8s  %-38s  %-10s  %-12s  %-7s  %-12s  %-7s%s",
        tostring(iter.iteration), tostring(iter.score_version_id), status_str,
        fb_ac1, fb_delta, acc_ac1, acc_delta, note))
      -- Show what was tried so the agent doesn't repeat failed approaches
      if iter.done_reason and iter.done_reason ~= "" then
        table.insert(lines, string.format("          Rationale: %s", trunc(iter.done_reason, 2000)))
      end
      -- Show all exploration results for this cycle (no pass/fail labeling — show
      -- raw deltas so the agent can reason about what each approach actually did)
      if iter.exploration_results and type(iter.exploration_results) == "table" then
        local result_list = {}
        for _, ap in ipairs(iter.exploration_results) do
          local fb_d = ap.fb_deltas and ap.fb_deltas.alignment or 0
          local acc_d = ap.acc_deltas and ap.acc_deltas.alignment or 0
          table.insert(result_list, string.format(
            "cand%d: FB %+.3f  ACC %+.3f  '%s'",
            ap.index, fb_d, acc_d, trunc(ap.done_reason or "", 2000)))
        end
        if #result_list > 0 then
          table.insert(lines, "          Tested: " .. table.concat(result_list, " | "))
        end
      end
      -- Show candidates that failed to create a version
      if iter.exploration_no_version and type(iter.exploration_no_version) == "table" and #iter.exploration_no_version > 0 then
        local no_ver_list = {}
        for _, ap in ipairs(iter.exploration_no_version) do
          table.insert(no_ver_list, string.format("cand%d (attempted: '%s')", ap.index, trunc(ap.done_reason or "", 2000)))
        end
        table.insert(lines, "          Exploration no-version (edit failed):" .. table.concat(no_ver_list, "; "))
      end
    end

    return table.concat(lines, "\n")
  end

  -- Enrich an RCA table with actionable fields from misclassification_analysis
  local function enrich_rca(rca)
    if type(rca) ~= "table" then return rca end
    local ma = rca.misclassification_analysis
    if type(ma) ~= "table" then return rca end

    -- Primary next action
    rca._primary_next_action = ma.primary_next_action or nil

    -- Category summaries (natural language per-category description)
    rca._category_summaries = ma.category_summaries or nil

    -- Category hierarchy (categories with topics nested under them, sorted by size)
    rca._category_hierarchy = (type(ma.category_hierarchy) == "table" and ma.category_hierarchy) or {}

    -- All item classifications with suggested_fix + evidence_quote
    rca._all_item_classifications = (type(ma.item_classifications_all) == "table" and ma.item_classifications_all) or {}

    -- Topic category breakdown for grouping items by topic
    rca._topic_category_breakdown = (type(ma.topic_category_breakdown) == "table" and ma.topic_category_breakdown) or {}

    return rca
  end

  -- Parse numbered hypotheses from an agent planning response
  local function parse_hypotheses(response_text)
    local hypotheses = {}
    if type(response_text) ~= "string" then return hypotheses end
    for num, rest in response_text:gmatch("(%d+)%.%s*([^\n]+)") do
      local name, desc = rest:match("^([^:]+):%s*(.+)$")
      if not name then
        name = "Hypothesis " .. num
        desc = rest
      end
      table.insert(hypotheses, {
        index = tonumber(num),
        name = name:match("^%s*(.-)%s*$"),
        description = desc:match("^%s*(.-)%s*$")
      })
    end
    return hypotheses
  end

  -- Exploration success classification: either metric improving is enough,
  -- as long as the other doesn't significantly regress.
  local IMPROVEMENT_THRESHOLD = 0.005   -- meaningful positive delta on the improving metric
  local REGRESSION_FLOOR      = -0.05   -- the other metric must not drop more than this

  local function classify_exploration_success(cand)
    if not cand.fb_deltas then return false end
    local fb_d = cand.fb_deltas.alignment or 0
    local acc_d = cand.acc_deltas and cand.acc_deltas.alignment or 0
    local fb_improves  = fb_d  > IMPROVEMENT_THRESHOLD and acc_d >= REGRESSION_FLOOR
    local acc_improves = acc_d > IMPROVEMENT_THRESHOLD and fb_d  >= REGRESSION_FLOOR
    return fb_improves or acc_improves
  end

  -- Build the full context message for the planning phase
  local function build_planning_context(opts)
    local parts = {}

    table.insert(parts, string.format('Score: "%s" | Scorecard: "%s"', opts.score_name, opts.scorecard_name))
    table.insert(parts, string.format("Baseline version: %s", tostring(opts.baseline_version_id)))
    table.insert(parts, "")

    -- Version history
    table.insert(parts, build_version_history(
      opts.iterations, opts.baseline_version_id,
      opts.baseline_fb_metrics, opts.baseline_acc_metrics,
      opts.last_accepted_version_id
    ))

    -- Current base
    table.insert(parts, "")
    table.insert(parts, string.format("Current base (score_config.yaml): %s", tostring(opts.last_accepted_version_id)))
    table.insert(parts, "")

    -- Accumulated insights from prior lessons-learned phases
    local cycle_insights = State.get("cycle_insights") or {}
    if #cycle_insights > 0 then
      table.insert(parts, "=== ACCUMULATED INSIGHTS ===")
      table.insert(parts, "Agent analysis from prior cycles (most recent first):\n")
      for i = #cycle_insights, 1, -1 do
        local ci = cycle_insights[i]
        table.insert(parts, string.format("--- Cycle %d Analysis ---", ci.cycle))
        table.insert(parts, ci.analysis or "(no analysis)")
        table.insert(parts, "")
      end
    end

    -- Evaluation results
    table.insert(parts, "=== CURRENT EVALUATION RESULTS ===")
    local fb_m = opts.feedback_metrics
    if fb_m then
      table.insert(parts, string.format("Feedback: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        fb_m.alignment, fb_m.accuracy, fb_m.precision, fb_m.recall))
      local cm_lines = render_confusion_context(fb_m)
      for _, line in ipairs(cm_lines) do table.insert(parts, line) end
    end
    if opts.feedback_rca then
      table.insert(parts, "Feedback RCA:")
      local rca = opts.feedback_rca
      if type(rca) == "table" then
        if rca.overall_explanation then
          table.insert(parts, "Summary: " .. tostring(rca.overall_explanation))
        end
        if rca.overall_improvement_suggestion then
          table.insert(parts, "Suggestion: " .. tostring(rca.overall_improvement_suggestion))
        end
        -- Primary next action
        if rca._primary_next_action then
          local pna = rca._primary_next_action
          if type(pna) == "table" then
            local pna_text = pna.action or pna.description or pna.recommendation or ""
            if pna_text ~= "" then
              local confidence = pna.confidence and (" [" .. tostring(pna.confidence) .. " confidence]") or ""
              table.insert(parts, "Primary next action: " .. pna_text .. confidence)
            end
          end
        end
        -- Misclassification analyses grouped by RCA category
        -- Use category_hierarchy for structure, items grouped under each category
        if type(rca._category_hierarchy) == "table" and #rca._category_hierarchy > 0 then
          -- Sort categories by item_count descending
          local sorted_cats = {}
          for _, cat in ipairs(rca._category_hierarchy) do
            table.insert(sorted_cats, cat)
          end
          table.sort(sorted_cats, function(a, b)
            return (a.item_count or 0) > (b.item_count or 0)
          end)

          -- Build a lookup: category_key -> list of items
          local items_by_category = {}
          if type(rca._all_item_classifications) == "table" then
            for _, item in ipairs(rca._all_item_classifications) do
              local cat_key = item.primary_category or "unknown"
              if not items_by_category[cat_key] then
                items_by_category[cat_key] = {}
              end
              table.insert(items_by_category[cat_key], item)
            end
          end

          -- Progressive example counts: top category gets 5, second gets 3, rest get 1
          local example_limits = {5, 3, 2, 1, 1}

          local total_items = type(rca._all_item_classifications) == "table" and #rca._all_item_classifications or 0
          table.insert(parts, string.format("=== MISCLASSIFICATION ANALYSIS BY CATEGORY (%d total) ===", total_items))

          for cat_rank, cat in ipairs(sorted_cats) do
            local cat_key = cat.category_key or "unknown"
            local cat_label = cat.category_label or cat_key
            local cat_count = cat.item_count or 0
            local share_pct = (cat.share or 0) * 100

            if cat_count > 0 then
              table.insert(parts, "")
              table.insert(parts, string.format("--- %s (%d items, %.0f%%) ---", cat_label, cat_count, share_pct))

              -- Category summary text
              if cat.summary_text and cat.summary_text ~= "" then
                table.insert(parts, "Summary: " .. tostring(cat.summary_text))
              end

              -- Top patterns
              if type(cat.top_patterns) == "table" and #cat.top_patterns > 0 then
                local pattern_strs = {}
                for _, p in ipairs(cat.top_patterns) do
                  table.insert(pattern_strs, string.format("%s (%d)", tostring(p.pattern or "?"), p.count or 0))
                end
                table.insert(parts, "Top patterns: " .. table.concat(pattern_strs, ", "))
              end

              -- Topics within this category
              if type(cat.topics) == "table" and #cat.topics > 0 then
                table.insert(parts, "Topics:")
                for _, topic in ipairs(cat.topics) do
                  table.insert(parts, string.format("  - %s (%d items)",
                    tostring(topic.label or "?"), topic.member_count or 0))
                end
              end

              -- Category-level summary from _category_summaries (recursive summarization)
              if type(rca._category_summaries) == "table" and rca._category_summaries[cat_key] then
                local cs = rca._category_summaries[cat_key]
                if type(cs) == "table" then
                  -- Representative evidence from recursive summarization
                  if type(cs.representative_evidence) == "table" and #cs.representative_evidence > 0 then
                    table.insert(parts, "Representative evidence from RCA:")
                    for _, ev in ipairs(cs.representative_evidence) do
                      local ev_str
                      if type(ev) == "table" then
                        ev_str = string.format("[%s] %s",
                          ev.source or "?",
                          ev.quote_or_fact or tostring(ev))
                      else
                        ev_str = tostring(ev)
                      end
                      table.insert(parts, "  * " .. ev_str)
                    end
                  end
                end
              end

              -- Detailed examples (progressive: more for top categories)
              local max_examples = example_limits[math.min(cat_rank, #example_limits)]
              local cat_items = items_by_category[cat_key] or {}
              local num_shown = math.min(max_examples, #cat_items)
              if num_shown > 0 then
                table.insert(parts, string.format("Detailed examples (%d of %d):", num_shown, #cat_items))
                for ex_i = 1, num_shown do
                  local item = cat_items[ex_i]
                  table.insert(parts, string.format("  [%d] predicted=%s correct=%s",
                    ex_i, tostring(item.predicted_value or "?"), tostring(item.correct_value or "?")))
                  if item.rationale_short and item.rationale_short ~= "" then
                    table.insert(parts, "      Summary: " .. tostring(item.rationale_short))
                  end
                  if item.suggested_fix and item.suggested_fix ~= "" then
                    table.insert(parts, "      Suggested fix: " .. tostring(item.suggested_fix))
                  end
                  if item.rationale_paragraph and item.rationale_paragraph ~= "" then
                    table.insert(parts, "      Rationale: " .. tostring(item.rationale_paragraph))
                  end
                  if item.evidence_quote and item.evidence_quote ~= "" then
                    table.insert(parts, "      Evidence: " .. tostring(item.evidence_quote))
                  end
                  if item.detailed_cause and item.detailed_cause ~= "" then
                    table.insert(parts, "      Detailed cause: " .. tostring(item.detailed_cause))
                  end
                end
              end
            end
          end
        elseif type(rca._all_item_classifications) == "table" and #rca._all_item_classifications > 0 then
          -- Fallback: flat list if no category_hierarchy available
          table.insert(parts, string.format("Misclassification analyses (%d):", #rca._all_item_classifications))
          for i, item in ipairs(rca._all_item_classifications) do
            local category = item.primary_category or "unknown"
            table.insert(parts, string.format("  [%d] predicted=%s correct=%s category=%s",
              i, tostring(item.predicted_value or "?"), tostring(item.correct_value or "?"), category))
            if item.rationale_short and item.rationale_short ~= "" then
              table.insert(parts, "      Summary: " .. tostring(item.rationale_short))
            end
            if item.suggested_fix and item.suggested_fix ~= "" then
              table.insert(parts, "      Suggested fix: " .. tostring(item.suggested_fix))
            end
          end
        end
      else
        table.insert(parts, tostring(rca))
      end
    end
    table.insert(parts, "")

    local acc_m = opts.accuracy_metrics
    if acc_m then
      table.insert(parts, string.format("Accuracy: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        acc_m.alignment, acc_m.accuracy, acc_m.precision, acc_m.recall))
      local cm_lines = render_confusion_context(acc_m)
      for _, line in ipairs(cm_lines) do table.insert(parts, line) end
    end
    if opts.accuracy_rca then
      table.insert(parts, "Accuracy RCA (deterministic dataset — improve this too, not just avoid regression):")
      local rca = opts.accuracy_rca
      if type(rca) == "table" then
        if rca.overall_explanation then
          table.insert(parts, "Summary: " .. tostring(rca.overall_explanation))
        end
        if rca.overall_improvement_suggestion then
          table.insert(parts, "Suggestion: " .. tostring(rca.overall_improvement_suggestion))
        end
        -- Primary next action
        if rca._primary_next_action then
          local pna = rca._primary_next_action
          if type(pna) == "table" then
            local pna_text = pna.action or pna.description or pna.recommendation or ""
            if pna_text ~= "" then
              local confidence = pna.confidence and (" [" .. tostring(pna.confidence) .. " confidence]") or ""
              table.insert(parts, "Primary next action: " .. pna_text .. confidence)
            end
          end
        end
        -- Category summaries (accuracy dataset — brief, for regression awareness)
        if type(rca._category_hierarchy) == "table" and #rca._category_hierarchy > 0 then
          table.insert(parts, "Error categories (accuracy dataset — target these for Hypothesis 3):")
          for _, cat in ipairs(rca._category_hierarchy) do
            local cat_count = cat.item_count or 0
            if cat_count > 0 then
              local cat_label = cat.category_label or cat.category_key or "unknown"
              local share_pct = (cat.share or 0) * 100
              table.insert(parts, string.format("  %s (%d items, %.0f%%): %s",
                cat_label, cat_count, share_pct, tostring(cat.summary_text or "")))
            end
          end
        elseif type(rca._category_summaries) == "table" then
          table.insert(parts, "Error categories:")
          for cat, summary in pairs(rca._category_summaries) do
            local summary_text
            if type(summary) == "table" then
              summary_text = summary.category_summary_text or summary.text or summary.description or summary.summary or summary[1] or "?"
            else
              summary_text = tostring(summary)
            end
            local item_count = ""
            if type(summary) == "table" and summary.item_count then
              item_count = string.format(" (%d items)", summary.item_count)
            end
            table.insert(parts, string.format("  %s%s: %s", tostring(cat), item_count, tostring(summary_text)))
          end
        end
      else
        table.insert(parts, tostring(rca))
      end
    end
    table.insert(parts, "")

    -- Guidelines first (read-only reference), then editable score config last
    if has_text(opts.current_guidelines) then
      table.insert(parts, "=== CLASSIFICATION GUIDELINES (READ-ONLY reference — DO NOT edit this) ===")
      table.insert(parts, opts.current_guidelines)
      table.insert(parts, "=== END OF GUIDELINES (read-only) ===")
      table.insert(parts, "")
    end

    -- Current score configuration (editable) — placed last so it's most prominent
    table.insert(parts, "=== CURRENT SCORE CONFIGURATION (score_config.yaml) — THIS IS THE FILE YOU EDIT ===")
    table.insert(parts, opts.current_code or "(not available)")
    table.insert(parts, "=== END OF score_config.yaml ===")

    -- Count consecutive accuracy regressions in prior iterations
    local consecutive_acc_rejections = 0
    if opts.iterations then
      for i = #opts.iterations, 1, -1 do
        local it = opts.iterations[i]
        local acc_d = it.accuracy_deltas and it.accuracy_deltas.alignment or 0
        if not it.accepted and acc_d < -0.02 then
          consecutive_acc_rejections = consecutive_acc_rejections + 1
        else
          break
        end
      end
    end

    -- Expert hint (optional, from user)
    if has_text(opts.hint) then
      table.insert(parts, "")
      table.insert(parts, "=== EXPERT HINT (from domain expert — prioritize this guidance) ===")
      table.insert(parts, opts.hint)
    end

    return table.concat(parts, "\n")
  end

  -- Build the shared cookbook and constraints section (used by all hypothesis prompts)
  local function build_cookbook_section(opts)
    local parts = {}
    local cons_failed = opts.consecutive_failed_cycles or 0

    table.insert(parts, "=== CHANGE COOKBOOK — OPTIONS TO TRY ===")
    table.insert(parts, "")
    table.insert(parts, "IMPORTANT: First scan score_config.yaml above to ensure you are NOT proposing something already there.")
    table.insert(parts, "")
    table.insert(parts, "CATEGORY A — Incremental prompt fix (low risk, targets the #1 RCA issue):")
    table.insert(parts, "  Target the LARGEST category of misclassification from the RCA.")
    table.insert(parts, "  * Add or sharpen a criterion that the RCA shows is ambiguous")
    table.insert(parts, "  * Add a concrete example to clarify an edge case NOT already covered")
    table.insert(parts, "  * Tighten language on an existing condition")
    table.insert(parts, "  DO NOT add examples for patterns already explicitly handled in the current YAML.")
    table.insert(parts, "")
    table.insert(parts, "CATEGORY B — Bold prompt overhaul (medium risk, high upside):")
    table.insert(parts, "  Take a bigger step: attempt changes that could address MULTIPLE top-priority RCA issues at once.")
    table.insert(parts, "  * Reorganize the prompt structure to be clearer")
    table.insert(parts, "  * Add a decision framework that covers several edge cases")
    table.insert(parts, "  * Rewrite a section of the system_message or user_message to eliminate ambiguity")
    table.insert(parts, "  Be willing to take more risks here — this is your swing-for-the-fences hypothesis.")
    table.insert(parts, "")
    table.insert(parts, "CATEGORY C — Structural / non-prompt change (higher risk, highest upside):")
    table.insert(parts, "  Changes to control flow, data preprocessing, or the model itself.")
    table.insert(parts, "")
    table.insert(parts, "  C1. Architecture changes:")
    table.insert(parts, "    * Split a single Classifier into multiple graph nodes (extraction + matching)")
    table.insert(parts, "    * Add a chain-of-thought step that reasons about ambiguous cases before classifying")
    table.insert(parts, "    * New graph nodes use class: Classifier with their own system_message and user_message")
    table.insert(parts, "")
    table.insert(parts, "  C2. Text preprocessing with the processors pipeline:")
    table.insert(parts, "    Scores can preprocess the input text BEFORE it reaches the LLM using the `item.processors` list.")
    table.insert(parts, "    This is powerful for long transcripts — trim the text to only the relevant parts.")
    table.insert(parts, "    Processors run in order; each transforms the text before the next one sees it.")
    table.insert(parts, "")
    table.insert(parts, "    KEY TECHNIQUE: Use RelevantWindowsTranscriptFilter to extract only the parts of a long")
    table.insert(parts, "    transcript that mention relevant keywords. This dramatically reduces noise for the LLM.")
    table.insert(parts, "    Example — extract windows around keywords with fuzzy matching:")
    table.insert(parts, "      item:")
    table.insert(parts, "        processors:")
    table.insert(parts, "          - class: RelevantWindowsTranscriptFilter")
    table.insert(parts, "            parameters:")
    table.insert(parts, "              keywords: [\"school\", \"university\", \"college\", \"degree\", \"program\"]")
    table.insert(parts, "              fuzzy_match: true")
    table.insert(parts, "              fuzzy_threshold: 80")
    table.insert(parts, "              prev_count: 2    # sentences before match")
    table.insert(parts, "              next_count: 2    # sentences after match")
    table.insert(parts, "")
    table.insert(parts, "    Other available text processors:")
    table.insert(parts, "      - class: FilterCustomerOnlyProcessor        # Keep only customer speech")
    table.insert(parts, "      - class: RemoveSpeakerIdentifiersTranscriptFilter  # Strip 'Agent:', 'Customer:' labels")
    table.insert(parts, "      - class: ExpandContractionsProcessor        # \"don't\" -> \"do not\"")
    table.insert(parts, "      - class: RemoveStopWordsTranscriptFilter    # Remove common filler words")
    table.insert(parts, "")
    table.insert(parts, "  C2b. Transcription error / redaction resilience (prompt-level):")
    table.insert(parts, "    If the RCA shows misclassifications caused by garbled speech-to-text output or redacted PII,")
    table.insert(parts, "    add instructions to the system_message or user_message warning the model that the transcript")
    table.insert(parts, "    may contain STT errors or redacted text (e.g., [REDACTED], ***). Instruct the model to infer")
    table.insert(parts, "    the likely intended phrase before classifying. This is a low-risk prompt addition.")
    table.insert(parts, "    Example addition to system_message:")
    table.insert(parts, "      'Note: Transcripts may contain speech-to-text errors (e.g., homophones, truncated words)")
    table.insert(parts, "       or redacted personally identifiable information. When you encounter garbled or redacted")
    table.insert(parts, "       text, infer the most likely intended meaning from surrounding context before classifying.'")
    table.insert(parts, "")
    table.insert(parts, "  C3. Model swap (use sparingly — only when prompt/structure changes have stagnated):")
    table.insert(parts, "    First check score_config.yaml above for the current model_name. Then swap to a DIFFERENT model.")
    table.insert(parts, "    PREFERRED MODEL: gpt-5.4-nano is the preferred default model. If the score is not already using")
    table.insert(parts, "    gpt-5.4-nano, switching to it should be your FIRST model swap hypothesis.")
    table.insert(parts, "    Available models (only propose one that is NOT already in use):")
    table.insert(parts, "    * gpt-5.4-nano (preferred, fast, cheapest): model_provider: ChatOpenAI, model_name: gpt-5.4-nano, max_tokens: 2000")
    table.insert(parts, "    * gpt-5-mini (good value): model_provider: ChatOpenAI, model_name: gpt-5-mini, max_tokens: 2000")
    table.insert(parts, "    * gpt-4o-mini: model_provider: ChatOpenAI, model_name: gpt-4o-mini-2024-07-18")
    table.insert(parts, "    * gpt-5.4-mini (stronger, more expensive — only if nano + prompt changes are exhausted):")
    table.insert(parts, "      model_provider: ChatOpenAI, model_name: gpt-5.4-mini, max_tokens: 2000")
    table.insert(parts, "    * gpt-oss-120b via Bedrock: model_provider: BedrockChat, model_name: openai.gpt-oss-120b-1:0")
    table.insert(parts, "      (For Bedrock models: remove the temperature field — it is not supported)")
    table.insert(parts, "    AVOID unless nothing else works (expensive):")
    table.insert(parts, "    * Claude 3.5 Haiku: model_provider: BedrockChat, model_name: us.anthropic.claude-3-5-haiku-20241022-v1:0")
    table.insert(parts, "")
    table.insert(parts, "THINGS YOU CANNOT CHANGE (do NOT propose hypotheses targeting these):")
    table.insert(parts, "  - Parser/output normalization logic (parse_final_value, label parsing, case normalization)")
    table.insert(parts, "    These are in Python framework code, NOT in score_config.yaml. You cannot edit them.")
    table.insert(parts, "  - The classification guidelines — they are for reference only, not editable.")
    table.insert(parts, "  - Infrastructure code outside the YAML config file.")
    table.insert(parts, "  If the RCA mentions output parsing issues, address them by adjusting the LLM prompt to")
    table.insert(parts, "  produce cleaner output, NOT by trying to modify the parser.")
    table.insert(parts, "")
    table.insert(parts, "IMPORTANT: The classification guidelines above are for reference only — they help you understand policy but are not editable.")
    table.insert(parts, "You will edit score_config.yaml (shown between the === markers above).")
    table.insert(parts, "Do NOT rewrite the entire user_message — full rewrites consistently regress.")

    if cons_failed >= 2 then
      table.insert(parts, "")
      table.insert(parts, string.format(
        "ESCALATION (%d consecutive cycles with regressions):", cons_failed))
      table.insert(parts, "Recent approaches caused metrics to go DOWN. Review the OPTIMIZATION HISTORY.")
      table.insert(parts, "Avoid anything similar to what caused regressions. Try more conservative changes.")
    end

    -- Build a list of approaches that caused genuine regressions (do not retry those)
    -- and approaches that were neutral or positive (already incorporated, build on them)
    if opts.iterations and #opts.iterations > 0 then
      local regressed_approaches = {}
      local carried_approaches = {}
      for _, iter in ipairs(opts.iterations) do
        if iter.exploration_results and type(iter.exploration_results) == "table" then
          for _, ap in ipairs(iter.exploration_results) do
            local fb_d = ap.fb_deltas and ap.fb_deltas.alignment or 0
            local acc_d = ap.acc_deltas and ap.acc_deltas.alignment or 0
            local desc = ap.done_reason or "(no description)"
            if fb_d < -0.005 or acc_d < -0.02 then
              table.insert(regressed_approaches, string.format(
                "  - Cycle %s, cand%d: FB %+.3f  ACC %+.3f — %s",
                tostring(iter.iteration), ap.index, fb_d, acc_d, desc))
            elseif fb_d >= 0 then
              table.insert(carried_approaches, string.format(
                "  - Cycle %s, cand%d: FB %+.3f  ACC %+.3f — %s",
                tostring(iter.iteration), ap.index, fb_d, acc_d, desc))
            end
          end
        end
      end
      if #regressed_approaches > 0 then
        table.insert(parts, "")
        table.insert(parts, "APPROACHES THAT CAUSED REGRESSIONS — avoid these and similar ideas:")
        for _, line in ipairs(regressed_approaches) do table.insert(parts, line) end
      end
      if #carried_approaches > 0 then
        table.insert(parts, "")
        table.insert(parts, "APPROACHES ALREADY TRIED (all cycles) — DO NOT REPEAT THESE:")
        for _, line in ipairs(carried_approaches) do table.insert(parts, line) end
        table.insert(parts, "These were tested in prior cycles. Some are now in the current code, some were not selected.")
        table.insert(parts, "DO NOT propose the same approach, a variation of it, or an undo of it.")
        table.insert(parts, "Each cycle must explore NEW territory. Look at the RCA for error patterns not yet addressed.")
      end
    end

    -- Escalating warning based on prior accuracy regressions
    local acc_rejections = opts.consecutive_acc_rejections or 0
    if acc_rejections >= 2 then
      table.insert(parts, "")
      table.insert(parts, string.format("CRITICAL WARNING: %d consecutive iterations REJECTED for accuracy regression.", acc_rejections))
      table.insert(parts, "All hypotheses MUST use Category A changes only (prompt changes — no model swaps or architecture changes).")
    elseif acc_rejections >= 1 then
      table.insert(parts, "")
      table.insert(parts, "WARNING: Prior iteration was REJECTED for accuracy regression.")
      table.insert(parts, "Prefer Category A changes (prompt). You may still try one Category B or C hypothesis if it is unlikely to hurt accuracy.")
    end

    return table.concat(parts, "\n")
  end

  -- Build a focused prompt for a single hypothesis generation slot.
  -- Each slot has a specific objective; the agent proposes exactly ONE hypothesis.
  local function build_hypothesis_prompt(slot, already_proposed, opts)
    local parts = {}
    local cons_failed = opts.consecutive_failed_cycles or 0

    -- Show already-proposed hypotheses so the agent avoids duplicates
    if #already_proposed > 0 then
      table.insert(parts, "=== HYPOTHESES ALREADY PROPOSED THIS CYCLE ===")
      table.insert(parts, "The following hypotheses have already been proposed for this cycle.")
      table.insert(parts, "You MUST propose something DIFFERENT from all of these.\n")
      for _, hyp in ipairs(already_proposed) do
        table.insert(parts, string.format("  %d. %s: %s", hyp.index, hyp.name, hyp.description or ""))
      end
      table.insert(parts, "")
    end

    table.insert(parts, "=== YOUR TASK ===")
    table.insert(parts, "Propose exactly ONE hypothesis. Respond with a single numbered line:")
    table.insert(parts, string.format("%d. <Hypothesis name>: <Description of what to change and why>", #already_proposed + 1))
    table.insert(parts, "")

    if slot == "feedback_incremental" then
      table.insert(parts, "OBJECTIVE: Incremental feedback fix (Category A)")
      table.insert(parts, "Target the LARGEST category of misclassification from the FEEDBACK RCA above.")
      table.insert(parts, "Make a safe, focused change — add or sharpen ONE criterion, add ONE example,")
      table.insert(parts, "or tighten language on ONE existing condition.")
      table.insert(parts, "This should be low-risk and directly address the #1 feedback error pattern.")
    elseif slot == "feedback_bold" then
      table.insert(parts, "OBJECTIVE: Bold feedback fix (Category A or B)")
      table.insert(parts, "Target a DIFFERENT feedback RCA issue than hypothesis 1, or take a bigger swing")
      table.insert(parts, "that addresses MULTIPLE top-priority feedback RCA issues at once.")
      table.insert(parts, "Options: reorganize prompt structure, add a decision framework covering several")
      table.insert(parts, "edge cases, or rewrite a section to eliminate ambiguity.")
      table.insert(parts, "Be willing to take more risk here — this is your swing-for-the-fences hypothesis.")
    elseif slot == "accuracy_fix" then
      table.insert(parts, "OBJECTIVE: Accuracy dataset fix (Category A or B)")
      table.insert(parts, "Target the top error pattern from the ACCURACY RCA above (the regression dataset),")
      table.insert(parts, "NOT the feedback RCA. The accuracy dataset is a deterministic regression safety net")
      table.insert(parts, "but ALSO an optimization target — improving accuracy often helps feedback too.")
      table.insert(parts, "Focus on what the accuracy RCA says the model is getting wrong.")
    elseif slot == "structural" then
      table.insert(parts, "OBJECTIVE: Structural / non-prompt change (Category C)")
      table.insert(parts, "Prompt changes alone have not been enough. Consider:")
      table.insert(parts, "  - C1: Architecture changes (split into extraction + matching nodes, add CoT step)")
      table.insert(parts, "  - C2: Preprocessing pipeline (RelevantWindowsTranscriptFilter to trim input)")
      table.insert(parts, "  - C2b: Transcription error resilience (warn model about STT errors/redactions)")
      table.insert(parts, "  - C3: Model swap (only if prompt AND structural changes exhausted)")
      table.insert(parts, "Prefer C1 or C2 over C3.")
    end

    table.insert(parts, "")
    table.insert(parts, "Remember: you will edit score_config.yaml to implement this. Only propose changes")
    table.insert(parts, "that can be made by editing that YAML file.")

    return table.concat(parts, "\n")
  end

  -- Build the review context message shown to the reviewer agent after evals
  local function build_review_context(opts)
    local parts = {}

    table.insert(parts, "=== EVALUATION RESULTS FOR YOUR CHANGE ===")
    table.insert(parts, "")
    table.insert(parts, string.format("Iteration %d change:", opts.iteration))
    table.insert(parts, string.format('  "%s"', opts.done_reason or "(no reason given)"))
    table.insert(parts, string.format("  New version: %s", tostring(opts.new_version_id)))
    table.insert(parts, string.format("  Prior version (reverts to): %s", tostring(opts.prior_version_id)))
    table.insert(parts, "")

    table.insert(parts, "Feedback alignment (vs baseline):")
    if opts.fb_metrics then
      table.insert(parts, string.format("  AC1: %.3f → %.3f (delta %+.3f)",
        opts.baseline_fb_ac1, opts.fb_metrics.alignment,
        opts.fb_metrics.alignment - opts.baseline_fb_ac1))
      table.insert(parts, string.format("  Accuracy: %.3f, Precision: %.3f, Recall: %.3f",
        opts.fb_metrics.accuracy, opts.fb_metrics.precision, opts.fb_metrics.recall))
    else
      table.insert(parts, "  (not available)")
    end
    table.insert(parts, "")

    table.insert(parts, "Accuracy on regression dataset (vs baseline):")
    if opts.acc_metrics then
      table.insert(parts, string.format("  AC1: %.3f → %.3f (delta %+.3f)",
        opts.baseline_acc_ac1, opts.acc_metrics.alignment,
        opts.acc_metrics.alignment - opts.baseline_acc_ac1))
    else
      table.insert(parts, "  (not available)")
    end
    table.insert(parts, "")

    -- Multi-candidate comparison table (if applicable)
    if opts.candidates and #opts.candidates > 1 then
      table.insert(parts, "=== CANDIDATE COMPARISON ===")
      table.insert(parts, string.format("%d candidates were tried. The best was pre-selected by metrics:", #opts.candidates))
      for _, cand in ipairs(opts.candidates) do
        local selected = cand.version_id == opts.new_version_id and " <- SELECTED" or ""
        local dq = ""
        if cand.score and cand.score <= -999 then dq = " (DISQUALIFIED)" end
        local synth_tag = cand.is_synthesis and " [SYNTH]" or ""
        table.insert(parts, string.format("  Candidate %d%s: FB AC1 %+.3f, ACC AC1 %+.3f%s%s",
          cand.index, synth_tag,
          cand.fb_deltas and cand.fb_deltas.alignment or 0,
          cand.acc_deltas and cand.acc_deltas.alignment or 0,
          dq, selected))
      end
      table.insert(parts, "")
    end

    table.insert(parts, "=== YOUR ASSESSMENT ===")
    table.insert(parts, "The system will automatically carry this version forward unless metrics regressed.")
    table.insert(parts, "A result that doesn't improve things is still useful — it gets carried forward as the new base")
    table.insert(parts, "so future cycles can build on it. Only a genuine regression (metrics went DOWN) causes a revert.")
    table.insert(parts, "")
    table.insert(parts, "Provide your assessment:")
    table.insert(parts, 'Call done(decision="keep", reason="...") — confirm you agree with carrying this forward.')
    table.insert(parts, 'Call done(decision="revert", reason="...") — flag a regression you observed (metrics went down).')
    table.insert(parts, "")
    table.insert(parts, 'REQUIRED: Call done(decision="keep", reason="...") or done(decision="revert", reason="...") NOW.')
    table.insert(parts, "Do NOT return a text response without calling this tool.")

    return table.concat(parts, "\n")
  end

  -- Phase A: Setup & Baseline
  Stage.set("setup")
  Human.notify({message = "Starting feedback alignment optimizer for scorecard=" .. params.scorecard .. ", score=" .. params.score, level = "info"})

  -- Validate scorecard exists
  -- plexus_scorecard_info returns the scorecard dict directly (no wrapper):
  -- { name, key, externalId, additionalDetails: { id, ... }, sections: {...} }
  local scorecard_info = call_plexus_tool("plexus_scorecard_info", {scorecard_identifier = params.scorecard})
  if not scorecard_info or not scorecard_info.additionalDetails then
    return {
      success = false,
      status = "error",
      message = "Scorecard not found: " .. tostring(params.scorecard)
    }
  end

  local scorecard_id = scorecard_info.additionalDetails.id
  local scorecard_name = scorecard_info.name or scorecard_info.key

  -- Validate score exists
  -- plexus_score_info returns the score dict directly:
  -- { found, scoreId, scoreName, scoreKey, externalId, code, guidelines, location: {...}, ... }
  local score_info = call_plexus_tool("plexus_score_info", {
    score_identifier = params.score,
    scorecard_identifier = params.scorecard
  })

  if not score_info or not score_info.scoreId then
    return {
      success = false,
      status = "error",
      message = "Score not found: " .. tostring(params.score) .. " in scorecard: " .. tostring(scorecard_name)
    }
  end

  local score_id = score_info.scoreId
  local score_name = score_info.scoreName or score_info.scoreKey

  Human.notify({message = "Resolved: scorecard_id=" .. scorecard_id .. ", score_id=" .. score_id, level = "info"})

  -- Dataset adequacy check: ensure a deterministic regression dataset exists.
  -- The accuracy evaluation uses this fixed dataset across all iterations.
  -- The feedback evaluation separately uses the newest items.
  Human.notify({message = "Checking for existing associated regression dataset...", level = "info"})
  local dataset_id = nil

  local dataset_check = call_plexus_tool("plexus_dataset_check_associated", {
    scorecard = params.scorecard,
    score = params.score
  })

  local min_dataset_rows = params.max_samples
  local dataset_adequate = dataset_check and dataset_check.has_dataset
    and dataset_check.is_materialized
    and dataset_check.row_count and dataset_check.row_count >= min_dataset_rows

  if dataset_adequate then
    dataset_id = dataset_check.dataset_id
    Human.notify({message = "Found adequate associated dataset: " .. dataset_id .. " (" .. dataset_check.row_count .. " rows)", level = "info"})
  else
    -- Need to create a dataset
    if dataset_check and dataset_check.has_dataset then
      Human.notify({message = string.format(
        "Existing dataset has %d rows but need %d, creating new one...",
        dataset_check.row_count or 0, min_dataset_rows
      ), level = "info"})
    else
      Human.notify({message = "No associated dataset found, creating one...", level = "info"})
    end

    -- Tier 1: Try balanced dataset with requested sample size
    Human.notify({
      message = string.format("Building balanced regression dataset (%d items)...", min_dataset_rows),
      level = "info"
    })
    local build_result = call_plexus_tool("plexus_dataset_build_from_feedback_window", {
      scorecard = params.scorecard,
      score = params.score,
      max_items = min_dataset_rows,
      days = params.days,
      balance = true
    })

    local min_acceptable = math.max(math.floor(min_dataset_rows / 4), 15)
    if build_result and build_result.rows_written and build_result.rows_written >= min_acceptable then
      dataset_id = build_result.dataset_id
      Human.notify({message = "Created balanced dataset: " .. dataset_id .. " (" .. build_result.rows_written .. " rows)", level = "info"})
    else
      -- Tier 2: Try unbalanced (relax balancing to get more items)
      local rows_so_far = (build_result and build_result.rows_written) or 0
      Human.notify({message = "Balanced dataset only has " .. rows_so_far .. " rows, trying unbalanced...", level = "info"})

      build_result = call_plexus_tool("plexus_dataset_build_from_feedback_window", {
        scorecard = params.scorecard,
        score = params.score,
        max_items = min_dataset_rows,
        days = params.days,
        balance = false
      })

      if build_result and build_result.rows_written and build_result.rows_written >= min_acceptable then
        dataset_id = build_result.dataset_id
        Human.notify({message = "Created unbalanced dataset: " .. dataset_id .. " (" .. build_result.rows_written .. " rows)", level = "info"})
      else
        -- Abort: not enough feedback data
        local final_rows = (build_result and build_result.rows_written) or 0
        return {
          success = false,
          status = "error",
          message = string.format(
            "Insufficient feedback data to build a regression dataset. Only %d items available (need %d, minimum %d). " ..
            "Collect more feedback for score '%s' before running the optimizer.",
            final_rows, min_dataset_rows, min_acceptable, score_name
          )
        }
      end
    end
  end

  State.set("dataset_id", dataset_id)
  Human.notify({message = "Using regression dataset: " .. dataset_id, level = "info"})

  -- smoke_test_item_ids is populated after the accuracy baseline is known (see below)
  local smoke_test_item_ids = nil

  -- Pull starting version (champion or specified start_version)
  local pull_args = {
    scorecard_identifier = params.scorecard,
    score_identifier = params.score
  }
  if has_text(params.start_version) then
    pull_args.version_id = params.start_version
    Human.notify({message = "Pulling specified start version: " .. params.start_version, level = "info"})
  else
    Human.notify({message = "Pulling champion score version...", level = "info"})
  end
  local initial_pull = call_plexus_tool("plexus_score_pull", pull_args)
  if not initial_pull or not initial_pull.success then
    return {
      success = false,
      status = "error",
      message = "Failed to pull initial score configuration"
    }
  end
  local champion_version_id = initial_pull.versionId
  local current_code_path = initial_pull.codeFilePath
  local current_code = File.read(current_code_path)
  local current_guidelines = ""
  if initial_pull.guidelinesFilePath then
    local g = File.read(initial_pull.guidelinesFilePath)
    if has_text(g) then current_guidelines = g end
  end
  Human.notify({message = "Champion version: " .. tostring(champion_version_id), level = "info"})

  -- Dual baseline evaluations — run new ones or reuse from a previous run
  Stage.set("baseline")

  local accuracy_baseline         = nil
  local accuracy_baseline_id      = nil
  local accuracy_baseline_metrics = nil
  local accuracy_baseline_rca     = {}
  local accuracy_available        = false
  local feedback_baseline_id      = nil
  local feedback_baseline_metrics = nil
  local feedback_baseline_rca     = {}

  local resume_acc = has_text(params.resume_accuracy_eval) and params.resume_accuracy_eval or nil
  local resume_fb  = has_text(params.resume_feedback_eval) and params.resume_feedback_eval or nil

  if resume_acc or resume_fb then
    -- Resume mode: reuse existing baseline evaluations
    Human.notify({message = "Resuming from existing baseline evaluations...", level = "info"})

    -- Helper: warn (but don't fail) if resumed eval's version differs from starting version.
    -- The user explicitly chose to resume with these baselines, so trust them.
    local function validate_eval_version(eval_info, eval_type, eval_id)
      local eval_version = eval_info.score_version_id or eval_info.scoreVersionId
      if eval_version and eval_version ~= champion_version_id then
        Human.notify({message = string.format(
          "Note: %s baseline %s was run on version %s but starting version is %s. "
          .. "Using it as the reference baseline anyway.",
          eval_type, eval_id, eval_version, champion_version_id
        ), level = "warning"})
      end
      return true, nil
    end

    if resume_acc then
      Human.notify({message = "Fetching accuracy baseline: " .. resume_acc, level = "info"})
      local acc_info = call_plexus_tool("plexus_evaluation_info", {
        evaluation_id = resume_acc,
        output_format = "json"
      })
      if acc_info and not acc_info.error then
        local valid, err = validate_eval_version(acc_info, "Accuracy", resume_acc)
        if not valid then
          return {success = false, status = "error", message = err}
        end
        accuracy_baseline_id      = resume_acc
        accuracy_baseline_metrics = extract_metrics(acc_info)
        accuracy_baseline_rca     = enrich_rca(acc_info.root_cause or {})
        accuracy_available        = true
        Human.notify({message = string.format(
          "Accuracy baseline (resumed): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
          accuracy_baseline_metrics.alignment,
          accuracy_baseline_metrics.accuracy,
          accuracy_baseline_metrics.precision,
          accuracy_baseline_metrics.recall
        ), level = "info"})
      else
        Human.notify({message = "Failed to resume accuracy baseline: " .. tostring(acc_info and acc_info.error or "not found"), level = "warning"})
      end
    end

    if resume_fb then
      Human.notify({message = "Fetching feedback baseline: " .. resume_fb, level = "info"})
      local fb_info = call_plexus_tool("plexus_evaluation_info", {
        evaluation_id = resume_fb,
        output_format = "json"
      })
      if not fb_info or fb_info.error then
        return {
          success = false,
          status  = "error",
          message = "Failed to resume feedback baseline " .. resume_fb .. ": " .. tostring(fb_info and fb_info.error or "not found")
        }
      end
      -- Skip version validation for feedback evals — they use the champion version
      -- at the time of evaluation, which may differ from the starting version.
      feedback_baseline_id      = resume_fb
      feedback_baseline_metrics = extract_metrics(fb_info)
      feedback_baseline_rca     = enrich_rca(fb_info.root_cause or {})
      Human.notify({message = string.format(
        "Feedback baseline (resumed): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        feedback_baseline_metrics.alignment,
        feedback_baseline_metrics.accuracy,
        feedback_baseline_metrics.precision,
        feedback_baseline_metrics.recall
      ), level = "info"})
    end

    -- If feedback baseline not resumed, must run it
    if not resume_fb then
      Human.notify({message = "No feedback baseline to resume — running fresh...", level = "info"})
    end
  end

  -- Diagnostic logger that bypasses broken Python logging by writing directly to file
  local diag_path = "optimizer_diag.log"
  pcall(function() diag_path = os.getenv("PLEXUS_DIAG_LOG") or diag_path end)
  local function diag(msg)
    local ts = os.date("%Y-%m-%d %H:%M:%S")
    local line = string.format("[%s] %s\n", ts, msg)
    -- Append by reading existing content
    local existing = ""
    pcall(function() existing = File.read(diag_path) end)
    File.write(diag_path, existing .. line)
    Human.notify({message = msg, level = "info"})
  end
  File.write(diag_path, "")  -- clear at start

  -- Run fresh baselines for any that weren't resumed
  if not feedback_baseline_id or (not accuracy_baseline_id and not resume_acc) then
    local batch_items = {}
    if not accuracy_baseline_id then
      table.insert(batch_items, {
        scorecard_name  = params.scorecard,
        score_name      = params.score,
        evaluation_type = "accuracy",
        dataset_id      = dataset_id,
        n_samples       = params.max_samples or 100,
        version         = champion_version_id,
        notes           = "Baseline: deterministic accuracy dataset for " .. score_name
      })
    end
    if not feedback_baseline_id then
      table.insert(batch_items, {
        scorecard_name     = params.scorecard,
        score_name         = params.score,
        evaluation_type    = "feedback",
        version            = champion_version_id,
        days               = params.days,
        max_feedback_items = params.max_samples or 100,
        sampling_mode      = "newest",
        wait               = true,
        notes              = "Baseline: recent feedback alignment dataset for " .. score_name
      })
    end

    Human.notify({
      message = string.format("Running %d fresh baseline evaluation(s) for %s...", #batch_items, score_name),
      level = "info"
    })

    local baseline_batch = call_plexus_tool("plexus_evaluation_run", {batch = batch_items})

    -- Parse results — map back to accuracy/feedback based on what we requested
    local batch_idx = 1
    if not accuracy_baseline_id then
      local acc_result = baseline_batch and baseline_batch[batch_idx]
      if acc_result and not acc_result.error and (acc_result.id or acc_result.evaluation_id) then
        accuracy_baseline         = acc_result
        accuracy_baseline_id      = acc_result.id or acc_result.evaluation_id
        accuracy_baseline_metrics = extract_metrics(acc_result)
        accuracy_baseline_rca     = enrich_rca(acc_result.root_cause or {})
        accuracy_available        = true
        Human.notify({message = string.format(
          "Accuracy baseline: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
          accuracy_baseline_metrics.alignment,
          accuracy_baseline_metrics.accuracy,
          accuracy_baseline_metrics.precision,
          accuracy_baseline_metrics.recall
        ), level = "info"})
        diag(string.format("Accuracy baseline (%s): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
          tostring(accuracy_baseline_id),
          accuracy_baseline_metrics.alignment, accuracy_baseline_metrics.accuracy,
          accuracy_baseline_metrics.precision, accuracy_baseline_metrics.recall))
      else
        local err_msg = (acc_result and acc_result.error) or "no result"
        Human.notify({message = "Accuracy baseline unavailable (will proceed feedback-only): " .. tostring(err_msg), level = "warning"})
      end
      batch_idx = batch_idx + 1
    end

    if not feedback_baseline_id then
      local fb_result = baseline_batch and baseline_batch[batch_idx]
      if not fb_result or fb_result.error or not (fb_result.id or fb_result.evaluation_id) then
        return {
          success = false,
          status  = "error",
          message = "Failed to run baseline feedback evaluation: " .. tostring(fb_result and fb_result.error or "no result")
        }
      end
      feedback_baseline_id      = fb_result.id or fb_result.evaluation_id
      feedback_baseline_metrics = extract_metrics(fb_result)
      feedback_baseline_rca     = enrich_rca(fb_result.root_cause or {})
      Human.notify({message = string.format(
        "Feedback baseline: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        feedback_baseline_metrics.alignment,
        feedback_baseline_metrics.accuracy,
        feedback_baseline_metrics.precision,
        feedback_baseline_metrics.recall
      ), level = "info"})
      diag(string.format("Feedback baseline (%s): AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
        tostring(feedback_baseline_id),
        feedback_baseline_metrics.alignment, feedback_baseline_metrics.accuracy,
        feedback_baseline_metrics.precision, feedback_baseline_metrics.recall))
    end
  end

  -- Store both baselines in state
  State.set("accuracy_baseline_id",      accuracy_baseline_id)
  State.set("accuracy_baseline_metrics", accuracy_baseline_metrics)
  State.set("feedback_baseline_id",      feedback_baseline_id)
  State.set("feedback_baseline_metrics", feedback_baseline_metrics)
  State.set("scorecard_id",  scorecard_id)
  State.set("score_id",      score_id)
  State.set("iterations",    {})
  -- Store RCA for the coding agent's first iteration
  State.set("last_accuracy_rca", accuracy_baseline_rca)
  State.set("last_feedback_rca", feedback_baseline_rca)

  -- Fetch smoke test items from the regression dataset (accuracy baseline eval).
  -- Using items from the actual regression dataset ensures they are EDU items
  -- with real school metadata, so the LLM path is exercised during smoke tests.
  if accuracy_baseline_id then
    local ids = {}
    -- Sample at three spread offsets to get variety across the dataset
    -- Use small offsets since some evals have 50+ items; avoid going past end
    for _, offset in ipairs({0, 15, 30}) do
      local ok, res = pcall(call_plexus_tool, "plexus_evaluation_score_result_find", {
        evaluation_id = accuracy_baseline_id,
        limit         = 1,
        offset        = offset
      })
      -- Tool returns {"score_results": [...], "pagination": {...}, ...}
      local sr = res and res.score_results
      if ok and sr and type(sr) == "table" and sr[1] and sr[1].item_id then
        ids[#ids+1] = sr[1].item_id
      end
    end
    if #ids > 0 then
      smoke_test_item_ids = table.concat(ids, ",")
      Human.notify({message = string.format(
        "Smoke test items from regression dataset (%d): %s", #ids, smoke_test_item_ids),
        level = "info"})
    else
      Human.notify({message = "WARNING: could not fetch smoke test items from baseline eval — smoke tests will be skipped",
        level = "warning"})
    end
  else
    Human.notify({message = "WARNING: no accuracy baseline available — smoke tests will be skipped",
      level = "warning"})
  end

  -- Early exit: if feedback alignment is already perfect or no RCA data
  local fb_rca_topics = (type(feedback_baseline_rca) == "table" and feedback_baseline_rca.topics) or {}
  local has_fb_rca = type(fb_rca_topics) == "table" and #fb_rca_topics > 0
  local acc_perfect = not accuracy_available or (accuracy_baseline_metrics and accuracy_baseline_metrics.alignment >= 0.99)
  if feedback_baseline_metrics.alignment >= 0.99 and acc_perfect then
    local reason = "Both baselines already at 99%+ alignment — nothing to optimize."
    Human.notify({message = reason, level = "info"})
    return {
      success = true,
      status = "converged",
      message = reason,
      accuracy_baseline_id = accuracy_baseline_id,
      feedback_baseline_id = feedback_baseline_id,
      iterations = {},
      feedback_improvement = 0,
      accuracy_improvement = 0,
      scorecard_id = scorecard_id,
      score_id = score_id
    }
  end


  -- ================================================================
  -- Exploration / Synthesis Optimization Cycles
  -- Exploration: Probe independent fixes for different RCA categories
  -- Synthesis:   Combine successful Exploration fixes into one version
  -- ================================================================
  Stage.set("exploration")

  local stop_reason = nil
  local iterations = {}
  local last_accepted_version_id = champion_version_id
  local last_accepted_fb_metrics = feedback_baseline_metrics
  local last_accepted_acc_metrics = accuracy_baseline_metrics
  local consecutive_failed_cycles = 0  -- plateau detection

  -- ================================================================
  -- LLM error recovery and context management helpers
  -- ================================================================

  -- Classify an error string to determine recovery strategy
  local function classify_error(err_str)
    local s = string.lower(tostring(err_str))
    if string.find(s, "contextwindowexceeded")
      or string.find(s, "context_length_exceeded")
      or string.find(s, "maximum context length")
      or string.find(s, "token limit") then
      return "context_window"
    end
    if string.find(s, "rate_limit") or string.find(s, "ratelimit")
      or string.find(s, "429") or string.find(s, "too many requests") then
      return "rate_limit"
    end
    if string.find(s, "timeout") or string.find(s, "timed out")
      or string.find(s, "connection")
      or string.find(s, "unterminated string")
      or string.find(s, "unexpected end of json") then
      return "transient"
    end
    if string.find(s, "authentication") or string.find(s, "api_key")
      or string.find(s, "unauthorized") then
      return "permanent"
    end
    return "unknown"
  end

  -- Proactive token budget guard — trim history before it overflows
  local CONTEXT_BUDGET_TOKENS = 100000
  local CONTEXT_BUDGET_WARN   = 80000

  local function guard_context_budget(agent, budget)
    budget = budget or CONTEXT_BUDGET_TOKENS
    local ok_count, token_count = pcall(function() return agent.history:count_tokens() end)
    if not ok_count then return end  -- count_tokens not available, skip guard
    token_count = token_count or 0

    if token_count <= budget then
      if token_count > CONTEXT_BUDGET_WARN then
        diag(string.format("Context budget warning: %d tokens (budget=%d)", token_count, budget))
      end
      return
    end

    diag(string.format("Context budget exceeded: %d tokens > %d budget. Trimming.", token_count, budget))

    -- Get all messages, keep most recent that fit within budget
    local ok_get, all_msgs = pcall(function() return agent.history:get() end)
    if not ok_get or not all_msgs then
      agent.clear_history()
      return
    end

    -- Convert lupa table to Lua table if needed
    local msgs = {}
    if type(all_msgs) == "table" then
      msgs = all_msgs
    else
      -- lupa proxy — iterate to collect
      for i = 1, 9999 do
        local m = all_msgs[i]
        if m == nil then break end
        table.insert(msgs, m)
      end
    end

    local kept = {}
    local running_tokens = 0
    -- Walk backwards, keeping recent messages within budget.
    -- IMPORTANT: Preserve tool_calls/tool message pairs to avoid
    -- "messages with role 'tool' must be a response to a preceeding
    -- message with 'tool_calls'" errors from the API.
    for i = #msgs, 1, -1 do
      local msg = msgs[i]
      local content = ""
      pcall(function() content = msg.content or "" end)
      local role = ""
      pcall(function() role = msg.role or "" end)
      local msg_tokens = math.floor(#tostring(content) / 4) + 4

      -- If this is a "tool" message, we must also include the preceding
      -- assistant message with tool_calls. Check if we have room for both.
      if role == "tool" and i > 1 then
        local prev_msg = msgs[i - 1]
        local prev_content = ""
        pcall(function() prev_content = prev_msg.content or "" end)
        local prev_tokens = math.floor(#tostring(prev_content) / 4) + 4
        if running_tokens + msg_tokens + prev_tokens > budget then
          break  -- can't fit the pair, stop here
        end
      elseif running_tokens + msg_tokens > budget then
        break
      end

      table.insert(kept, 1, msg)
      running_tokens = running_tokens + msg_tokens
    end

    -- Remove any orphaned "tool" messages at the start of kept
    -- (the preceding tool_calls message may have been trimmed)
    while #kept > 0 do
      local first_role = ""
      pcall(function() first_role = kept[1].role end)
      if first_role == "tool" then
        table.remove(kept, 1)
      else
        break
      end
    end

    -- Always preserve first system message if it was dropped
    if #msgs > 0 and #kept > 0 then
      local first_role = ""
      pcall(function() first_role = msgs[1].role end)
      local kept_first_role = ""
      pcall(function() kept_first_role = kept[1].role end)
      if first_role == "system" and kept_first_role ~= "system" then
        table.insert(kept, 1, msgs[1])
      end
    end

    agent.clear_history()
    for _, msg in ipairs(kept) do
      pcall(function() agent.history:add(msg) end)
    end
    diag(string.format("History trimmed: %d tokens -> %d messages (%d tokens est)",
      token_count, #kept, running_tokens))
  end

  -- Retry wrapper for code_editor calls with error-type-specific recovery
  -- recovery_context: {file_content = string, task_description = string} or nil
  local MAX_EDITOR_RETRIES = 2

  local function safe_editor_call(msg, recovery_context)
    for attempt = 1, MAX_EDITOR_RETRIES + 1 do
      Tool.reset()
      local ok, err = pcall(function()
        code_editor({message = msg})
      end)
      if ok then return true, nil end

      local err_type = classify_error(err)
      diag(string.format("code_editor error (attempt %d/%d, type=%s): %s",
        attempt, MAX_EDITOR_RETRIES + 1, err_type, trunc(tostring(err), 300)))

      if err_type == "permanent" then
        return false, tostring(err)
      end

      if attempt > MAX_EDITOR_RETRIES then
        return false, tostring(err)
      end

      if err_type == "context_window" then
        -- Recovery: clear history, re-inject just essential context
        code_editor.clear_history()
        if recovery_context then
          if recovery_context.file_content then
            code_editor.history:add({
              role = "system",
              content = "=== CURRENT score_config.yaml ===\n"
                .. recovery_context.file_content
                .. "\n=== END OF score_config.yaml ==="
            })
          end
          if recovery_context.task_description then
            msg = recovery_context.task_description
          end
        end
        diag("Recovered from context window error: cleared history, re-injected context")

      elseif err_type == "rate_limit" or err_type == "transient" then
        local wait_seconds = attempt * 5
        diag(string.format("Waiting %d seconds before retry...", wait_seconds))
        local t = os.clock() + wait_seconds
        while os.clock() < t do end

      else
        -- Unknown error: clear history and retry with context
        code_editor.clear_history()
        if recovery_context and recovery_context.file_content then
          code_editor.history:add({
            role = "system",
            content = "=== CURRENT score_config.yaml ===\n"
              .. recovery_context.file_content
              .. "\n=== END OF score_config.yaml ==="
          })
        end
      end
    end
    return false, "max retries exceeded"
  end

  for cycle = 1, params.max_iterations do
    local cycle_ok, cycle_err = pcall(function()
    diag(string.format("=== ENTERING CYCLE %d/%d === (last_accepted=%s)", cycle, params.max_iterations, tostring(last_accepted_version_id)))
    Human.notify({message = string.format(
      "═══ Cycle %d/%d ═══", cycle, params.max_iterations), level = "info"})
    State.set("current_iteration", cycle)

    -- Pull the last accepted version as starting point for this cycle
    local score_pull = call_plexus_tool("plexus_score_pull", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score,
      version_id = last_accepted_version_id
    })
    if not score_pull or not score_pull.success then
      return {
        success = false,
        status = "error",
        message = "Failed to pull score configuration at cycle " .. cycle
      }
    end

    -- Read current code and guidelines (with retry for transient file system issues)
    local current_code = nil
    for read_attempt = 1, 3 do
      local read_ok, read_result = pcall(function()
        return Step.checkpoint(function()
          return File.read(score_pull.codeFilePath)
        end)
      end)
      if read_ok and has_text(read_result) then
        current_code = read_result
        break
      end
      if read_attempt < 3 then
        diag(string.format("Code file read attempt %d failed, retrying in 2s...", read_attempt))
        local t = os.clock() + 2
        while os.clock() < t do end
      end
    end
    if not has_text(current_code) then
      return {
        success = false,
        status = "error",
        message = "Failed to read score code file at cycle " .. cycle
      }
    end
    local current_guidelines = ""
    if score_pull.guidelinesFilePath then
      local g_result = Step.checkpoint(function()
        return File.read(score_pull.guidelinesFilePath)
      end)
      if has_text(g_result) then
        current_guidelines = g_result
      end
    end

    -- Get current eval metrics (updated after accepted cycles)
    local current_fb_metrics = State.get("feedback_baseline_metrics") or feedback_baseline_metrics
    local current_acc_metrics = accuracy_available and (State.get("accuracy_baseline_metrics") or accuracy_baseline_metrics) or nil
    local current_fb_rca = State.get("last_feedback_rca") or feedback_baseline_rca
    local current_acc_rca = accuracy_available and (State.get("last_accuracy_rca") or accuracy_baseline_rca) or nil

    -- Count consecutive accuracy regressions for strategy selection
    local consecutive_acc_rejections = 0
    if iterations then
      for i = #iterations, 1, -1 do
        local it = iterations[i]
        local acc_d = it.accuracy_deltas and it.accuracy_deltas.alignment or 0
        if not it.accepted and acc_d < -0.02 then
          consecutive_acc_rejections = consecutive_acc_rejections + 1
        else
          break
        end
      end
    end

    -- ================================================================
    -- SYNTHESIS (cycle 2+): reason explicitly about what was learned
    -- ================================================================
    if cycle > 1 and #iterations > 0 then
      Human.notify({message = string.format(
        "Cycle %d — Synthesis: reasoning about lessons from cycles 1-%d...",
        cycle, cycle - 1), level = "info"})

      local syn = {}
      table.insert(syn, string.format(
        "=== LESSONS LEARNED: Cycles 1-%d ===\n", cycle - 1))
      table.insert(syn,
        "Before proposing new hypotheses, analyze what we've learned across ALL prior cycles.\n")

      -- Show ALL prior cycles, not just the last one
      for _, prev in ipairs(iterations) do
        local status = prev.accepted and "ACCEPTED" or "REJECTED"
        local fb_d = prev.feedback_deltas and prev.feedback_deltas.alignment or 0
        table.insert(syn, string.format("--- Cycle %d (%s, FB AC1 %+.3f) ---",
          prev.iteration, status, fb_d))
        if prev.exploration_results and type(prev.exploration_results) == "table" then
          for _, r in ipairs(prev.exploration_results) do
            local r_fb_d = r.fb_deltas and r.fb_deltas.alignment or 0
            local r_acc_d = r.acc_deltas and r.acc_deltas.alignment or 0
            local hyp_label = r.hypothesis
              and (r.hypothesis.name .. ": " .. (r.hypothesis.description or ""))
              or ("Hypothesis " .. tostring(r.index))
            table.insert(syn, string.format(
              "  %d. %s\n     Implemented: %s\n     FB AC1 %+.3f   ACC AC1 %+.3f  %s\n",
              r.index, hyp_label, r.done_reason or "(no note)",
              r_fb_d, r_acc_d, r.succeeded and "SUCCEEDED" or "FAILED"))
          end
        end
      end

      -- Include accumulated insights from prior lessons-learned phases
      local prior_insights = State.get("cycle_insights") or {}
      if #prior_insights > 0 then
        table.insert(syn, "\n=== PRIOR ANALYSIS (your reasoning from previous cycles) ===")
        for _, ci in ipairs(prior_insights) do
          table.insert(syn, string.format("\nCycle %d analysis:\n%s", ci.cycle, ci.analysis or ""))
        end
      end

      table.insert(syn, "\n\nNow synthesize everything above. For each hypothesis across ALL cycles, reason through:\n")
      table.insert(syn, "  - What did this change actually do to the score's behavior?\n")
      table.insert(syn, "  - Did the metric results match what you expected? Why or why not?\n")
      table.insert(syn, "  - CLASSIFY: Is this approach (a) fundamentally wrong — the premise was flawed,\n")
      table.insert(syn, "    (b) directionally right but implementation was off — worth refining, or\n")
      table.insert(syn, "    (c) inconclusive — too small an effect to learn from?\n")
      table.insert(syn, "  - What does this tell us about what this score's evaluation data actually rewards?\n")
      table.insert(syn, "  - Looking at the FULL trajectory across all cycles, what patterns emerge?\n")
      table.insert(syn, "  - What SPECIFIC territory has NOT been explored yet?\n")
      table.insert(syn, "\nWrite out your analysis. Be specific — name the exact criteria/lines you'd change next.\n")
      table.insert(syn, "This reasoning will directly shape your hypotheses for cycle "
        .. tostring(cycle) .. " and will be preserved for future cycles.")

      guard_context_budget(code_editor)
      local syn_ok, syn_err = safe_editor_call(table.concat(syn, ""), nil)
      if not syn_ok then
        diag(string.format("CODE_EDITOR FAILED in prior-cycle synthesis: %s", tostring(syn_err)))
      end
      local syn_text = code_editor.output or "(synthesis complete)"
      Human.notify({message = "  Synthesis:\n" .. syn_text, level = "info"})

      -- Persist the agent's lessons-learned reasoning so future cycles can see it.
      -- This survives history compaction because it's stored in State, not conversation.
      local prev = iterations[#iterations]
      local insight_entry = {
        cycle = cycle - 1,
        analysis = trunc(syn_text, 5000)
      }
      if prev and prev.exploration_results and type(prev.exploration_results) == "table" then
        insight_entry.hypotheses_tested = {}
        for _, r in ipairs(prev.exploration_results) do
          table.insert(insight_entry.hypotheses_tested, {
            name = r.hypothesis and r.hypothesis.name or ("Hypothesis " .. tostring(r.index)),
            description = trunc(r.done_reason or "", 2000),
            fb_delta = r.fb_deltas and r.fb_deltas.alignment or 0,
            acc_delta = r.acc_deltas and r.acc_deltas.alignment or 0,
            succeeded = r.succeeded or false
          })
        end
      end
      local cycle_insights = State.get("cycle_insights") or {}
      table.insert(cycle_insights, insight_entry)
      State.set("cycle_insights", cycle_insights)
      diag(string.format("Cycle %d insight stored (%d chars, %d hypotheses)",
        cycle - 1, #(syn_text or ""), insight_entry.hypotheses_tested and #insight_entry.hypotheses_tested or 0))
    end

    -- ================================================================
    -- PHASE 1: Planning — sequential hypothesis generation
    -- Each hypothesis is generated in a separate LLM call with a focused
    -- objective. Each call sees previously proposed hypotheses to avoid
    -- duplication and ensure diversity.
    -- ================================================================
    Stage.set("exploration")
    Human.notify({message = string.format(
      "Cycle %d — Planning: generating hypotheses sequentially...", cycle
    ), level = "info"})

    -- Build base planning context (RCA + metrics + guidelines + score config)
    local planning_inject = build_planning_context({
      scorecard_name = scorecard_name,
      score_name = score_name,
      baseline_version_id = champion_version_id,
      last_accepted_version_id = last_accepted_version_id,
      iterations = iterations,
      baseline_fb_metrics = feedback_baseline_metrics,
      baseline_acc_metrics = accuracy_baseline_metrics,
      feedback_metrics = current_fb_metrics,
      accuracy_metrics = current_acc_metrics,
      feedback_rca = current_fb_rca,
      accuracy_rca = current_acc_rca,
      current_code = current_code,
      current_guidelines = current_guidelines,
      iteration = cycle,
      consecutive_failed_cycles = consecutive_failed_cycles,
      hint = params.hint
    })

    -- Build shared cookbook section
    local cookbook = build_cookbook_section({
      consecutive_failed_cycles = consecutive_failed_cycles,
      consecutive_acc_rejections = consecutive_acc_rejections,
      iterations = iterations
    })

    -- Log planning context for debugging
    local context_log_path = string.format("optimizer_cycle%d_planning_context.txt", cycle)
    pcall(function() File.write(context_log_path, planning_inject .. "\n\n" .. cookbook) end)

    -- Define the hypothesis generation slots for this cycle.
    -- Slots 1-3 are always generated; slot 4 is only generated on escalation.
    local hyp_slots = {"feedback_incremental", "feedback_bold", "accuracy_fix"}
    if consecutive_failed_cycles >= 2 then
      table.insert(hyp_slots, "structural")
    end

    -- Generate hypotheses sequentially — each sees the previous ones
    local hypotheses = {}

    for slot_idx, slot_name in ipairs(hyp_slots) do
      Human.notify({message = string.format(
        "  Generating hypothesis %d/%d (%s)...", slot_idx, #hyp_slots, slot_name), level = "info"})

      -- Build the focused prompt for this slot
      local hyp_prompt = build_hypothesis_prompt(slot_name, hypotheses, {
        consecutive_failed_cycles = consecutive_failed_cycles
      })

      -- Full prompt = base context + cookbook + focused task
      local full_prompt = planning_inject .. "\n\n" .. cookbook .. "\n\n" .. hyp_prompt

      -- Each hypothesis generation gets a fresh conversation to avoid confusion
      Tool.reset()
      code_editor.clear_history()
      guard_context_budget(code_editor)

      local plan_ok, plan_err = safe_editor_call(full_prompt, {
        file_content = current_code,
        task_description = full_prompt
      })

      if not plan_ok then
        diag(string.format("Hyp slot %d (%s) FAILED: %s", slot_idx, slot_name, tostring(plan_err)))
        Human.notify({message = string.format(
          "    Slot %d (%s) failed: %s", slot_idx, slot_name, trunc(tostring(plan_err), 100)), level = "error"})
      else
        local response = code_editor.output or ""
        local parsed = parse_hypotheses(response)

        if #parsed > 0 then
          -- Take the first parsed hypothesis and re-index it
          local hyp = parsed[1]
          hyp.index = #hypotheses + 1
          hyp.slot = slot_name
          table.insert(hypotheses, hyp)
          diag(string.format("  Hyp %d (%s): %s — %s",
            hyp.index, slot_name, hyp.name, trunc(hyp.description, 200)))
          Human.notify({message = string.format(
            "    %d. [%s] %s: %s", hyp.index, slot_name, hyp.name, trunc(hyp.description, 100)), level = "info"})
        else
          -- Retry once with a nudge
          diag(string.format("Hyp slot %d (%s) produced no parseable hypothesis, retrying...", slot_idx, slot_name))
          guard_context_budget(code_editor)
          local retry_ok, _ = safe_editor_call(
            "I need exactly ONE hypothesis on a single numbered line. Example:\n"
            .. string.format("%d. Fix something: Description of what to change and why", #hypotheses + 1),
            {file_content = current_code, task_description = full_prompt}
          )
          if retry_ok then
            local retry_parsed = parse_hypotheses(code_editor.output or "")
            if #retry_parsed > 0 then
              local hyp = retry_parsed[1]
              hyp.index = #hypotheses + 1
              hyp.slot = slot_name
              table.insert(hypotheses, hyp)
              diag(string.format("  Hyp %d (%s, retry): %s — %s",
                hyp.index, slot_name, hyp.name, trunc(hyp.description, 200)))
              Human.notify({message = string.format(
                "    %d. [%s] %s: %s", hyp.index, slot_name, hyp.name, trunc(hyp.description, 100)), level = "info"})
            else
              diag(string.format("Hyp slot %d (%s) failed after retry — no hypothesis", slot_idx, slot_name))
            end
          end
        end
      end
    end

    -- Fallback if ALL slots failed
    if #hypotheses == 0 then
      local rca_action = current_fb_rca and current_fb_rca._primary_next_action
      local fallback_desc = "Address top error pattern from RCA"
      if type(rca_action) == "table" then
        fallback_desc = rca_action.action or rca_action.description or fallback_desc
      end
      hypotheses = {{index = 1, name = "RCA primary fix", description = fallback_desc, slot = "fallback"}}
    end

    diag(string.format("Planning complete: %d hypotheses generated", #hypotheses))
    Human.notify({message = string.format(
      "  Planning complete: %d hypotheses", #hypotheses), level = "info"})

    -- ================================================================
    -- PHASE 2: Implement each hypothesis (continuous conversation)
    -- ================================================================
    local submitted_versions = {}
    local any_cannot_improve = false

    for h = 1, #hypotheses do
      local hyp = hypotheses[h]
      Human.notify({message = string.format(
        "  Hypothesis %d/%d: %s", h, #hypotheses, hyp.name), level = "info"})

      -- Reset editor to baseline code for each hypothesis
      call_plexus_tool("score_editor_setup", {
        scorecard_identifier = params.scorecard,
        score_identifier     = params.score,
        yaml_content         = current_code,
        code_file_path       = score_pull.codeFilePath,
        iteration            = cycle,
        hypothesis           = hyp.name .. ": " .. (hyp.description or "")
      })

      -- Clear accumulated conversation and tool state to prevent corruption.
      -- Each hypothesis gets a completely fresh context.
      Tool.reset()
      code_editor.clear_history()

      -- Inner ReAct loop for this hypothesis.
      -- Failed str_replace attempts do NOT count as logical steps — the LLM gets
      -- unlimited retries for mechanical editing failures (up to max_edit_retries).
      -- Only meaningful actions (successful edit, submit, view, done) advance the
      -- step counter. This prevents hypotheses from failing due to editing mechanics
      -- rather than the hypothesis actually being a bad idea.
      local max_react_steps = 10
      local max_edit_retries = 10   -- total failed edits before giving up on this hypothesis
      local version_id = nil
      local hyp_done_reason = ""
      local smoke_test_failure = nil
      local total_edit_failures = 0

      local react_step = 0
      local hypothesis_done = false
      while react_step < max_react_steps and not hypothesis_done do
        react_step = react_step + 1
        local msg
        if react_step == 1 and total_edit_failures == 0 then
          -- First step for this hypothesis — inject current file as system message
          local editor_content = call_plexus_tool("score_editor_get_content", {})
          if editor_content and editor_content.file_content then
            code_editor.history:add({
              role = "system",
              content = "=== CURRENT score_config.yaml (the file you are editing) ===\n"
                .. editor_content.file_content
                .. "\n=== END OF score_config.yaml ==="
            })
          end

          msg = string.format(
            "Implement hypothesis %d of %d: %s\n\n%s\n\n"
            .. "Edit score_config.yaml to test this hypothesis. "
            .. "The current file content is shown in the system message above.\n"
            .. "IMPORTANT: Your str_replace old_str MUST be copied exactly from score_config.yaml.\n"
            .. "The RCA quotes are paraphrased — do NOT use RCA text as old_str.\n"
            .. "When done, call submit_score_version(version_note='<what you changed> to address <which error pattern>; expect <predicted effect>').\n"
            .. "The version_note is your future self's primary learning signal — be specific about WHAT, WHY, and EXPECTED EFFECT.\n"
            .. "Call done(reason='cannot_improve: ...') if you cannot find a viable edit.",
            h, #hypotheses, hyp.name, hyp.description)
        else
          -- Subsequent turns: provide feedback on what just happened
          local last_edit = Tool.last_call("str_replace_editor")
          local last_submit = Tool.last_call("submit_score_version")
          local last_done = Tool.last_call("done")

          local feedback_parts = {}

          -- Smoke test failure takes priority over all other feedback
          if smoke_test_failure then
            table.insert(feedback_parts, "SMOKE TEST FAILED for the version you just submitted:\n\n" .. smoke_test_failure)
            table.insert(feedback_parts, "\nThe score version was created but the prediction engine cannot execute it.")
            table.insert(feedback_parts, "Fix the issue in score_config.yaml and call submit_score_version again.")
            smoke_test_failure = nil
          elseif last_edit then
            local edit_result = tostring(last_edit.result or "")
            local edit_command = (last_edit.args and last_edit.args.command) or ""
            if edit_command == "view" then
              table.insert(feedback_parts, "File viewed successfully. The file has NOT been modified yet.")
              table.insert(feedback_parts, "You must call str_replace_editor with command='str_replace' to make changes, then call submit_score_version to submit.")
            elseif string.find(edit_result, "Error") then
              table.insert(feedback_parts, "Your str_replace_editor call returned an error:\n" .. edit_result)
              table.insert(feedback_parts, "\nYou can retry the edit with corrected old_str, or call view to re-read the file and copy the exact text.")
            else
              table.insert(feedback_parts, "Edit applied successfully.")
              table.insert(feedback_parts, "You can make more edits, or call submit_score_version(version_note=\"...\") to submit.")
            end
          end
          if last_submit then
            local ok_sub, sub_result = pcall(function() return safe_decode(last_submit.result) end)
            if ok_sub and sub_result and sub_result.error then
              local err_text = tostring(sub_result.error)
              table.insert(feedback_parts, "submit_score_version returned an error:\n  " .. err_text)
              if string.find(err_text, "most recent str_replace_editor") then
                table.insert(feedback_parts, "\nTo recover: call str_replace_editor(command='view', path='score_config.yaml') to clear the error state, then call submit_score_version again.")
              elseif string.find(err_text, "unchanged from the original") then
                table.insert(feedback_parts, "\nThe file has not been modified. You must use str_replace_editor(command='str_replace', ...) to make actual changes before submitting.")
              else
                table.insert(feedback_parts, "\nFix the issue and try submit_score_version again.")
              end
            end
          end
          if #feedback_parts == 0 then
            table.insert(feedback_parts, "No recognized tool call was made.")
            table.insert(feedback_parts, "You must call str_replace_editor, submit_score_version, or done.")
          end
          table.insert(feedback_parts, string.format("\n(Hypothesis %d, step %d/%d)", h, react_step, max_react_steps))

          -- Always include the current file content inline in the feedback message.
          local editor_content = call_plexus_tool("score_editor_get_content", {})
          if editor_content and editor_content.file_content then
            table.insert(feedback_parts, "\n=== CURRENT score_config.yaml (copy your old_str EXACTLY from here) ===\n"
              .. editor_content.file_content
              .. "\n=== END OF score_config.yaml ===")
          end

          msg = table.concat(feedback_parts, "\n")
        end

        -- Log the feedback message for debugging
        if react_step > 1 or total_edit_failures > 0 then
          Human.notify({message = string.format(
            "  [Hyp %d, step %d, edit_fails=%d] feedback (%d chars): %s",
            h, react_step, total_edit_failures, #msg, trunc(msg, 200)
          ), level = "info"})
        end
        -- Get current file for recovery context
        local hyp_file_content = nil
        pcall(function()
          local ec = call_plexus_tool("score_editor_get_content", {})
          if ec and ec.file_content then hyp_file_content = ec.file_content end
        end)

        guard_context_budget(code_editor)
        local editor_ok, editor_err = safe_editor_call(msg, {
          file_content = hyp_file_content or current_code,
          task_description = msg
        })
        if not editor_ok then
          diag(string.format("CODE_EDITOR FAILED in hypothesis %d step %d: %s", h, react_step, tostring(editor_err)))
          Human.notify({message = string.format(
            "  Hypothesis %d step %d — code_editor failed: %s", h, react_step, trunc(tostring(editor_err), 200)), level = "error"})
          hyp_done = true
        end

        -- Record agent's text response to session
        local agent_text = code_editor.output or ""
        if has_text(agent_text) then
          Human.notify({message = string.format(
            "  [Hyp %d, step %d] Agent: %s",
            h, react_step, agent_text), level = "info"})
        end

        -- Determine if this was a failed edit attempt (doesn't count as a logical step)
        local was_edit_failure = false
        local last_edit_check = Tool.last_call("str_replace_editor")
        if last_edit_check then
          local edit_result = tostring(last_edit_check.result or "")
          local edit_command = (last_edit_check.args and last_edit_check.args.command) or ""
          if edit_command ~= "view" and string.find(edit_result, "Error") then
            was_edit_failure = true
            total_edit_failures = total_edit_failures + 1
            Human.notify({message = string.format(
              "    Hypothesis %d: edit failure %d/%d (not counting as step)",
              h, total_edit_failures, max_edit_retries), level = "info"})
          end
        end

        -- Check termination conditions
        local submit_call = Tool.last_call("submit_score_version")
        if submit_call then
          local ok, submit_result = pcall(function() return safe_decode(submit_call.result) end)
          if ok and submit_result and submit_result.version_id then
            local candidate_id = submit_result.version_id
            Human.notify({message = string.format(
              "    Hypothesis %d: version %s created (step %d) — smoke testing...",
              h, candidate_id, react_step), level = "info"})

            local smoke_passed = false
            local smoke_detail = ""

            if not smoke_test_item_ids then
              smoke_passed = true
              Human.notify({message = "    Smoke test skipped (no item IDs available)", level = "warning"})
            end

            local smoke_ok, smoke = true, nil
            if smoke_test_item_ids then
              smoke_ok, smoke = pcall(call_plexus_tool, "plexus_predict", {
                scorecard_name = params.scorecard,
                score_name     = params.score,
                version        = candidate_id,
                item_ids       = smoke_test_item_ids,
                include_trace  = false,
                no_cache       = true
              })
              if not smoke_ok then
                smoke_detail = "Smoke test call error: " .. tostring(smoke)
                smoke = nil
              end
            end

            -- Pass if at least one prediction reached the LLM (value is not ERROR/nil/NA)
            if not smoke_passed and smoke and smoke.predictions and #smoke.predictions > 0 then
              local all_details = {}
              for _, pred in ipairs(smoke.predictions) do
                local sc = pred.scores and pred.scores[1]
                if sc and sc.value ~= "ERROR" and sc.value ~= nil and sc.value ~= "NA" then
                  smoke_passed = true
                  Human.notify({message = string.format(
                    "    Smoke test PASSED (item=%s value=%s)",
                    tostring(pred.item_id or "?"), tostring(sc.value)), level = "info"})
                  diag(string.format("Hyp %d smoke PASSED (version=%s item=%s value=%s)",
                    h, tostring(candidate_id), tostring(pred.item_id or "?"), tostring(sc.value)))
                  break
                else
                  local ed = sc and sc.error_details
                  local detail = (sc and sc.explanation) or (ed and ed.error_message)
                    or string.format("value=%s", tostring(sc and sc.value or "nil"))
                  if ed and ed.traceback then
                    detail = detail .. "\n\nTraceback:\n" .. tostring(ed.traceback)
                  end
                  all_details[#all_details+1] = string.format("item=%s: %s",
                    tostring(pred.item_id or "?"), detail)
                end
              end
              if not smoke_passed then
                smoke_detail = "All smoke test items failed LLM invocation:\n" .. table.concat(all_details, "\n")
              end
            elseif smoke and smoke.error then
              smoke_detail = "Prediction call failed: " .. tostring(smoke.error)
            elseif smoke and not smoke_passed then
              smoke_detail = "Prediction returned no results: " .. (safe_encode(smoke) or "{}")
            end

            if smoke_passed then
              version_id = candidate_id
              diag(string.format("Hyp %d smoke passed, setting version_id=%s", h, tostring(candidate_id)))
              local ok_a, vn = pcall(function() return submit_call.args.version_note end)
              if ok_a and has_text(vn) then hyp_done_reason = vn end
              hypothesis_done = true
            else
              Human.notify({message = string.format(
                "    Hypothesis %d: smoke test FAILED — %s",
                h, trunc(smoke_detail, 120)), level = "warning"})
              diag(string.format("Hyp %d smoke FAILED (version=%s): %s",
                h, tostring(candidate_id), trunc(smoke_detail, 200)))
              smoke_test_failure = string.format(
                "Version %s was created but FAILED the smoke test.\n\nError detail:\n%s\n\n"
                .. "The score_config.yaml has an execution error. Diagnose and fix it, "
                .. "then call submit_score_version again.",
                candidate_id, smoke_detail)
            end

          elseif ok and submit_result and submit_result.error then
            Human.notify({message = string.format(
              "    Hypothesis %d submit error (step %d): %s",
              h, react_step, tostring(submit_result.error)), level = "warning"})
          end
        end

        local done_call = Tool.last_call("done")
        if done_call then
          Human.notify({message = string.format("    Hypothesis %d: agent called done (step %d)", h, react_step), level = "info"})
          local ok_res, done_result = pcall(function() return safe_decode(done_call.result) end)
          if ok_res and done_result and has_text(done_result.reason) then
            hyp_done_reason = done_result.reason
          end
          if not has_text(hyp_done_reason) then
            local ok_r, reason_val = pcall(function() return done_call.args.reason end)
            if ok_r and has_text(reason_val) then
              hyp_done_reason = string.gsub(reason_val, "\\n", "\n")
            end
          end
          if string.find(string.lower(hyp_done_reason), "cannot_improve") then
            any_cannot_improve = true
          end
          hypothesis_done = true
        end

        -- If this was just a failed edit, don't count it as a logical step
        if was_edit_failure and not hypothesis_done then
          react_step = react_step - 1
          if total_edit_failures >= max_edit_retries then
            Human.notify({message = string.format(
              "    Hypothesis %d: %d edit failures — giving up on this hypothesis",
              h, total_edit_failures), level = "warning"})
            hypothesis_done = true
          end
        end
      end

      diag(string.format("Hyp %d react loop exited (steps=%d, version=%s, done=%s)",
        h, react_step, tostring(version_id or "nil"), tostring(hypothesis_done)))

      -- Post-hypothesis bookkeeping wrapped in pcall to prevent silent crashes
      -- (v13 crashed between smoke PASSED and submitted with no diag entry)
      local post_ok, post_err = pcall(function()
        -- Extract version_note as done_reason if we submitted
        if not has_text(hyp_done_reason) and version_id then
          local sc = Tool.last_call("submit_score_version")
          if sc then
            local ok_a, note = pcall(function() return sc.args.version_note end)
            if ok_a and has_text(note) then hyp_done_reason = note end
          end
        end

        -- Record submitted version
        if version_id then
          table.insert(submitted_versions, {
            index = h,
            version_id = version_id,
            done_reason = hyp_done_reason,
            hypothesis = hyp
          })
          diag(string.format("Hyp %d submitted (version=%s, steps=%d, edit_fails=%d): %s",
            h, version_id, react_step, total_edit_failures, trunc(hyp.name .. ": " .. (hyp.description or ""), 200)))
        else
          diag(string.format("Hyp %d NO VERSION (steps=%d, edit_fails=%d, reason=%s): %s",
            h, react_step, total_edit_failures,
            has_text(hyp_done_reason) and trunc(hyp_done_reason, 100) or "unknown",
            trunc(hyp.name .. ": " .. (hyp.description or ""), 200)))
        end

        -- Transition message to conversation history (so agent has full context)
        if version_id then
          code_editor.history:add({role = "user", content = string.format(
            "Hypothesis %d ('%s') submitted as version %s. Evaluation will run after all hypotheses are complete.",
            h, hyp.name, version_id)})
        else
          code_editor.history:add({role = "user", content = string.format(
            "Hypothesis %d ('%s') was not submitted (no viable edit found). Reason: %s",
            h, hyp.name, has_text(hyp_done_reason) and hyp_done_reason or "unknown")})
        end

        -- Preview next hypothesis in conversation
        if h < #hypotheses then
          code_editor.history:add({role = "user", content = string.format(
            "Moving to hypothesis %d of %d: %s\n%s",
            h+1, #hypotheses, hypotheses[h+1].name, hypotheses[h+1].description)})
        end
      end)

      if not post_ok then
        diag(string.format("ERROR in Hyp %d post-processing: %s", h, trunc(tostring(post_err), 500)))
        Human.notify({message = string.format(
          "  Hypothesis %d post-processing error (version may still be valid): %s",
          h, trunc(tostring(post_err), 200)), level = "error"})
        -- If we have a version_id, still record it despite the error
        if version_id then
          table.insert(submitted_versions, {
            index = h,
            version_id = version_id,
            done_reason = hyp_done_reason or "(post-processing error)",
            hypothesis = hyp
          })
          diag(string.format("Hyp %d submitted (recovered from error, version=%s): %s",
            h, version_id, trunc(hyp.name or "", 100)))
        end
      end
    end

    -- ================================================================
    -- PHASE 3: Batch evaluate all submitted versions
    -- ================================================================
    if #submitted_versions == 0 then
      -- No hypotheses produced a version
      local skip_reason = any_cannot_improve and "cannot_improve" or "all_hypotheses_failed"
      Human.notify({message = string.format(
        "Cycle %d — No hypotheses submitted (%s)", cycle, skip_reason), level = "info"})
      consecutive_failed_cycles = consecutive_failed_cycles + 1
      local cycle_log = {
        iteration = cycle,
        accepted = false,
        skip_reason = skip_reason,
        num_candidates = #hypotheses
      }
      table.insert(iterations, cycle_log)
      State.set("iterations", iterations)
      if consecutive_failed_cycles >= 5 then
        stop_reason = "improvement_plateau"
        return "break_cycle"
      end
      if Stop.requested() then stop_reason = "user_stopped"; return "break_cycle" end

    else
      -- Batch-eval all submitted hypothesis versions
      local batch = {}
      for _, sv in ipairs(submitted_versions) do
        if accuracy_available then
          table.insert(batch, {
            scorecard_name = params.scorecard,
            score_name = params.score,
            evaluation_type = "accuracy",
            dataset_id = dataset_id,
            n_samples = params.max_samples or 100,
            version = sv.version_id,
            baseline = accuracy_baseline_id,
            notes = string.format("Cycle %d / %s — deterministic regression dataset", cycle, trunc(sv.hypothesis.name .. ": " .. (sv.hypothesis.description or ""), 500))
          })
        end
        table.insert(batch, {
          scorecard_name = params.scorecard,
          score_name = params.score,
          evaluation_type = "feedback",
          days = params.days,
          max_feedback_items = params.max_samples or 100,
          sampling_mode = "newest",
          version = sv.version_id,
          baseline = feedback_baseline_id,
          wait = true,
          notes = string.format("Cycle %d / %s — recent feedback items", cycle, trunc(sv.hypothesis.name .. ": " .. (sv.hypothesis.description or ""), 500))
        })
      end

      Human.notify({message = string.format(
        "  Evaluating %d hypotheses (%d evals in parallel)...",
        #submitted_versions, #batch
      ), level = "info"})

      diag(string.format("Dispatching hypothesis eval batch (%d evals)", #batch))
      local batch_results = call_plexus_tool("plexus_evaluation_run", {batch = batch})
      diag(string.format("Hypothesis eval batch returned (%d results)", batch_results and #batch_results or 0))

      -- Parse results
      local evals_per = accuracy_available and 2 or 1
      for i, sv in ipairs(submitted_versions) do
        local base_idx = (i - 1) * evals_per
        if accuracy_available then
          local acc_r = batch_results and batch_results[base_idx + 1]
          if acc_r and (acc_r.id or acc_r.evaluation_id) then
            sv.acc_metrics = extract_metrics(acc_r)
            sv.acc_deltas = calculate_deltas(sv.acc_metrics, accuracy_baseline_metrics)
            sv.acc_rca = enrich_rca(acc_r.root_cause or {})
            sv.acc_eval_id = acc_r.id or acc_r.evaluation_id
          end
        end
        local fb_r = batch_results and batch_results[base_idx + evals_per]
        if fb_r and (fb_r.id or fb_r.evaluation_id) then
          sv.fb_metrics = extract_metrics(fb_r)
          sv.fb_deltas = calculate_deltas(sv.fb_metrics, feedback_baseline_metrics)
          sv.fb_rca = enrich_rca(fb_r.root_cause or {})
          sv.fb_eval_id = fb_r.id or fb_r.evaluation_id
        end
      end

      -- Classify hypotheses as succeeded/failed
      local succeeded = {}
      local failed = {}
      for _, sv in ipairs(submitted_versions) do
        sv.succeeded = classify_exploration_success(sv)
        if sv.succeeded then
          table.insert(succeeded, sv)
        else
          table.insert(failed, sv)
        end
      end

      -- Log results
      Human.notify({message = string.format(
        "  Results: %d succeeded, %d failed", #succeeded, #failed), level = "info"})
      for _, sv in ipairs(submitted_versions) do
        local status_label = sv.succeeded and "SUCCEEDED" or "FAILED"
        local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
        local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
        Human.notify({message = string.format(
          "    Hyp %d [%s]: FB AC1 %+.3f, ACC AC1 %+.3f  [%s]",
          sv.index, status_label, fb_d, acc_d,
          trunc(sv.done_reason or "", 60)
        ), level = "info"})
        diag(string.format("Hyp %d [%s] version=%s: FB AC1 %+.3f, ACC AC1 %+.3f — %s",
          sv.index, status_label, tostring(sv.version_id or "?"),
          fb_d, acc_d, trunc(sv.done_reason or sv.hypothesis and sv.hypothesis.name or "", 80)))
      end

      -- ================================================================
      -- PHASE 4: SYNTHESIS — always create a synthesized version
      -- Combines insights from ALL hypothesis evaluations into one update
      -- ================================================================
      diag("Entering synthesis phase")
      Stage.set("selection")
      local final_version_id = nil
      local final_is_synthesis = true
      local final_done_reason = ""

      Human.notify({message = string.format(
        "Cycle %d — Synthesis: creating synthesized version from %d hypothesis results (%d succeeded, %d failed)...",
        cycle, #submitted_versions, #succeeded, #failed), level = "info"})

      -- Build the synthesis prompt with all hypothesis results
      local synth_parts = {}
      table.insert(synth_parts, string.format("=== CYCLE %d SYNTHESIS ===\n", cycle))
      table.insert(synth_parts, "All hypotheses have been evaluated. Your task is to synthesize a SINGLE")
      table.insert(synth_parts, "updated version that incorporates the best insights from all results.\n")

      -- Show all hypothesis results (succeeded and failed)
      table.insert(synth_parts, "=== HYPOTHESIS EVALUATION RESULTS ===")
      for _, sv in ipairs(submitted_versions) do
        local status = sv.succeeded and "SUCCEEDED" or "FAILED"
        local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
        local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
        table.insert(synth_parts, string.format(
          "\nHypothesis %d ('%s'): %s",
          sv.index, sv.hypothesis.name, status))
        table.insert(synth_parts, string.format(
          "  Feedback AC1 delta: %+.3f   Accuracy AC1 delta: %+.3f",
          fb_d, acc_d))
        table.insert(synth_parts, string.format(
          "  Rationale: %s", trunc(sv.done_reason or sv.hypothesis.description, 2000)))
        if acc_d < -0.01 then
          table.insert(synth_parts, string.format(
            "  *** WARNING: This hypothesis REGRESSED accuracy by %.3f — do NOT incorporate without ensuring accuracy is preserved. ***",
            math.abs(acc_d)))
        end

        -- Include the actual code for succeeded hypotheses
        if sv.succeeded then
          local hyp_pull = call_plexus_tool("plexus_score_pull", {
            scorecard_identifier = params.scorecard,
            score_identifier = params.score,
            version_id = sv.version_id
          })
          if hyp_pull and hyp_pull.success and hyp_pull.codeFilePath then
            local hyp_code = File.read(hyp_pull.codeFilePath)
            if has_text(hyp_code) then
              table.insert(synth_parts, string.format(
                "  === CODE FOR HYPOTHESIS %d (version %s) ===",
                sv.index, sv.version_id))
              table.insert(synth_parts, hyp_code)
              table.insert(synth_parts, string.format(
                "  === END CODE FOR HYPOTHESIS %d ===", sv.index))
            end
          end
        end
      end
      table.insert(synth_parts, "")

      -- Determine the best starting point for synthesis
      local synth_start_code = current_code  -- default: baseline
      local synth_start_label = "BASELINE"

      if #succeeded >= 1 then
        -- Pick the candidate with the highest combined (feedback + accuracy) delta
        local best = succeeded[1]
        local best_score = -999
        for _, sv in ipairs(succeeded) do
          local combined = (sv.fb_deltas and sv.fb_deltas.alignment or 0)
                         + (sv.acc_deltas and sv.acc_deltas.alignment or 0)
          if combined > best_score then
            best_score = combined
            best = sv
          end
        end
        local best_pull = call_plexus_tool("plexus_score_pull", {
          scorecard_identifier = params.scorecard,
          score_identifier = params.score,
          version_id = best.version_id
        })
        if best_pull and best_pull.success and best_pull.codeFilePath then
          local best_code = File.read(best_pull.codeFilePath)
          if has_text(best_code) then
            synth_start_code = best_code
            synth_start_label = string.format("HYPOTHESIS %d (%s)", best.index, best.version_id)
            diag(string.format("Synthesis starting from hypothesis %d (combined delta %+.3f)", best.index, best_score))
          end
        end
      end

      -- Context-specific synthesis instructions
      if #succeeded > 1 then
        table.insert(synth_parts, "=== SYNTHESIS TASK (MULTIPLE SUCCESSES) ===")
        table.insert(synth_parts, string.format(
          "Multiple hypotheses improved the score. Starting from %s (best combined improvement).", synth_start_label))
        table.insert(synth_parts, "Incorporate changes from other successful hypotheses ONLY if they don't regress accuracy.")
        table.insert(synth_parts, "Where changes conflict, prefer approaches that improved BOTH metrics")
        table.insert(synth_parts, "over those that improved only one. Also consider insights from failed")
        table.insert(synth_parts, "hypotheses — what to avoid.\n")
      elseif #succeeded == 1 then
        table.insert(synth_parts, "=== SYNTHESIS TASK (SINGLE SUCCESS) ===")
        table.insert(synth_parts, string.format(
          "One hypothesis succeeded. Its code is already loaded in the editor (starting from %s).", synth_start_label))
        table.insert(synth_parts, "Consider whether insights from the failed hypotheses suggest any")
        table.insert(synth_parts, "additional refinements or adjustments. If no refinement is needed,")
        table.insert(synth_parts, "submit the current code as-is.\n")
      else
        table.insert(synth_parts, "=== SYNTHESIS TASK (NO SUCCESSES) ===")
        table.insert(synth_parts, "No hypothesis met the success threshold, but each result provides signal.")
        table.insert(synth_parts, "Analyze WHY each approach failed or regressed. Create a modest,")
        table.insert(synth_parts, "conservative change that avoids the patterns that caused regression")
        table.insert(synth_parts, "and tries the safest possible improvement based on what was learned.")
        table.insert(synth_parts, "If a hypothesis was close to neutral (small positive or small negative),")
        table.insert(synth_parts, "the underlying idea may still be sound with refinement.\n")
      end

      table.insert(synth_parts, string.format("Edit score_config.yaml starting from %s below.", synth_start_label))
      table.insert(synth_parts, "When done, call submit_score_version(version_note='Cycle " .. tostring(cycle) .. " synthesis: <what you combined/changed> to address <which patterns>; expected effect: <prediction>').")
      table.insert(synth_parts, "The version_note is critical — it becomes the learning signal for future cycles. Include: what ideas you kept/discarded, what error pattern this targets, and what metric movement you predict.")
      table.insert(synth_parts, "If you truly cannot find ANY viable change, call done(reason='cannot_improve: <explanation>').\n")

      -- Reset editor to best starting point code
      call_plexus_tool("score_editor_setup", {
        scorecard_identifier = params.scorecard,
        score_identifier     = params.score,
        yaml_content         = synth_start_code,
        code_file_path       = score_pull.codeFilePath,
        iteration            = cycle,
        hypothesis           = "Cycle " .. tostring(cycle) .. " synthesis"
      })

      -- Clear accumulated history to avoid context overflow
      code_editor.clear_history()

      -- Inject starting code as system message
      code_editor.history:add({
        role = "system",
        content = string.format("=== CURRENT score_config.yaml (starting from %s — apply your synthesis here) ===\n", synth_start_label)
          .. synth_start_code .. "\n=== END OF score_config.yaml ==="
      })

      -- ReAct implementation loop for synthesis (edit retries don't count as logical steps)
      local max_synth_steps = 12
      local max_synth_edit_retries = 10
      local synth_smoke_failure = nil
      local synth_edit_failures = 0
      local synth_step = 0
      local synth_done = false

      while synth_step < max_synth_steps and not synth_done do
        synth_step = synth_step + 1
        local synth_msg
        if synth_step == 1 and synth_edit_failures == 0 then
          synth_msg = table.concat(synth_parts, "\n")
        else
          -- Feedback loop (same pattern as hypothesis and combination loops)
          local feedback_parts = {}

          if synth_smoke_failure then
            table.insert(feedback_parts, "SMOKE TEST FAILED:\n\n" .. synth_smoke_failure)
            table.insert(feedback_parts, "\nFix the issue and call submit_score_version again.")
            synth_smoke_failure = nil
          else
            local last_edit = Tool.last_call("str_replace_editor")
            local last_submit = Tool.last_call("submit_score_version")
            if last_edit then
              local edit_result = tostring(last_edit.result or "")
              local edit_cmd = (last_edit.args and last_edit.args.command) or ""
              if edit_cmd == "view" then
                table.insert(feedback_parts, "File viewed. Call str_replace_editor with command='str_replace' to make changes.")
              elseif string.find(edit_result, "Error") then
                table.insert(feedback_parts, "str_replace_editor error:\n" .. edit_result)
                table.insert(feedback_parts, "\nCall view to re-read, then retry with exact text.")
              else
                table.insert(feedback_parts, "Edit applied. Submit with submit_score_version or continue editing.")
              end
            end
            if last_submit then
              local ok_sub, sub_result = pcall(function() return safe_decode(last_submit.result) end)
              if ok_sub and sub_result and sub_result.error then
                table.insert(feedback_parts, "submit_score_version error:\n  " .. tostring(sub_result.error))
              end
            end
          end

          if #feedback_parts == 0 then
            table.insert(feedback_parts, "You must call str_replace_editor or submit_score_version.")
          end
          table.insert(feedback_parts, string.format("\n(Synthesis step %d/%d, edit_fails=%d)",
            synth_step, max_synth_steps, synth_edit_failures))

          -- Always include current file content inline so old_str can be copied exactly
          local editor_content = call_plexus_tool("score_editor_get_content", {})
          if editor_content and editor_content.file_content then
            table.insert(feedback_parts, "\n=== CURRENT score_config.yaml (copy your old_str EXACTLY from here) ===\n"
              .. editor_content.file_content
              .. "\n=== END OF score_config.yaml ===")
          end
          synth_msg = table.concat(feedback_parts, "\n")
        end

        guard_context_budget(code_editor)
        local editor_ok, editor_err = safe_editor_call(synth_msg, {
          file_content = current_code,
          task_description = synth_msg
        })
        if not editor_ok then
          diag(string.format("CODE_EDITOR FAILED in synthesis step %d: %s", synth_step, tostring(editor_err)))
          Human.notify({message = string.format(
            "  Synthesis step %d — code_editor failed: %s", synth_step, trunc(tostring(editor_err), 200)), level = "error"})
          synth_done = true
        end

        -- Record agent's text response to session
        local agent_text = code_editor.output or ""
        if has_text(agent_text) then
          Human.notify({message = string.format(
            "  [Synthesis, step %d] Agent: %s",
            synth_step, agent_text), level = "info"})
        end

        -- Detect failed edit attempts
        local synth_was_edit_failure = false
        local last_edit_check = Tool.last_call("str_replace_editor")
        if last_edit_check then
          local edit_result = tostring(last_edit_check.result or "")
          local edit_command = (last_edit_check.args and last_edit_check.args.command) or ""
          if edit_command ~= "view" and string.find(edit_result, "Error") then
            synth_was_edit_failure = true
            synth_edit_failures = synth_edit_failures + 1
          end
        end

        -- Check for submit
        local submit_call = Tool.last_call("submit_score_version")
        if submit_call then
          local ok, submit_result = pcall(function() return safe_decode(submit_call.result) end)
          if ok and submit_result and submit_result.version_id then
            local candidate_id = submit_result.version_id
            Human.notify({message = string.format(
              "  Synthesis version %s created — smoke testing...", candidate_id), level = "info"})

            -- Smoke test the synthesized version
            local smoke_passed = false
            local smoke_detail = ""

            if not smoke_test_item_ids then
              smoke_passed = true
              Human.notify({message = "    Smoke test skipped (no item IDs)", level = "warning"})
            end

            local smoke_ok, smoke = true, nil
            if smoke_test_item_ids then
              smoke_ok, smoke = pcall(call_plexus_tool, "plexus_predict", {
                scorecard_name = params.scorecard,
                score_name     = params.score,
                version        = candidate_id,
                item_ids       = smoke_test_item_ids,
                include_trace  = false,
                no_cache       = true
              })
              if not smoke_ok then
                smoke_detail = "Smoke test call error: " .. tostring(smoke)
                smoke = nil
              end
            end

            -- Pass if at least one prediction reached the LLM (value is not ERROR/nil/NA)
            if not smoke_passed and smoke and smoke.predictions and #smoke.predictions > 0 then
              local all_details = {}
              for _, pred in ipairs(smoke.predictions) do
                local sc = pred.scores and pred.scores[1]
                if sc and sc.value ~= "ERROR" and sc.value ~= nil and sc.value ~= "NA" then
                  smoke_passed = true
                  Human.notify({message = string.format(
                    "    Smoke test PASSED (item=%s value=%s)",
                    tostring(pred.item_id or "?"), tostring(sc.value)), level = "info"})
                  diag(string.format("Synthesis smoke PASSED (version=%s item=%s value=%s)",
                    tostring(candidate_id), tostring(pred.item_id or "?"), tostring(sc.value)))
                  break
                else
                  local ed = sc and sc.error_details
                  local detail = (sc and sc.explanation) or (ed and ed.error_message)
                    or string.format("value=%s", tostring(sc and sc.value or "nil"))
                  if ed and ed.traceback then
                    detail = detail .. "\n\nTraceback:\n" .. tostring(ed.traceback)
                  end
                  all_details[#all_details+1] = string.format("item=%s: %s",
                    tostring(pred.item_id or "?"), detail)
                end
              end
              if not smoke_passed then
                smoke_detail = "All smoke test items failed LLM invocation:\n" .. table.concat(all_details, "\n")
              end
            elseif smoke and smoke.error then
              smoke_detail = "Prediction call failed: " .. tostring(smoke.error)
            elseif smoke and not smoke_passed then
              smoke_detail = "Prediction returned no results"
            end

            if smoke_passed then
              final_version_id = candidate_id
              local ok_a, vn = pcall(function() return submit_call.args.version_note end)
              if ok_a and has_text(vn) then final_done_reason = vn end
              diag(string.format("Synthesis version created: %s", final_version_id))
              Human.notify({message = string.format(
                "  Synthesis version: %s", final_version_id), level = "info"})
              synth_done = true
            else
              Human.notify({message = string.format(
                "  Synthesis smoke test FAILED: %s", trunc(smoke_detail, 120)), level = "warning"})
              synth_smoke_failure = string.format(
                "Version %s was created but FAILED the smoke test.\n\nError detail:\n%s\n\n"
                .. "The score_config.yaml has an execution error. Diagnose and fix it, "
                .. "then call submit_score_version again.",
                candidate_id, smoke_detail)
            end

          elseif ok and submit_result and submit_result.error then
            Human.notify({message = string.format(
              "  Synthesis submit error (step %d): %s",
              synth_step, tostring(submit_result.error)), level = "warning"})
          end
        end

        -- Check if agent gave up
        if not synth_done then
          local done_call = Tool.last_call("done")
          if done_call then
            local ok_r, reason = pcall(function() return done_call.args.reason or "" end)
            final_done_reason = ok_r and reason or "agent gave up"
            Human.notify({message = string.format(
              "  Synthesis: agent called done — %s", trunc(final_done_reason, 100)), level = "info"})
            synth_done = true
          end
        end

        -- Failed edit doesn't count as a logical step
        if synth_was_edit_failure and not synth_done then
          synth_step = synth_step - 1
          if synth_edit_failures >= max_synth_edit_retries then
            Human.notify({message = string.format(
              "  Synthesis: %d edit failures — giving up", synth_edit_failures), level = "warning"})
            synth_done = true
          end
        end
      end

      -- Fallback if synthesis produced no version
      if not final_version_id then
        if #succeeded > 0 then
          Human.notify({message = "  Synthesis failed — falling back to best succeeded hypothesis", level = "warning"})
          table.sort(succeeded, function(a, b)
            return (a.fb_deltas and a.fb_deltas.alignment or 0) > (b.fb_deltas and b.fb_deltas.alignment or 0)
          end)
          final_version_id = succeeded[1].version_id
          final_done_reason = succeeded[1].done_reason or ""
          final_is_synthesis = false
        else
          -- No succeeded hypotheses AND synthesis failed — record as failed cycle
          Human.notify({message = string.format(
            "Cycle %d — No synthesis produced and no hypothesis succeeded", cycle), level = "info"})
          consecutive_failed_cycles = consecutive_failed_cycles + 1

          table.sort(submitted_versions, function(a, b)
            local a_fb = a.fb_deltas and a.fb_deltas.alignment or -999
            local b_fb = b.fb_deltas and b.fb_deltas.alignment or -999
            return a_fb > b_fb
          end)
          local best = submitted_versions[1]

          local cycle_log = {
            iteration = cycle,
            score_version_id = best and best.version_id or nil,
            done_reason = best and best.done_reason or "",
            accuracy_metrics = best and best.acc_metrics or nil,
            feedback_metrics = best and best.fb_metrics or nil,
            accuracy_deltas = best and best.acc_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0},
            feedback_deltas = best and best.fb_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0},
            accepted = false,
            skip_reason = "synthesis_failed_no_hypothesis_success",
            num_candidates = #submitted_versions,
            exploration_results = submitted_versions
          }
          table.insert(iterations, cycle_log)
          State.set("iterations", iterations)

          if best and best.fb_rca then State.set("last_feedback_rca", best.fb_rca) end
          if best and best.acc_rca then State.set("last_accuracy_rca", best.acc_rca) end

          -- Compact history even on failed cycles
          if cycle < params.max_iterations then
            code_editor.clear_history()
            code_editor.history:add({
              role = "system",
              content = string.format("=== CYCLE %d SUMMARY ===\nStatus: FAILED (no hypothesis succeeded)\nCurrent base version: %s",
                cycle, tostring(last_accepted_version_id))
            })
            diag(string.format("Cycle %d (failed) history compacted", cycle))
          end

          if consecutive_failed_cycles >= 5 then
            stop_reason = "improvement_plateau"
            return "break_cycle"
          end
          if Stop.requested() then stop_reason = "user_stopped"; return "break_cycle" end
        end
      end

      -- ================================================================
      -- Evaluate the final synthesized version (if we have one)
      -- ================================================================
      if final_version_id then
        local b_fb_metrics, b_acc_metrics, b_fb_deltas, b_acc_deltas
        local b_fb_rca, b_acc_rca
        local b_fb_eval_id, b_acc_eval_id

        -- Reuse eval if using a single hypothesis directly
        if not final_is_synthesis and #succeeded == 1 then
          b_fb_metrics = succeeded[1].fb_metrics
          b_acc_metrics = succeeded[1].acc_metrics
          b_fb_deltas = succeeded[1].fb_deltas
          b_acc_deltas = succeeded[1].acc_deltas
          b_fb_rca = succeeded[1].fb_rca or {}
          b_acc_rca = succeeded[1].acc_rca or {}
          b_fb_eval_id = succeeded[1].fb_eval_id
          b_acc_eval_id = succeeded[1].acc_eval_id
        else
          -- Need fresh evals for combined version
          diag(string.format("Dispatching synthesis eval for version %s", tostring(final_version_id)))
          Human.notify({message = "  Evaluating final version...", level = "info"})
          local b_batch = {}
          if accuracy_available then
            table.insert(b_batch, {
              scorecard_name = params.scorecard,
              score_name = params.score,
              evaluation_type = "accuracy",
              dataset_id = dataset_id,
              n_samples = params.max_samples or 100,
              version = final_version_id,
              baseline = accuracy_baseline_id,
              notes = string.format("Cycle %d synthesis — deterministic regression dataset: %s", cycle, trunc(final_done_reason or "", 500))
            })
          end
          table.insert(b_batch, {
            scorecard_name = params.scorecard,
            score_name = params.score,
            evaluation_type = "feedback",
            days = params.days,
            max_feedback_items = params.max_samples or 100,
            sampling_mode = "newest",
            version = final_version_id,
            baseline = feedback_baseline_id,
            wait = true,
            notes = string.format("Cycle %d synthesis — recent feedback items: %s", cycle, trunc(final_done_reason or "", 500))
          })

          local b_results = call_plexus_tool("plexus_evaluation_run", {batch = b_batch})
          diag("Synthesis eval batch returned")

          local b_evals_per = accuracy_available and 2 or 1
          if accuracy_available then
            local b_acc_r = b_results and b_results[1]
            if b_acc_r and (b_acc_r.id or b_acc_r.evaluation_id) then
              b_acc_metrics = extract_metrics(b_acc_r)
              b_acc_deltas = calculate_deltas(b_acc_metrics, accuracy_baseline_metrics)
              b_acc_rca = enrich_rca(b_acc_r.root_cause or {})
              b_acc_eval_id = b_acc_r.id or b_acc_r.evaluation_id
            end
            diag(string.format("Accuracy metrics extracted: %s", tostring(b_acc_eval_id)))
          end
          local b_fb_r = b_results and b_results[b_evals_per]
          if b_fb_r and (b_fb_r.id or b_fb_r.evaluation_id) then
            b_fb_metrics = extract_metrics(b_fb_r)
            b_fb_deltas = calculate_deltas(b_fb_metrics, feedback_baseline_metrics)
            b_fb_rca = enrich_rca(b_fb_r.root_cause or {})
            b_fb_eval_id = b_fb_r.id or b_fb_r.evaluation_id
          end
          diag(string.format("Feedback metrics extracted: %s", tostring(b_fb_eval_id)))
        end

        b_fb_deltas = b_fb_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0}
        b_acc_deltas = b_acc_deltas or {alignment = 0, accuracy = 0, precision = 0, recall = 0}
        b_fb_rca = b_fb_rca or {}
        b_acc_rca = b_acc_rca or {}

        -- Compute vs-accepted deltas for logging
        local vs_accepted_fb_delta = 0
        local vs_accepted_acc_delta = 0
        if last_accepted_fb_metrics and b_fb_metrics then
          vs_accepted_fb_delta = b_fb_metrics.alignment - last_accepted_fb_metrics.alignment
        end
        if last_accepted_acc_metrics and b_acc_metrics then
          vs_accepted_acc_delta = b_acc_metrics.alignment - last_accepted_acc_metrics.alignment
        end

        Human.notify({message = string.format(
          "  Final eval: FB AC1 %+.3f (vs base), %+.3f (vs accepted); ACC AC1 %+.3f (vs base), %+.3f (vs accepted)%s",
          b_fb_deltas.alignment, vs_accepted_fb_delta,
          b_acc_deltas.alignment, vs_accepted_acc_delta,
          final_is_synthesis and " [SYNTHESIS]" or ""
        ), level = "info"})

        -- ================================================================
        -- REVIEW (wrapped in pcall for crash diagnosis)
        -- ================================================================
        diag("Starting review phase")
        local iter_accuracy_ok = b_acc_metrics ~= nil

        local disqualified = false
        local disqualification_reason = nil
        if not b_fb_metrics then
          disqualified = true
          disqualification_reason = "missing_feedback_metrics"
        elseif accuracy_available and b_acc_deltas.alignment < -0.02 then
          disqualified = true
          disqualification_reason = string.format("accuracy_regression_vs_baseline_%.3f", b_acc_deltas.alignment)
        elseif b_fb_deltas.alignment < -0.02 then
          disqualified = true
          disqualification_reason = string.format("feedback_regression_vs_baseline_%.3f", b_fb_deltas.alignment)
        end

        -- Dual-threshold: also check regression vs last accepted version
        -- Uses looser threshold (-0.05 vs -0.02) to account for evaluation noise
        if not disqualified and last_accepted_fb_metrics then
          local vs_accepted_fb = calculate_deltas(b_fb_metrics or feedback_baseline_metrics, last_accepted_fb_metrics)
          local vs_accepted_acc = accuracy_available and last_accepted_acc_metrics and b_acc_metrics
            and calculate_deltas(b_acc_metrics, last_accepted_acc_metrics) or nil

          local accepted_regression_threshold = -0.05
          if vs_accepted_acc and vs_accepted_acc.alignment < accepted_regression_threshold then
            disqualified = true
            disqualification_reason = string.format("accuracy_regression_vs_accepted_%.3f", vs_accepted_acc.alignment)
          elseif vs_accepted_fb.alignment < accepted_regression_threshold then
            disqualified = true
            disqualification_reason = string.format("feedback_regression_vs_accepted_%.3f", vs_accepted_fb.alignment)
          end
        end
        diag(string.format("disqualified=%s reason=%s", tostring(disqualified), tostring(disqualification_reason)))

        local accept = false

        if disqualified then
          Human.notify({message = string.format(
            "Cycle %d: version disqualified — skipping review", cycle), level = "warning"})
        else
          Tool.reset()
          reviewer.clear_history()
          diag("Building review context...")
          local review_msg = build_review_context({
            iteration = cycle,
            done_reason = final_done_reason,
            new_version_id = final_version_id,
            prior_version_id = last_accepted_version_id,
            fb_metrics = b_fb_metrics or feedback_baseline_metrics,
            acc_metrics = iter_accuracy_ok and b_acc_metrics or nil,
            baseline_fb_ac1 = feedback_baseline_metrics.alignment,
            baseline_acc_ac1 = accuracy_baseline_metrics and accuracy_baseline_metrics.alignment or 0,
            candidates = submitted_versions
          })
          diag(string.format("Review msg length: %d chars, invoking reviewer...", #review_msg))
          local review_ok, review_err = pcall(function()
            reviewer({message = review_msg})
          end)
          if not review_ok then
            diag(string.format("REVIEWER CRASHED: %s", tostring(review_err)))
          else
            diag("Reviewer returned")
          end

          -- Extract reviewer assessment (advisory only — metrics determine acceptance)
          local review_done = Tool.last_call("done")
          if review_done and review_done.args then
            local ok_r, reason_field = pcall(function() return review_done.args.reason or "" end)
            local ok_d, decision_field = pcall(function() return review_done.args.decision or "" end)
            reason_field = ok_r and reason_field or ""
            decision_field = ok_d and decision_field or ""
            Human.notify({message = string.format(
              "  Reviewer assessment: %s — %s",
              decision_field,
              has_text(reason_field) and reason_field or "(no reason)"
            ), level = "info"})
          end

          -- Acceptance is purely metric-based: carry forward unless metrics genuinely regressed.
          -- A neutral result (no improvement) is still carried forward — we accumulate
          -- many small changes across cycles, only rejecting when things actually got worse.
          local regression_threshold = -0.02
          local accepted_regression_threshold = -0.05
          local acc_regressed = accuracy_available and iter_accuracy_ok and (b_acc_deltas.alignment < regression_threshold)
          local fb_regressed = b_fb_deltas.alignment < regression_threshold

          -- Also check regression vs last accepted version (prevents sliding backward)
          local acc_regressed_vs_accepted = false
          local fb_regressed_vs_accepted = false
          if last_accepted_fb_metrics then
            local vs_accepted_fb = calculate_deltas(b_fb_metrics, last_accepted_fb_metrics)
            fb_regressed_vs_accepted = vs_accepted_fb.alignment < accepted_regression_threshold
            if accuracy_available and iter_accuracy_ok and last_accepted_acc_metrics then
              local vs_accepted_acc = calculate_deltas(b_acc_metrics, last_accepted_acc_metrics)
              acc_regressed_vs_accepted = vs_accepted_acc.alignment < accepted_regression_threshold
            end
          end

          local decision_str, decision_reason
          if acc_regressed then
            decision_str = "REJECTED"
            decision_reason = string.format("accuracy regressed vs baseline by %.4f", math.abs(b_acc_deltas.alignment))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          elseif fb_regressed then
            decision_str = "REJECTED"
            decision_reason = string.format("feedback regressed vs baseline by %.4f", math.abs(b_fb_deltas.alignment))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          elseif acc_regressed_vs_accepted then
            local vs_acc = calculate_deltas(b_acc_metrics, last_accepted_acc_metrics)
            decision_str = "REJECTED"
            decision_reason = string.format("accuracy regressed vs last accepted by %.4f", math.abs(vs_acc.alignment))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          elseif fb_regressed_vs_accepted then
            local vs_fb = calculate_deltas(b_fb_metrics, last_accepted_fb_metrics)
            decision_str = "REJECTED"
            decision_reason = string.format("feedback regressed vs last accepted by %.4f", math.abs(vs_fb.alignment))
            Human.notify({message = string.format("Cycle %d REJECTED: %s", cycle, decision_reason), level = "warning"})
          else
            accept = true
            local fb_improved = b_fb_deltas.alignment > 0.005
            if fb_improved then
              decision_str = "ACCEPTED"
              decision_reason = string.format("feedback improved by %.4f", b_fb_deltas.alignment)
              Human.notify({message = string.format("Cycle %d ACCEPTED: %s", cycle, decision_reason), level = "info"})
            else
              decision_str = "CARRIED"
              decision_reason = string.format("neutral result (FB %+.4f)", b_fb_deltas.alignment)
              Human.notify({message = string.format("Cycle %d CARRIED: %s — carrying forward to accumulate improvements", cycle, decision_reason), level = "info"})
            end
            last_accepted_version_id = final_version_id
            last_accepted_fb_metrics = b_fb_metrics or last_accepted_fb_metrics
            if accuracy_available and b_acc_metrics then
              last_accepted_acc_metrics = b_acc_metrics
            end
          end
          diag(string.format(
            "Cycle %d %s (version=%s): FB AC1=%.3f (%+.3f vs baseline), ACC AC1=%.3f (%+.3f vs baseline) — %s",
            cycle, decision_str or "?", tostring(final_version_id),
            b_fb_metrics and b_fb_metrics.alignment or 0, b_fb_deltas.alignment,
            b_acc_metrics and b_acc_metrics.alignment or 0, b_acc_deltas.alignment,
            decision_reason or ""))
        end

        -- Store cycle log
        local cycle_log = {
          iteration = cycle,
          score_version_id = final_version_id,
          accuracy_evaluation_id = b_acc_eval_id,
          feedback_evaluation_id = b_fb_eval_id,
          done_reason = final_done_reason,
          accuracy_metrics = b_acc_metrics,
          feedback_metrics = b_fb_metrics,
          accuracy_deltas = b_acc_deltas,
          feedback_deltas = b_fb_deltas,
          accepted = accept,
          disqualified = disqualified,
          disqualification_reason = disqualification_reason,
          is_synthesis = final_is_synthesis,
          num_candidates = #submitted_versions,
          exploration_results = submitted_versions
        }
        table.insert(iterations, cycle_log)
        diag("Saving iterations to state...")
        State.set("iterations", iterations)
        diag("Iterations saved")

        -- Concise cycle summary
        local accepted_count = 0
        local carried_count = 0
        local rejected_count = 0
        local skipped_count = 0
        for _, it in ipairs(iterations) do
          if it.skip_reason then skipped_count = skipped_count + 1
          elseif it.accepted then
            local fb_d = it.feedback_deltas and it.feedback_deltas.alignment or 0
            if fb_d > 0.005 then accepted_count = accepted_count + 1
            else carried_count = carried_count + 1 end
          else rejected_count = rejected_count + 1 end
        end
        local status_str
        if not accept then
          status_str = "REJECTED"
        elseif b_fb_deltas.alignment > 0.005 then
          status_str = "ACCEPTED"
        else
          status_str = "CARRIED"
        end
        local synthesis_note = final_is_synthesis and " [SYNTHESIS]" or ""
        local reason_short = has_text(final_done_reason) and (": " .. trunc(final_done_reason, 500)) or ""
        Human.notify({message = string.format(
          "┌─ Cycle %d/%d %s%s (%d succeeded, %d failed)%s\n│  FB AC1: %.3f (%+.3f vs baseline)  ACC AC1: %.3f (%+.3f vs baseline)\n│  Running: %d accepted, %d carried (neutral), %d rejected, %d skipped\n└─ Current base: %s",
          cycle, params.max_iterations, status_str, synthesis_note, #succeeded, #failed, reason_short,
          b_fb_metrics and b_fb_metrics.alignment or 0, b_fb_deltas.alignment,
          b_acc_metrics and b_acc_metrics.alignment or 0, b_acc_deltas.alignment,
          accepted_count, carried_count, rejected_count, skipped_count,
          tostring(last_accepted_version_id)
        ), level = "info"})

        -- Update running state for next cycle
        if accept then
          consecutive_failed_cycles = 0  -- reset whenever we carry forward (even neutral)
          if iter_accuracy_ok then
            State.set("accuracy_baseline_metrics", b_acc_metrics)
          end
          State.set("feedback_baseline_metrics", b_fb_metrics)
        else
          -- Only count genuine regressions toward the failure plateau counter
          consecutive_failed_cycles = consecutive_failed_cycles + 1
        end
        diag("Saving RCA to state...")
        State.set("last_accuracy_rca", b_acc_rca)
        State.set("last_feedback_rca", b_fb_rca)
        diag("State saved, checking exit conditions...")

        -- Check if target accuracy was reached (early exit)
        if accept and b_fb_metrics and b_fb_metrics.alignment >= params.target_accuracy then
          Human.notify({
            message = string.format(
              "Target accuracy reached: feedback AC1=%.3f >= %.3f — stopping early.",
              b_fb_metrics.alignment, params.target_accuracy),
            level = "info"
          })
          stop_reason = "target_reached"
          return "break_cycle"
        end

        -- Plateau detection
        if consecutive_failed_cycles >= 5 then
          Human.notify({message = "5 consecutive failed cycles — stopping (improvement plateau)", level = "info"})
          stop_reason = "improvement_plateau"
          return "break_cycle"
        end

        -- Check for stop request
        if Stop.requested() then
          stop_reason = "user_stopped"
          return "break_cycle"
        end
        -- ================================================================
        -- End-of-cycle history compaction: replace full conversation with
        -- a compact summary to prevent context overflow in later cycles.
        -- build_planning_context() reconstructs the full optimization history
        -- from the iterations array, so the summary is supplementary context.
        -- ================================================================
        if cycle < params.max_iterations then
          local summary_parts = {}
          table.insert(summary_parts, string.format("=== CYCLE %d SUMMARY ===", cycle))
          table.insert(summary_parts, string.format("Status: %s", status_str))
          table.insert(summary_parts, string.format(
            "Feedback AC1: %.3f (%+.3f vs baseline)  Accuracy AC1: %.3f (%+.3f vs baseline)",
            b_fb_metrics and b_fb_metrics.alignment or 0, b_fb_deltas.alignment,
            b_acc_metrics and b_acc_metrics.alignment or 0, b_acc_deltas.alignment))

          if submitted_versions and #submitted_versions > 0 then
            table.insert(summary_parts, "Hypotheses tested:")
            for _, sv in ipairs(submitted_versions) do
              local fb_d = sv.fb_deltas and sv.fb_deltas.alignment or 0
              local acc_d = sv.acc_deltas and sv.acc_deltas.alignment or 0
              table.insert(summary_parts, string.format(
                "  %d. %s: FB %+.3f, ACC %+.3f — %s",
                sv.index or 0, sv.hypothesis and sv.hypothesis.name or "?",
                fb_d, acc_d,
                trunc(sv.done_reason or (sv.hypothesis and sv.hypothesis.description) or "", 2000)))
            end
          end

          if has_text(final_done_reason) then
            table.insert(summary_parts, "Synthesis: " .. trunc(final_done_reason, 2000))
          end
          table.insert(summary_parts, string.format("Current base version: %s",
            tostring(last_accepted_version_id)))

          code_editor.clear_history()
          code_editor.history:add({
            role = "system",
            content = table.concat(summary_parts, "\n")
          })
          diag(string.format("Cycle %d history compacted to summary (%d chars)",
            cycle, #table.concat(summary_parts, "\n")))
        end

        diag(string.format("Cycle %d complete, entering next iteration", cycle))
      end  -- end of if final_version_id (synthesis produced a version to evaluate)
    end  -- end of else (submitted_versions > 0)
    end)  -- end of pcall(function()
    if not cycle_ok then
      diag(string.format("ERROR in cycle %d: %s", cycle, tostring(cycle_err)))
      Human.notify({message = string.format(
        "ERROR in cycle %d: %s — skipping to next cycle", cycle, trunc(tostring(cycle_err), 500)), level = "error"})

      consecutive_failed_cycles = consecutive_failed_cycles + 1

      -- Record as failed cycle so history is preserved
      table.insert(iterations, {
        iteration = cycle,
        accepted = false,
        skip_reason = "cycle_error: " .. trunc(tostring(cycle_err), 200),
        feedback_deltas = {alignment = 0, accuracy = 0, precision = 0, recall = 0},
        accuracy_deltas = {alignment = 0, accuracy = 0, precision = 0, recall = 0},
      })
      State.set("iterations", iterations)

      -- Only truly fatal errors (auth, permanent) should kill the procedure
      local err_lower = string.lower(tostring(cycle_err))
      if string.find(err_lower, "authentication") or string.find(err_lower, "unauthorized") then
        error(cycle_err)
      end
      -- Otherwise continue to next cycle (plateau detection handles repeated failures)
    end
    -- pcall body returns "break_cycle" when it wants to exit the for loop
    if cycle_err == "break_cycle" then break end
  end  -- end of for cycle
  diag("Exited main cycle loop")

  -- Determine final stop reason
  if not stop_reason then
    if #iterations >= params.max_iterations then
      stop_reason = "max_iterations"
    else
      stop_reason = "converged"
    end
  end

  -- Phase C: Finalization
  Stage.set("finalize")

  -- Calculate total improvement from accepted cycles
  local last_accepted = nil
  for i = #iterations, 1, -1 do
    if iterations[i].accepted then
      last_accepted = iterations[i]
      break
    end
  end

  local total_fb_improvement = last_accepted and
    (last_accepted.feedback_metrics.alignment - feedback_baseline_metrics.alignment) or 0
  local total_acc_improvement = 0
  if last_accepted and last_accepted.accuracy_metrics and accuracy_baseline_metrics then
    total_acc_improvement = last_accepted.accuracy_metrics.alignment - accuracy_baseline_metrics.alignment
  end

  Human.notify({message = string.format(
    "Optimization complete: %d cycles, feedback AC1 improvement: %+.4f, accuracy AC1 improvement: %+.4f",
    #iterations, total_fb_improvement, total_acc_improvement
  ), level = "info"})

  return {
    success = true,
    status = stop_reason,
    message = string.format(
      "Completed %d cycles. Feedback AC1: %+.4f, Accuracy AC1: %+.4f (%s)",
      #iterations, total_fb_improvement, total_acc_improvement, stop_reason
    ),
    accuracy_baseline_id = accuracy_baseline_id,
    feedback_baseline_id = feedback_baseline_id,
    final_evaluation_id = last_accepted and last_accepted.feedback_evaluation_id or nil,
    iterations = iterations,
    feedback_improvement = total_fb_improvement,
    accuracy_improvement = total_acc_improvement,
    scorecard_id = scorecard_id,
    score_id = score_id
  }
