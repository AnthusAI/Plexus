  -- ================================================================
  -- COERCE NUMERIC PARAMS: saved procedures store param values as
  -- strings; tonumber() ensures arithmetic works regardless of source.
  -- ================================================================
  params.days                  = tonumber(params.days) or 90
  params.max_iterations        = tonumber(params.max_iterations) or 3
  params.max_samples           = tonumber(params.max_samples) or 100
  params.num_candidates        = tonumber(params.num_candidates) or 4
  if params.num_candidates < 4 then
    params.num_candidates = 4
  end
  params.improvement_threshold = tonumber(params.improvement_threshold) or 0.02
  params.target_accuracy       = tonumber(params.target_accuracy) or 0.95
  params.context_window        = tonumber(params.context_window) or 180000

  -- ================================================================
  -- OPTIMIZATION OBJECTIVE: programmatic config driven by params
  -- ================================================================
  local objective = has_text(params.optimization_objective)
    and params.optimization_objective or "alignment"

  -- Config table: scoring weights, hard vetoes, primary metric key
  local function build_objective_config(obj)
    if obj == "precision_safe" then
      return {
        primary_metric   = "precision",
        primary_weight   = 0.7,
        secondary_metric = "alignment",
        secondary_weight = 0.3,
        hard_veto_alignment = -0.02,
        hard_veto_accuracy  = -0.02,
      }
    elseif obj == "precision" then
      return {
        primary_metric   = "precision",
        primary_weight   = 1.0,
        hard_veto_alignment = -0.05,
      }
    elseif obj == "recall_safe" then
      return {
        primary_metric   = "recall",
        primary_weight   = 0.7,
        secondary_metric = "alignment",
        secondary_weight = 0.3,
        hard_veto_alignment = -0.02,
        hard_veto_accuracy  = -0.02,
      }
    elseif obj == "recall" then
      return {
        primary_metric   = "recall",
        primary_weight   = 1.0,
        hard_veto_alignment = -0.05,
      }
    else  -- "alignment" (default)
      return {
        primary_metric    = "alignment",
        primary_weight    = 0.6,
        secondary_metric  = "alignment",   -- accuracy dataset alignment
        secondary_source  = "acc",         -- pull secondary from acc_deltas (not fb_deltas)
        secondary_weight  = 0.4,
        hard_veto_accuracy = -0.02,
      }
    end
  end
  local objective_config = build_objective_config(objective)

