name: Feedback Alignment Optimizer
version: 1.0.0
class: Tactus
description: "Iteratively optimize Plexus score alignment using feedback evaluations with root-cause analysis (RCA). Runs baseline → analyze RCA → propose changes → evaluate → repeat until convergence or max iterations."

params:
  scorecard:
    type: string
    required: true
    description: "Scorecard identifier (name, key, or ID)"

  score:
    type: string
    required: true
    description: "Score identifier (name, key, or ID)"

  days:
    type: number
    default: 90
    description: "Feedback window in days for evaluation dataset"

  max_samples:
    type: number
    default: 200
    required: false
    description: "Maximum number of feedback samples to use per evaluation (default: 200)"

  max_iterations:
    type: number
    default: 10
    description: "Maximum number of optimization iterations"

  improvement_threshold:
    type: number
    default: 0.02
    description: "Minimum AC1 (Gwet's alignment) improvement to continue iterating (0.02 = 2%)"

  dry_run:
    type: boolean
    default: false
    description: "If true, run analysis only without making score updates"

outputs:
  success:
    type: boolean
    required: true

  status:
    type: string
    required: true
    description: "Completion status: converged, max_iterations, user_stopped, improvement_plateau, or error"

  message:
    type: string
    required: true

  baseline_evaluation_id:
    type: string
    required: false

  final_evaluation_id:
    type: string
    required: false

  iterations:
    type: array
    required: false
    description: "Array of iteration results with metrics and deltas"

  improvement:
    type: number
    required: false
    description: "Total AC1 improvement from baseline to final"

  scorecard_id:
    type: string
    required: false

  score_id:
    type: string
    required: false

agents:
  orchestrator:
    system_prompt: |
      DIRECT TOOL EXECUTOR - NO THINKING REQUIRED

      When you receive "Call TOOL_NAME with arguments: JSON_ARGS", immediately:
      1. Call the exact tool with those exact arguments
      2. Do NOT explain, analyze, discuss, or modify anything
      3. Just execute the tool call

      Example:
      Input: "Call plexus_scorecard_info with arguments: {"scorecard": "731"}"
      Action: Call plexus_scorecard_info({"scorecard": "731"})

      NO PREAMBLE. NO POSTAMBLE. JUST TOOL CALLS.

    initial_message: Ready.

    tools:
      - plexus_scorecard_info
      - plexus_score_info
      - plexus_score_pull
      - plexus_score_update
      - plexus_evaluation_run
      - plexus_evaluation_info
      - plexus_predict
      - plexus_item_last
      - score_editor_setup
      - score_editor_get_result

  analyzer:
    system_prompt: |
      You are an expert in analyzing Plexus score performance and identifying alignment improvements.

      Your role:
      1. Analyze root-cause analysis (RCA) output from feedback evaluations
      2. Identify systematic error patterns (false positives, false negatives)
      3. Identify one specific, targeted change to the score YAML configuration
      4. Formulate a clear hypothesis about the expected improvement

      Analysis approach:
      - Focus on RCA topics/clusters showing highest error rates
      - Look for missing criteria, threshold issues, or overly broad/narrow rules
      - Propose ONE minimal, focused change (one concept per iteration)
      - Consider both the guidelines section and the classifier logic

      When ready, call done() with your full analysis as the reason argument.
      Write structured prose using Markdown headers — do NOT use JSON or YAML code blocks:

      ## Hypothesis
      What specific improvement do you expect, and why?

      ## Error Patterns
      What does the evaluation data show? Which RCA topics have the highest error rates?
      What are the false positive and false negative patterns?

      ## Proposed Change
      Describe the EXACT change to make to the score YAML. Be very specific with line-by-line guidance
      for the code editor. Format your change description like this:

      "In section [name], find the text: [old_text_here] and replace it with: [new_text_here]"

      Include the EXACT text to find (copy from score YAML if possible) and the EXACT replacement text.
      The code editor will use your old_text and new_text verbatim with str_replace_editor.

      ## Rationale
      Why should this change improve alignment? What is the expected mechanism?

    initial_message: |
      Waiting for baseline metrics and RCA data to analyze.

    tools:
      - plexus_evaluation_info
      - plexus_score_info
      - plexus_score_pull
      - plexus_scorecard_info

  code_editor:
    system_prompt: |
      You are a precise YAML configuration editor. You MUST make the exact edit requested.
      Your job is NOT to evaluate whether the change is good—just implement it exactly as specified
      by the previous analyst's "Proposed Change" section.

      CRITICAL: Every time you are given an edit request, you MUST call str_replace_editor to make
      that change. Do not skip, defer, or decline to edit. The analyst has already evaluated that
      this change will improve alignment, so your job is to implement it reliably.

      Workflow:
      1. Call str_replace_editor(command="view", path="score_config.yaml") to see the current file
      2. Find the text section described in the "Proposed Change" section you were given
      3. Call str_replace_editor(command="str_replace", ...) with old_str and new_str EXACTLY as specified
      4. If validation fails, adjust and retry (but you MUST complete the edit)
      5. Call submit_score_code() to finalize
      6. Call done()

      Rules:
      - You WILL edit the file—do not view and return without editing
      - Copy old_str exactly from the view output (including all whitespace and indentation)
      - Do NOT call submit_score_code() if YAML validation reported errors—fix and retry instead
      - You MUST call done() after submit_score_code() returns success=true
      - If you receive a "Proposed Change" description, implement it exactly as specified

    initial_message: "Ready to edit score configuration. Awaiting proposed changes from analyzer."

    tools:
      - str_replace_editor
      - submit_score_code

stages:
  - setup
  - baseline
  - optimize
  - finalize

code: |

  -- Helper functions
  local function has_text(s)
    return type(s) == "string" and #s > 0
  end

  local function safe_decode(value)
    if value == nil then
      return nil, "nil"
    end
    if type(value) ~= "string" then
      local ok_encode, encoded = pcall(function()
        return Json.encode(value)
      end)
      if ok_encode then
        local ok_decode, decoded = pcall(function()
          return Json.decode(encoded)
        end)
        if ok_decode then
          return decoded, nil
        end
      end
      return value, nil
    end
    local ok, decoded = pcall(function()
      return Json.decode(value)
    end)
    if ok then
      return decoded, nil
    end
    return nil, decoded
  end

  local function safe_get_metric(metrics, name)
    if type(metrics) ~= "table" then return nil end
    for _, m in ipairs(metrics) do
      if type(m) == "table" and m.name == name then
        return m.value
      end
    end
    return nil
  end

  local function extract_metrics(eval_result)
    local metrics = eval_result.metrics or {}
    return {
      alignment = safe_get_metric(metrics, "Alignment") or 0,
      accuracy = safe_get_metric(metrics, "Accuracy") or 0,
      precision = safe_get_metric(metrics, "Precision") or 0,
      recall = safe_get_metric(metrics, "Recall") or 0
    }
  end

  local function calculate_deltas(current, baseline)
    return {
      alignment = current.alignment - baseline.alignment,
      accuracy = current.accuracy - baseline.accuracy,
      precision = current.precision - baseline.precision,
      recall = current.recall - baseline.recall
    }
  end

  local function wait_for_agent_done(agent, max_turns, inject_msg)
    if has_text(inject_msg) then
      agent({message = inject_msg})
    end

    for turn = 1, max_turns do
      if Tool.called("done") then
        return true
      end
      agent()
    end

    return false
  end

  local function call_plexus_tool(tool_name, args_table)
    -- Use orchestrator agent to call Plexus MCP tools
    local args_json = Json.encode(args_table or {})
    local inject = "EXECUTE TOOL NOW: " .. tool_name .. "\nUSE THESE EXACT PARAMETERS (do not rename): " .. args_json .. "\nCALL THE TOOL IMMEDIATELY."

    local start_count = Tool.get_call_count(tool_name)

    local status, err = pcall(function() orchestrator({message = inject}) end)
    if not status then
      error("Failed to call orchestrator agent: " .. tostring(err))
    end

    -- Wait for the tool to be called (max 5 turns)
    for turn = 1, 5 do
      if Tool.get_call_count(tool_name) > start_count then
        local call_result = Tool.last_call(tool_name)
        -- Decode JSON result
        local decoded_result, decode_err = safe_decode(call_result.result)
        if not decoded_result then
          error("Failed to decode " .. tool_name .. " result: " .. tostring(decode_err))
        end
        return decoded_result
      end
      orchestrator()
    end

    -- Tool was not called
    error("Orchestrator failed to call " .. tool_name)
  end

  -- Phase A: Setup & Baseline
  Stage.set("setup")
  Log.info("Starting feedback alignment optimizer for scorecard=" .. params.scorecard .. ", score=" .. params.score)

  -- Validate scorecard exists
  -- plexus_scorecard_info returns the scorecard dict directly (no wrapper):
  -- { name, key, externalId, additionalDetails: { id, ... }, sections: {...} }
  local scorecard_info = call_plexus_tool("plexus_scorecard_info", {scorecard_identifier = params.scorecard})
  if not scorecard_info or not scorecard_info.additionalDetails then
    return {
      success = false,
      status = "error",
      message = "Scorecard not found: " .. tostring(params.scorecard)
    }
  end

  local scorecard_id = scorecard_info.additionalDetails.id
  local scorecard_name = scorecard_info.name or scorecard_info.key

  -- Validate score exists
  -- plexus_score_info returns the score dict directly:
  -- { found, scoreId, scoreName, scoreKey, externalId, code, guidelines, location: {...}, ... }
  local score_info = call_plexus_tool("plexus_score_info", {
    score_identifier = params.score,
    scorecard_identifier = params.scorecard
  })

  if not score_info or not score_info.scoreId then
    return {
      success = false,
      status = "error",
      message = "Score not found: " .. tostring(params.score) .. " in scorecard: " .. tostring(scorecard_name)
    }
  end

  local score_id = score_info.scoreId
  local score_name = score_info.scoreName or score_info.scoreKey

  Log.info("Resolved: scorecard_id=" .. scorecard_id .. ", score_id=" .. score_id)

  -- Run baseline feedback evaluation with RCA
  Stage.set("baseline")
  Human.notify({
    message = "Running baseline feedback evaluation with RCA for " .. score_name .. "...",
    level = "info"
  })

  -- Progressive sample sizes: start small (50) and increase per iteration up to max_samples.
  -- base_samples is also used for the baseline evaluation to keep startup fast.
  local base_samples = math.min(50, params.max_samples or 200)
  local sample_step = 50

  local baseline_eval_params = {
    scorecard_name = params.scorecard,
    score_name = params.score,
    evaluation_type = "feedback",
    days = params.days,
    max_feedback_samples = base_samples,
    wait = true
  }

  local baseline_eval = call_plexus_tool("plexus_evaluation_run", baseline_eval_params)

  -- wait=true path returns "id", non-wait returns "evaluation_id"
  if not baseline_eval or not (baseline_eval.id or baseline_eval.evaluation_id) then
    return {
      success = false,
      status = "error",
      message = "Failed to run baseline evaluation"
    }
  end

  local baseline_evaluation_id = baseline_eval.id or baseline_eval.evaluation_id
  local baseline_metrics = extract_metrics(baseline_eval)

  State.set("baseline_evaluation_id", baseline_evaluation_id)
  State.set("baseline_metrics", baseline_metrics)
  State.set("scorecard_id", scorecard_id)
  State.set("score_id", score_id)
  State.set("iterations", {})

  Log.info(string.format(
    "Baseline evaluation complete: AC1=%.3f, Accuracy=%.3f, Precision=%.3f, Recall=%.3f",
    baseline_metrics.alignment,
    baseline_metrics.accuracy,
    baseline_metrics.precision,
    baseline_metrics.recall
  ))

  -- Extract RCA data
  local baseline_rca = baseline_eval.root_cause or {}
  State.set("last_rca", baseline_rca)

  -- Early exit: if metrics are already perfect or RCA is empty, nothing to optimize
  local rca_topics = (type(baseline_rca) == "table" and baseline_rca.topics) or {}
  local has_rca = type(rca_topics) == "table" and #rca_topics > 0
  if baseline_metrics.alignment >= 0.99 or not has_rca then
    local reason = baseline_metrics.alignment >= 0.99 and
      string.format("Baseline alignment is already %.1f%% — nothing to optimize.", baseline_metrics.alignment * 100) or
      "No RCA data available — cannot identify improvement opportunities."
    Log.info(reason)
    return {
      success = true,
      status = "converged",
      message = reason,
      baseline_evaluation_id = baseline_evaluation_id,
      iterations = {},
      improvement = 0,
      scorecard_id = scorecard_id,
      score_id = score_id
    }
  end

  -- Phase B: Optimization Loop
  Stage.set("optimize")

  local stop_reason = nil
  local iterations = {}

  for iteration = 1, params.max_iterations do
    Log.info("Starting iteration " .. iteration .. " of " .. params.max_iterations)
    State.set("current_iteration", iteration)

    -- Progressive sample count: 50, 100, 150, ... up to max_samples
    local current_samples = math.min(base_samples + (iteration - 1) * sample_step, params.max_samples or 200)
    Log.info("Using " .. current_samples .. " samples for iteration " .. iteration)

    -- Fetch current score configuration via pull (writes to local file)
    -- plexus_score_pull returns { success, codeFilePath, guidelinesFilePath, ... }
    local score_pull = call_plexus_tool("plexus_score_pull", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score
    })

    if not score_pull or not score_pull.success then
      return {
        success = false,
        status = "error",
        message = "Failed to pull score configuration at iteration " .. iteration
      }
    end

    -- Read the pulled code from the local file (must be inside Step.checkpoint for determinism)
    local current_code = Step.checkpoint(function()
      return File.read(score_pull.codeFilePath)
    end)
    if not has_text(current_code) then
      return {
        success = false,
        status = "error",
        message = "Failed to read score code file at iteration " .. iteration
      }
    end
    local current_guidelines = ""
    if score_pull.guidelinesFilePath then
      local g_result = Step.checkpoint(function()
        return File.read(score_pull.guidelinesFilePath)
      end)
      if has_text(g_result) then
        current_guidelines = g_result
      end
    end

    -- Initialize new_version_id for this iteration (will be populated by edit)
    local new_version_id = nil

    -- Prepare analysis context for agent
    local analysis_context = {
      iteration = iteration,
      baseline_metrics = baseline_metrics,
      last_rca = State.get("last_rca"),
      current_code = current_code,
      current_guidelines = current_guidelines,
      score_name = score_name,
      scorecard_name = scorecard_name
    }

    -- Agent analyzes RCA and proposes changes
    analyzer.clear_history()

    local analysis_inject = "Analyze the RCA output and identify ONE targeted improvement for iteration " .. tostring(iteration) .. ".\n\n" ..
      "Current metrics:\n" ..
      "- AC1 (Alignment): " .. string.format("%.3f", baseline_metrics.alignment) .. "\n" ..
      "- Accuracy: " .. string.format("%.3f", baseline_metrics.accuracy) .. "\n" ..
      "- Precision: " .. string.format("%.3f", baseline_metrics.precision) .. "\n" ..
      "- Recall: " .. string.format("%.3f", baseline_metrics.recall) .. "\n\n" ..
      "Root Cause Analysis:\n" .. Json.encode(State.get("last_rca")) .. "\n\n" ..
      "Current Score Configuration:\n" .. current_code .. "\n\n" ..
      "Current Guidelines:\n" .. current_guidelines .. "\n\n" ..
      "Write your analysis as structured prose (Markdown headers are fine). " ..
      "Describe the change clearly so a code editor can implement it — do NOT include YAML code. " ..
      "Call done(reason='<your analysis>') when ready."

    local analyzer_done = wait_for_agent_done(analyzer, 10, analysis_inject)

    if not analyzer_done then
      return {
        success = false,
        status = "error",
        message = "Analyzer timed out at iteration " .. iteration
      }
    end

    local done_call = Tool.last_call("done")

    -- Extract prose hypothesis from analyzer done() call.
    -- The analyzer is instructed to pass plain prose (not JSON) as the reason argument.
    local hypothesis_text = ""
    local ok_res, done_result = pcall(function() return safe_decode(done_call.result) end)
    if ok_res and done_result and has_text(done_result.reason) then
      hypothesis_text = done_result.reason
    end
    -- Fallback: args.reason
    if not has_text(hypothesis_text) then
      local ok_r, reason_val = pcall(function() return done_call.args.reason end)
      if ok_r and has_text(reason_val) then
        hypothesis_text = reason_val
      end
    end

    if not has_text(hypothesis_text) then
      return {
        success = false,
        status = "error",
        message = "Analyzer produced no hypothesis at iteration " .. iteration
      }
    end

    Log.info("## Analyzer Hypothesis (iteration " .. iteration .. ")\n\n" .. hypothesis_text)

    -- Set up score editor for the code_editor agent.
    -- yaml_content is intentionally omitted — it is too large to pass through the orchestrator LLM.
    -- The str_replace_editor tool auto-loads the current YAML on first view.
    local setup_result = call_plexus_tool("score_editor_setup", {
      scorecard_identifier = params.scorecard,
      score_identifier = params.score,
      iteration = iteration,
      hypothesis = string.sub(hypothesis_text, 1, 200),
      dry_run = params.dry_run or false
    })

    if not setup_result or not setup_result.success then
      return {
        success = false,
        status = "error",
        message = "Failed to set up score editor at iteration " .. iteration
      }
    end

    -- Dispatch code editor agent to make targeted YAML edits
    Human.notify({
      message = "Editing score configuration for iteration " .. iteration .. "...",
      level = "info"
    })

    -- Dispatch code editor agent with the full hypothesis
    code_editor.clear_history()

    -- Build a very explicit instruction with the hypothesis
    local editor_prompt = (
      "CRITICAL: The following change MUST be implemented exactly as specified.\n" ..
      "Do NOT skip, defer, or decline to edit. Follow ALL steps:\n\n" ..
      hypothesis_text ..
      "\n\n" ..
      "EXECUTION STEPS (required):\n" ..
      "1. Call str_replace_editor(command='view', path='score_config.yaml') to see the file\n" ..
      "2. Locate the text described in 'Proposed Change' section above\n" ..
      "3. Call str_replace_editor(command='str_replace', path='score_config.yaml', old_str='EXACT_OLD_TEXT', new_str='NEW_TEXT')\n" ..
      "4. When YAML validation shows no errors, call submit_score_code()\n" ..
      "5. Call done()\n\n" ..
      "You will NOT evaluate whether this is good. You WILL make this edit."
    )

    local editor_done = wait_for_agent_done(code_editor, 20, editor_prompt)

    if not editor_done then
      return {
        success = false,
        status = "error",
        message = "Code editor did not complete at iteration " .. iteration
      }
    end

    -- Retrieve the score version ID created by submit_score_code
    local version_result = call_plexus_tool("score_editor_get_result", {})
    if not version_result or not version_result.version_id then
      return {
        success = false,
        status = "error",
        message = "Code editor did not create a score version at iteration " .. iteration
      }
    end
    new_version_id = version_result.version_id
    Log.info("Score version created: " .. new_version_id)

    -- Run evaluation with updated score version
    Human.notify({
      message = "Running evaluation for iteration " .. iteration .. " (" .. current_samples .. " samples)...",
      level = "info"
    })

    local eval_result = nil
    if not params.dry_run then
      local eval_params = {
        scorecard_name = params.scorecard,
        score_name = params.score,
        evaluation_type = "feedback",
        days = params.days,
        baseline = baseline_evaluation_id,
        max_feedback_samples = current_samples,
        wait = true
      }

      eval_result = call_plexus_tool("plexus_evaluation_run", eval_params)

      if not eval_result or not (eval_result.id or eval_result.evaluation_id) then
        return {
          success = false,
          status = "error",
          message = "Failed to run evaluation at iteration " .. iteration
        }
      end
    else
      -- In dry run, simulate evaluation with baseline metrics
      eval_result = {
        evaluation_id = "dry_run_" .. iteration,
        metrics = baseline_eval.metrics,
        root_cause = baseline_rca
      }
    end

    local eval_metrics = extract_metrics(eval_result)
    local deltas = calculate_deltas(eval_metrics, baseline_metrics)

    Log.info(string.format(
      "Iteration %d results: AC1=%.3f (Δ%+.3f), Accuracy=%.3f (Δ%+.3f)",
      iteration,
      eval_metrics.alignment,
      deltas.alignment,
      eval_metrics.accuracy,
      deltas.accuracy
    ))

    -- Store iteration log
    local iteration_log = {
      iteration = iteration,
      score_version_id = new_version_id,
      evaluation_id = eval_result.id or eval_result.evaluation_id,
      hypothesis = hypothesis_text,
      metrics = eval_metrics,
      deltas = deltas,
      samples_used = current_samples,
      rca_summary = {
        topic_count = (eval_result.root_cause and eval_result.root_cause.topics and #eval_result.root_cause.topics) or 0
      }
    }

    table.insert(iterations, iteration_log)
    State.set("iterations", iterations)
    State.set("last_rca", eval_result.root_cause or {})

    -- Decision logic: stop if below improvement threshold
    if deltas.alignment < params.improvement_threshold then
      Log.info(string.format(
        "AC1 improvement (%.4f) below threshold (%.4f) — stopping optimization",
        deltas.alignment,
        params.improvement_threshold
      ))
      stop_reason = "improvement_plateau"
      break
    end

    if deltas.alignment < 0 then
      Log.warn(string.format("AC1 regressed by %.4f", math.abs(deltas.alignment)))
    end

    -- Check for stop request
    if Stop.requested() then
      stop_reason = "user_stopped"
      break
    end
  end

  -- Determine final stop reason
  if not stop_reason then
    if #iterations >= params.max_iterations then
      stop_reason = "max_iterations"
    else
      stop_reason = "converged"
    end
  end

  -- Phase C: Finalization
  Stage.set("finalize")

  if #iterations == 0 then
    return {
      success = true,
      status = stop_reason or "converged",
      message = "No changes were applied.",
      baseline_evaluation_id = baseline_evaluation_id,
      iterations = {},
      improvement = 0,
      scorecard_id = scorecard_id,
      score_id = score_id
    }
  end

  local final_iter = iterations[#iterations]
  local total_improvement = final_iter.metrics.alignment - baseline_metrics.alignment

  Log.info(string.format(
    "Optimization complete: %d iterations, total AC1 improvement: %+.4f",
    #iterations,
    total_improvement
  ))

  return {
    success = true,
    status = stop_reason,
    message = string.format(
      "Completed %d iterations with total AC1 improvement of %+.4f (%s)",
      #iterations,
      total_improvement,
      stop_reason
    ),
    baseline_evaluation_id = baseline_evaluation_id,
    final_evaluation_id = final_iter.evaluation_id,
    iterations = iterations,
    improvement = total_improvement,
    scorecard_id = scorecard_id,
    score_id = score_id
  }
