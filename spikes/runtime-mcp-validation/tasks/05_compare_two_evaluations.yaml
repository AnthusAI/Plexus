id: compare_two_evaluations
name: "Compare two evaluations and identify regressions"
prompt: |
  Compare evaluations eval_compliance_2026_04_20 and eval_compliance_2026_04_27
  for Compliance Tone. Tell me whether the newer evaluation should be considered
  an improvement, regression, or mixed result. Include the biggest metric movement.
  Call plexus.evaluation.info for both evaluation ids, then call
  plexus.evaluation.compare with baseline_evaluation_id eval_compliance_2026_04_20
  and candidate_evaluation_id eval_compliance_2026_04_27.
  Return exactly these fields: baseline_evaluation_id, candidate_evaluation_id,
  assessment, and biggest_metric_movement. For this fixture, biggest_metric_movement
  should be the metric name string, not a nested object.
expected_outcome:
  kind: exact_fields
  fields:
    baseline_evaluation_id: eval_compliance_2026_04_20
    candidate_evaluation_id: eval_compliance_2026_04_27
    assessment: regression
    biggest_metric_movement: recall
coverage_tags:
  - evaluations
  - comparison
  - multi_step
  - metric_reasoning
required_apis:
  - plexus.evaluation.info
  - plexus.evaluation.compare
max_attempts_for_first_try_pass: 1
fixture_notes: |
  The newer evaluation should have slightly better accuracy but materially worse
  recall, forcing a mixed-metric judgment where recall determines regression.
