id: discover_dataset_docs_then_build
name: "Discover dataset docs before building from feedback"
prompt: |
  I need a dataset built from the last 14 days of approved feedback for Compliance
  Tone, but I do not remember the dataset API. Use the docs to find the right
  API, then build the dataset and return the dataset id, row count, and source
  feedback window.
  Call plexus.docs.list, then plexus.docs.get{ key = "dataset" } before taking
  action. Then call plexus.dataset.build_from_feedback_window with score_id
  score_compliance_tone, window_days 14, and approved = true.
  Return exactly these fields: dataset_id, row_count, and source_window_days.
expected_outcome:
  kind: docs_discovery_then_action
  fields:
    docs_requested:
      - dataset
    dataset_id_present: true
    row_count_present: true
    source_window_days: 14
coverage_tags:
  - discovery_flow
  - docs
  - dataset
  - feedback
required_apis:
  - plexus.docs.list
  - plexus.docs.get
  - plexus.dataset.build_from_feedback_window
max_attempts_for_first_try_pass: 1
fixture_notes: |
  The prompt intentionally says the API is unknown. The expected behavior is
  docs-first, then action. The harness should record whether docs were used.
