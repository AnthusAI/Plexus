id: tight_budget_feedback_triage
name: "Triage feedback under a tight budget"
prompt: |
  The runtime has been configured with a tight $0.05 budget for this request,
  so you must stay on the cheap rungs of the cost ladder. For Compliance Tone,
  identify whether the last 30 days of feedback shows a likely false-negative
  problem. Use plexus.feedback.alignment and plexus.feedback.find for
  score_id score_compliance_tone to pull aggregate evidence. Do not call
  plexus.evaluation.run or plexus.score_result.investigate; those would blow
  the runtime budget and the runtime will refuse them. Return exactly these
  top-level fields: answer (yes or no) and alignment (the aggregate evidence
  and counts you used).
expected_outcome:
  kind: budget_aware
  fields:
    answer_present: true
    evidence_uses_counts_or_alignment: true
    did_not_call:
      - plexus.evaluation.run
      - plexus.score_result.investigate
coverage_tags:
  - budget_aware
  - cost_ladder
  - feedback
  - avoids_expensive_tool
required_apis:
  - plexus.feedback.alignment
  - plexus.feedback.find
forbidden_apis:
  - plexus.evaluation.run
  - plexus.score_result.investigate
max_attempts_for_first_try_pass: 1
fixture_notes: |
  The agent should choose aggregate feedback alignment/counts instead of an
  expensive evaluation or LLM investigation. The budget cap is enforced by
  the harness/runtime, so the snippet should not have to query budget itself.
